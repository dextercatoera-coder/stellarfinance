        h += '<div style="font-weight:700;font-size:.82rem">' + (isP ? esc(it.vendor) : 'Deposit') + '</div>';
        if (it.desc) h += '<div class="sch-desc" style="max-width:400px;white-space:normal">' + esc(it.desc) + '</div>';
        h += '</div><div style="text-align:right;flex-shrink:0;margin-left:12px">';
        h += '<div style="font-family:JetBrains Mono;font-weight:700;font-size:.88rem;color:' + (isP ? '#cc3333' : '#2d8a32') + '">' + (isP ? '-' : '+') + fmtCur(it.amt, it.cur) + '</div>';
        h += '<div style="font-family:JetBrains Mono;font-size:.52rem;color:var(--t3)">' + fmtD(it.usd) + '</div>';
        if (it.status) h += '<span class="badge ' + (it.status === 'Deposited' ? 'bg2' : it.status === 'Confirmed' ? 'bb2' : 'by2') + '" style="margin-top:2px">' + it.status + '</span>';
        h += '</div></div></div>';
      }
      h += '</div></div>';
    }
    h += '</div>';
    el('app').innerHTML = h;
  }

  // ===== CURRENCY =====
  function showCur() {
    var h = '<div class="fbar"><label>Mode:</label><select onchange="App.setCMd(this.value);if(this.value===\'live\')App.fetchLR();App.render()"><option value="live"' + (currencyMode === 'live' ? ' selected' : '') + '>Live</option><option value="fixed"' + (currencyMode === 'fixed' ? ' selected' : '') + '>Manual</option></select>';
    if (currencyMode === 'live') { h += '<button class="btn bs bp" onclick="App.fetchLR()">' + (liveFetching ? 'Updating...' : 'Refresh') + '</button>'; if (liveLastUpdated) h += '<span style="font-size:.6rem;color:#2d8a32;font-family:JetBrains Mono">' + liveLastUpdated + '</span>'; }
    h += '</div><div class="cur-convert-box"><div style="font-family:Space Grotesk;font-size:.82rem;font-weight:700;margin-bottom:10px">Converter</div>';
    h += '<div style="display:grid;grid-template-columns:1fr 80px 80px 40px;gap:8px;align-items:end"><div class="fg"><label class="fl">Amount</label><input type="number" id="cvAmt" value="' + curConvAmt + '" step="any" oninput="App.doConv()"></div><div class="fg"><label class="fl">From</label><select id="cvFr" onchange="App.doConv()">' + curOpts(curFrom) + '</select></div><div class="fg"><label class="fl">To</label><select id="cvTo" onchange="App.doConv()">' + curOpts(curTo) + '</select></div><div class="fg"><button class="btn" onclick="App.swapCur()">&#8644;</button></div></div>';
    h += '<div class="cur-convert-result" id="cvRes">' + fmtCur(convertCurrency(curConvAmt, curFrom, curTo), curTo) + '</div>';
    h += '<div class="cur-convert-sub" id="cvSub">1 ' + curFrom + ' = ' + convertCurrency(1, curFrom, curTo).toFixed(4) + ' ' + curTo + '</div></div>';
    h += '<div class="card"><div class="ch"><span class="ct">Rates (' + currencyMode + ')</span></div><div class="cur-pair-grid">';
    for (var k in FX) { if (k === 'USD') continue; h += '<div class="cur-pair-card"><div class="cur-pair-pair">USD/' + k + '</div><div class="cur-pair-rate">' + FX[k].r.toFixed(2) + '</div><div class="cur-pair-sub">' + FX[k].n + '</div></div>'; }
    h += '</div></div>';
    el('app').innerHTML = h;
  }
  function doConv() {
    var a = parseFloat(el('cvAmt').value) || 0, f = el('cvFr').value, t = el('cvTo').value;
    curConvAmt = a; curFrom = f; curTo = t;
    el('cvRes').textContent = fmtCur(convertCurrency(a, f, t), t);
    el('cvSub').textContent = '1 ' + f + ' = ' + convertCurrency(1, f, t).toFixed(4) + ' ' + t;
  }
  function swapCur() { var t = el('cvFr').value; el('cvFr').value = el('cvTo').value; el('cvTo').value = t; doConv(); }
  function fetchLR() {
    if (liveFetching) return;
    liveFetching = true;
    var ql = [];
    for (var k in FX) if (k !== 'USD') ql.push(k);
    var done = false;
    function ok() { if (done) return; done = true; liveLastUpdated = new Date().toLocaleString(); localStorage.setItem('ss_curRates', JSON.stringify(rateSnap())); localStorage.setItem('ss_curLiveTS', liveLastUpdated); liveFetching = false; render(); }
    fetch('https://api.frankfurter.dev/v2/rates?base=USD&quotes=' + ql.join(','))
      .then(function(r) { if (!r.ok) throw 0; return r.json(); })
      .then(function(data) { if (data && data.rates) { for (var k2 in data.rates) if (FX[k2]) FX[k2].r = data.rates[k2]; ok(); } else throw 0; })
      .catch(function() {
        fetch('https://open.er-api.com/v6/latest/USD')
          .then(function(r) { if (!r.ok) throw 0; return r.json(); })
          .then(function(d) { if (d && d.rates) { for (var k3 in FX) if (k3 !== 'USD' && d.rates[k3]) FX[k3].r = d.rates[k3]; ok(); } else throw 0; })
          .catch(function() { liveFetching = false; notify('Could not fetch rates'); });
      });
  }

  // ===== CLOUD TAB =====
  function showCloud() {
    var cfg; try { cfg = JSON.parse(localStorage.getItem('ss_cloudCfg')); } catch (e) {} cfg = cfg || {};
    var h = '<div class="fbar"><label>Display:</label><select onchange="App.setDC(this.value);App.render()">' + curOpts(DC) + '</select></div>';
    h += '<div class="stats"><div class="si" style="border-left:4px solid var(--bl)"><div class="sl">Payments</div><div class="sv" style="color:var(--bl)">' + D.pays.length + '</div></div>';
    h += '<div class="si" style="border-left:4px solid var(--g)"><div class="sl">Schedules</div><div class="sv" style="color:var(--g)">' + D.psSch.length + '</div></div>';
    h += '<div class="si" style="border-left:4px solid var(--am)"><div class="sl">Investments</div><div class="sv" style="color:var(--am)">' + D.invSch.length + '</div></div></div>';

    if (!currentUser) {
      h += '<div class="auth-card"><div class="auth-avatar">&#128274;</div><div style="font-family:Space Grotesk;font-size:1.1rem;font-weight:700;margin-bottom:4px">Sign In Required</div>';
      h += '<div style="font-size:.72rem;color:var(--t2);margin-bottom:20px">Sign in with Google to access cloud sync.</div>';
      if (!cfg.apiKey) {
        h += '<div class="config-grid" style="text-align:left;margin-bottom:16px"><div class="fg"><label class="fl">API Key</label><input type="text" id="cApiKey" placeholder="AIzaSy..."></div><div class="fg"><label class="fl">Database URL</label><input type="text" id="cDbUrl" placeholder="https://xxx.firebaseio.com"></div><div class="fg"><label class="fl">Project ID</label><input type="text" id="cPid" placeholder="my-project"></div><div class="fg"><label class="fl">Auth Domain</label><input type="text" id="cAuth" placeholder="xxx.firebaseapp.com"></div></div>';
        h += '<div class="config-grid" style="text-align:left;margin-bottom:16px"><div class="fg"><label class="fl">Room</label><input type="text" id="cRoom" value="' + esc(cloudRoom) + '" placeholder="default"></div><div class="fg">&nbsp;</div></div>';
      }
      h += '<button class="google-btn" onclick="App.saveCfgSI()"><svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg> Sign in with Google</button></div>';
    } else {
      var nm = currentUser.displayName || currentUser.email || 'User';
      var av = currentUser.photoURL ? '<img src="' + esc(currentUser.photoURL) + '">' : '<span>' + nm.charAt(0).toUpperCase() + '</span>';
      h += '<div class="card" style="border-left:4px solid var(--g)"><div class="ch"><span class="ct">Signed In</span><button class="signout-btn" onclick="App.doSignOut()">&#x2192; Sign Out</button></div>';
      h += '<div style="display:flex;align-items:center;gap:12px"><div class="auth-avatar" style="width:48px;height:48px;border-color:var(--g)">' + av + '</div><div><div class="auth-name">' + esc(nm) + '</div><div class="auth-email">' + esc(currentUser.email || '') + '</div></div></div></div>';
      h += '<div class="card" style="border-left:4px solid ' + (cloudConnected ? 'var(--g)' : 'var(--bl)') + '"><div class="ch"><span class="ct">Cloud Sync</span><span class="cloud-status ' + (cloudConnected ? 'connected' : 'disconnected') + '"><span class="user-dot" style="background:' + (cloudConnected ? 'var(--g)' : 'var(--rd)') + '"></span>' + (cloudConnected ? 'Connected' : 'Disconnected') + '</span></div>';
      if (cloudConnected) {
        var uc = Object.keys(cloudUsers).length;
        h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px"><div style="padding:10px;background:var(--s2);border-radius:var(--r)"><div style="font-size:.54rem;color:var(--t3);font-family:JetBrains Mono;text-transform:uppercase">Room</div><div style="font-weight:700;font-size:1rem;color:var(--bl)">' + esc(cloudRoom) + '</div></div><div style="padding:10px;background:var(--s2);border-radius:var(--r)"><div style="font-size:.54rem;color:var(--t3);font-family:JetBrains Mono;text-transform:uppercase">Online</div><div style="font-weight:700;font-size:1rem;color:var(--g)">' + uc + '</div></div></div>';
        h += '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">';
        for (var uid2 in cloudUsers) { var u = cloudUsers[uid2]; h += '<span class="user-pill"><span class="user-dot" style="background:' + (u.color || '#999') + '"></span>' + esc(u.name || 'Anon') + (uid2 === cloudUserId ? ' (you)' : '') + '</span>'; }
        h += '</div><div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn bp" onclick="App.cloudPush()">Push</button><button class="btn" style="border-color:var(--bl);color:var(--bl)" onclick="App.cloudPull()">Pull</button><button class="btn" onclick="App.cloudFullSync()">Full Sync</button><button class="btn" onclick="App.render()">Refresh</button><button class="btn bd" onclick="App.cloudDisconnect()">Disconnect</button></div>';
      } else {
        h += '<div style="font-size:.72rem;color:var(--t2);margin-bottom:12px">Connect to start syncing.</div>';
        h += '<div class="config-grid"><div class="fg"><label class="fl">API Key</label><input type="text" id="cApiKey" value="' + esc(cfg.apiKey || '') + '" placeholder="AIzaSy..."></div><div class="fg"><label class="fl">Database URL</label><input type="text" id="cDbUrl" value="' + esc(cfg.databaseURL || '') + '" placeholder="https://xxx.firebaseio.com"></div><div class="fg"><label class="fl">Room</label><input type="text" id="cRoom" value="' + esc(cloudRoom) + '" placeholder="default"></div><div class="fg">&nbsp;</div></div>';
        h += '<div style="display:flex;gap:8px;margin-top:8px"><button class="btn bp" onclick="App.saveCfgCO()">Save & Connect</button></div>';
      }
      h += '</div>';
      h += '<div class="card"><div class="ch"><span class="ct">Settings</span></div><label style="display:flex;align-items:center;gap:8px;font-size:.72rem;cursor:pointer"><input type="checkbox" ' + (cloudAutoSync ? 'checked' : '') + ' onchange="App.toggleAS(this.checked)" style="width:auto"> Auto-push changes to cloud</label></div>';
      h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px"><div class="card" style="border-left:4px solid var(--g)"><div class="ch"><span class="ct">Backup</span></div><div style="font-size:.68rem;color:var(--t2);margin-bottom:8px">Export all data as JSON.</div><button class="btn bp" onclick="App.cBkp()" style="width:100%;padding:10px">&#8681; Download</button></div>';
      h += '<div class="card" style="border-left:4px solid var(--bl)"><div class="ch"><span class="ct">Restore</span></div><div style="font-size:.68rem;color:var(--t2);margin-bottom:8px">Import backup.</div><div class="file-drop-zone"><div style="font-size:.66rem">Drop .json or <label style="color:var(--bl);cursor:pointer;text-decoration:underline">browse<input type="file" accept=".json" style="display:none" onchange="App.cRes(this.files[0])"></label></div></div></div></div>';
      h += '<div class="card" style="border-left:4px solid var(--rd)"><div class="ch"><span class="ct" style="color:var(--rd)">Danger Zone</span></div><div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn bd" onclick="App.clrP()">Clear Payments</button><button class="btn bd" onclick="App.clrS()">Clear Schedules</button><button class="btn bd" onclick="App.clrI()">Clear Investments</button><button class="btn bd" onclick="App.clrA()" style="background:var(--rd);color:#fff;border-color:var(--rd)">Clear All</button></div></div>';
    }
    el('app').innerHTML = h;
  }

  function saveCfgSI() {
    var cfg; try { cfg = JSON.parse(localStorage.getItem('ss_cloudCfg')); } catch (e) {} cfg = cfg || {};
    var el1 = el('cApiKey'); if (el1 && el1.value.trim()) cfg.apiKey = el1.value.trim();
    var el2 = el('cDbUrl'); if (el2 && el2.value.trim()) cfg.databaseURL = el2.value.trim();
    var el3 = el('cPid'); if (el3 && el3.value.trim()) cfg.projectId = el3.value.trim();
    var el4 = el('cAuth'); if (el4 && el4.value.trim()) cfg.authDomain = el4.value.trim();
    var el5 = el('cRoom'); if (el5) cloudRoom = el5.value.trim() || 'default';
    if (!cfg.apiKey) { alert('API Key required'); return; }
    localStorage.setItem('ss_cloudRoom', cloudRoom);
    localStorage.setItem('ss_cloudCfg', JSON.stringify(cfg));
    doSignIn();
  }

  function saveCfgCO() {
    var cfg; try { cfg = JSON.parse(localStorage.getItem('ss_cloudCfg')); } catch (e) {} cfg = cfg || {};
    var el1 = el('cApiKey'); if (el1) cfg.apiKey = el1.value.trim();
    var el2 = el('cDbUrl'); if (el2) cfg.databaseURL = el2.value.trim();
    if (!cfg.apiKey || !cfg.databaseURL) { alert('API Key and Database URL required'); return; }
    var el5 = el('cRoom'); if (el5) cloudRoom = el5.value.trim() || 'default';
    localStorage.setItem('ss_cloudRoom', cloudRoom);
    localStorage.setItem('ss_cloudCfg', JSON.stringify(cfg));
    if (!firebaseInit()) { notify('Init failed'); return; }
    cloudConnect();
  }

  function toggleAS(v) { cloudAutoSync = v; localStorage.setItem('ss_cloudAuto', v ? 'true' : 'false'); notify('Auto-sync ' + (v ? 'on' : 'off')); }
  function cBkp() {
    var bkp = { version: 1, date: new Date().toISOString(), dc: DC, pays: D.pays, psSch: D.psSch, invSch: D.invSch, vf: D.vf, curRates: rateSnap() };
    var b = new Blob([JSON.stringify(bkp, null, 2)], { type: 'application/json' }), u = URL.createObjectURL(b), a = document.createElement('a');
    a.href = u; a.download = 'StellarSeeds_' + today() + '.json'; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(u); notify('Backup downloaded');
  }
  function cRes(file) {
    if (!file) return;
    if (!confirm('Replace all current data?')) return;
    var reader = new FileReader();
    reader.onload = function(e) {
      try {
        var b = JSON.parse(e.target.result); if (!b.version) throw new Error('Invalid');
        cloudSilent = true;
        if (b.pays) D.pays = b.pays; if (b.psSch) D.psSch = b.psSch; if (b.invSch) D.invSch = b.invSch; if (b.vf) D.vf = b.vf;
        saveLocal(); cloudSilent = false; notify('Restored'); render();
      } catch (err) { alert('Error: ' + err.message); }
    };
    reader.readAsText(file);
  }
  function clrP() { if (!confirm('Delete all payments?')) return; D.pays = []; save(); notify('Cleared'); render(); }
  function clrS() { if (!confirm('Delete all schedules?')) return; D.psSch = []; save(); notify('Cleared'); render(); }
  function clrI() { if (!confirm('Delete all investments?')) return; D.invSch = []; save(); notify('Cleared'); render(); }
  function clrA() { if (!confirm('DELETE EVERYTHING?')) return; if (!confirm('Are you sure?')) return; D.pays = []; D.psSch = []; D.invSch = []; D.vf = {}; save(); notify('All cleared'); render(); }

  function openExport() { openModal('Export', '<div style="font-size:.72rem;color:var(--t2);margin-bottom:16px">Export all data as CSV.</div><button class="btn bp" onclick="App.doCSV()" style="padding:12px 24px">Export CSV</button>', '<button class="btn" onclick="App.cMod()">Close</button>'); }
  function doCSV() {
    var rows = [['Date', 'Type', 'Entity', 'Category', 'Fund', 'Currency', 'Amount', 'USD', 'Status']];
    for (var i = 0; i < D.pays.length; i++) { var p = D.pays[i]; rows.push([p.date, 'Payment', p.vendor, p.category || '', p.fund || '', p.cur, p.amt, convertCurrency(p.amt, p.cur, 'USD').toFixed(2), 'Paid']); }
    for (var i = 0; i < D.invSch.length; i++) { var r = D.invSch[i]; rows.push([r.date, 'Investment', r.remarks || '', r.fund || '', r.cur || 'USD', r.amount, convertCurrency(r.amount, r.cur || 'USD', 'USD').toFixed(2), r.status]); }
    var csv = '';
    for (var i = 0; i < rows.length; i++) csv += rows[i].map(function(c) { return '"' + String(c).replace(/"/g, '""') + '"'; }).join(',') + '\n';
    var b = new Blob([csv], { type: 'text/csv' }), u = URL.createObjectURL(b), a = document.createElement('a');
    a.href = u; a.download = 'StellarSeeds_' + today() + '.csv'; a.click(); URL.revokeObjectURL(u); notify('Exported'); cMod();
  }

  // ===== PAGE ROUTER =====
  var pageRenderers = {
    dash: showDash, cf: showCF, pays: showPays, paySch: showPaySch,
    invSch: showInv, vendors: showVendors, history: showHist, cur: showCur, cloud: showCloud
  };

  // ===== INIT =====
  function init() {
    initFileDB().then(function() { load(); nav(); render(); }).catch(function() { load(); nav(); render(); });
    if (currencyMode === 'live') setTimeout(fetchLR, 500);
    setInterval(function() { if (currencyMode === 'live') fetchLR(); }, 600000);
    setTimeout(function() {
      if (localStorage.getItem('ss_cloudCfg') && firebaseInit()) {
        firebaseAuth.onAuthStateChanged(function(user) {
          currentUser = user; updateBadges();
          if (user) autoConnectCloud();
          if (tab === 'cloud') render();
        });
      }
    }, 500);
  }

  // ===== PUBLIC API =====
  return {
    init: init, go: go, render: render, cMod: cMod,
    setDC: setDC, setDashFund: function(v) { dashFund = v; },
    setSummaryMonth: function(v) { summaryMonth = v; },
    setCF: function(v) { cfFund = v; },
    setCL: function(v) { cfLookback = parseInt(v); },
    setCM: function(v) { cfMonths = parseInt(v); },
    setIF: function(v) { invShowFund = v; },
    setPT: function(v) { pssTerm = v; },
    setPF: function(v) { pssFund = v; },
    setCMd: function(v) { currencyMode = v; localStorage.setItem('ss_curMode', v); },
    setPF2: function(k, v) { psF[k] = v; },
    resetPF: function() { psF = { q: '', cat: 'all', fund: 'all', status: 'all' }; },
    setHF: function(k, v) { histF[k] = v; },
    resetHF: function() { histF = { type: 'all', fund: 'all', q: '' }; render(); },
    mpSub: mpSub, doPay: doPay, pickInst: pickInst, submitPay: submitPay, delPay: delPay,
    editSch: editSch, saveSch: saveSch, delSch: delSch,
    pssSave: pssSave, pssChk: pssChk, addIR: addIR,
    invSave: invSave, invEdit: invEdit, invSaveE: invSaveE, invDel: invDel,
    doConv: doConv, swapCur: swapCur, fetchLR: fetchLR,
    openExport: openExport, doCSV: doCSV,
    openFilesModal: openFilesModal, openVFMI: openVFMI,
    uploadFiles: uploadFiles, downloadFile: downloadFile, removeFile: removeFile,
    showMonthDetail: showMonthDetail,
    toggleOS: toggleOS, toggleVN: toggleVN,
    doSignIn: doSignIn, doSignOut: doSignOut,
    saveCfgSI: saveCfgSI, saveCfgCO: saveCfgCO,
    cloudConnect: cloudConnect, cloudDisconnect: cloudDisconnect,
    cloudPush: cloudPush, cloudPull: cloudPull, cloudFullSync: cloudFullSync,
    toggleAS: toggleAS, cBkp: cBkp, cRes: cRes,
    clrP: clrP, clrS: clrS, clrI: clrI, clrA: clrA
  };
})();

App.init();
</script>
