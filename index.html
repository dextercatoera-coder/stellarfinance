<div id="loginScr" style="display:none"><div class="lcard"><div style="display:flex;align-items:center;gap:10px;margin-bottom:24px;justify-content:center"><div class="logo-ic" style="width:40px;height:40px"></div><div class="logo-txt"><span class="logo-nm" style="font-size:1.1rem">Stellar Seeds</span><span class="logo-sb">Construction Management</span></div></div><div style="font-family:'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:700;text-align:center;margin-bottom:4px" id="lTitle">Sign In</div><div style="font-size:.72rem;color:var(--t3);text-align:center;margin-bottom:20px" id="lSub">Enter credentials</div><div class="lerr" id="lErr"></div><div class="fg"><label class="fl">Email</label><input type="text" id="lEmail" placeholder="you@company.com"></div><div class="fg"><label class="fl">Password</label><input type="password" id="lPass" placeholder="Password"></div><button class="btn bp" style="width:100%;padding:10px;font-size:.82rem;margin-top:6px" id="lBtn" onclick="doLogin()">Sign In</button><div style="text-align:center;margin-top:14px;font-size:.74rem;color:var(--t3)" id="lTog">No account? <a style="color:var(--g);font-weight:600" onclick="togAuth()">Sign Up</a></div><div style="margin-top:16px;padding-top:12px;border-top:1px solid var(--b2);text-align:center"><a style="font-size:.68rem;color:var(--t3);text-decoration:underline" onclick="skipAuth()">Continue without login</a></div></div></div>

function getSummaryMonths(){var m={};for(var i=0;i<D.pays.length;i++){if(D.pays[i].date)m[D.pays[i].date.substring(0,7)]=1}for(var i=0;i<D.invSch.length;i++){if(D.invSch[i].date)m[D.invSch[i].date.substring(0,7)]=1}return Object.keys(m).sort()}
function getMonthPayables(mk){var p=mk.split('-'),yr=parseInt(p[0]),mo=parseInt(p[1])-1,pl=[];for(var i=0;i<D.psSch.length;i++){var r=D.psSch[i];if(r.terms==='monthly'&&r.startDate&&r.endDate){var ms=new Date(yr,mo,1),me=new Date(yr,mo+1,0);if(ms<=new Date(r.endDate)&&me>=new Date(r.startDate)){var mc=monthCount(r.startDate,r.endDate),ma=mc>0?cv(r.totalCost,r.cur||'USD','USD')/mc:0;pl.push({vendor:r.vendor,amount:ma,fund:r.fund||'VN Fund',category:r.category||'Others',type:'Monthly',detail:''})}}else if(r.terms==='installment'){for(var j=0;j<(r.installments||[]).length;j++){var ins=r.installments[j];if(ins.date&&ins.date.substring(0,7)===mk){var ia=cv(r.totalCost,r.cur||'USD','USD')*ins.pct/100;pl.push({vendor:r.vendor,amount:ia,fund:ins.fund||r.fund||'VN Fund',category:r.category||'Others',type:'Tranche',detail:ins.pct+'%'})}}}}pl.sort(function(a,b){return b.amount-a.amount});return pl}
function getProjectedMonthly(n){var now=new Date(),sy=now.getFullYear(),sm=now.getMonth(),mn=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],data=[];for(var m=0;m<n;m++){var tm=sm+m,ty=sy+Math.floor(tm/12),tmm=tm%12,proj=0,dtls=[];for(var i=0;i<D.psSch.length;i++){var r=D.psSch[i],aUSD=cv(r.totalCost,r.cur||'USD','USD');if(r.terms==='monthly'){if(new Date(ty,tmm,1)<=new Date(r.endDate)&&new Date(ty,tmm+1,0)>=new Date(r.startDate)){var mc=monthCount(r.startDate,r.endDate),ma=mc>0?aUSD/mc:0;proj+=ma;dtls.push({vendor:r.vendor,amount:ma,fund:r.fund||'VN Fund',type:'Monthly'})}}else if(r.terms==='installment'){for(var j=0;j<(r.installments||[]).length;j++){var inst=r.installments[j],id=new Date(inst.date);if(id.getFullYear()===ty&&id.getMonth()===tmm){var ia=aUSD*inst.pct/100;proj+=ia;dtls.push({vendor:r.vendor,amount:ia,fund:inst.fund||r.fund||'VN Fund',type:'Tranche '+inst.pct+'%'})}}}}var act=0;for(var i=0;i<D.pays.length;i++){var p=D.pays[i],pd=new Date(p.date);if(pd.getFullYear()===ty&&pd.getMonth()===tmm)act+=cv(p.amt,p.cur,'USD')}data.push({label:mn[tmm]+' '+String(ty).slice(2),shortLabel:mn[tmm],month:tmm,year:ty,projected:proj,actual:act,details:dtls,isCurrent:m===0,isFuture:m>0})}return data}

/* ===== CASH FLOW ENGINE (past + present + future) ===== */
function getCashFlowProjection(pastN,futureN){
var now=new Date(),sy=now.getFullYear(),sm=now.getMonth();
var mn=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
var data=[],currentIdx=pastN;

for(var m=-pastN;m<=futureN;m++){
var tm=sm+m,ty=sy+Math.floor(tm/12),tmm=((tm%12)+12)%12;
var inf={},outf={},din=[],dout=[];
for(var fi=0;fi<FUNDS.length;fi++){inf[FUNDS[fi]]=0;outf[FUNDS[fi]]=0}
var isPast=m<0,isCurrent=m===0,isFuture=m>0;

if(isPast||isCurrent){
/* Actual data from records */
for(var i=0;i<D.invSch.length;i++){var r=D.invSch[i];
if(r.date&&(r.status==='Deposited'||r.status==='Confirmed')){var rd=new Date(r.date);
if(rd.getFullYear()===ty&&rd.getMonth()===tmm){var fund=r.fund||'Other',amt=cv(r.amount,r.cur||'USD','USD');inf[fund]+=amt;din.push({fund:fund,amount:amt,source:r.remarks||'Deposit',type:r.status})}}}
for(var i=0;i<D.pays.length;i++){var p=D.pays[i];
if(p.date){var pd=new Date(p.date);if(pd.getFullYear()===ty&&pd.getMonth()===tmm){var fund=p.fund||'Other',amt=cv(p.amt,p.cur,'USD');outf[fund]+=amt;dout.push({fund:fund,amount:amt,vendor:p.vendor,type:'Payment'})}}}}

if(isFuture){
/* Projected data */
for(var i=0;i<D.invSch.length;i++){var r=D.invSch[i];
if(r.status==='Pending'&&r.date){var rd=new Date(r.date);
if(rd.getFullYear()===ty&&rd.getMonth()===tmm){var fund=r.fund||'Other',amt=cv(r.amount,r.cur||'USD','USD');inf[fund]+=amt;din.push({fund:fund,amount:amt,source:r.remarks||'Deposit',type:'Pending'})}}}
for(var i=0;i<D.psSch.length;i++){var r=D.psSch[i],aUSD=cv(r.totalCost,r.cur||'USD','USD');
if(r.terms==='monthly'&&r.startDate&&r.endDate){
if(new Date(ty,tmm,1)<=new Date(r.endDate)&&new Date(ty,tmm+1,0)>=new Date(r.startDate)){
var mc=monthCount(r.startDate,r.endDate),ma=mc>0?aUSD/mc:0,fund=r.fund||'VN Fund';outf[fund]+=ma;dout.push({fund:fund,amount:ma,vendor:r.vendor,type:'Monthly'})}}
else if(r.terms==='installment'){for(var j=0;j<(r.installments||[]).length;j++){var inst=r.installments[j];if(inst.date){var id2=new Date(inst.date);if(id2.getFullYear()===ty&&id2.getMonth()===tmm){var ia=aUSD*inst.pct/100,fund=inst.fund||r.fund||'VN Fund';outf[fund]+=ia;dout.push({fund:fund,amount:ia,vendor:r.vendor,type:'Tranche '+inst.pct+'%'})}}}}}}

var tIn=0,tOut=0;for(var fi=0;fi<FUNDS.length;fi++){tIn+=inf[FUNDS[fi]];tOut+=outf[FUNDS[fi]]}
data.push({label:mn[tmm]+' '+String(ty).slice(2),month:tmm,year:ty,inflows:inf,outflows:outf,totalIn:tIn,totalOut:tOut,net:tIn-tOut,detailsIn:din,detailsOut:dout,isPast:isPast,isCurrent:isCurrent,isFuture:isFuture})
}

/* Calculate running balance */
var fb=getFundBalances(),currentTotalBal=0;
for(var k in fb)currentTotalBal+=fb[k].balance;

/* Per-fund running balance */
for(var fi=0;fi<FUNDS.length;fi++){
var fund=FUNDS[fi],curBal=(fb[fund]||{balance:0}).balance;
var pastNets=0;for(var i=0;i<=currentIdx;i++)pastNets+=((data[i].inflows[fund]||0)-(data[i].outflows[fund]||0));
var startBal=curBal-pastNets,runBal=startBal;
for(var i=0;i<data.length;i++){runBal+=((data[i].inflows[fund]||0)-(data[i].outflows[fund]||0));if(!data[i].fundBal)data[i].fundBal={};data[i].fundBal[fund]=runBal}
}

/* Total running balance */
var totalPastNets=0;for(var i=0;i<=currentIdx;i++)totalPastNets+=data[i].net;
var totalStartBal=currentTotalBal-totalPastNets,tRun=totalStartBal;
for(var i=0;i<data.length;i++){tRun+=data[i].net;data[i].totalBal=tRun}

return data}

var maxV=0;for(var i=0;i<n;i++){var iv=fund==='all'?data[i].totalIn:(data[i].inflows[fund]||0),ov=fund==='all'?data[i].totalOut:(data[i].outflows[fund]||0);maxV=Math.max(maxV,iv,ov)}
if(maxV===0)maxV=100;var cH=160;
var h='<div style="position:relative;margin-bottom:6px"><div style="position:relative;margin-left:50px;height:'+cH+'px">';
for(var g=0;g<=4;g++){var yP=(g/4)*100;h+='<div style="position:absolute;left:0;right:0;top:'+yP+'%;border-top:'+(g===4?'1px solid var(--b1)':'1px dashed var(--b2)')+'"></div>';h+='<div style="position:absolute;left:-48px;top:calc('+yP+'% - 6px);width:44px;text-align:right;font-size:.42rem;font-family:JetBrains Mono;color:var(--t3)">'+fmtD(maxV*(1-g/4))+'</div>'}
/* Separator line at current month */
var sepX=(pastN/(n>1?n-1:1))*100;
h+='<div style="position:absolute;left:'+sepX+'%;top:0;bottom:0;border-left:1.5px dashed var(--g);z-index:2;opacity:.5"></div>';
h+='<div style="position:absolute;left:0;right:0;bottom:0;top:0;display:flex;gap:2px;padding:0 1px">';
for(var i=0;i<n;i++){var iv=fund==='all'?data[i].totalIn:(data[i].inflows[fund]||0),ov=fund==='all'?data[i].totalOut:(data[i].outflows[fund]||0);var iH=maxV>0?(iv/maxV)*cH:0,oH=maxV>0?(ov/maxV)*cH:0;var op=data[i].isCurrent?'1':data[i].isPast?'0.85':'0.45';h+='<div style="flex:1;display:flex;gap:1px;align-items:flex-end;height:'+cH+'px;opacity:'+op+'"><div style="flex:1;background:var(--g);border-radius:1px 1px 0 0;height:'+Math.max(iv>0?2:0,iH)+'px"></div><div style="flex:1;background:var(--rd);border-radius:1px 1px 0 0;height:'+Math.max(ov>0?2:0,oH)+'px"></div></div>'}
h+='</div></div><div style="display:flex;gap:2px;padding:0 1px;margin-left:50px;margin-top:3px">';
for(var i=0;i<n;i++){h+='<div style="flex:1;text-align:center;font-size:.34rem;color:'+(data[i].isCurrent?'var(--g)':data[i].isPast?'var(--t2)':'var(--t3)')+';font-family:JetBrains Mono;font-weight:'+(data[i].isCurrent?'700':'400')+'">'+data[i].label+'</div>'}
h+='</div><div style="display:flex;gap:14px;justify-content:center;margin-top:6px;font-size:.52rem;color:var(--t3)"><span style="display:flex;align-items:center;gap:3px"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:var(--g)"></span>Inflow</span><span style="display:flex;align-items:center;gap:3px"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:var(--rd)"></span>Outflow</span><span style="display:flex;align-items:center;gap:3px"><span style="display:inline-block;width:12px;height:0;border-top:1.5px dashed var(--g)"></span>Now</span></div></div>';
return h}

function cfBalanceLine(data,fund,pastN){
var n=data.length;if(!n)return '';
var vals=[];for(var i=0;i<n;i++){if(fund==='all')vals.push(data[i].totalBal);else vals.push((data[i].fundBal&&data[i].fundBal[fund])||0)}
var mx=Math.max.apply(null,vals),mn2=Math.min.apply(null,vals);mn2=Math.min(mn2,0);mx=Math.max(mx,0);if(mx===mn2){mx+=100;mn2-=100}var rng=mx-mn2;

/* Split points into past and future */
var pastPts='',futurePts='',allPts='';
for(var i=0;i<n;i++){var x=n>1?(i/(n-1))*100:50,y=100-((vals[i]-mn2)/rng)*100;allPts+=x.toFixed(1)+','+y.toFixed(1)+' ';if(i<=pastN)pastPts+=x.toFixed(1)+','+y.toFixed(1)+' ';if(i>=pastN)futurePts+=x.toFixed(1)+','+y.toFixed(1)+' '}

var zy=100-((0-mn2)/rng)*100;zy=Math.max(0,Math.min(100,zy));
var col=vals[n-1]>=0?'#2d8a32':'#cc3333';
var r='<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--b2)"><div style="font-size:.5rem;color:var(--t3);margin-bottom:3px;font-family:JetBrains Mono">Running Balance ('+(fund==='all'?'Total':fund)+')&ensp;<span style="color:var(--t2)">|</span>&ensp;<span style="color:var(--t2)">Past</span> &mdash; <span style="color:var(--t3)">Projected</span></div>';
r+='<svg viewBox="0 0 100 100" preserveAspectRatio="none" style="width:100%;height:60px;border:1px solid var(--b2);border-radius:4px;background:var(--s2)">';
r+='<line x1="0" y1="'+zy.toFixed(1)+'" x2="100" y2="'+zy.toFixed(1)+'" stroke="#e0ded8" stroke-width="0.3" stroke-dasharray="1,1"/>';
r+='<polygon points="0,'+zy.toFixed(1)+' '+allPts+'100,'+zy.toFixed(1)+'" fill="'+(vals[n-1]>=0?'rgba(45,138,50,.08)':'rgba(204,51,51,.08)')+'"/>';
/* Past: solid line */
r+='<polyline points="'+pastPts.trim()+'" fill="none" stroke="'+col+'" stroke-width="0.8"/>';
/* Future: dashed line */
r+='<polyline points="'+futurePts.trim()+'" fill="none" stroke="'+col+'" stroke-width="0.6" stroke-dasharray="2,1" opacity="0.7"/>';
/* Current month dot */
var cx=n>1?(pastN/(n-1))*100:50,cy=100-((vals[pastN]-mn2)/rng)*100;
r+='<circle cx="'+cx.toFixed(1)+'" cy="'+cy.toFixed(1)+'" r="2" fill="'+col+'" stroke="#fff" stroke-width="0.5"/>';
/* End dot */
r+='<circle cx="'+(n>1?100:50).toFixed(1)+'" cy="'+(100-((vals[n-1]-mn2)/rng)*100).toFixed(1)+'" r="1.2" fill="'+col+'" opacity="0.6"/>';
r+='</svg><div style="display:flex;justify-content:space-between;font-size:.48rem;font-family:JetBrains Mono;margin-top:2px"><span style="color:var(--t3)">Earliest: '+fmtD(vals[0])+'</span><span style="color:var(--g);font-weight:700">Now: '+fmtD(vals[pastN])+'</span><span style="color:'+(vals[n-1]>=0?'var(--g)':'var(--rd)')+';font-weight:700">End: '+fmtD(vals[n-1])+'</span></div></div>';
return r}

function cfPerFundChart(data,pastN){

var maxV=0;for(var i=0;i<n;i++)for(var fi=0;fi<FUNDS.length;fi++){maxV=Math.max(maxV,data[i].outflows[FUNDS[fi]]||0)}
if(maxV===0)maxV=100;var cH=160,fc={'VN Fund':'var(--g)','PH Fund':'var(--bl)','Other':'var(--am)'};
var h='<div style="position:relative;margin-bottom:6px"><div style="position:relative;margin-left:50px;height:'+cH+'px">';
for(var g=0;g<=4;g++){var yP=(g/4)*100;h+='<div style="position:absolute;left:0;right:0;top:'+yP+'%;border-top:'+(g===4?'1px solid var(--b1)':'1px dashed var(--b2)')+'"></div>';h+='<div style="position:absolute;left:-48px;top:calc('+yP+'% - 6px);width:44px;text-align:right;font-size:.42rem;font-family:JetBrains Mono;color:var(--t3)">'+fmtD(maxV*(1-g/4))+'</div>'}

function getSecData(id){var r={table:[],chart:null};if(id==='fb'){var fb=getFundBalances();r.table=[['Fund','Inflow('+DC+')','Outflow('+DC+')','Balance('+DC+')']];for(var i=0;i<FUNDS.length;i++){var f=fb[FUNDS[i]]||{inflow:0,outflow:0,balance:0};r.table.push([FUNDS[i],fmtD(f.inflow),fmtD(f.outflow),fmtD(f.balance)])}}else if(id==='vs'){var vs=getVendorSummary(),vk=Object.keys(vs).sort(function(a,b){return vs[b].totalSch-vs[a].totalSch});r.table=[['Vendor','Scheduled('+DC+')','Paid('+DC+')','Paid%']];var lb=[],dS=[],dP=[];for(var i=0;i<vk.length;i++){var v=vs[vk[i]];r.table.push([vk[i],fmtD(v.totalSch),fmtD(v.totalPaid),pct(v.totalPaid,v.totalSch)+'%']);lb.push(vk[i].substring(0,15));dS.push(+v.totalSch.toFixed(0));dP.push(+v.totalPaid.toFixed(0))}r.chart={title:'Vendors',labels:lb,datasets:[{name:'Scheduled',values:dS,color:'2874a6'},{name:'Paid',values:dP,color:'2d8a32'}]}}else if(id==='tot'){var fb=getFundBalances(),tI=0,tO=0;for(var k in fb){tI+=fb[k].inflow;tO+=fb[k].outflow}r.table=[['Metric','Value'],['Total Inflow',fmtD(tI)],['Disbursed',fmtD(tO)],['Balance',fmtD(tI-tO)]]}else if(id==='cfproj'){var proj=getCashFlowProjection(cfLookback,cfMonths);r.table=[['Month','Period','Inflow('+DC+')','Outflow('+DC+')','Net('+DC+')','Balance('+DC+')']];var lb=[],dI=[],dO=[];for(var i=0;i<proj.length;i++){var p=proj[i],iv,ov,bal;if(cfFund==='all'){iv=p.totalIn;ov=p.totalOut;bal=p.totalBal}else{iv=p.inflows[cfFund]||0;ov=p.outflows[cfFund]||0;bal=(p.fundBal&&p.fundBal[cfFund])||0}var per=p.isPast?'Actual':p.isCurrent?'Current':'Projected';r.table.push([p.label,per,fmtD(iv),fmtD(ov),fmtD(iv-ov),fmtD(bal)]);lb.push(p.label);dI.push(+iv.toFixed(0));dO.push(+ov.toFixed(0))}r.chart={title:'Cash Flow',labels:lb,datasets:[{name:'Inflow',values:dI,color:'2d8a32'},{name:'Outflow',values:dO,color:'cc3333'}]}}else if(id==='inv'){r.table=[['#','Date','Fund','Amount','Currency','Status']];for(var i=0;i<D.invSch.length;i++){var x=D.invSch[i];r.table.push([i+1,x.date,x.fund,x.amount,x.cur,x.status])}}else if(id==='pay'){r.table=[['#','Date','Vendor','Fund','Amount','Currency','Schedule']];for(var i=0;i<D.pays.length;i++){var p=D.pays[i],sl='';if(p.psSchId){var sf=findSch(p.psSchId);sl=sf?sf.sch.vendor:'Linked'}r.table.push([i+1,p.date,p.vendor,p.fund||'Other',p.amt,p.cur,sl||'Unlinked'])}}else if(id==='ps'){r.table=[['#','Vendor','Terms','Total','Currency','Fund','Status']];for(var i=0;i<D.psSch.length;i++){var x=D.psSch[i],st=getSchStatus(x.id);r.table.push([i+1,x.vendor,x.terms,x.totalCost,x.cur,x.fund||'VN Fund',st.label])}}else if(id==='tx'){var txs=filterTxs(buildTxList());r.table=[['#','Date','Type','Entity','Fund','Amount('+DC+')','Status']];for(var i=0;i<txs.length;i++){var t=txs[i];r.table.push([i+1,t.date,t.type,t.entity,t.fund,(t.type==='payment'?'-':'+')+fmtD(t.usd),t.status])}}else if(id==='rates'){r.table=[['Code','Name','Rate/USD']];for(var k in FX)r.table.push([k,FX[k].name,FX[k].r])}else if(id==='status'){r.table=[['Key','Value'],['Cloud',cOn?'Connected':'Offline'],['User',curUser?curUser.email:'Local']]}return r}
function openExport(){var secs=getExpSections();for(var i=0;i<secs.length;i++){if(expChecked[secs[i].id]===undefined)expChecked[secs[i].id]=secs[i].def}var xOk=typeof XLSX!=='undefined',pOk=typeof jspdf!=='undefined';var h='<div style="margin-bottom:12px"><div style="font-family:Space Grotesk;font-size:.88rem;font-weight:700">Export: <span style="color:var(--g)">'+(TLBL[tab]||tab)+'</span></div></div><div style="margin-bottom:12px"><div style="font-size:.68rem;font-weight:700;margin-bottom:6px">Sections:</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:4px">';for(var i=0;i<secs.length;i++){h+='<label class="sec-cb"><input type="checkbox" id="expC_'+secs[i].id+'"'+(expChecked[secs[i].id]?' checked':'')+' onchange="expChecked[\''+secs[i].id+'\']=this.checked">'+H(secs[i].label)+'</label>'}h+='</div></div><div style="display:flex;gap:6px;margin-bottom:14px"><button class="btn bs" onclick="selAllExp(true)">All</button><button class="btn bs" onclick="selAllExp(false)">None</button></div><div class="exp-grid"><div class="exp-card excel"'+(xOk?' onclick="runExp(\'xlsx\')"':' style="opacity:.4"')+'><div class="exp-icon">X</div><div class="exp-title">Excel</div></div><div class="exp-card pdf"'+(pOk?' onclick="runExp(\'pdf\')"':' style="opacity:.4"')+'><div class="exp-icon">P</div><div class="exp-title">PDF</div></div><div class="exp-card ppt" onclick="runExp(\'pptx\')"><div class="exp-icon">T</div><div class="exp-title">PowerPoint</div></div></div><div class="exp-status" id="expSt"></div>';mOpen('Export',h,'<button class="btn" onclick="mClose()">Close</button>')}
function selAllExp(val){var secs=getExpSections();for(var i=0;i<secs.length;i++){expChecked[secs[i].id]=val;var el=document.getElementById('expC_'+secs[i].id);if(el)el.checked=val}}
function eMsg(m,t){var el=document.getElementById('expSt');if(el){el.className='exp-status show '+(t||'going');el.textContent=m}}
function runExp(fmt){var any=false,secs=getExpSections();for(var i=0;i<secs.length;i++){if(expChecked[secs[i].id]){any=true;break}}if(!any){eMsg('Select at least one','fail');return}try{eMsg('Generating...');if(fmt==='xlsx')expX();else if(fmt==='pdf')expP();else if(fmt==='pptx')expT();eMsg('Done!','ok');setTimeout(mClose,1200)}catch(err){eMsg('Error: '+err.message,'fail');console.error(err)}}
function expX(){var wb=XLSX.utils.book_new(),secs=getExpSections(),cnt=0;for(var i=0;i<secs.length;i++){if(!expChecked[secs[i].id])continue;var data=getSecData(secs[i].id);if(data.table.length>1){XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(data.table),secs[i].label.substring(0,31));cnt++}}if(!cnt)throw new Error('No data');XLSX.writeFile(wb,'StellarSeeds_'+td()+'.xlsx')}
function expP(){var doc=new jspdf.jsPDF();doc.setFontSize(18);doc.setTextColor(40,116,166);doc.text('Stellar Seeds',14,20);doc.setFontSize(10);doc.setTextColor(120);doc.text((TLBL[tab]||tab)+' | '+new Date().toLocaleDateString()+' | '+DC,14,28);var y=34,secs=getExpSections();for(var i=0;i<secs.length;i++){if(!expChecked[secs[i].id])continue;var data=getSecData(secs[i].id);if(y>260){doc.addPage();y=20}doc.setFontSize(11);doc.setTextColor(40,116,166);doc.text(secs[i].label,14,y);y+=5;if(data.table.length>1){doc.autoTable({startY:y,head:[data.table[0]],body:data.table.slice(1),theme:'grid',headStyles:{fillColor:[40,116,166],textColor:255},styles:{fontSize:7},margin:{left:14,right:14}});y=doc.lastAutoTable?doc.lastAutoTable.finalY+6:y+20}}doc.save('StellarSeeds_'+td()+'.pdf')}
function expT(){var Ctor=typeof PptxGenJS!=='undefined'?PptxGenJS:PptxGen;if(!Ctor)throw new Error('PPT not loaded');var pptx=new Ctor(),s1=pptx.addSlide();s1.addText('STELLAR SEEDS',{x:0.8,y:1.5,w:8,fontSize:30,color:'FFFFFF',bold:true});s1.addText((TLBL[tab]||tab)+' | '+new Date().toLocaleDateString(),{x:0.8,y:2.4,w:8,fontSize:12,color:'999'});var secs=getExpSections();for(var i=0;i<secs.length;i++){if(!expChecked[secs[i].id])continue;var data=getSecData(secs[i].id);if(data.table.length>1){var s=pptx.addSlide();s.addText(secs[i].label,{x:0.6,y:0.15,w:8,fontSize:18,color:'FFFFFF',bold:true});var rows=[];for(var j=0;j<data.table.length;j++)rows.push(data.table[j].map(String));s.addTable(rows,{x:0.4,y:1.0,w:9.2,fontSize:8,fontFace:'Arial',border:{type:'solid',pt:0.5,color:'e0ded8'},rowH:0.3,autoPage:true,head:{fill:{color:'2874a6'},color:'FFFFFF',bold:true},altRow:{fill:{color:'f5f4f0'}}})}}pptx.writeFile({fileName:'StellarSeeds_'+td()+'.pptx'})}

/* ===== CLOUD ===== */
function initCloud(){var c;try{c=JSON.parse(localStorage.getItem('ss_cloud'))}catch(e){}if(!c||!c.databaseURL)return false;try{if(typeof firebase!=='undefined'){var cfg={databaseURL:c.databaseURL};if(c.apiKey)cfg.apiKey=c.apiKey;if(!firebase.apps.length)firebase.initializeApp(cfg);db=firebase.database();try{auth=firebase.auth()}catch(e){auth=null}cOn=true;return true}}catch(e){}return false}
function cSave(){if(!db)return;skipSync=true;db.ref('ss').update({costs:D.costs,pays:D.pays,upds:D.upds,vn:D.vn,psSch:D.psSch,invSch:D.invSch,_ts:Date.now()}).then(function(){setTimeout(function(){skipSync=false},1000);setDot('on');setLbl('Synced')}).catch(function(e){skipSync=false;setDot(isPermErr(e)?'err':'wr')})}
function syncFromCloud(){if(!db)return;setDot('wr');setLbl('Syncing...');db.ref('ss').once('value').then(function(s){var v=s.val();if(!v){setupLiveSync();setDot('on');setLbl('Synced');return}var ch=false;['costs','pays','upds','psSch','invSch'].forEach(function(k){if(v[k]&&Array.isArray(v[k])&&v[k].length){D[k]=v[k];localStorage.setItem('ss_'+k,JSON.stringify(v[k]));ch=true}});if(ch)doRender();setDot('on');setLbl('Synced');setupLiveSync()}).catch(function(e){setDot(isPermErr(e)?'err':'wr');setupLiveSync()})}
function setupLiveSync(){if(!db)return;var ref=db.ref('ss');ref.off();ref.on('value',function(s){if(skipSync)return;var v=s.val();if(!v)return;var ch=false;['costs','pays','upds','psSch','invSch'].forEach(function(k){if(v[k]&&Array.isArray(v[k])){D[k]=v[k];localStorage.setItem('ss_'+k,JSON.stringify(v[k]));ch=true}});if(ch){doRender();setDot('on');setLbl('Synced')}},function(e){setDot('err')})}
function monitorConnection(){if(!db)return;db.ref('.info/connected').on('value',function(s){if(s.val()===true){setDot('on');setLbl('Connected');if(curUser)syncFromCloud()}else{setDot('off');setLbl('Offline')}})}

/* ===== AUTH ===== */
function checkAuth(){monitorConnection();if(!auth){showMain();return}auth.onAuthStateChanged(function(u){if(u){curUser=u;showMain();syncFromCloud()}else{curUser=null;showLogin()}})}
function showLogin(){G('loginScr').style.display='flex';G('mainApp').style.display='none'}
function showMain(){G('loginScr').style.display='none';G('mainApp').style.display='block';if(curUser){G('hUser').textContent=curUser.email||'';G('hUser').style.display='inline';G('hOut').style.display='inline'}else{G('hUser').style.display='none';G('hOut').style.display='none';setDot('off');setLbl('Local')}load();nav();doRender()}
window.togAuth=function(){authMode=authMode==='login'?'signup':'login';G('lTitle').textContent=authMode==='signup'?'Create Account':'Sign In';G('lBtn').textContent=authMode==='signup'?'Sign Up':'Sign In'};
window.doLogin=function(){var em=G('lEmail').value.trim(),pw=G('lPass').value;if(!em||!pw){G('lErr').textContent='Required';G('lErr').style.display='block';return}if(!auth){G('lErr').textContent='Cloud not configured';G('lErr').style.display='block';return}G('lBtn').textContent='Wait...';if(authMode==='signup'){auth.createUserWithEmailAndPassword(em,pw).catch(function(e){G('lBtn').textContent='Sign Up';G('lErr').textContent=e.code;G('lErr').style.display='block'})}else{auth.signInWithEmailAndPassword(em,pw).catch(function(e){G('lBtn').textContent='Sign In';G('lErr').textContent=e.code;G('lErr').style.display='block'})}};
window.doLogout=function(){if(auth)auth.signOut();else{curUser=null;showLogin()}};
window.skipAuth=function(){curUser=null;showMain();notify('Local mode')};

/* ===== PERSISTENCE ===== */
function save(){localStorage.setItem('ss_costs',JSON.stringify(D.costs));localStorage.setItem('ss_pays',JSON.stringify(D.pays));localStorage.setItem('ss_upds',JSON.stringify(D.upds));localStorage.setItem('ss_vn',JSON.stringify(D.vn));localStorage.setItem('ss_psSch',JSON.stringify(D.psSch));localStorage.setItem('ss_invSch',JSON.stringify(D.invSch));cSave()}
function lj(k,d){try{var v=JSON.parse(localStorage.getItem('ss_'+k));if(v&&((Array.isArray(v)&&v.length)||(!Array.isArray(v)&&Object.keys(v).length)))return v}catch(e){}return d}
function load(){D.costs=lj('costs',[]);D.pays=lj('pays',[]);D.upds=lj('upds',[]);D.vn=lj('vn',{});D.psSch=lj('psSch',[]);D.invSch=lj('invSch',[]);DC=localStorage.getItem('ss_DC')||'USD';currencyMode=localStorage.getItem('ss_curMode')||'live';cfFund=localStorage.getItem('ss_cfFund')||'all';cfMonths=parseInt(localStorage.getItem('ss_cfMo'))||12;cfLookback=parseInt(localStorage.getItem('ss_cfLb'));if(isNaN(cfLookback))cfLookback=6;var sr=null;try{sr=JSON.parse(localStorage.getItem('ss_curRates'))}catch(e){}if(sr){for(var k in sr){if(FX[k])FX[k].r=sr[k]}}liveLastUpdated=localStorage.getItem('ss_curLiveTS')||null;if(currencyMode==='live')fetchLiveRates()}

/* ===== NAV ===== */
var tabs=[{id:'costD',l:'Summary'},{id:'cf',l:'Cash Flow'},{id:'invSch',l:'Investment'},{id:'pays',l:'Payments'},{id:'paySch',l:'Pay Schedule'},{id:'vendors',l:'Vendors'},{id:'history',l:'History'},{id:'cur',l:'Currency'},{id:'cloud',l:'Cloud'}];
var R={costD:showSummary,cf:showCashFlow,invSch:showInvSch,pays:showPays,paySch:showPaySch,vendors:showVendors,history:showHistory,cur:showCur,cloud:showCloud};
function nav(){var h='';for(var i=0;i<tabs.length;i++)h+='<button class="'+(tab===tabs[i].id?'act':'')+'" onclick="go(\''+tabs[i].id+'\')">'+tabs[i].l+'</button>';G('nbar').innerHTML=h}
function go(id){tab=id;nav();doRender()}
function doRender(){try{if(R[tab])R[tab]()}catch(e){G('app').innerHTML='<div class="card" style="color:var(--rd)"><b>Error:</b> '+H(e.message)+'<pre style="font-size:.6rem;white-space:pre-wrap">'+H(e.stack)+'</pre></div>'}}

/* ===== LIVE RATES ===== */
function fetchLiveRates(){liveFetching=true;if(tab==='cur')doRender();var ql=[];for(var k in FX){if(k!=='USD')ql.push(k)}var done=false;function ok(){if(done)return;done=true;liveLastUpdated=new Date().toLocaleString();localStorage.setItem('ss_curRates',JSON.stringify(getRateSnap()));localStorage.setItem('ss_curLiveTS',liveLastUpdated);liveFetching=false;notify('Rates updated');doRender()}var to=setTimeout(function(){if(!done){done=true;liveFetching=false;doRender()}},12000);fetch('https://api.frankfurter.dev/v2/rates?base=USD&quotes='+ql.join(',')).then(function(r){if(!r.ok)throw 0;return r.json()}).then(function(data){if(done)return;if(data&&data.rates){for(var k2 in data.rates){if(FX[k2])FX[k2].r=data.rates[k2]}clearTimeout(to);ok()}else throw 0}).catch(function(){if(done)return;fetch('https://open.er-api.com/v6/latest/USD').then(function(r){if(!r.ok)throw 0;return r.json()}).then(function(data){if(done)return;clearTimeout(to);if(data&&data.rates){for(var k3 in FX){if(k3!=='USD'&&data.rates[k3])FX[k3].r=data.rates[k3]}ok()}else throw 0}).catch(function(){if(done)return;clearTimeout(to);liveFetching=false;doRender()})})}
function getRateSnap(){var s={};for(var k in FX)s[k]=FX[k].r;return s}

/* ===== INIT ===== */
setInterval(function(){if(currencyMode==='live')fetchLiveRates()},600000);
initCloud();checkAuth();

} catch(initErr) {
  document.getElementById('loginScr').style.display='none';
  document.getElementById('mainApp').style.display='block';
  document.getElementById('app').innerHTML='<div class="card" style="color:var(--rd)"><b>Init Error:</b> '+initErr.message+'<pre>'+initErr.stack+'</pre></div>';
}
</script>
