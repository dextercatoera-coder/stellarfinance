<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stellar Seeds</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=JetBrains+Mono:wght@400;500&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f4f0;--s1:#fff;--s2:#faf9f6;--s3:#eeece7;--b1:#e0ded8;--b2:var(--s3);--g:#2d8a32;--gb:#3da642;--gc:rgba(45,138,50,.08);--bl:#2874a6;--blc:rgba(40,116,166,.08);--am:#b89630;--amc:rgba(184,150,48,.08);--rd:#cc3333;--rdc:rgba(204,51,51,.08);--or:#d4930d;--orc:rgba(212,147,13,.08);--t1:#1a1c18;--t2:#555;--t3:#999;--r:6px;--rl:10px}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t1);line-height:1.5;font-size:14px;min-height:100vh}
button{font-family:inherit;cursor:pointer}
select,input[type="text"],input[type="number"],input[type="date"],textarea{width:100%;padding:6px 10px;background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);color:var(--t1);font-family:'DM Sans',sans-serif;font-size:.8rem;outline:0}
select:focus,input:focus,textarea:focus{border-color:var(--g)}
textarea{resize:vertical;min-height:36px}
.hdr{height:52px;background:var(--s1);border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px}
.logo-ic{width:32px;height:32px;background:linear-gradient(135deg,var(--g),#1a5c20);border-radius:var(--r);position:relative}
.logo-ic::after{content:'';position:absolute;width:16px;height:16px;border:2.5px solid rgba(255,255,255,.9);border-radius:50%;top:5px;left:5px}
.logo-nm{font-family:'Cormorant Garamond',serif;font-size:.88rem;font-weight:700;color:var(--am);letter-spacing:.18em;text-transform:uppercase}
.logo-sb{font-family:'JetBrains Mono',monospace;font-size:.38rem;color:var(--t3);letter-spacing:.08em;text-transform:uppercase}
.btn{font-weight:600;font-size:.72rem;padding:5px 12px;border-radius:var(--r);border:1px solid var(--b1);background:var(--s1);color:var(--t1);transition:all .12s;white-space:nowrap}
.btn:hover{background:var(--s3)}
.bp{background:var(--g);border-color:var(--g);color:#fff}.bp:hover{background:var(--gb)}
.bd{border-color:var(--rd);color:var(--rd)}.bd:hover{background:var(--rdc)}
.bs{padding:3px 8px;font-size:.66rem}
.nb{background:var(--s1);border-bottom:1px solid var(--b1);display:flex;padding:0 12px;overflow-x:auto;position:sticky;top:52px;z-index:99}
.nb button{background:0;border:0;padding:8px 10px;font-size:.74rem;font-weight:600;color:var(--t3);border-bottom:2px solid transparent;white-space:nowrap;font-family:'DM Sans',sans-serif;transition:all .15s}
.nb button:hover{color:var(--t1)}.nb button.on{color:var(--g);border-color:var(--g)}
.ap{padding:16px;max-width:1400px;margin:0 auto}
.cd{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);padding:14px;margin-bottom:12px}
.ch{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.ct{font-weight:700;font-size:.84rem}
.stg{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:14px}
.sti{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);padding:12px}
.stl{font-family:'JetBrains Mono',monospace;font-size:.52rem;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.stv{font-size:1.15rem;font-weight:700;line-height:1.1}
.tw{overflow-x:auto;border-radius:var(--r);border:1px solid var(--b1)}
table{width:100%;border-collapse:collapse;font-size:.76rem}
th{background:var(--s2);font-weight:600;font-size:.6rem;text-transform:uppercase;letter-spacing:.04em;color:var(--t3);padding:6px 8px;text-align:left;border-bottom:1px solid var(--b1);white-space:nowrap}
td{padding:5px 8px;border-bottom:1px solid var(--b2);vertical-align:middle}
tr:last-child td{border-bottom:0}
tbody tr:hover{background:var(--s2)}
.bg{font-family:'JetBrains Mono',monospace;font-size:.56rem;padding:2px 6px;border-radius:12px;font-weight:500;display:inline-flex;align-items:center;gap:3px;white-space:nowrap}
.bg::before{content:'';width:4px;height:4px;border-radius:50%;flex-shrink:0}
.b1{background:var(--gc);color:var(--g)}.b1::before{background:var(--g)}
.b2{background:var(--rdc);color:var(--rd)}.b2::before{background:var(--rd)}
.b3{background:var(--orc);color:var(--or)}.b3::before{background:var(--or)}
.b4{background:var(--blc);color:var(--bl)}.b4::before{background:var(--bl)}
.fg{margin-bottom:8px}
.fl{display:block;font-size:.68rem;font-weight:600;color:var(--t2);margin-bottom:3px}
.fb{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:8px 10px;background:var(--s2);border:1px solid var(--b2);border-radius:var(--rl);margin-bottom:10px}
.fb label{font-size:.7rem;font-weight:600;color:var(--t2);white-space:nowrap}
.fb select{width:auto;min-width:80px;padding:4px 8px;font-size:.74rem;border-radius:var(--r);border:1px solid var(--b1);background:var(--s1);font-weight:600;outline:0}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;display:none;align-items:center;justify-content:center;padding:12px}
.mo.op{display:flex}
.mb{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);width:100%;max-width:860px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.mh{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--b1);position:sticky;top:0;background:var(--s1)}
.mh h3{font-size:.88rem;font-weight:700}
.mc{background:0;border:0;color:var(--t3);font-size:1.2rem;padding:4px 8px}.mc:hover{color:var(--t1)}
.md{padding:16px}
.mf{padding:10px 16px;border-top:1px solid var(--b1);display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:var(--s1)}
.tst{position:fixed;bottom:16px;right:16px;background:var(--t1);color:#fff;padding:8px 16px;border-radius:var(--r);font-size:.76rem;font-weight:600;z-index:300;transform:translateY(60px);opacity:0;transition:all .3s ease}
.tst.sh{transform:translateY(0);opacity:1}
.tc{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.tk{border:2px solid var(--b2);border-radius:var(--rl);padding:14px;cursor:pointer;transition:all .15s;text-align:center}
.tk:hover{border-color:var(--bl)}.tk.on{border-color:var(--g);background:var(--gc)}
.ps{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);padding:12px;border-left:4px solid var(--bl);margin-bottom:10px}
.ps-v{font-weight:700;font-size:.88rem;cursor:pointer;color:var(--bl)}.ps-v:hover{text-decoration:underline}
.ps-d{font-size:.6rem;color:var(--t2);font-style:italic;margin-top:2px;line-height:1.3}
.pb{height:10px;background:var(--s3);border-radius:5px;overflow:hidden}
.pf{height:100%;border-radius:5px;transition:width .3s}
.pi{display:flex;justify-content:space-between;font-size:.54rem;font-family:'JetBrains Mono',monospace;margin-top:3px;color:var(--t3)}
.ppl{margin-top:8px;padding-top:8px;border-top:1px solid var(--b2)}
.ppi{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:.64rem;border-bottom:1px dashed var(--b2)}
.ppi:last-child{border-bottom:0}
.ppd{font-family:'JetBrains Mono',monospace;color:var(--t3)}
.ppa{font-family:'JetBrains Mono',monospace;font-weight:700}
.ppb{background:0;border:0;color:var(--t3);font-size:.7rem;padding:2px 5px;cursor:pointer}.ppb:hover{color:var(--rd)}
.ptc{border:2px solid var(--b2);border-radius:var(--rl);padding:10px 14px;cursor:pointer;transition:all .15s;text-align:center}
.ptc:hover{border-color:var(--bl)}.ptc.on{border-color:var(--g);background:var(--gc)}
.sb{display:flex;gap:4px;height:20px;border-radius:6px;overflow:hidden;background:var(--s3);margin-bottom:6px}
.sg{transition:width .3s}
.ip{border:2px solid var(--b1);border-radius:var(--rl);padding:12px;margin-bottom:8px;cursor:pointer;transition:all .15s}
.ip:hover{border-color:var(--bl);background:var(--blc)}.ip.on{border-color:var(--g);background:var(--gc)}.ip.dn2{opacity:.5;cursor:default}
.fw{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px;background:var(--s2);border:1px solid var(--b2);border-radius:var(--rl)}
.fi{text-align:center;padding:8px;border-radius:var(--r);border:2px solid var(--b2);cursor:pointer;transition:all .15s}
.fi:hover{border-color:var(--bl)}.fi.on{border-color:var(--g);background:var(--gc)}
.fn{font-size:.58rem;font-family:'JetBrains Mono',monospace;font-weight:700;text-transform:uppercase;margin-bottom:2px}
.fv{font-size:.92rem;font-weight:700;line-height:1.1}
.fs{font-size:.5rem;color:var(--t3);font-family:'JetBrains Mono',monospace;margin-top:2px}
.tbr{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;padding:12px;background:var(--s2);border:1px solid var(--b2);border-radius:var(--rl);margin-bottom:10px}
.tb{text-align:center}
.tl2{font-size:.48rem;font-family:'JetBrains Mono',monospace;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.tv2{font-size:1.1rem;font-weight:700;line-height:1.1}
.hl{border-left:3px solid var(--b2);padding:10px 0 10px 16px;position:relative;margin-left:8px}
.hl::before{content:'';position:absolute;left:-8px;top:14px;width:10px;height:10px;border-radius:50%;border:2px solid var(--b1);background:var(--s1)}
.hl.hp::before{background:var(--rd);border-color:var(--rd)}
.hl.hi::before{background:var(--g);border-color:var(--g)}
.cur-box{background:linear-gradient(135deg,var(--s1),var(--s2));border:1px solid var(--b1);border-radius:var(--rl);padding:20px;margin-bottom:14px}
.cur-r{font-size:1.6rem;font-weight:700;color:var(--g);text-align:center;margin:10px 0 4px}
.cur-s{text-align:center;font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--t3)}
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px}
.cc{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);padding:12px;text-align:center}
.cp{font-weight:700;font-size:.72rem;color:var(--t3);margin-bottom:2px}
.cr2{font-family:'JetBrains Mono',monospace;font-size:1.1rem;font-weight:700;color:var(--bl)}
.cs2{font-size:.54rem;color:var(--t3);font-family:'JetBrains Mono',monospace;margin-top:2px}
.rate-mode{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.rate-editor{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);padding:14px;margin-bottom:12px}
.rate-row{display:grid;grid-template-columns:80px 1fr 80px;gap:8px;align-items:center;padding:6px 0;border-bottom:1px solid var(--b2)}
.rate-row:last-child{border-bottom:0}
.rate-pair{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:.74rem}
.rate-input{padding:6px 10px;background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);font-family:'JetBrains Mono',monospace;font-size:.82rem;font-weight:700;text-align:right;width:100%;outline:0}
.rate-input:focus{border-color:var(--g)}
.rate-note{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--t3);text-align:right}
.rate-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:.62rem;font-weight:700;font-family:'JetBrains Mono',monospace}
.rate-badge.live{background:var(--gc);color:var(--g)}.rate-badge.standard{background:var(--amc);color:var(--am)}
.sync-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:.6rem;font-weight:700;font-family:'JetBrains Mono',monospace}
.sync-badge.off{background:var(--rdc);color:var(--rd)}.sync-badge.on{background:var(--gc);color:var(--g)}
.user-pill{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;background:var(--s2);border:1px solid var(--b2);border-radius:12px;font-size:.58rem;font-weight:600}
.user-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
@media(max-width:900px){.ap{padding:10px}.fw,.tbr{grid-template-columns:1fr}.cg{grid-template-columns:1fr}.rate-mode{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="mainApp"><div class="hdr"><div class="logo"><div class="logo-ic"></div><div><div class="logo-nm">Stellar Seeds</div><div class="logo-sb">Seed Tolling Plant</div></div></div><div id="hdrRight" style="display:flex;align-items:center;gap:8px"></div></div><div class="nb" id="navbar"></div><div class="ap" id="content"></div></div>
<div class="mo" id="modal"><div class="mb"><div class="mh"><h3 id="modalTitle"></h3><button class="mc" onclick="SS.cM()">&times;</button></div><div class="md" id="modalBody"></div><div class="mf" id="modalFoot"></div></div></div>
<div class="tst" id="toast"></div>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
(function(){
"use strict";
var LR={USD:1,EUR:.92,VND:26307,PHP:61.26,THB:34.5,SGD:1.34,CNY:7.24,JPY:155.5,KRW:1380,GBP:.79,AUD:1.53,MYR:4.47,INR:83.5};
var SY={USD:'$',EUR:'\u20ac',VND:'\u0110',PHP:'\u20b1',THB:'\u0e3f',SGD:'S$',CNY:'\u00a5',JPY:'\u00a5',KRW:'\u20a9',GBP:'\u00a3',AUD:'A$',MYR:'RM',INR:'\u20b9'};
var CN={USD:'US Dollar',EUR:'Euro',VND:'Dong',PHP:'Peso',THB:'Baht',SGD:'S Dollar',CNY:'Yuan',JPY:'Yen',KRW:'Won',GBP:'Pound',AUD:'A Dollar',MYR:'Ringgit',INR:'Rupee'};
var CATS=['Machines','Buildings','Land','Opex','Logistics','Tax','Others'];
var CC={Machines:'#2874a6',Buildings:'#2d8a32',Land:'#b89630',Opex:'#9b59b6',Logistics:'#e67e22',Tax:'#c0392b',Others:'#999'};
var FUNDS=['VN Fund','PH Fund','Other'],FC={'VN Fund':'#2d8a32','PH Fund':'#2874a6','Other':'#b89630'};
var TABS=[{id:'dash',l:'Dashboard'},{id:'cf',l:'Cash Flow'},{id:'payments',l:'Payments'},{id:'schedules',l:'Schedules'},{id:'investments',l:'Investments'},{id:'vendors',l:'Vendors'},{id:'history',l:'History'},{id:'currency',l:'Currency'},{id:'settings',l:'Settings'}];
var D={payments:[],schedules:[],investments:[],files:{},rateMode:'live',standardRates:{}};
var ST={tab:'dash',cur:'USD',pt:'full',sTerm:'monthly',sFund:'VN Fund',selI:-1,cfF:'all',cfP:3,cfFu:12};
var CL={enabled:false,connected:false,db:null,room:'default',uid:null,uname:'User',users:{},syncing:false};
var PG={};
function $i(id){return document.getElementById(id)}
function esc(s){return s==null?'':String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function uid(){return Date.now().toString(36)+Math.random().toString(36).substr(2,6)}
function td(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function addD(ds,n){var d=new Date(ds);if(isNaN(d))d=new Date();d.setDate(d.getDate()+n);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function ar(){return D.rateMode==='standard'&&Object.keys(D.standardRates).length>0?D.standardRates:LR}
function cc(v,f,t){if(f===t)return v;var r=ar();return(v/(r[f]||1))*(r[t]||1)}
function fmtC(a,c){return(SY[c]||'$')+Number(a||0).toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtD(u){return fmtC(cc(u,'USD',ST.cur),ST.cur)}
function fmtK(v){if(Math.abs(v)>=1e6)return(v/1e6).toFixed(1)+'M';if(Math.abs(v)>=1e3)return(v/1e3).toFixed(1)+'K';return Math.round(v).toString()}
function pct(a,b){return b>0?Math.round(a/b*100):0}
function mDif(s,e){if(!s||!e)return 0;var a=new Date(s),b=new Date(e);if(isNaN(a)||isNaN(b))return 0;return Math.max(1,(b.getFullYear()-a.getFullYear())*12+(b.getMonth()-a.getMonth())+1)}
function fmtM(k){var m=['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],p=k.split('-');return m[parseInt(p[1])||0]+' '+p[0]}
function note(m){var t=$i('toast');if(!t)return;t.textContent=m;t.classList.add('sh');setTimeout(function(){t.classList.remove('sh')},2200)}
function oM(ti,bd,ft){$i('modalTitle').textContent=ti;$i('modalBody').innerHTML=bd;$i('modalFoot').innerHTML=ft||'';$i('modal').classList.add('op')}
function cO(s){var h='';for(var k in LR)h+='<option value="'+k+'"'+(k===s?' selected':'')+'>'+k+'</option>';return h}
function catO(s){var h='';for(var i=0;i<CATS.length;i++)h+='<option value="'+CATS[i]+'"'+(CATS[i]===s?' selected':'')+'>'+CATS[i]+'</option>';return h}
function fO(s){var h='';for(var i=0;i<FUNDS.length;i++)h+='<option value="'+FUNDS[i]+'"'+(FUNDS[i]===s?' selected':'')+'>'+FUNDS[i]+'</option>';return h}
function fA(s){return'<option value="all"'+(s==='all'?' selected':'')+'>All Funds</option>'+fO(s)}
function allV(){var m={};for(var i=0;i<D.schedules.length;i++){var v=D.schedules[i].vendor;if(v)m[v.toUpperCase()]=1}for(var i=0;i<D.payments.length;i++){var v=D.payments[i].vendor;if(v)m[v.toUpperCase()]=1}return Object.keys(m).sort()}
function vO(s){var v=allV(),u=s?s.toUpperCase():'',h='<option value="">-- Vendor --</option>';for(var i=0;i<v.length;i++)h+='<option value="'+esc(v[i])+'"'+(u===v[i]?' selected':'')+'>'+esc(v[i])+'</option>';h+='<option value="__NEW__">+ New</option>';return h}
function catB(c,s){var cl=CC[c]||'#999',l=(c==='Others'&&s)?'Others: '+s:c;return'<span class="bg" style="background:'+cl+'22;color:'+cl+';border:1px solid '+cl+'44">'+esc(l)+'</span>'}
function funB(f){var c=FC[f]||'#999';return'<span class="bg" style="background:'+c+'22;color:'+c+';border:1px solid '+c+'44">'+esc(f)+'</span>'}
function donut(arr,sz){var t=0;for(var i=0;i<arr.length;i++)t+=arr[i].value;if(!t)return'<svg viewBox="0 0 100 100" style="width:'+sz+'px;height:'+sz+'px"><circle cx="50" cy="50" r="35" fill="none" stroke="#eeece7" stroke-width="16"/></svg>';var r=35,c=2*Math.PI*r,off=0;var svg='<svg viewBox="0 0 100 100" style="width:'+sz+'px;height:'+sz+'px;transform:rotate(-90deg)"><circle cx="50" cy="50" r="'+r+'" fill="none" stroke="#eeece7" stroke-width="16"/>';for(var i=0;i<arr.length;i++){var seg=(arr[i].value/t)*c;if(seg<.3)continue;svg+='<circle cx="50" cy="50" r="'+r+'" fill="none" stroke="'+arr[i].color+'" stroke-width="16" stroke-dasharray="'+seg.toFixed(2)+' '+(c-seg).toFixed(2)+'" stroke-dashoffset="'+(-off).toFixed(2)+'"/>';off+=seg}return svg+'</svg>'}
function schPays(sid){var r=[];for(var i=0;i<D.payments.length;i++){if(String(D.payments[i].sid)===String(sid))r.push(D.payments[i])}return r}
function schPaid(sid){var p=schPays(sid),t=0;for(var i=0;i<p.length;i++)t+=cc(p[i].amount,p[i].currency,'USD');return t}

="display:flex;gap:6px;margin-top:3px">'+catB(v.cat)+funB(v.fund)+'<span class="bg '+(v.pct>=99?'b1':v.pct>0?'b3':'b4')+'">'+(v.pct>=99?'Completed':v.pct+'%')+'</span></div></div><div style="text-align:right"><div style="font-size:1.2rem;font-weight:700;color:#2874a6">'+fmtD(v.budget)+'</div><div style="font-size:.6rem;color:var(--t3)">BUDGET</div></div></div><div style="margin-top:8px"><div style="display:flex;justify-content:space-between;font-size:.66rem;margin-bottom:3px"><span>Progress</span><span style="font-family:JetBrains Mono;font-weight:700;color:'+bc+'">'+v.pct+'%</span></div><div class="pb" style="height:10px"><div class="pf" style="width:'+v.pct+'%;background:'+bc+'"></div></div><div style="display:flex;justify-content:space-between;font-size:.62rem;margin-top:3px"><span style="color:#2d8a32">Paid: '+fmtD(v.paid)+'</span><span style="color:#d4930d">Rem: '+fmtD(v.rem)+'</span></div></div><div style="display:flex;justify-content:flex-end;gap:6px;margin-top:8px"><button class="btn bs bp" onclick="SS.showVD(\''+esc(v.name)+'\')">View Schedules</button></div></div>'}c.innerHTML=h};

PG.history=function(c){var h='<div class="fb"><label>Display:</label><select onchange="SS.setC(this.value)">'+cO(ST.cur)+'</select></div>';var all=[];for(var i=0;i<D.payments.length;i++){var p=D.payments[i];all.push({date:p.date,type:'pay',vendor:p.vendor,fund:p.fund||'Other',cur:p.currency,amt:p.amount,rem:p.remarks||''})}for(var i=0;i<D.investments.length;i++){var r=D.investments[i];all.push({date:r.date,type:'inv',vendor:'Deposit',fund:r.fund||'Other',cur:r.currency||'USD',amt:r.amount,rem:r.remarks||''})}all.sort(function(a,b){return(a.date||'')<(b.date||'')?1:-1});var tP=0,tI=0;for(var i=0;i<all.length;i++){var u=cc(all[i].amt,all[i].cur,'USD');if(all[i].type==='pay')tP+=u;else tI+=u}h+='<div class="stg"><div class="sti" style="border-left:4px solid var(--rd)"><div class="stl">Payments</div><div class="stv" style="color:var(--rd)">'+fmtD(tP)+'</div></div><div class="sti" style="border-left:4px solid var(--g)"><div class="stl">Investments</div><div class="stv" style="color:var(--g)">'+fmtD(tI)+'</div></div><div class="sti" style="border-left:4px solid var(--bl)"><div class="stl">Net</div><div class="stv" style="color:'+(tI-tP>=0?'var(--g)':'var(--rd)')+'">'+fmtD(tI-tP)+'</div></div></div>';if(!all.length){h+='<div class="cd" style="text-align:center;padding:50px;color:var(--t3)">No transactions.</div>';c.innerHTML=h;return}h+='<div class="cd"><div class="ch"><span class="ct">History ('+all.length+')</span></div>';for(var i=0;i<all.length;i++){var it=all[i],isP=it.type==='pay';h+='<div class="hl '+(isP?'hp':'hi')+'"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div style="display:flex;align-items:center;gap:6px;margin-bottom:2px"><span style="font-family:JetBrains Mono;font-size:.56rem;color:var(--t3)">'+esc(it.date)+'</span><span class="bg '+(isP?'b2':'b1')+'">'+(isP?'Payment':'Investment')+'</span>'+funB(it.fund)+'</div><div style="font-weight:700;font-size:.82rem">'+esc(it.vendor)+'</div>'+(it.rem?'<div style="font-size:.6rem;color:var(--t2);font-style:italic">'+esc(it.rem)+'</div>':'')+'</div><div style="text-align:right;flex-shrink:0;margin-left:12px"><div style="font-family:JetBrains Mono;font-weight:700;font-size:.88rem;color:'+(isP?'#cc3333':'#2d8a32')+'">'+(isP?'-':'+')+fmtC(it.amt,it.cur)+'</div><div style="font-family:JetBrains Mono;font-size:.52rem;color:var(--t3)">'+fmtD(cc(it.amt,it.cur,'USD'))+'</div></div></div></div>'}h+='</div>';c.innerHTML=h};

/* CURRENCY */
PG.currency=function(c){var h='<div class="fb"><label>Display:</label><select onchange="SS.setC(this.value)">'+cO(ST.cur)+'</select></div>';h+='<div class="cd" style="border-left:4px solid var(--am)"><div class="ch"><span class="ct">Rate Mode</span><span class="rate-badge '+(D.rateMode==='live'?'live':'standard')+'">'+(D.rateMode==='live'?'Live':'Standard')+'</span></div><div class="rate-mode"><div class="tk'+(D.rateMode==="live"?' on':'')+'" onclick="SS.setRM(\'live\')" style="border-color:'+(D.rateMode==='live'?'var(--g)':'var(--b2)')+';background:'+(D.rateMode==='live'?'var(--gc)':'transparent')+'"><div style="font-size:1.4rem;margin-bottom:4px">&#128279;</div><div style="font-weight:700;font-size:.82rem">Live Rates</div><div style="font-size:.54rem;color:var(--t3)">Fixed reference</div></div><div class="tk'+(D.rateMode==="standard"?' on':'')+'" onclick="SS.setRM(\'standard\')" style="border-color:'+(D.rateMode==='standard'?'var(--g)':'var(--b2)')+';background:'+(D.rateMode==='standard'?'var(--gc)':'transparent')+'"><div style="font-size:1.4rem;margin-bottom:4px">&#9998;</div><div style="font-weight:700;font-size:.82rem">Standard Rates</div><div style="font-size:.54rem;color:var(--t3)">Custom editable</div></div></div></div>';h+='<div class="rate-editor" style="border-left:4px solid '+(D.rateMode==='standard'?'var(--g)':'var(--b1)')+'"><div class="ch"><span class="ct">Standard Rates (USD base)</span>'+(D.rateMode==='standard'?'<span class="bg b1">Active</span>':'')+'</div>';for(var k in LR){var cr=D.standardRates[k]||LR[k];h+='<div class="rate-row"><div><div class="rate-pair">'+k+'</div></div><div><input type="number" class="rate-input" id="sr_'+k+'" value="'+(k==='USD'?'1.0000':cr.toFixed(4))+'"'+(k==='USD'?' disabled style="opacity:.5;background:var(--s2)"':'')+'></div><div class="rate-note">'+(k==='USD'?'base':'1USD='+cr.toFixed(4)+' '+k)+'</div></div>'}h+='<div style="display:flex;justify-content:flex-end;gap:8px;margin-top:12px"><button class="btn" onclick="SS.resetR()">Reset</button><button class="btn bp" onclick="SS.saveR()">Save</button></div></div>';h+='<div class="cur-box"><div style="font-weight:700;font-size:.82rem;margin-bottom:10px">Converter <span class="rate-badge '+(D.rateMode==='live'?'live':'standard')+'" style="font-size:.5rem">'+D.rateMode+'</span></div><div style="display:grid;grid-template-columns:1fr 80px 80px 40px;gap:8px;align-items:end"><div class="fg"><label class="fl">Amount</label><input type="number" id="cvA" value="1000" step="any" oninput="SS.doCv()"></div><div class="fg"><label class="fl">From</label><select id="cvFr" onchange="SS.doCv()">'+cO('USD')+'</select></div><div class="fg"><label class="fl">To</label><select id="cvTo" onchange="SS.doCv()">'+cO('EUR')+'</select></div><div class="fg"><button class="btn" onclick="SS.swapC()">&#8644;</button></div></div><div class="cur-r" id="cvR">'+fmtC(cc(1000,'USD','EUR'),'EUR')+'</div><div class="cur-s" id="cvI">1 USD = '+cc(1,'USD','EUR').toFixed(4)+' EUR</div></div>';var r2=ar();h+='<div class="cd"><div class="ch"><span class="ct">Active Rates</span><span class="rate-badge '+(D.rateMode==='live'?'live':'standard')+'">'+D.rateMode+'</span></div><div class="cg">';for(var k in r2){if(k==='USD')continue;h+='<div class="cc"><div class="cp">USD/'+k+'</div><div class="cr2">'+r2[k].toFixed(2)+'</div><div class="cs2">'+(CN[k]||k)+'</div></div>'}h+='</div></div>';c.innerHTML=h};

/* SETTINGS */
PG.settings=function(c){var h='<div class="stg"><div class="sti" style="border-left:4px solid var(--bl)"><div class="stl">Payments</div><div class="stv">'+D.payments.length+'</div></div><div class="sti" style="border-left:4px solid var(--g)"><div class="stl">Schedules</div><div class="stv">'+D.schedules.length+'</div></div><div class="sti" style="border-left:4px solid var(--am)"><div class="stl">Investments</div><div class="stv">'+D.investments.length+'</div></div></div>';h+='<div class="cd" style="border-left:4px solid var(--g)"><div class="ch"><span class="ct">Cloud Sync</span><span class="sync-badge '+(CL.connected?'on':'off')+'">'+(CL.connected?'Connected':'Disconnected')+'</span></div><div style="font-size:.72rem;color:var(--t2);margin-bottom:10px">Real-time collaboration. Needs a <a href="https://console.firebase.google.com" target="_blank" style="color:var(--bl)">Firebase project</a>.</div>';var cfg;try{cfg=JSON.parse(localStorage.getItem('ss_cloudCfg'))}catch(e){}cfg=cfg||{};h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div class="fg"><label class="fl">API Key</label><input type="text" id="clKey" value="'+esc(cfg.apiKey||'')+'"></div><div class="fg"><label class="fl">Database URL</label><input type="text" id="clUrl" value="'+esc(cfg.databaseURL||'')+'"></div><div class="fg"><label class="fl">Room</label><input type="text" id="clRoom" value="'+esc(CL.room)+'"></div><div class="fg"><label class="fl">Name</label><input type="text" id="clName" value="'+esc(CL.uname)+'"></div></div><div style="display:flex;gap:8px;margin-top:8px;align-items:center">';if(!CL.connected)h+='<button class="btn bp" onclick="SS.cloudCon()">Connect</button>';else h+='<button class="btn bd" onclick="SS.cloudDis()">Disconnect</button>';if(CL.connected&&Object.keys(CL.users).length){h+='<div style="display:flex;gap:4px;flex-wrap:wrap;margin-left:8px">';for(var uid in CL.users){var u=CL.users[uid];h+='<span class="user-pill"><span class="user-dot" style="background:var(--g)"></span>'+esc(u.name||'User')+'</span>'}h+='</div>'}h+='</div></div>';h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px"><div class="cd" style="border-left:4px solid var(--g)"><div class="ch"><span class="ct">Backup</span></div><div style="font-size:.72rem;color:var(--t2);margin-bottom:8px">Download all data + rates.</div><button class="btn bp" onclick="SS.bkp()" style="width:100%;padding:10px">Download</button></div><div class="cd" style="border-left:4px solid var(--bl)"><div class="ch"><span class="ct">Restore</span></div><div style="font-size:.72rem;color:var(--t2);margin-bottom:8px">Upload backup.</div><div style="border:2px dashed var(--b1);border-radius:var(--rl);padding:16px;text-align:center"><label style="color:var(--bl);cursor:pointer;text-decoration:underline;font-size:.72rem">Browse<input type="file" accept=".json" style="display:none" onchange="SS.res(this.files[0])"></label></div></div></div>';var bk=[];try{bk=JSON.parse(localStorage.getItem('ss_bk'))||[]}catch(e){}if(bk.length){h+='<div class="cd" style="border-left:4px solid var(--am)"><div class="ch"><span class="ct">Auto-Backups ('+bk.length+')</span></div>';for(var i=bk.length-1;i>=0;i--)h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--b2)"><span style="font-family:JetBrains Mono;font-size:.62rem;color:var(--t3)">'+esc(bk[i].ts)+'</span><button class="btn bs" onclick="SS.rBk('+i+')">Restore</button></div>';h+='</div>'}h+='<div class="cd" style="border-left:4px solid var(--rd);margin-top:12px"><div class="ch"><span class="ct">Danger Zone</span></div><div style="font-size:.72rem;color:var(--t2);margin-bottom:8px">Delete ALL data permanently.</div><button class="btn bd" onclick="SS.clr()" style="background:var(--rd);color:#fff;border-color:var(--rd)">Clear All</button></div>';c.innerHTML=h};

/* ACTIONS */
function addPay(){var v=$i('mpV').value;if(v==='__NEW__')v=$i('mpVN').value.trim();v=v.toUpperCase();var cat=$i('mpCat').value,os=cat==='Others'?$i('mpOSV').value.trim():'';var d=$i('mpD').value,a=parseFloat($i('mpA').value)||0;if(!v){alert('Vendor required');return}if(!a){alert('Amount required');return}if(!d){alert('Date required');return}if(cat==='Others'&&!os){alert('Specify category');return}D.payments.push({id:uid(),date:d,vendor:v,amount:a,currency:$i('mpC').value,fund:$i('mpF').value,category:cat,catSpec:os,remarks:$i('mpR').value.trim(),sid:'',instIdx:-1,pt:ST.pt});save();note('Recorded');render()}
function delPay(pid){if(!confirm('Delete?'))return;for(var i=0;i<D.payments.length;i++)if(D.payments[i].id===pid){D.payments.splice(i,1);break}save();note('Deleted');render()}
function enroll(){var v=$i('schV').value;if(v==='__NEW__')v=$i('schVN').value.trim();v=v.toUpperCase();var cat=$i('schCat').value,os=cat==='Others'?$i('schOSV').value.trim():'';var cost=parseFloat($i('schCost').value)||0;if(!v){alert('Vendor required');return}if(!cost){alert('Cost required');return}if(cat==='Others'&&!os){alert('Specify');return}var e={id:uid(),vendor:v,description:$i('schDesc').value.trim(),totalCost:cost,cur:$i('schCur').value,category:cat,catSpec:os,fund:ST.sFund,terms:ST.sTerm,startDate:'',endDate:'',installments:[],remarks:$i('schRem').value.trim()};if(ST.sTerm==='monthly'){e.startDate=$i('schStart').value;e.endDate=$i('schEnd').value;if(!e.startDate||!e.endDate){alert('Dates required');return}}else{var rows=document.querySelectorAll('.irow'),insts=[],pT=0;for(var i=0;i<rows.length;i++){var dE=rows[i].querySelector('.id'),pE=rows[i].querySelector('.ip2'),fE=rows[i].querySelector('.if');if(dE&&pE&&fE){var dv=dE.value,pv=parseFloat(pE.value)||0;if(dv&&pv>0){insts.push({pct:pv,date:dv,fund:fE.value});pT+=pv}}}if(!insts.length||Math.abs(pT-100)>0.01){alert('Must total 100%');return}insts.sort(function(a,b){return a.date<b.date?-1:1});e.installments=insts}D.schedules.push(e);save();note('Enrolled: '+v);render()}
function delSch(idx){if(!confirm('Delete schedule+payments?'))return;var sid=D.schedules[idx].id;D.payments=D.payments.filter(function(p){return String(p.sid)!==String(sid)});D.schedules.splice(idx,1);save();note('Deleted');render()}
function addInv(){var d=$i('invD').value,a=parseFloat($i('invA').value)||0;if(!d||!a){alert('Required');return}D.investments.push({id:uid(),date:d,fund:$i('invF').value,amount:a,currency:$i('invC').value,status:$i('invS').value,remarks:$i('invR').value.trim()});save();note('Recorded');render()}
function delInv(idx){if(!confirm('Delete?'))return;D.investments.splice(idx,1);save();note('Deleted');render()}
function bkp(){var b={version:2,date:new Date().toISOString(),cur:ST.cur,rm:D.rateMode,sr:D.standardRates,payments:D.payments,schedules:D.schedules,investments:D.investments,files:D.files};var blob=new Blob([JSON.stringify(b,null,2)],{type:'application/json'}),u=URL.createObjectURL(blob),a=document.createElement('a');a.href=u;a.download='StellarSeeds_'+td()+'.json';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);note('Downloaded')}
function res(file){if(!file)return;if(!confirm('Replace ALL data?'))return;var reader=new FileReader();reader.onload=function(e){try{var b=JSON.parse(e.target.result);if(!b.version)throw new Error('Invalid');D.payments=b.payments||[];D.schedules=b.schedules||[];D.investments=b.investments||[];D.files=b.files||{};if(b.cur)ST.cur=b.cur;if(b.rm)D.rateMode=b.rm;if(b.sr)D.standardRates=b.sr;save();note('Restored');render()}catch(err){alert(err.message)}};reader.readAsText(file)}
function rBk(idx){var bk=[];try{bk=JSON.parse(localStorage.getItem('ss_bk'))||[]}catch(e){}if(!bk[idx])return;if(!confirm('Restore?'))return;try{var d=JSON.parse(bk[idx].d);D.payments=d.p||[];D.schedules=d.s||[];D.investments=d.i||[];save();note('Restored');render()}catch(e){alert('Error')}}
function clr(){if(!confirm('DELETE ALL?'))return;if(!confirm('Sure?'))return;D.payments=[];D.schedules=[];D.investments=[];D.files={};save();note('Cleared');render()}
function tN(s,id){var e=$i(id);if(e)e.style.display=s.value==='__NEW__'?'block':'none'}
function tS(s,id){var e=$i(id);if(e)e.style.display=s.value==='Others'?'block':'none'}
function chkP(){var rows=document.querySelectorAll('.irow'),t=0;for(var i=0;i<rows.length;i++){var p=rows[i].querySelector('.ip2');if(p)t+=(parseFloat(p.value)||0)}var w=$i('pctW');if(w){w.textContent=Math.abs(t-100)>0.01?'Total: '+t+'%':'100% OK';w.style.color=Math.abs(t-100)>0.01?'#cc3333':'#2d8a32'}}
function addIR(){var c=$i('instRows');if(!c)return;var r=document.createElement('div');r.className='irow';r.style.cssText='display:grid;grid-template-columns:1fr 80px 100px 40px;gap:8px;align-items:end;margin-bottom:6px';r.innerHTML='<div class="fg"><label class="fl">Date</label><input type="date" class="id" value="'+td()+'"></div><div class="fg"><label class="fl">%</label><input type="number" class="ip2" value="0" oninput="SS.chkP()"></div><div class="fg"><label class="fl">Fund</label><select class="if">'+fO(ST.sFund)+'</select></div><div class="fg"><button class="btn bs bd" onclick="SS.remIR(this)">X</button></div>';c.appendChild(r)}
function remIR(btn){var r=btn.closest('.irow');if(r)r.remove();chkP()}
function doCv(){var a=parseFloat($i('cvA').value)||0,f=$i('cvFr').value,t=$i('cvTo').value,r=$i('cvR'),i=$i('cvI');if(r)r.textContent=fmtC(cc(a,f,t),t);if(i)i.textContent='1 '+f+' = '+cc(1,f,t).toFixed(4)+' '+t}
function swapC(){var f=$i('cvFr'),t=$i('cvTo');if(!f||!t)return;var tmp=f.value;f.value=t.value;t.value=tmp;doCv()}
function setRM(m){D.rateMode=m;save();note('Switched to '+m+' rates');render()}
function saveR(){for(var k in LR){if(k==='USD')continue;var inp=$i('sr_'+k);if(inp){var v=parseFloat(inp.value);if(!isNaN(v)&&v>0)D.standardRates[k]=v}}save();note('Saved');render()}
function resetR(){if(!confirm('Reset?'))return;D.standardRates={};for(var k in LR)D.standardRates[k]=LR[k];save();note('Reset');render()}

/* PUBLIC API */
window.SS={
init:function(){load();nav();render();updateHdr();setTimeout(function(){try{if(localStorage.getItem('ss_cloudCfg'))cloudInit()}catch(e){}},500)},
go:go,render:render,cM:function(){$i('modal').classList.remove('op')},
setC:function(v){ST.cur=v;localStorage.setItem('ss_c',v);render()},
setPT:function(v){ST.pt=v;render()},setST:function(v){ST.sTerm=v;render()},setSF:function(v){ST.sFund=v;render()},
setCF:function(v){ST.cfF=v;render()},setCP:function(v){ST.cfP=parseInt(v);render()},setCFu:function(v){ST.cfFu=parseInt(v);render()},
addPay:addPay,delPay:delPay,enroll:enroll,delSch:delSch,
showSch:showSch,openPay:openPay,pickI:pickI,subPay:subPay,
editSch:editSch,saveEdit:saveEdit,edTerm:edTerm,edChkP:edChkP,edAddIR:edAddIR,edRemIR:edRemIR,
addInv:addInv,delInv:delInv,showVD:showVD,
bkp:bkp,res:res,rBk:rBk,clr:clr,
tN:tN,tS:tS,chkP:chkP,addIR:addIR,remIR:remIR,
doCv:doCv,swapC:swapC,setRM:setRM,saveR:saveR,resetR:resetR,
cloudCon:function(){var cfg={apiKey:$i('clKey').value.trim(),databaseURL:$i('clUrl').value.trim()};if(!cfg.apiKey||!cfg.databaseURL){alert('API Key and Database URL required');return}localStorage.setItem('ss_cloudCfg',JSON.stringify(cfg));CL.room=$i('clRoom').value.trim()||'default';CL.uname=$i('clName').value.trim()||'User';localStorage.setItem('ss_cloudRoom',CL.room);localStorage.setItem('ss_cloudName',CL.uname);cloudInit();setTimeout(function(){render()},1500)},
cloudDis:function(){cloudDisc();note('Disconnected')}
};
SS.init();
})();
</script>
