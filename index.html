<style>

.cf-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.cf-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);padding:14px;overflow:hidden}
.cur-pair-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-bottom:14px}
.cur-pair-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);padding:12px;text-align:center;transition:all .15s}
.cur-pair-card:hover{border-color:var(--bl);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.cur-pair-pair{font-family:'Space Grotesk',sans-serif;font-size:.72rem;font-weight:700;color:var(--t3);margin-bottom:2px}
.cur-pair-rate{font-family:'JetBrains Mono',monospace;font-size:1.1rem;font-weight:700;color:var(--bl)}

<body>
<div id="loginScr" style="display:none">
<div class="lcard">
<div style="display:flex;align-items:center;gap:10px;margin-bottom:24px;justify-content:center">
<div class="logo-ic" style="width:40px;height:40px"></div>

</div>

<div style="font-size:.72rem;color:var(--t3);text-align:center;margin-bottom:20px" id="lSub">Enter credentials</div>

<div style="text-align:center;margin-top:14px;font-size:.74rem;color:var(--t3)" id="lTog">No account? <a style="color:var(--g);font-weight:600" onclick="togAuth()">Sign Up</a></div>
<div style="margin-top:16px;padding-top:12px;border-top:1px solid var(--b2);text-align:center"><a style="font-size:.68rem;color:var(--t3);text-decoration:underline" onclick="skipAuth()">Continue without login</a></div>
</div>
</div>

<div id="mainApp" style="display:none">
<div class="hdr">
<div class="logo"><div class="logo-ic"></div><div class="logo-txt"><span class="logo-nm">Stellar Seeds</span><span class="logo-sb">Seed Tolling Plant</span></div></div>

<script>
/* ========== DATA ========== */

function monthlyAmt(t,s,e){var mc=monthCount(s,e);return mc>0?t/mc:0}

/* ========== CLOUD ========== */
function initCloud(){
  var c;try{c=JSON.parse(localStorage.getItem('ss_cloud'))}catch(e){}
  if(!c||!c.databaseURL)return false;
  try{
    var cfg={databaseURL:c.databaseURL};
    if(c.apiKey)cfg.apiKey=c.apiKey;
    if(typeof firebase!=='undefined'){
      if(!firebase.apps.length)firebase.initializeApp(cfg);
      db=firebase.database();
      try{auth=firebase.auth()}catch(e){auth=null}
      cOn=true;return true;
    }
  }catch(e){}
  return false;
}

function cSave(){
  if(!db)return;
  skipSync=true;
  db.ref('ss').update({
    costs:D.costs,pays:D.pays,upds:D.upds,
    vn:D.vn,psSch:D.psSch,invSch:D.invSch,
    _ts:Date.now(),_by:curUser?curUser.email:'local'
  }).then(function(){
    setTimeout(function(){skipSync=false},1000);
    setDot('on');setLbl('Synced');
  }).catch(function(e){
    skipSync=false;
    if(isPermErr(e)){setDot('err');setLbl('Denied')}
    else{setDot('wr');setLbl('Err')}
  });
}

function syncFromCloud(){
  if(!db)return;
  setDot('wr');setLbl('Syncing...');
  db.ref('ss').once('value').then(function(snap){
    var val=snap.val();
    if(!val){setupLiveSync();setDot('on');setLbl('Synced');return}
    var ch=false;
    ['costs','pays','upds','psSch','invSch'].forEach(function(k){
      if(val[k]&&Array.isArray(val[k])&&val[k].length){
        D[k]=val[k];
        localStorage.setItem('ss_'+k,JSON.stringify(val[k]));
        ch=true;
      }
    });
    if(ch)doRender();
    setDot('on');setLbl('Synced');
    setupLiveSync();
  }).catch(function(e){
    if(isPermErr(e)){setDot('err');setLbl('Denied')}
    else{setDot('wr');setLbl('Sync err')}
    setupLiveSync();
  });
}

function setupLiveSync(){
  if(!db)return;
  var ref=db.ref('ss');
  ref.off();
  ref.on('value',function(snap){
    if(skipSync)return;
    var val=snap.val();if(!val)return;
    var ch=false;
    ['costs','pays','upds','psSch','invSch'].forEach(function(k){
      if(val[k]&&Array.isArray(val[k])){
        D[k]=val[k];
        localStorage.setItem('ss_'+k,JSON.stringify(val[k]));
        ch=true;
      }
    });
    if(ch){doRender();setDot('on');setLbl('Synced')}
  },function(e){setDot('err');setLbl(isPermErr(e)?'Denied':'Err')});
}

function monitorConnection(){
  if(!db)return;
  db.ref('.info/connected').on('value',function(s){
    if(s.val()===true){
      setDot('on');setLbl('Connected');
      if(curUser)syncFromCloud();
    }else{setDot('off');setLbl('Offline')}
  });
}

function checkAuth(){
  monitorConnection();
  if(!auth){showMain();return}
  auth.onAuthStateChanged(function(u){
    if(u){curUser=u;showMain();syncFromCloud()}
    else{curUser=null;showLogin()}
  });
}

/* ========== AUTH UI ========== */
function showLogin(){
  $('loginScr').style.display='flex';
  $('mainApp').style.display='none';
}
function showMain(){
  $('loginScr').style.display='none';
  $('mainApp').style.display='block';
  if(curUser){
    $('hUser').textContent=curUser.email||'';
    $('hUser').style.display='inline';
    $('hOut').style.display='inline';
  }else{
    $('hUser').style.display='none';
    $('hOut').style.display='none';
    setDot('off');setLbl('Local');
  }

}
window.togAuth=function(){
  authMode=authMode==='login'?'signup':'login';
  $('lTitle').textContent=authMode==='signup'?'Create Account':'Sign In';
  $('lBtn').textContent=authMode==='signup'?'Sign Up':'Sign In';
};
window.doLogin=function(){
  var em=$('lEmail').value.trim(),pw=$('lPass').value;
  if(!em||!pw){$('lErr').textContent='Required';$('lErr').style.display='block';return}
  if(!auth){$('lErr').textContent='Cloud not configured';$('lErr').style.display='block';return}
  $('lBtn').textContent='Wait...';
  if(authMode==='signup'){
    auth.createUserWithEmailAndPassword(em,pw).catch(function(e){$('lBtn').textContent='Sign Up';$('lErr').textContent=e.code;$('lErr').style.display='block'})
  }else{
    auth.signInWithEmailAndPassword(em,pw).catch(function(e){$('lBtn').textContent='Sign In';$('lErr').textContent=e.code;$('lErr').style.display='block'})
  }
};
window.doLogout=function(){if(auth)auth.signOut();else{curUser=null;showLogin()}};
window.skipAuth=function(){curUser=null;showMain();notify('Local mode')};

/* ========== CURRENCY ========== */
function fetchLiveRates(){
  liveFetching=true;if(tab==='cur')doRender();
  var ql=[];for(var k in FX){if(k!=='USD')ql.push(k)}
  var done=false;
  function ok(){if(done)return;done=true;liveLastUpdated=new Date().toLocaleString();localStorage.setItem('ss_curRates',JSON.stringify(getRateSnapshot()));localStorage.setItem('ss_curLiveTS',liveLastUpdated);liveFetching=false;notify('Rates updated');doRender()}
  var to=setTimeout(function(){if(!done){done=true;liveFetching=false;notify('Using cached');doRender()}},12000);
  fetch('https://api.frankfurter.dev/v2/rates?base=USD&quotes='+ql.join(',')).then(function(r){if(!r.ok)throw 0;return r.json()}).then(function(data){if(done)return;if(data&&data.rates){for(var k2 in data.rates){if(FX[k2])FX[k2].r=data.rates[k2]}clearTimeout(to);ok()}else throw 0}).catch(function(){if(done)return;fetch('https://open.er-api.com/v6/latest/USD').then(function(r){if(!r.ok)throw 0;return r.json()}).then(function(data){if(done)return;clearTimeout(to);if(data&&data.rates){for(var k3 in FX){if(k3!=='USD'&&data.rates[k3])FX[k3].r=data.rates[k3]}ok()}else throw 0}).catch(function(){if(done)return;clearTimeout(to);liveFetching=false;doRender()})});
}
function getRateSnapshot(){var s={};for(var k in FX)s[k]=FX[k].r;return s}

function getMTDData(){var now=new Date(),yr=now.getFullYear(),mo=now.getMonth(),today=now.getDate(),dim=new Date(yr,mo+1,0).getDate(),data=[];for(var d=1;d<=dim;d++){var ds=yr+'-'+String(mo+1).padStart(2,'0')+'-'+String(d).padStart(2,'0'),inf=0,outf=0;for(var i=0;i<D.invSch.length;i++){var r=D.invSch[i];if(r.date===ds&&(r.status==='Deposited'||r.status==='Confirmed'))inf+=cv(r.amount,r.cur||'USD','USD')}for(var i=0;i<D.pays.length;i++){var p=D.pays[i];if(p.date===ds)outf+=cv(p.amt,p.cur,'USD')}data.push({label:String(d),inflow:inf,outflow:outf,isToday:d===today,isPast:d<=today,isFuture:d>today})}return data}

function cfBarChart(data,chartH){var maxVal=0,tIn=0,tOut=0;for(var i=0;i<data.length;i++){if(data[i].inflow>maxVal)maxVal=data[i].inflow;if(data[i].outflow>maxVal)maxVal=data[i].outflow;tIn+=data[i].inflow;tOut+=data[i].outflow}var tNet=tIn-tOut;if(maxVal===0)maxVal=100;var h='<div style="display:flex;gap:12px;margin-bottom:8px"><div style="font-size:.56rem"><span style="color:var(--t3)">In:</span> <span style="color:var(--g);font-family:JetBrains Mono;font-weight:700">'+fmtD(tIn)+'</span></div><div style="font-size:.56rem"><span style="color:var(--t3)">Out:</span> <span style="color:var(--rd);font-family:JetBrains Mono;font-weight:700">'+fmtD(tOut)+'</span></div><div style="font-size:.56rem"><span style="color:var(--t3)">Net:</span> <span style="color:'+(tNet>=0?'var(--g)':'var(--rd)')+';font-family:JetBrains Mono;font-weight:700">'+fmtD(tNet)+'</span></div></div>';h+='<div style="position:relative;margin-left:48px;height:'+chartH+'px">';for(var g=0;g<=4;g++){var yP=(g/4)*100;h+='<div style="position:absolute;left:0;right:0;top:'+yP+'%;border-top:'+(g===4?'1px solid var(--b1)':'1px dashed var(--b2)')+'"></div>';h+='<div style="position:absolute;left:-46px;top:calc('+yP+'% - 6px);width:42px;text-align:right;font-size:.42rem;font-family:JetBrains Mono;color:var(--t3)">'+fmtD(maxVal*(1-g/4))+'</div>'}h+='<div style="position:absolute;left:0;right:0;bottom:0;top:0;display:flex;gap:2px;padding:0 1px">';for(var i=0;i<data.length;i++){var d=data[i],inH=(d.inflow/maxVal)*chartH,outH=(d.outflow/maxVal)*chartH,op=d.isFuture?'0.2':'1';h+='<div style="flex:1;display:flex;flex-direction:column;justify-content:flex-end;min-width:0;opacity:'+op+'"><div style="display:flex;gap:1px;align-items:flex-end;height:'+chartH+'px"><div style="flex:1;background:'+(d.isFuture?'var(--b2)':'var(--g)')+';border-radius:1px 1px 0 0;height:'+Math.max(d.inflow>0?2:0,inH)+'px"></div><div style="flex:1;background:'+(d.isFuture?'var(--b2)':'var(--rd)')+';border-radius:1px 1px 0 0;height:'+Math.max(d.o function cfCumLine(data,h){var cum=[],tot=0;for(var i=0;i<data.length;i++){tot+=data[i].inflow-data[i].outflow;cum.push(tot)}if(!cum.length)return'';var mx=Math.max.apply(null,cum),mn2=Math.min.apply(null,cum);mn2=Math.min(mn2,0);mx=Math.max(mx,0);if(mx===mn2){mx+=100;mn2-=100}var rng=mx-mn2,n=cum.length,pts='';for(var i=0;i<n;i++){var x=n>1?(i/(n-1))*100:50,y=100-((cum[i]-mn2)/rng)*100;pts+=x.toFixed(1)+','+y.toFixed(1)+' '}var zy=100-((0-mn2)/rng)*100;zy=Math.max(0,Math.min(100,zy));var r='<div style="margin-top:6px;padding-top:6px;border-top:1px solid var(--b2)"><div style="font-size:.5rem;color:var(--t3);margin-bottom:3px;font-family:JetBrains Mono">Cumulative Net</div>';r+='<svg viewBox="0 0 100 100" preserveAspectRatio="none" style="width:100%;height:'+h+'px;border:1px solid var(--b2);border-radius:4px;background:var(--s2)">';r+='<line x1="0" y1="'+zy.toFixed(1)+'" x2="100" y2="'+zy.toFixed(1)+'" stroke="var(--b1)" stroke-width="0.3" stroke-dasharray="1,1"/>';r+='<polygon points="0,'+zy.toFixed(1)+' '+pts+'100,'+zy.toFixed(1)+'" fill="'+(cum[n-1]>=0?'rgba(45,138,50,.1)':'rgba(204,51,51,.1)')+'"/>';r+='<polyline points="'+pts.trim()+'" fill="none" stroke="'+(cum[n-1]>=0?'var(--g)':'var(--rd)')+'" stroke-width="0.6"/>';r+='<circle cx="'+(n>1?100:50).toFixed(1)+'" cy="'+(100-((cum[n-1]-mn2)/rng)*100).toFixed(1)+'" r="1.5" fill="'+(cum[n-1]>=0?'var(--g)':'var(--rd)')+'"/>';r+='</svg></div>';return r}

  h+='<div class="cur-convert-box"><div style="font-family:Space Grotesk;font-size:.82rem;font-weight:700;margin-bottom:10px">Currency Converter</div>';
  var curOpts='';for(var k in FX)curOpts+='<option value="'+k+'">'+k+' - '+FX[k].name+'</option>';
  h+='<div style="display:grid;grid-template-columns:1fr 80px 80px 50px;gap:8px;align-items:end"><div class="fg"><label class="fl">Amount</label><input type="number" id="cvAmt" value="'+curConvAmt+'" step="any" oninput="doConvert()"></div><div class="fg"><label class="fl">From</label><select id="cvFrom" onchange="doConvert()">'+curOpts.replace('value="'+curFrom+'"','value="'+curFrom+'" selected')+'</select></div><div class="fg"><label class="fl">To</label><select id="cvTo" onchange="doConvert()">'+curOpts.replace('value="'+curTo+'"','value="'+curTo+'" selected')+'</select></div><div class="fg"><button class="btn" style="font-size:.9rem" onclick="var t=$(\'cvFrom\').value;$(\'cvFrom\').value=$(\'cvTo\').value;$(\'cvTo\').value=t;doConvert()">&#8644;</button></div></div>';
  var converted=cv(curConvAmt,curFrom,curTo),rate=cv(1,curFrom,curTo);
  h+='<div class="cur-convert-result" id="cvResult">'+fmtC(converted,curTo)+'</div><div class="cur-convert-sub" id="cvSub">1 '+curFrom+' = '+rate.toFixed(4)+' '+curTo+'</div></div>';
  h+='<div class="card"><div class="ch"><span class="ct">Exchange Rates</span><span style="font-family:JetBrains Mono;font-size:.52rem;color:var(--t3)">Base: 1 USD</span></div><div class="cur-pair-grid">';
  for(var k2 in FX){if(k2==='USD')continue;var rr=FX[k2].r;h+='<div class="cur-pair-card"><div class="cur-pair-pair">USD / '+k2+'</div><div class="cur-pair-rate">'+(rr>=1000?Number(rr).toLocaleString('en',{maximumFractionDigits:2}):rr.toFixed(4))+'</div><div class="cur-pair-sub">'+FX[k2].name+'</div></div>'}
  h+='</div></div>';
  if(currencyMode==='fixed'){h+='<div class="card"><div class="ch"><span class="ct">Manual Rates</span></div><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px">';for(var k3 in FX)h+='<div class="fg"><label class="fl">'+k3+'</label><input type="number" id="fx_'+k3+'" value="'+FX[k3].r+'" step="any"></div>';h+='</div><div style="display:flex;justify-content:flex-end;margin-top:8px"><button class="btn bp" onclick="saveFixedRates()">Save</button></div></div>'}
  $('app').innerHTML=h;
}
window.doConvert=function(){var amt=parseFloat($('cvAmt').value)||0,f=$('cvFrom').value,t=$('cvTo').value;curConvAmt=amt;curFrom=f;curTo=t;var r2=cv(amt,f,t),rate=cv(1,f,t);$('cvResult').textContent=fmtC(r2,t);$('cvSub').textContent='1 '+f+' = '+rate.toFixed(4)+' '+t};
window.saveFixedRates=function(){for(var k in FX){var el=$('fx_'+k);if(el){var r2=parseFloat(el.value)||0;if(r2>0)FX[k].r=r2}}localStorage.setItem('ss_curRates',JSON.stringify(getRateSnapshot()));notify('Saved');doRender()};

function showCloud(){
  var h='<div class="card"><div class="ch"><span class="ct">Cloud Sync</span></div>';
  if(cOn){h+='<div style="color:var(--g);font-weight:600">Connected</div>';if(curUser)h+='<div style="font-size:.72rem;color:var(--t2);margin-top:4px">User: '+H(curUser.email)+'</div>'}
  else{h+='<div style="color:var(--t3)">Not configured</div>'}
  h+='<div class="fg" style="margin-top:10px"><label class="fl">Database URL</label><input type="text" id="clURL" placeholder="https://your-project.firebaseio.com"></div>';
  h+='<div class="fg"><label class="fl">API Key</label><input type="text" id="clKey" placeholder="AIzaSy..."></div>';
  h+='<div style="display:flex;justify-content:flex-end;gap:6px"><button class="btn bp" onclick="saveCloud()">Connect</button></div>';
  h+='<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--b2)"><div style="font-size:.68rem;font-weight:600;margin-bottom:6px">Setup Guide</div><ol style="font-size:.66rem;color:var(--t2);padding-left:16px;line-height:1.8"><li>console.firebase.google.com - Create project</li><li>Enable Realtime Database</li><li>Set security rules to allow authenticated read/write</li><li>Enable Email/Password authentication</li><li>Paste Database URL and API Key above</li><li>Click Connect, then reload page</li><li>Sign up each team member</li></ol></div>';
  h+='</div>';
  $('app').innerHTML=h;
}
window.saveCloud=function(){var url=$('clURL').value.trim(),key=$('clKey').value.trim();if(!url||!key){alert('Both fields required');return}localStorage.setItem('ss_cloud',JSON.stringify({databaseURL:url,apiKey:key}));notify('Saved. Reload page.');initCloud()};

/* ========== INIT ========== */
setInterval(function(){if(currencyMode==='live')fetchLiveRates()},600000);
initCloud();
checkAuth();
</script>
</body>
