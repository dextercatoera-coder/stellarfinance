<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

.mo-highlight{background:linear-gradient(135deg,var(--blc),rgba(40,116,166,.04));border:1px solid rgba(40,116,166,.15);border-radius:var(--r);padding:8px 10px;margin-top:6px;display:grid;grid-template-columns:1fr 1fr;gap:6px}
.mo-highlight-item{text-align:center}

.fund-avail-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;padding:10px;background:var(--s2);border:1px solid var(--b2);border-radius:var(--rl)}

.fund-avail-item:hover{border-color:var(--bl)}.fund-avail-item.sel{border-color:var(--g);background:var(--gc)}

.fund-avail-sub{font-size:.5rem;color:var(--t3);font-family:'JetBrains Mono',monospace;margin-top:2px}
.vd-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);margin-bottom:12px;overflow:hidden}
.vd-header{padding:14px 16px;border-bottom:1px solid var(--b1);display:flex;justify-content:space-between;align-items:center}

.fund-bal-row:last-child{border-bottom:0}
.fund-bal-name{font-weight:700}
.fund-bal-bar{height:14px;background:var(--s3);border-radius:4px;overflow:hidden;position:relative}

.cur-pair-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-bottom:14px}
.cur-pair-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);padding:12px;text-align:center;transition:all .15s}
.cur-pair-card:hover{border-color:var(--bl)}
.cur-pair-pair{font-family:'Space Grotesk',sans-serif;font-size:.72rem;font-weight:700;color:var(--t3);margin-bottom:2px}
.cur-pair-rate{font-family:'JetBrains Mono',monospace;font-size:1.1rem;font-weight:700;color:var(--bl)}
.cur-pair-sub{font-size:.54rem;color:var(--t3);font-family:'JetBrains Mono',monospace;margin-top:2px}
.cur-convert-box{background:linear-gradient(135deg,var(--s1),var(--s2));border:1px solid var(--b1);border-radius:var(--rl);padding:20px;margin-bottom:14px}
.cur-convert-result{font-family:'Space Grotesk',sans-serif;font-size:1.6rem;font-weight:700;color:var(--g);text-align:center;margin:10px 0 4px}
.cur-convert-sub{text-align:center;font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--t3)}
.exp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:12px}
.exp-card{border:2px solid var(--b2);border-radius:var(--rl);padding:20px;cursor:pointer;transition:all .15s;text-align:center}
.exp-card:hover{transform:translateY(-2px)}
.exp-card .exp-icon{font-size:2.2rem;margin-bottom:6px}.exp-card .exp-title{font-family:'Space Grotesk',sans-serif;font-size:.88rem;font-weight:700;margin-bottom:2px}.exp-card .exp-desc{font-size:.62rem;color:var(--t3);line-height:1.3}
.exp-card.excel{border-color:rgba(45,138,50,.3)}.exp-card.excel:hover{border-color:var(--g);background:var(--gc)}
.exp-card.pdf{border-color:rgba(204,51,51,.3)}.exp-card.pdf:hover{border-color:var(--rd);background:var(--rdc)}

.exp-status{padding:10px;background:var(--s2);border:1px solid var(--b2);border-radius:var(--r);margin-bottom:10px;display:none;font-family:'JetBrains Mono',monospace;font-size:.66rem}
.exp-status.show{display:block}.exp-status.going{color:var(--bl)}.exp-status.ok{color:var(--g)}.exp-status.fail{color:var(--rd)}
.sec-cb{display:flex;align-items:center;gap:6px;padding:7px 10px;background:var(--s2);border:1px solid var(--b2);border-radius:var(--r);cursor:pointer;font-size:.72rem;transition:all .12s;user-select:none}
.sec-cb:hover{border-color:var(--bl);background:var(--blc)}
.sec-cb input{accent-color:var(--g);width:14px;height:14px}

@media(max-width:900px){.app{padding:10px}.fin-row{grid-template-columns:1fr}.fund-bal-row{grid-template-columns:80px 1fr 80px}.fund-avail-bar,.term-cards,.ps-schedule-grid{grid-template-columns:1fr}.ps-inst-row{grid-template-columns:1fr 80px 1fr 40px}.exp-grid{grid-template-columns:1fr}}
</style>

<div id="loginScr" style="display:none"><div class="lcard"><div style="display:flex;align-items:center;gap:10px;margin-bottom:24px;justify-content:center"><div class="logo-ic" style="width:40px;height:40px"></div><div class="logo-txt"><span class="logo-nm" style="font-size:1.1rem">Stellar Seeds</span><span class="logo-sb">Construction Management</span></div></div><div style="font-family:'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:700;text-align:center;margin-bottom:4px" id="lTitle">Sign In</div><div style="font-size:.72rem;color:var(--t3);text-align:center;margin-bottom:20px" id="lSub">Enter credentials</div><div class="lerr" id="lErr"></div><div class="fg"><label class="fl">Email</label><input type="text" id="lEmail" placeholder="you@company.com"></div><div class="fg"><label class="fl">Password</label><input type="password" id="lPass" placeholder="Password"></div><button class="btn bp" style="width:100%;padding:10px;font-size:.82rem;margin-top:6px" id="lBtn" onclick="doLogin()">Sign In</button><div style="text-align:center;margin-top:14px;font-size:.74rem;color:var(--t3)" id="lTog">No account? <a style="color:var(--g);font-weight:600" onclick="togAuth()">Sign Up</a></div><div style="margin-top:16px;padding-top:12px;border-top:1px solid var(--b2);text-align:center"><a style="font-size:.68rem;color:var(--t3);text-decoration:underline" onclick="skipAuth()">Continue without login</a></div></div></div>

function addD(ds,n){var d=new Date(ds);d.setDate(d.getDate()+n);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function notify(m){var t=G('tst');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2200)}
function mOpen(ti,bd,ft){G('mTi').textContent=ti;G('mBd').innerHTML=bd;G('mFt').innerHTML=ft||'';G('mdl').classList.add('open')}
function mClose(){G('mdl').classList.remove('open')}
G('mdl').addEventListener('click',function(e){if(e.target===this)mClose()});
document.addEventListener('keydown',function(e){if(e.key==='Escape')mClose()});
function cv(v,f,t){if(f===t)return v;return v/(FX[f]?FX[f].r:1)*(FX[t]?FX[t].r:1)}
function fmtC(v,c){return(SY[c]||'')+Number(v||0).toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtD(v){return fmtC(cv(v,'USD',DC),DC)}
function isPermErr(e){var m=(e&&e.message)||'';return m.indexOf('permission')>=0||m.indexOf('PERMISSION_DENIED')>=0}
function setDot(st){var el=G('hDot');if(el)el.className='dot '+st}
function setLbl(m){var el=G('hLbl');if(el)el.textContent=m}
function getAllVendors(){var m={};for(var i=0;i<D.psSch.length;i++)m[D.psSch[i].vendor]=1;for(var i=0;i<D.pays.length;i++)m[D.pays[i].vendor]=1;return Object.keys(m).sort()}
function monthCount(s,e){if(!s||!e)return 0;return Math.max(1,(new Date(e).getFullYear()-new Date(s).getFullYear())*12+(new Date(e).getMonth()-new Date(s).getMonth())+1)}
function monthlyAmt(t,s,e){var mc=monthCount(s,e);return mc>0?t/mc:0}
function catBadge(cat){var c=CAT_COLORS[cat]||'var(--t3)';return '<span class="badge" style="background:'+c+'22;color:'+c+';border:1px solid '+c+'44">'+H(cat)+'</span>'}
function fundBadge(fund){var c=FUND_COLORS[fund]||'var(--t3)';return '<span class="badge" style="background:'+c+'22;color:'+c+';border:1px solid '+c+'44">'+H(fund)+'</span>'}
function fundOpts(sel){var o='';for(var i=0;i<FUNDS.length;i++)o+='<option value="'+FUNDS[i]+'"'+(sel===FUNDS[i]?' selected':'')+'>'+FUNDS[i]+'</option>';return o}
function mkDl(id){var vds=getAllVendors(),dl='<datalist id="'+id+'">';for(var i=0;i<vds.length;i++)dl+='<option value="'+H(vds[i])+'">';return dl+'</datalist>'}
function cbar(fn){var o='';for(var k in FX)o+='<option value="'+k+'"'+(DC===k?' selected':'')+'>'+k+'</option>';return '<div class="fbar"><label>Display:</label><select onchange="'+fn+'">'+o+'</select></div>'}
function getVendorSummary(){var vs={};for(var i=0;i<D.psSch.length;i++){var r=D.psSch[i],v=r.vendor;if(!vs[v])vs[v]={totalSch:0,cur:r.cur||'USD',category:r.category||'Others',terms:r.terms,startDate:r.startDate||'',endDate:r.endDate||'',installments:r.installments||[],totalPaid:0,payCount:0,remarks:r.remarks||'',fund:r.fund||'VN Fund'};vs[v].totalSch+=cv(r.totalCost,r.cur||'USD','USD')}for(var i=0;i<D.pays.length;i++){var p=D.pays[i],v=p.vendor;if(!vs[v])vs[v]={totalSch:0,cur:'USD',category:p.category||'Others',terms:'--',startDate:'',endDate:'',installments:[],totalPaid:0,payCount:0,remarks:'',fund:p.fund||'Other'};vs[v].totalPaid+=cv(p.amt,p.cur,'USD');vs[v].payCount++}return vs}
function getFundBalances(){var bal={};for(var i=0;i<FUNDS.length;i++)bal[FUNDS[i]]={inflow:0,outflow:0,balance:0};for(var i=0;i<D.invSch.length;i++){var r=D.invSch[i],f=r.fund||'Other';if(!bal[f])bal[f]={inflow:0,outflow:0,balance:0};if(r.status==='Deposited'||r.status==='Confirmed')bal[f].inflow+=cv(r.amount,r.cur||'USD','USD')}for(var i=0;i<D.pays.length;i++){var p=D.pays[i],f=p.fund||'Other';if(!bal[f])bal[f]={inflow:0,outflow:0,balance:0};bal[f].outflow+=cv(p.amt,p.cur,'USD')}for(var k in bal)bal[k].balance=bal[k].inflow-bal[k].outflow;return bal}
function getSummaryMonths(){var m={};for(var i=0;i<D.pays.length;i++){if(D.pays[i].date)m[D.pays[i].date.substring(0,7)]=1}for(var i=0;i<D.invSch.length;i++){if(D.invSch[i].date)m[D.invSch[i].date.substring(0,7)]=1}for(var i=0;i<D.psSch.length;i++){var r=D.psSch[i];if(r.terms==='monthly'&&r.startDate&&r.endDate){var c=new Date(r.startDate),e=new Date(r.endDate);while(c<=e){var k=c.getFullYear()+'-'+String(c.getMonth()+1).padStart(2,'0');m[k]=1;c.setMonth(c.getMonth()+1)}}}return Object.keys(m).sort()}
function fmtM(k){var p=k.split('-');var mn=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return mn[parseInt(p[1])-1]+' '+p[0]}
function getMonthPayables(mk){var p=mk.split('-'),yr=parseInt(p[0]),mo=parseInt(p[1])-1,pl=[];for(var i=0;i<D.psSch.length;i++){var r=D.psSch[i];if(r.terms==='monthly'&&r.startDate&&r.endDate){var ms=new Date(yr,mo,1),me=new Date(yr,mo+1,0),ss=new Date(r.startDate),se=new Date(r.endDate);if(ms<=se&&me>=ss){var mc=monthCount(r.startDate,r.endDate),ma=mc>0?cv(r.totalCost,r.cur||'USD','USD')/mc:0;pl.push({vendor:r.vendor,amount:ma,fund:r.fund||'VN Fund',category:r.category||'Others',type:'Monthly',detail:''})}}else if(r.terms==='installment'){for(var j=0;j<(r.installments||[]).length;j++){var ins=r.installments[j];if(ins.date&&ins.date.substring(0,7)===mk){var ia=cv(r.totalCost,r.cur||'USD','USD')*ins.pct/100;pl.push({vendor:r.vendor,amount:ia,fund:ins.fund||r.fund||'VN Fund',category:r.category||'Others',type:'Tranche',detail:ins.pct+'%'})}}}}pl.sort(function(a,b){return b.amount-a.amount});return pl}

/* ===== CLOUD ===== */
function initCloud(){var c;try{c=JSON.parse(localStorage.getItem('ss_cloud'))}catch(e){}if(!c||!c.databaseURL)return false;try{if(typeof firebase!=='undefined'){var cfg={databaseURL:c.databaseURL};if(c.apiKey)cfg.apiKey=c.apiKey;if(!firebase.apps.length)firebase.initializeApp(cfg);db=firebase.database();try{auth=firebase.auth()}catch(e){auth=null}cOn=true;return true}}catch(e){}return false}
function cSave(){if(!db)return;skipSync=true;db.ref('ss').update({costs:D.costs,pays:D.pays,upds:D.upds,vn:D.vn,psSch:D.psSch,invSch:D.invSch,_ts:Date.now(),_by:curUser?curUser.email:'local'}).then(function(){setTimeout(function(){skipSync=false},1000);setDot('on');setLbl('Synced')}).catch(function(e){skipSync=false;setDot(isPermErr(e)?'err':'wr');setLbl(isPermErr(e)?'Denied':'Err')})}
function syncFromCloud(){if(!db)return;setDot('wr');setLbl('Syncing...');db.ref('ss').once('value').then(function(s){var v=s.val();if(!v){setupLiveSync();setDot('on');setLbl('Synced');return}var ch=false;['costs','pays','upds','psSch','invSch'].forEach(function(k){if(v[k]&&Array.isArray(v[k])&&v[k].length){D[k]=v[k];localStorage.setItem('ss_'+k,JSON.stringify(v[k]));ch=true}});if(ch)doRender();setDot('on');setLbl('Synced');setupLiveSync()}).catch(function(e){setDot(isPermErr(e)?'err':'wr');setLbl(isPermErr(e)?'Denied':'Sync err');setupLiveSync()})}
function setupLiveSync(){if(!db)return;var ref=db.ref('ss');ref.off();ref.on('value',function(s){if(skipSync)return;var v=s.val();if(!v)return;var ch=false;['costs','pays','upds','psSch','invSch'].forEach(function(k){if(v[k]&&Array.isArray(v[k])){D[k]=v[k];localStorage.setItem('ss_'+k,JSON.stringify(v[k]));ch=true}});if(ch){doRender();setDot('on');setLbl('Synced')}},function(e){setDot('err');setLbl(isPermErr(e)?'Denied':'Err')})}
function monitorConnection(){if(!db)return;db.ref('.info/connected').on('value',function(s){if(s.val()===true){setDot('on');setLbl('Connected');if(curUser)syncFromCloud()}else{setDot('off');setLbl('Offline')}})}
function checkAuth(){monitorConnection();if(!auth){showMain();return}auth.onAuthStateChanged(function(u){if(u){curUser=u;showMain();syncFromCloud()}else{curUser=null;showLogin()}})}
function showLogin(){G('loginScr').style.display='flex';G('mainApp').style.display='none'}
function showMain(){G('loginScr').style.display='none';G('mainApp').style.display='block';if(curUser){G('hUser').textContent=curUser.email||'';G('hUser').style.display='inline';G('hOut').style.display='inline'}else{G('hUser').style.display='none';G('hOut').style.display='none';setDot('off');setLbl('Local')}load();nav();doRender()}
window.togAuth=function(){authMode=authMode==='login'?'signup':'login';G('lTitle').textContent=authMode==='signup'?'Create Account':'Sign In';G('lBtn').textContent=authMode==='signup'?'Sign Up':'Sign In'};
window.doLogin=function(){var em=G('lEmail').value.trim(),pw=G('lPass').value;if(!em||!pw){G('lErr').textContent='Required';G('lErr').style.display='block';return}if(!auth){G('lErr').textContent='Cloud not configured';G('lErr').style.display='block';return}G('lBtn').textContent='Wait...';if(authMode==='signup'){auth.createUserWithEmailAndPassword(em,pw).catch(function(e){G('lBtn').textContent='Sign Up';G('lErr').textContent=e.code;G('lErr').style.display='block'})}else{auth.signInWithEmailAndPassword(em,pw).catch(function(e){G('lBtn').textContent='Sign In';G('lErr').textContent=e.code;G('lErr').style.display='block'})}};
window.doLogout=function(){if(auth)auth.signOut();else{curUser=null;showLogin()}};
window.skipAuth=function(){curUser=null;showMain();notify('Local mode')};

function save(){localStorage.setItem('ss_costs',JSON.stringify(D.costs));localStorage.setItem('ss_pays',JSON.stringify(D.pays));localStorage.setItem('ss_upds',JSON.stringify(D.upds));localStorage.setItem('ss_vn',JSON.stringify(D.vn));localStorage.setItem('ss_psSch',JSON.stringify(D.psSch));localStorage.setItem('ss_invSch',JSON.stringify(D.invSch));cSave()}
function lj(k,d){try{var v=JSON.parse(localStorage.getItem('ss_'+k));if(v&&((Array.isArray(v)&&v.length)||(!Array.isArray(v)&&Object.keys(v).length)))return v}catch(e){}return d}
function load(){D.costs=lj('costs',[]);D.pays=lj('pays',[]);D.upds=lj('upds',[]);D.vn=lj('vn',{});D.psSch=lj('psSch',[]);D.invSch=lj('invSch',[]);DC=localStorage.getItem('ss_DC')||'USD';currencyMode=localStorage.getItem('ss_curMode')||'live';var sr=null;try{sr=JSON.parse(localStorage.getItem('ss_curRates'))}catch(e){}if(sr){for(var k in sr){if(FX[k])FX[k].r=sr[k]}}liveLastUpdated=localStorage.getItem('ss_curLiveTS')||null;if(currencyMode==='live')fetchLiveRates()}

var tabs=[{id:'costD',l:'Summary'},{id:'invSch',l:'Investment'},{id:'paySch',l:'Pay Schedule'},{id:'pays',l:'Payments'},{id:'vendors',l:'Vendors'},{id:'history',l:'History'},{id:'cur',l:'Currency'},{id:'cloud',l:'Cloud'}];

var R={costD:showSummary,invSch:showInvSch,pays:showPays,paySch:showPaySch,vendors:showVendors,history:showHistory,cur:showCur,cloud:showCloud};
function nav(){var h='';for(var i=0;i<tabs.length;i++)h+='<button class="'+(tab===tabs[i].id?'act':'')+'" onclick="go(\''+tabs[i].id+'\')">'+tabs[i].l+'</button>';G('nbar').innerHTML=h}

function fetchLiveRates(){liveFetching=true;if(tab==='cur')doRender();var ql=[];for(var k in FX){if(k!=='USD')ql.push(k)}var done=false;function ok(){if(done)return;done=true;liveLastUpdated=new Date().toLocaleString();localStorage.setItem('ss_curRates',JSON.stringify(getRateSnap()));localStorage.setItem('ss_curLiveTS',liveLastUpdated);liveFetching=false;notify('Rates updated');doRender()}var to=setTimeout(function(){if(!done){done=true;liveFetching=false;doRender()}},12000);fetch('https://api.frankfurter.dev/v2/rates?base=USD&quotes='+ql.join(',')).then(function(r){if(!r.ok)throw 0;return r.json()}).then(function(data){if(done)return;if(data&&data.rates){for(var k2 in data.rates){if(FX[k2])FX[k2].r=data.rates[k2]}clearTimeout(to);ok()}else throw 0}).catch(function(){if(done)return;fetch('https://open.er-api.com/v6/latest/USD').then(function(r){if(!r.ok)throw 0;return r.json()}).then(function(data){if(done)return;clearTimeout(to);if(data&&data.rates){for(var k3 in FX){if(k3!=='USD'&&data.rates[k3])FX[k3].r=data.rates[k3]}ok()}else throw 0}).catch(function(){if(done)return;clearTimeout(to);liveFetching=false;doRender()})})}
function getRateSnap(){var s={};for(var k in FX)s[k]=FX[k].r;return s}

function getProjectedMonthly(n){var now=new Date(),sy=now.getFullYear(),sm=now.getMonth(),mn=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],data=[];for(var m=0;m<n;m++){var tm=sm+m,ty=sy+Math.floor(tm/12),tmm=tm%12,proj=0,dtls=[];for(var i=0;i<D.psSch.length;i++){var r=D.psSch[i],aUSD=cv(r.totalCost,r.cur||'USD','USD');if(r.terms==='monthly'){if(new Date(ty,tmm,1)<=new Date(r.endDate)&&new Date(ty,tmm+1,0)>=new Date(r.startDate)){var mc=monthCount(r.startDate,r.endDate),ma=mc>0?aUSD/mc:0;proj+=ma;dtls.push({vendor:r.vendor,amount:ma,fund:r.fund||'VN Fund',type:'Monthly'})}}else if(r.terms==='installment'){for(var j=0;j<(r.installments||[]).length;j++){var ins=r.installments[j],id=new Date(ins.date);if(id.getFullYear()===ty&&id.getMonth()===tmm){var ia=aUSD*ins.pct/100;proj+=ia;dtls.push({vendor:r.vendor,amount:ia,fund:ins.fund||r.fund||'VN Fund',type:'Tranche '+ins.pct+'%'})}}}}var act=0;for(var i=0;i<D.pays.length;i++){var p=D.pays[i],pd=new Date(p.date);if(pd.getFullYear()===ty&&pd.getMonth()===tmm)act+=cv(p.amt,p.cur,'USD')}data.push({label:mn[tmm]+' '+String(ty).slice(2),shortLabel:mn[tmm],month:tmm,year:ty,projected:proj,actual:act,details:dtls,isCurrent:m===0,isFuture:m>0})}return data}

function getExpSections(){
var s=[];
switch(tab){
case 'costD':
  s.push({id:'fb',label:'Fund Balances',def:true,hasChart:true});
  s.push({id:'vs',label:'Vendor Summary',def:true,hasChart:true});
  s.push({id:'tot',label:'Financial Overview',def:true,hasChart:false});
  if(summaryMonth!=='all')s.push({id:'mp',label:'Payables ('+fmtM(summaryMonth)+')',def:true,hasChart:true});
  else s.push({id:'up',label:'Upcoming 6 Months',def:false,hasChart:true});
  break;
case 'invSch':s.push({id:'fb',label:'Fund Balances',def:true,hasChart:true});s.push({id:'inv',label:'Investment Records',def:true,hasChart:false});break;
case 'pays':s.push({id:'fb',label:'Fund Balances',def:true,hasChart:true});s.push({id:'pay',label:'Payment Records',def:true,hasChart:false});break;
case 'paySch':s.push({id:'ps',label:'Schedules List',def:true,hasChart:false});s.push({id:'psc',label:'Schedule Chart',def:false,hasChart:true});break;
case 'vendors':s.push({id:'vs',label:'Vendor Summary',def:true,hasChart:true});break;
case 'history':s.push({id:'tx',label:'Transaction Records',def:true,hasChart:false});s.push({id:'flow',label:'Cash Flow by Month',def:false,hasChart:true});break;
case 'cur':s.push({id:'rates',label:'Exchange Rates',def:true,hasChart:false});break;
case 'cloud':s.push({id:'status',label:'Connection Status',def:true,hasChart:false});break;
}return s}

function getSecData(id){
var r={table:[],chart:null};
if(id==='fb'){var fb=getFundBalances();r.table=[['Fund','Inflow('+DC+')','Outflow('+DC+')','Balance('+DC+')']];var lb=[],dI=[],dO=[];for(var i=0;i<FUNDS.length;i++){var f=fb[FUNDS[i]]||{inflow:0,outflow:0,balance:0};r.table.push([FUNDS[i],fmtD(f.inflow),fmtD(f.outflow),fmtD(f.balance)]);lb.push(FUNDS[i]);dI.push(+f.inflow.toFixed(0));dO.push(+f.outflow.toFixed(0))}r.chart={title:'Fund Balances ('+DC+')',labels:lb,datasets:[{name:'Inflow',values:dI,color:'2d8a32'},{name:'Outflow',values:dO,color:'cc3333'}]}}
else if(id==='vs'){var vs=getVendorSummary(),vk=Object.keys(vs).sort(function(a,b){return vs[b].totalSch-vs[a].totalSch});r.table=[['Vendor','Category','Scheduled('+DC+')','Paid('+DC+')','Paid%']];var lb=[],dS=[],dP=[];for(var i=0;i<vk.length;i++){var v=vs[vk[i]];r.table.push([vk[i],v.category,fmtD(v.totalSch),fmtD(v.totalPaid),pct(v.totalPaid,v.totalSch)+'%']);lb.push(vk[i].substring(0,15));dS.push(+v.totalSch.toFixed(0));dP.push(+v.totalPaid.toFixed(0))}r.chart=vk.length?{title:'Vendor Progress',labels:lb,datasets:[{name:'Scheduled',values:dS,color:'2874a6'},{name:'Paid',values:dP,color:'2d8a32'}]}:null}
else if(id==='tot'){var fb=getFundBalances(),tI=0,tO=0;for(var k in fb){tI+=fb[k].inflow;tO+=fb[k].outflow}var tS=0;for(var i=0;i<D.psSch.length;i++)tS+=cv(D.psSch[i].totalCost,D.psSch[i].cur||'USD','USD');r.table=[['Metric','Value'],['Total Inflow',fmtD(tI)],['Total Disbursed',fmtD(tO)],['Balance',fmtD(tI-tO)],['Budget',fmtD(tS)],['Disbursed %',pct(tO,tS)+'%'],['Payments',String(D.pays.length)],['Schedules',String(D.psSch.length)]]}
else if(id==='mp'){var mp=getMonthPayables(summaryMonth);r.table=[['Vendor','Fund','Type','Amount('+DC+')']];var lb=[],dA=[];for(var i=0;i<mp.length;i++){r.table.push([mp[i].vendor,mp[i].fund,mp[i].type+(mp[i].detail?' '+mp[i].detail:''),fmtD(mp[i].amount)]);lb.push(mp[i].vendor.substring(0,15));dA.push(+mp[i].amount.toFixed(0))}var tot=0;for(var i=0;i<mp.length;i++)tot+=mp[i].amount;r.table.push(['TOTAL','','',fmtD(tot)]);r.chart=mp.length?{title:'Payables - '+fmtM(summaryMonth),labels:lb,datasets:[{name:'Due',values:dA,color:'2874a6'}]}:null}
else if(id==='up'){var pd=getProjectedMonthly(6);r.table=[['Month','Projected('+DC+')','Actual('+DC+')','Items']];var lb=[],dP=[],dA=[];for(var i=0;i<pd.length;i++){r.table.push([pd[i].label,fmtD(pd[i].projected),fmtD(pd[i].actual),String(pd[i].details.length)]);lb.push(pd[i].shortLabel);dP.push(+pd[i].projected.toFixed(0));dA.push(+pd[i].actual.toFixed(0))}r.chart={title:'Upcoming 6 Months',labels:lb,datasets:[{name:'Projected',values:dP,color:'2874a6'},{name:'Actual',values:dA,color:'2d8a32'}]}}
else if(id==='inv'){r.table=[['#','Date','Fund','Amount','Currency','Status','Remarks']];for(var i=0;i<D.invSch.length;i++){var x=D.invSch[i];r.table.push([i+1,x.date,x.fund,x.amount,x.cur,x.status,x.remarks||''])}}
else if(id==='pay'){var rc=D.pays.slice().sort(function(a,b){return b.date<a.date?-1:1});r.table=[['#','Date','Vendor','Fund','Category','Amount','Currency','Display('+DC+')']];for(var i=0;i<rc.length;i++){var p=rc[i];r.table.push([i+1,p.date,p.vendor,p.fund||'Other',p.category||'Others',p.amt,p.cur,fmtD(cv(p.amt,p.cur,'USD'))])}}
else if(id==='ps'){r.table=[['#','Vendor','Category','Terms','Total','Currency','Fund']];for(var i=0;i<D.psSch.length;i++){var x=D.psSch[i];r.table.push([i+1,x.vendor,x.category,x.terms,x.totalCost,x.cur,x.fund||'VN Fund'])}}
else if(id==='psc'){r.table=[['Vendor','Category','Total('+DC+')']];var lb=[],dA=[];for(var i=0;i<D.psSch.length;i++){var x=D.psSch[i],a=cv(x.totalCost,x.cur||'USD',DC);r.table.push([x.vendor,x.category,fmtD(a)]);lb.push(x.vendor.substring(0,15));dA.push(+a.toFixed(0))}r.chart=D.psSch.length?{title:'Schedules ('+DC+')',labels:lb,datasets:[{name:'Total',values:dA,color:'2874a6'}]}:null}
else if(id==='tx'){var txs=filterTxs(buildTxList());r.table=[['#','Date','Type','Entity','Fund','Amount('+DC+')','Status']];for(var i=0;i<txs.length;i++){var t=txs[i];r.table.push([i+1,t.date,t.type,t.entity,t.fund,(t.type==='payment'?'-':'+')+fmtD(t.usd),t.status])}}
else if(id==='flow'){var txs=filterTxs(buildTxList()),byM={};for(var i=0;i<txs.length;i++){var m=txs[i].date?txs[i].date.substring(0,7):'?';if(!byM[m])byM[m]={i:0,o:0};if(txs[i].type==='payment')byM[m].o+=txs[i].usd;else byM[m].i+=txs[i].usd}var months=Object.keys(byM).sort();r.table=[['Month','Inflow('+DC+')','Outflow('+DC+')','Net('+DC+')']];var lb=[],dI=[],dO=[];for(var i=0;i<months.length;i++){var d=byM[months[i]];r.table.push([fmtM(months[i]),fmtD(d.i),fmtD(d.o),fmtD(d.i-d.o)]);lb.push(fmtM(months[i]));dI.push(+d.i.toFixed(0));dO.push(+d.o.toFixed(0))}r.chart=months.length?{title:'Cash Flow',labels:lb,datasets:[{name:'Inflow',values:dI,color:'2d8a32'},{name:'Outflow',values:dO,color:'cc3333'}]}:null}
else if(id==='rates'){r.table=[['Code','Name','Rate per USD']];for(var k in FX)r.table.push([k,FX[k].name,FX[k].r])}
else if(id==='status'){r.table=[['Key','Value'],['Connection',cOn?'Connected':'Offline'],['User',curUser?curUser.email:'Local'],['Payments',D.pays.length],['Schedules',D.psSch.length],['Investments',D.invSch.length]]}
return r}

h+='<div class="exp-grid">';

h+='<div class="exp-card ppt"'+(tOk?' onclick="runExp(\'pptx\')"':' style="opacity:.4"')+'><div class="exp-icon">T</div><div class="exp-title">PowerPoint</div><div class="exp-desc">'+(tOk?'Slides with native charts':'Not loaded')+'</div></div>';

function selAllExp(val){var secs=getExpSections();for(var i=0;i<secs.length;i++){expChecked[secs[i].id]=val;var el=document.getElementById('expC_'+secs[i].id);if(el)el.checked=val}}

function eMsg(m,t){var el=document.getElementById('expSt');if(el){el.className='exp-status show '+(t||'going');el.textContent=m}}

function runExp(fmt){
var any=false,secs=getExpSections();for(var i=0;i<secs.length;i++){if(expChecked[secs[i].id]){any=true;break}}
if(!any){eMsg('Select at least one section','fail');return}
try{eMsg('Generating '+fmt.toUpperCase()+'...');if(fmt==='xlsx')expX();else if(fmt==='pdf')expP();else if(fmt==='pptx')expT();else{eMsg('Unknown','fail');return}eMsg('Done!','ok');notify('Exported');setTimeout(mClose,1200)}catch(err){eMsg('Error: '+err.message,'fail');console.error(err)}}

function expX(){
if(typeof XLSX==='undefined')throw new Error('XLSX not loaded');
var wb=XLSX.utils.book_new(),secs=getExpSections(),cnt=0;
for(var i=0;i<secs.length;i++){if(!expChecked[secs[i].id])continue;var data=getSecData(secs[i].id);
if(data.table.length>1){XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(data.table),secs[i].label.substring(0,31));cnt++}
if(expCharts&&data.chart){var cd=[['Label']];for(var j=0;j<data.chart.datasets.length;j++)cd[0].push(data.chart.datasets[j].name);for(var j=0;j<data.chart.labels.length;j++){var row=[data.chart.labels[j]];for(var k=0;k<data.chart.datasets.length;k++)row.push(data.chart.datasets[k].values[j]);cd.push(row)}XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(cd),(secs[i].label+' Chart').substring(0,31));cnt++}}
if(!cnt)throw new Error('No data');
XLSX.writeFile(wb,'StellarSeeds_'+td()+'.xlsx')}

function expP(){
if(typeof jspdf==='undefined')throw new Error('jsPDF not loaded');
var doc=new jspdf.jsPDF();
doc.setFontSize(18);doc.setTextColor(40,116,166);doc.text('Stellar Seeds',14,20);

doc.save('StellarSeeds_'+td()+'.pdf')}

function drawPDFChart(doc,x,y,w,h,cd){
var mT=14,mB=22,mL=30,mR=10,pX=x+mL,pY=y+mT,pW=w-mL-mR,pH=h-mT-mB;
var mx=0;for(var i=0;i<cd.datasets.length;i++)for(var j=0;j<cd.datasets[i].values.length;j++)mx=Math.max(mx,cd.datasets[i].values[j]);
if(mx===0)mx=100;mx=Math.ceil(mx/100)*100;
doc.setFontSize(8);doc.setTextColor(60);doc.text(cd.title||'',x,y+6);
doc.setDrawColor(220);doc.setLineWidth(0.2);
for(var g=0;g<=4;g++){var gy=pY+pH*(1-g/4);doc.line(pX,gy,pX+pW,gy);doc.setFontSize(5);doc.setTextColor(150);var lbl=mx*g/4;doc.text(lbl>=1000?(lbl/1000).toFixed(0)+'K':String(Math.round(lbl)),x,gy+1.5)}
var nL=cd.labels.length,nS=cd.datasets.length,gW=pW/nL,pad=gW*0.12,bAW=gW-pad*2,bW=bAW/Math.max(1,nS);
for(var j=0;j<nL;j++){for(var d=0;d<nS;d++){var val=cd.datasets[d].values[j],bH=mx>0?(val/mx)*pH:0,bx=pX+j*gW+pad+d*bW,by=pY+pH-bH;var c=cd.datasets[d].color||'2874a6';doc.setFillColor(parseInt(c.substring(0,2),16),parseInt(c.substring(2,4),16),parseInt(c.substring(4,6),16));doc.rect(bx,by,Math.max(1,bW-0.5),bH,'F')}doc.setFontSize(4.5);doc.setTextColor(100);var lb=cd.labels[j];if(lb.length>12)lb=lb.substring(0,12);doc.text(lb,pX+j*gW+gW/2,pY+pH+4,{align:'center'})}
var ly=pY+pH+9,lx=pX;doc.setFontSize(5.5);
for(var d=0;d<nS;d++){var c=cd.datasets[d].color||'2874a6';doc.setFillColor(parseInt(c.substring(0,2),16),parseInt(c.substring(2,4),16),parseInt(c.substring(4,6),16));doc.rect(lx,ly-2,3.5,2.5,'F');doc.setTextColor(80);doc.text(cd.datasets[d].name,lx+4.5,ly);lx+=doc.getTextWidth(cd.datasets[d].name)+10}
return ly+5}

function expT(){
var Ctor=typeof PptxGenJS!=='undefined'?PptxGenJS:(typeof PptxGen!=='undefined'?PptxGen:null);
if(!Ctor)throw new Error('PPT library not loaded');
var pptx=new Ctor(),s1=pptx.addSlide();
try{s1.addShape(pptx.ShapeType.rect,{x:0,y:0,w:'100%',h:'100%',fill:{color:'1a2416'}})}catch(e){}
s1.addText('STELLAR SEEDS',{x:0.8,y:1.5,w:8,fontSize:30,color:'FFFFFF',bold:true});
s1.addText((TLBL[tab]||tab)+' | '+new Date().toLocaleDateString()+' | '+DC,{x:0.8,y:2.4,w:8,fontSize:12,color:'999'});
var secs=getExpSections();
for(var i=0;i<secs.length;i++){if(!expChecked[secs[i].id])continue;var data=getSecData(secs[i].id);
if(data.table.length>1){var s=pptx.addSlide();try{s.addShape(pptx.ShapeType.rect,{x:0,y:0,w:'100%',h:0.8,fill:{color:'2874a6'}})}catch(e){}s.addText(secs[i].label,{x:0.6,y:0.15,w:8,fontSize:18,color:'FFFFFF',bold:true});var rows=[];for(var j=0;j<data.table.length;j++)rows.push(data.table[j].map(String));s.addTable(rows,{x:0.4,y:1.0,w:9.2,fontSize:8,fontFace:'Arial',border:{type:'solid',pt:0.5,color:'e0ded8'},rowH:0.3,autoPage:true,head:{fill:{color:'2874a6'},color:'FFFFFF',bold:true},altRow:{fill:{color:'f5f4f0'}}})}
if(expCharts&&data.chart&&data.chart.labels.length&&data.chart.datasets.length){var cs=pptx.addSlide();try{cs.addShape(pptx.ShapeType.rect,{x:0,y:0,w:'100%',h:0.8,fill:{color:'2d8a32'}})}catch(e){}cs.addText(data.chart.title,{x:0.6,y:0.15,w:8,fontSize:18,color:'FFFFFF',bold:true});var cData=[],colors=[];for(var d=0;d<data.chart.datasets.length;d++){cData.push({name:data.chart.datasets[d].name,labels:data.chart.labels,values:data.chart.datasets[d].values});colors.push(data.chart.datasets[d].color)}try{cs.addChart('bar',cData,{x:0.5,y:1.2,w:8.5,h:4.5,showValue:true,valueFontSize:7,catAxisLabelFontSize:8,valAxisLabelFontSize:7,showLegend:data.chart.datasets.length>1,legendPos:'b',chartColors:colors})}catch(ce){cs.addText('Chart: '+data.chart.title,{x:0.5,y:1.5,w:9,fontSize:14,color:'999'});var tRows=[['Label']];for(var dd=0;dd<data.chart.datasets.length;dd++)tRows[0].push(data.chart.datasets[dd].name);for(var jj=0;jj<data.chart.labels.length;jj++){var tr=[data.chart.labels[jj]];for(var dd=0;dd<data.chart.datasets.length;dd++)tr.push(String(data.chart.datasets[dd].values[jj]));tRows.push(tr)}try{cs.addTable(tRows,{x:0.5,y:2.2,w:9,fontSize:8,fontFace:'Arial',border:{type:'solid',pt:0.5,color:'e0ded8'},rowH:0.25,head:{fill:{color:'2d8a32'},color:'FFFFFF',bold:true}})}catch(e2){}}}}
pptx.writeFile({fileName:'StellarSeeds_'+td()+'.pptx'})}

/* ===== INIT ===== */
setInterval(function(){if(currencyMode==='live')fetchLiveRates()},600000);
initCloud();checkAuth();
</script>
