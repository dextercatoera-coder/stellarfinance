<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stellar Seeds</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f4f0;--s1:#fff;--s2:#faf9f6;--s3:#eeece7;--b1:#e0ded8;--b2:#ece9e3;--g:#2d8a32;--gb:#3da642;--gc:rgba(45,138,50,.08);--bl:#2874a6;--blc:rgba(40,116,166,.08);--am:#b89630;--amc:rgba(184,150,48,.08);--rd:#cc3333;--rdc:rgba(204,51,51,.08);--or:#d4930d;--orc:rgba(212,147,13,.08);--t1:#1a1c18;--t2:#555;--t3:#999;--r:6px;--rl:10px}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t1);line-height:1.5;font-size:14px}
button{font-family:inherit;cursor:pointer}
.hdr{height:52px;background:var(--s1);border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px}
.logo-ic{width:32px;height:32px;background:linear-gradient(135deg,var(--g),#1a5c20);border-radius:var(--r);position:relative}
.logo-ic::after{content:'';position:absolute;width:16px;height:16px;border:2.5px solid rgba(255,255,255,.9);border-radius:50%;top:5px;left:5px}
.logo-txt{display:flex;flex-direction:column;line-height:1}
.logo-nm{font-family:'Cormorant Garamond',serif;font-size:.88rem;font-weight:700;color:var(--am);letter-spacing:.18em;text-transform:uppercase}
.logo-sb{font-family:'JetBrains Mono',monospace;font-size:.38rem;color:var(--t3);letter-spacing:.08em;text-transform:uppercase}
.btn{font-weight:600;font-size:.72rem;padding:5px 12px;border-radius:var(--r);border:1px solid var(--b1);background:var(--s1);color:var(--t1);transition:all .12s;white-space:nowrap}.btn:hover{background:var(--s3)}.bp{background:var(--g);border-color:var(--g);color:#fff}.bp:hover{background:var(--gb)}.bd{border-color:var(--rd);color:var(--rd)}.bs{padding:3px 8px;font-size:.66rem}
.nav{background:var(--s1);border-bottom:1px solid var(--b1);display:flex;padding:0 12px;overflow-x:auto;position:sticky;top:52px;z-index:99}
.nav button{background:0;border:0;padding:8px 10px;font-size:.74rem;font-weight:600;color:var(--t3);border-bottom:2px solid transparent;white-space:nowrap;font-family:'DM Sans',sans-serif;transition:all .15s}.nav button:hover{color:var(--t1)}.nav button.act{color:var(--g);border-color:var(--g)}
.app{padding:16px;max-width:1400px;margin:0 auto}
.card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);padding:14px;margin-bottom:12px}
.ch{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.ct{font-family:'Space Grotesk',sans-serif;font-size:.82rem;font-weight:700}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:14px}
.si{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);padding:12px}.si .sl{font-family:'JetBrains Mono',monospace;font-size:.54rem;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}.si .sv{font-family:'Space Grotesk',sans-serif;font-size:1.15rem;font-weight:700;line-height:1.1}
.tw{overflow-x:auto;border-radius:var(--r);border:1px solid var(--b1)}
table{width:100%;border-collapse:collapse;font-size:.76rem}
th{background:var(--s2);font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:.6rem;text-transform:uppercase;letter-spacing:.04em;color:var(--t3);padding:6px 8px;text-align:left;border-bottom:1px solid var(--b1);white-space:nowrap;cursor:pointer;user-select:none}th:hover{background:var(--s3)}.sorted{color:var(--bl)!important}
td{padding:5px 8px;border-bottom:1px solid var(--b2);vertical-align:middle}tr:last-child td{border-bottom:0}tbody tr:hover{background:var(--s2)}
.badge{font-family:'JetBrains Mono',monospace;font-size:.56rem;padding:2px 6px;border-radius:12px;font-weight:500;display:inline-flex;align-items:center;gap:3px;white-space:nowrap}.badge::before{content:'';width:4px;height:4px;border-radius:50%;flex-shrink:0}
.bg2{background:var(--gc);color:var(--g)}.bg2::before{background:var(--g)}.bd2{background:var(--rdc);color:var(--rd)}.bd2::before{background:var(--rd)}.by2{background:var(--orc);color:var(--or)}.by2::before{background:var(--or)}.bb2{background:var(--blc);color:var(--bl)}.bb2::before{background:var(--bl)}.bx2{background:rgba(153,153,153,.12);color:var(--t3)}.bx2::before{background:var(--t3)}
select,input[type="text"],input[type="number"],input[type="date"],textarea{width:100%;padding:6px 10px;background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);color:var(--t1);font-family:'DM Sans',sans-serif;font-size:.8rem;outline:0;transition:border-color .15s}select:focus,input:focus,textarea:focus{border-color:var(--g)}textarea{resize:vertical;min-height:36px}
.fg{margin-bottom:8px}.fl{display:block;font-size:.68rem;font-weight:600;color:var(--t2);margin-bottom:3px}
.fbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:8px 10px;background:var(--s2);border:1px solid var(--b2);border-radius:var(--rl);margin-bottom:10px}.fbar label{font-size:.7rem;font-weight:600;color:var(--t2);white-space:nowrap}.fbar select,.fbar input{width:auto;min-width:80px;padding:4px 8px;font-size:.74rem;border-radius:var(--r);border:1px solid var(--b1);background:var(--s1);font-weight:600;outline:0}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;display:none;align-items:center;justify-content:center;padding:12px}.modal.open{display:flex}
.mbox{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);width:100%;max-width:680px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.mhdr{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--b1);position:sticky;top:0;background:var(--s1)}.mhdr h3{font-family:'Space Grotesk',sans-serif;font-size:.88rem;font-weight:700}
.mx{background:0;border:0;color:var(--t3);font-size:1.2rem;padding:4px 8px}.mx:hover{color:var(--t1)}
.mbd{padding:16px}.mft{padding:10px 16px;border-top:1px solid var(--b1);display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:var(--s1)}
.toast{position:fixed;bottom:16px;right:16px;background:var(--t1);color:#fff;padding:8px 16px;border-radius:var(--r);font-size:.76rem;font-weight:600;z-index:300;transform:translateY(60px);opacity:0;transition:all .3s ease}.toast.show{transform:translateY(0);opacity:1}
.term-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}.term-card{border:2px solid var(--b2);border-radius:var(--rl);padding:14px;cursor:pointer;transition:all .15s;text-align:center}.term-card:hover{border-color:var(--bl)}.term-card.sel{border-color:var(--g);background:var(--gc)}.term-card .tc-icon{font-size:1.4rem;margin-bottom:4px}.term-card .tc-title{font-family:'Space Grotesk',sans-serif;font-size:.82rem;font-weight:700}
.vendor-dd{display:flex;gap:6px;align-items:end}.vendor-dd select{flex:2}.vendor-dd input{flex:1}
.ps-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);padding:12px;border-left:4px solid var(--bl);margin-bottom:10px}.ps-card-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}.ps-card-vendor{font-family:'Space Grotesk',sans-serif;font-size:.88rem;font-weight:700}.ps-card-total{font-family:'JetBrains Mono',monospace;font-size:.92rem;font-weight:700;color:var(--bl)}
.sch-desc{font-size:.6rem;color:var(--t2);font-style:italic;margin-top:2px;line-height:1.3}
.fund-avail-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px;background:var(--s2);border:1px solid var(--b2);border-radius:var(--rl)}.fund-avail-item{text-align:center;padding:8px;border-radius:var(--r);border:2px solid var(--b2);cursor:pointer;transition:all .15s}.fund-avail-item:hover{border-color:var(--bl)}.fund-avail-item.sel{border-color:var(--g);background:var(--gc)}.fund-avail-name{font-size:.58rem;font-family:'JetBrains Mono',monospace;font-weight:700;text-transform:uppercase;margin-bottom:2px}.fund-avail-bal{font-family:'Space Grotesk',sans-serif;font-size:.92rem;font-weight:700;line-height:1.1}.fund-avail-sub{font-size:.5rem;color:var(--t3);font-family:'JetBrains Mono',monospace;margin-top:2px}
.vd-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);margin-bottom:12px;overflow:hidden}.vd-header{padding:14px 16px;border-bottom:1px solid var(--b1);display:flex;justify-content:space-between;align-items:center}.vd-name{font-family:'Space Grotesk',sans-serif;font-size:1rem;font-weight:700}.vd-body{padding:14px 16px}
.vd-bar-wrap{height:10px;background:var(--s3);border-radius:5px;overflow:hidden;margin:6px 0}.vd-bar-paid{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--g),var(--gb))}
.vd-pay-mini-bar{height:6px;background:var(--s3);border-radius:3px;overflow:hidden;min-width:60px}.vd-pay-mini-fill{height:100%;border-radius:3px}
.cat-spec-box{background:var(--amc);border:1px solid rgba(184,150,48,.2);border-radius:var(--r);padding:8px 10px}.cat-spec-box label{color:var(--am)}
.inst-pick{border:2px solid var(--b1);border-radius:var(--rl);padding:12px;margin-bottom:8px;cursor:pointer;transition:all .15s}.inst-pick:hover{border-color:var(--bl);background:var(--blc)}.inst-pick.ip-sel{border-color:var(--g);background:var(--gc)}.inst-pick.ip-done{opacity:.6;cursor:default}
.inst-pick-head{display:flex;justify-content:space-between;align-items:center}.inst-pick-tranche{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.84rem}.inst-pick-amt{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:.88rem;color:var(--bl)}
.ps-prog-bar{height:10px;background:var(--s3);border-radius:5px;overflow:hidden}.ps-prog-fill{height:100%;border-radius:5px;transition:width .3s}.ps-prog-info{display:flex;justify-content:space-between;font-size:.54rem;font-family:'JetBrains Mono',monospace;margin-top:3px;color:var(--t3)}
.ps-pay-list{margin-top:8px;padding-top:8px;border-top:1px solid var(--b2)}.ps-pay-item{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:.64rem;border-bottom:1px dashed var(--b2)}.ps-pay-item:last-child{border-bottom:0}.ps-pay-date{font-family:'JetBrains Mono',monospace;color:var(--t3)}.ps-pay-amt{font-family:'JetBrains Mono',monospace;font-weight:700}.ps-pay-btn{background:0;border:0;color:var(--t3);font-size:.6rem;padding:1px 4px;cursor:pointer}.ps-pay-btn:hover{color:var(--bl)}.ps-pay-btn.del:hover{color:var(--rd)}
.donut-wrap{position:relative;width:150px;height:150px;flex-shrink:0}.donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}.donut-total{font-family:'JetBrains Mono',monospace;font-size:.44rem;color:var(--t3);text-transform:uppercase;letter-spacing:.06em}.donut-val{font-family:'Space Grotesk',sans-serif;font-size:.88rem;font-weight:700;color:var(--g)}
.cat-legend-item{display:flex;align-items:center;gap:6px;margin-bottom:5px}.cat-legend-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}.cat-legend-label{font-size:.6rem;flex:1}.cat-legend-pct{font-family:'JetBrains Mono',monospace;font-size:.6rem;font-weight:700}.cat-legend-val{font-family:'JetBrains Mono',monospace;font-size:.54rem;color:var(--t3)}
.status-stack{height:22px;background:var(--s3);border-radius:8px;overflow:hidden;display:flex;margin-bottom:8px}.status-seg{transition:width .3s ease}.status-seg:first-child{border-radius:8px 0 0 8px}.status-seg:last-child{border-radius:0 8px 8px 0}
.status-legend{display:flex;gap:16px;flex-wrap:wrap}.status-legend-item{display:flex;align-items:center;gap:4px}.status-legend-dot{width:6px;height:6px;border-radius:2px}.status-legend-label{font-size:.58rem}.status-legend-count{font-family:'JetBrains Mono',monospace;font-size:.62rem;font-weight:700}
.cur-convert-box{background:linear-gradient(135deg,var(--s1),var(--s2));border:1px solid var(--b1);border-radius:var(--rl);padding:20px;margin-bottom:14px}.cur-convert-result{font-family:'Space Grotesk',sans-serif;font-size:1.6rem;font-weight:700;color:var(--g);text-align:center;margin:10px 0 4px}.cur-convert-sub{text-align:center;font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--t3)}
.cur-pair-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}.cur-pair-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);padding:12px;text-align:center}.cur-pair-pair{font-family:'Space Grotesk',sans-serif;font-size:.72rem;font-weight:700;color:var(--t3);margin-bottom:2px}.cur-pair-rate{font-family:'JetBrains Mono',monospace;font-size:1.1rem;font-weight:700;color:var(--bl)}.cur-pair-sub{font-size:.54rem;color:var(--t3);font-family:'JetBrains Mono',monospace;margin-top:2px}
.file-drop-zone{border:2px dashed var(--b1);border-radius:var(--rl);padding:16px;text-align:center;cursor:pointer;transition:all .15s;background:var(--s2);margin-top:8px}.file-drop-zone:hover{border-color:var(--bl);background:var(--blc)}
.file-item{display:flex;align-items:center;gap:6px;padding:5px 8px;background:var(--s1);border:1px solid var(--b2);border-radius:var(--r);margin-bottom:3px}.file-name{font-size:.64rem;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.file-size{font-size:.5rem;color:var(--t3);font-family:'JetBrains Mono',monospace}.file-btn{background:0;border:0;cursor:pointer;font-size:.7rem;padding:2px 5px;transition:color .12s}.file-btn:hover{color:var(--bl)}
.file-att-badge{display:inline-flex;align-items:center;gap:3px;font-size:.58rem;color:var(--bl);cursor:pointer;font-family:'JetBrains Mono',monospace;font-weight:600}.file-att-badge:hover{text-decoration:underline}
.cloud-status{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:.62rem;font-weight:700;font-family:'JetBrains Mono',monospace}.cloud-status.connected{background:var(--gc);color:var(--g)}.cloud-status.disconnected{background:var(--rdc);color:var(--rd)}.cloud-status.syncing{background:var(--orc);color:var(--or)}
.user-pill{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;background:var(--s2);border:1px solid var(--b2);border-radius:16px;font-size:.58rem;font-weight:600}.user-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.config-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:900px){.app{padding:10px}.fund-avail-bar,.config-grid{grid-template-columns:1fr}.cur-pair-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="mainApp">
<div class="hdr"><div class="logo"><div class="logo-ic"></div><div class="logo-txt"><span class="logo-nm">Stellar Seeds</span><span class="logo-sb">Seed Tolling Plant</span></div></div><div style="display:flex;align-items:center;gap:8px"><span id="cloudBadge"></span><button class="btn bp bs" onclick="App.openExport()">Export</button></div></div>
<div class="nav" id="nbar"></div>
<div class="app" id="app"></div>
</div>
<div class="modal" id="mdl"><div class="mbox"><div class="mhdr"><h3 id="mTi"></h3><button class="mx" onclick="App.mc()">&times;</button></div><div class="mbd" id="mBd"></div><div class="mft" id="mFt"></div></div></div>
<div class="toast" id="tst"></div>
<script>
var App=(function(){
"use strict";

var D={pays:[],psSch:[],invSch:[],vf:{}};
var tab='dash',DC='USD',pssTerm='monthly',pssFund='VN Fund';
var summaryMonth='all',invShowFund='all',dashFund='all';
var cfFund='all',cfLookback=6,cfMonths=12;
var curConvAmt=1000,curFrom='USD',curTo='EUR';
var currencyMode='live',liveLastUpdated=null,liveFetching=false;
var psF={q:'',cat:'all',fund:'all',terms:'all',status:'all'};
var psS={col:'vendor',dir:1};
var fileDB=null;

// Cloud state
var cloudDb=null,cloudConnected=false,cloudSyncing=false,cloudRoom='default';
var cloudUserId='',cloudUserName='',cloudUsers={};
var cloudListener=null,presenceRef=null;
var cloudLastSync=null,cloudAutoSync=true;
var cloudSilent=false;

var FX={USD:{r:1,n:'US Dollar'},EUR:{r:.92,n:'Euro'},VND:{r:26307,n:'Dong'},PHP:{r:61.26,n:'Peso'},THB:{r:34.5,n:'Baht'},SGD:{r:1.34,n:'S$'},CNY:{r:7.24,n:'Yuan'},JPY:{r:155.5,n:'Yen'},KRW:{r:1380,n:'Won'},GBP:{r:.79,n:'Pound'},AUD:{r:1.53,n:'A$'},MYR:{r:4.47,n:'Ringgit'},INR:{r:83.5,n:'Rupee'}};
var SY={USD:'$',EUR:'\u20ac',VND:'\u0110',PHP:'\u20b1',THB:'\u0e3f',SGD:'S$',CNY:'\u00a5',JPY:'\u00a5',KRW:'\u20a9',GBP:'\u00a3',AUD:'A$',MYR:'RM',INR:'\u20b9'};
var CATS=['Machines','Buildings','Land','Opex','Logistics','Tax','Others'];
var CAT_C={Machines:'#2874a6',Buildings:'#2d8a32',Land:'#b89630',Opex:'#9b59b6',Logistics:'#e67e22',Tax:'#c0392b',Others:'#999'};
var FUNDS=['VN Fund','PH Fund','Other'];
var FC={'VN Fund':'#2d8a32','PH Fund':'#2874a6','Other':'#b89630'};
var STD_DEF={USD:1,PHP:60,THB:31.2,VND:26120,EUR:1.1983};
var STD=JSON.parse(JSON.stringify(STD_DEF));
var UC=['#2874a6','#2d8a32','#b89630','#9b59b6','#e67e22','#c0392b','#d4930d'];

function $(id){return document.getElementById(id)}
function H(s){var d=document.createElement('span');d.textContent=String(s==null?'':s);return d.innerHTML}
function uid(){return Date.now().toString(36)+Math.random().toString(36).substr(2,5)}
function td(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function addD(ds,n){var d=new Date(ds);if(isNaN(d))d=new Date();d.setDate(d.getDate()+n);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function notify(m){var t=$('tst');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2200)}
function mo(ti,bd,ft){$('mTi').textContent=ti;$('mBd').innerHTML=bd;$('mFt').innerHTML=ft||'';$('mdl').classList.add('open')}
function mc_(){$('mdl').classList.remove('open')}
function cv(v,f,t){if(f===t)return v;var ff=FX[f]?FX[f].r:1,ft=FX[t]?FX[t].r:1;return ff?v/ff*ft:0}
function fmtC(v,c){return(SY[c]||'$')+Number(v||0).toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtD(v){return fmtC(cv(v,'USD',DC),DC)}
function fmtK(v){if(Math.abs(v)>=1e6)return(v/1e6).toFixed(1)+'M';if(Math.abs(v)>=1e3)return(v/1e3).toFixed(1)+'K';return Math.round(v).toString()}
function pct(a,b){return b>0?Math.round(a/b*100):0}
function mc(s,e){if(!s||!e)return 0;var sd=new Date(s),ed=new Date(e);if(isNaN(sd)||isNaN(ed))return 0;return Math.max(1,(ed.getFullYear()-sd.getFullYear())*12+(ed.getMonth()-sd.getMonth())+1)}
function fmtM(k){var mn=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],p=k.split('-');return mn[parseInt(p[1])-1]+' '+p[0]}
function curOpts(sel){var o='';for(var k in FX)o+='<option value="'+k+'"'+(k===sel?' selected':'')+'>'+k+'</option>';return o}
function catOpts(sel){var o='';for(var i=0;i<CATS.length;i++)o+='<option value="'+CATS[i]+'"'+(sel===CATS[i]?' selected':'')+'>'+CATS[i]+'</option>';return o}
function fundOpts(sel){var o='';for(var i=0;i<FUNDS.length;i++)o+='<option value="'+FUNDS[i]+'"'+(sel===FUNDS[i]?' selected':'')+'>'+FUNDS[i]+'</option>';return o}
function fundAll(sel){return '<option value="all"'+(sel==='all'?' selected':'')+'>All Funds</option>'+fundOpts(sel)}
function catBadge(c,s){var cl=CAT_C[c]||'#999';var l=c==='Others'&&s?'Others: '+s:c;return '<span class="badge" style="background:'+cl+'22;color:'+cl+';border:1px solid '+cl+'44">'+H(l)+'</span>'}

// Firebase
function cloudInit(){
var cfg;try{cfg=JSON.parse(localStorage.getItem('ss_cloudCfg'))}catch(e){}

try{if(firebase.apps.length)firebase.app().delete().then(function(){firebase.initializeApp(cfg);cloudDb=firebase.database();return true})}catch(e){}

}

function cloudConnect(){
var cfg;try{cfg=JSON.parse(localStorage.getItem('ss_cloudCfg'))}catch(e){}
if(!cfg||!cfg.apiKey||!cfg.databaseURL){notify('Configure Firebase first');return}
if(!cloudUserName){cloudUserName='User-'+Math.floor(Math.random()*9999);localStorage.setItem('ss_cloudUser',cloudUserName)}
try{if(!firebase.apps.length)firebase.initializeApp(cfg);else firebase.app()}catch(e){try{firebase.initializeApp(cfg)}catch(e2){notify('Firebase init error');return}}
cloudDb=firebase.database();
cloudConnected=true;updateCloudBadge();
var roomRef=cloudDb.ref('ss/'+cloudRoom);
presenceRef=roomRef.child('users/'+cloudUserId);
presenceRef.set({name:cloudUserName,lastSeen:firebase.database.ServerValue.TIMESTAMP,color:UC[Math.abs(hashCode(cloudUserId))%UC.length]});
presenceRef.onDisconnect().remove();
roomRef.child('users').on('value',function(snap){cloudUsers=snap.val()||{};if(tab==='cloud')render()});
roomRef.child('meta').on('value',function(snap){var m=snap.val();if(m&&m.lastUpdatedBy!==cloudUserId){cloudPull(true)}});
notify('Connected to cloud');
render()
}

function cloudDisconnect(){
if(presenceRef)try{presenceRef.remove()}catch(e){}
if(cloudListener)try{cloudListener()}catch(e){}
cloudConnected=false;cloudDb=null;cloudUsers={};
try{if(firebase.apps.length)firebase.app().delete()}catch(e){}
updateCloudBadge();notify('Disconnected');render()
}

function cloudPush(){
if(!cloudConnected||!cloudDb)return;cloudSyncing=true;
var roomRef=cloudDb.ref('ss/'+cloudRoom);
roomRef.child('data').set({pays:D.pays,psSch:D.psSch,invSch:D.invSch,vf:D.vf}).then(function(){
roomRef.child('meta').set({lastUpdatedBy:cloudUserId,lastUpdated:firebase.database.ServerValue.TIMESTAMP,userName:cloudUserName});
cloudLastSync=new Date().toLocaleString();cloudSyncing=false;
if(tab==='cloud')render()}).catch(function(){cloudSyncing=false;notify('Push failed')})
}

function cloudPull(silent){
if(!cloudConnected||!cloudDb)return;
cloudDb.ref('ss/'+cloudRoom+'/data').once('value').then(function(snap){
var data=snap.val();if(!data){if(!silent)notify('No cloud data found');return}
cloudSilent=true;
D.pays=data.pays||[];D.psSch=data.psSch||[];D.invSch=data.invSch||[];D.vf=data.vf||{};
for(var i=0;i<D.psSch.length;i++){if(!D.psSch[i].id)D.psSch[i].id=uid();if(!D.psSch[i].attachments)D.psSch[i].attachments=[]}
save_localOnly();cloudSilent=false;
cloudLastSync=new Date().toLocaleString();
if(!silent)notify('Data pulled from cloud');render()}).catch(function(){if(!silent)notify('Pull failed')})
}

function cloudFullSync(){
if(!cloudConnected||!cloudDb)return;
cloudDb.ref('ss/'+cloudRoom+'/data').once('value').then(function(snap){
var remote=snap.val();if(!remote||!remote.pays||remote.pays.length===0){cloudPush();return}
cloudSilent=true;
D.pays=remote.pays||[];D.psSch=remote.psSch||[];D.invSch=remote.invSch||[];D.vf=remote.vf||{};
for(var i=0;i<D.psSch.length;i++){if(!D.psSch[i].id)D.psSch[i].id=uid();if(!D.psSch[i].attachments)D.psSch[i].attachments=[]}

// Cash Flow Projection
function cfProj(pN,fN){var now=new Date(),sy=now.getFullYear(),sm=now.getMonth(),mn=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],data=[],fb0=getFB();for(var m=-pN;m<=fN;m++){var tm=sm+m,ty=sy+Math.floor(tm/12),tmm=((tm%12)+12)%12,isP=m<0,isC=m===0,isF=m>0;var inf={},outf={};for(var fi=0;fi<FUNDS.length;fi++){inf[FUNDS[fi]]=0;outf[FUNDS[fi]]=0}for(var i=0;i<D.invSch.length;i++){var r=D.invSch[i];if(r.date&&(r.status==='Deposited'||r.status==='Confirmed')){var rd=new Date(r.date);if(!isNaN(rd)&&rd.getFullYear()===ty&&rd.getMonth()===tmm)inf[r.fund||'Other']+=cv(r.amount,r.cur||'USD','USD')}}if(isP||isC){for(var i=0;i<D.pays.length;i++){var p=D.pays[i];if(p.date){var pd=new Date(p.date);if(!isNaN(pd)&&pd.getFullYear()===ty&&pd.getMonth()===tmm)outf[p.fund||'Other']+=cv(p.amt,p.cur,'USD')}}}if(isF){for(var i=0;i<D.invSch.length;i++){var r=D.invSch[i];if(r.status==='Pending'&&r.date){var rd=new Date(r.date);if(!isNaN(rd)&&rd.getFullYear()===ty&&rd.getMonth()===tmm)inf[r.fund||'Other']+=cv(r.amount,r.cur||'USD','USD')}}for(var i=0;i<D.psSch.length;i++){var r=D.psSch[i],aUSD=cv(r.totalCost,r.cur||'USD','USD');if(r.terms==='monthly'&&r.startDate&&r.endDate){var sd=new Date(r.startDate),ed=new Date(r.endDate);if(!isNaN(sd)&&!isNaN(ed)&&(new Date(ty,tmm,1)<=ed&&new Date(ty,tmm+1,0)>=sd)){var cnt=mc(r.startDate,r.endDate);outf[r.fund||'VN Fund']+=(cnt>0?aUSD/cnt:0)}}else if(r.terms==='installment'){for(var j=0;j<(r.installments||[]).length;j++){var inst=r.installments[j];if(inst.date){var id2=new Date(inst.date);if(!isNaN(id2)&&id2.getFullYear()===ty&&id2.getMonth()===tmm)outf[inst.fund||r.fund||'VN Fund']+=aUSD*inst.pct/100}}}}}var tI=0,tO=0;for(var fi=0;fi<FUNDS.length;fi++){tI+=inf[FUNDS[fi]];tO+=outf[FUNDS[fi]]}data.push({label:mn[tmm]+' '+String(ty).slice(2),inflows:inf,outflows:outf,totalIn:tI,totalOut:tO,net:tI-tO,isPast:isP,isCurrent:isC,isFuture:isF,fundBal:{}})}for(var fi=0;fi<FUNDS.length;fi++){var fund=FUNDS[fi],cb=(fb0[fund]||{balance:0}).balance,pn=0;for(var i=0;i<=pN;i++)pn+=((data[i].inflows[fund]||0)-(data[i].outflows[fund]||0));var rb=cb-pn;for(var i=0;i<data.length;i++){rb+=((data[i].inflows[fund]||0)-(data[i].outflows[fund]||0));data[i].fundBal[fund]=rb}}var cT=0;for(var k in fb0)cT+=fb0[k].balance;var tPn=0;for(var i=0;i<=pN;i++)tPn+=data[i].net;var tR=cT-tPn;for(var i=0;i<data.length;i++){tR+=data[i].net;data[i].totalBal=tR}return data}

function getInvAnalysis(){var proj=cfProj(0,24),results=[];for(var fi=0;fi<FUNDS.length;fi++){var fund=FUNDS[fi],fb=getFB(),curBal=(fb[fund]||{balance:0}).balance;var firstNeg=-1,minBal=curBal;for(var i=0;i<proj.length;i++){var bal=(proj[i].fundBal&&proj[i].fundBal[fund])||0;if(bal<minBal)minBal=bal;if(bal<0&&firstNeg<0)firstNeg=i}var avgB=0,oM=0;for(var i=0;i<proj.length;i++){var out=proj[i].outflows[fund]||0;if(out>0){avgB+=out;oM++}}avgB=oM>0?avgB/oM:0;var needed=0,urg='sufficient',ib='';if(firstNeg>=0){needed=Math.abs(minBal)+avgB*6;urg=firstNeg<=2?'critical':firstNeg<=6?'warning':'planned';ib=proj[Math.max(0,firstNeg-1)].label}results.push({fund:fund,curBal:curBal,avgB:avgB,fn:firstNeg,dl:firstNeg>=0?proj[firstNeg].label:null,minBal:minBal,needed:needed,urg:urg,ib:ib})}return results}

function pssSave(){var v=resV('pssV','pssVN'),c=parseFloat($('pssCost').value)||0;if(!v||!c){alert('Required');return}var cat=$('pssCat').value,cs=cat==='Others'?$('pssCatSpec').value.trim():'';if(cat==='Others'&&!cs){alert('Specify');return}var e2={id:uid(),vendor:v,description:$('pssDesc').value.trim(),totalCost:c,cur:$('pssCur').value,category:cat,catSpec:cs,fund:pssFund,terms:pssTerm,startDate:'',endDate:'',installments:[],attachments:[],remarks:$('pssRem').value.trim()};if(pssTerm==='monthly'){e2.startDate=$('pssStart').value;e2.endDate=$('pssEnd').value;if(!e2.startDate||!e2.endDate){alert('Dates');return}}else{var rowArr=$('instRows').children,insts=[],pT=0;for(var i=0;i<rowArr.length;i++){var r=rowArr[i],d=r.querySelector('input.inst-date'),p=r.querySelector('input.inst-pct'),f=r.querySelector('select.inst-fund');if(d&&p&&f){var dv=d.value,pv=parseFloat(p.value)||0;if(dv&&pv>0){insts.push({pct:pv,date:dv,fund:f.value});pT+=pv}}}if(!insts.length||Math.abs(pT-100)>0.01){alert('Must total 100%');return}insts.sort(function(a,b){return a.date<b.date?-1:1});e2.installments=insts}D.psSch.push(e2);save();notify('Enrolled: '+v);render()}
function editSch(idx){var s=D.psSch[idx];if(!s)return;var h=`<div class="fg"><label class="fl">Vendor</label><input type="text" id="esV" value="${H(s.vendor)}"></div><div class="fg"><label class="fl">Description</label><textarea id="esDesc" rows="2">${H(s.description||'')}</textarea></div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px"><div class="fg"><label class="fl">Cost</label><input type="number" id="esCost" value="${s.totalCost}" step="any"></div><div class="fg"><label class="fl">Currency</label><select id="esCur">${curOpts(s.cur||'USD')}</select></div><div class="fg"><label class="fl">Fund</label><select id="esFund">${fundOpts(s.fund||'VN Fund')}</select></div></div>`;if(s.terms==='monthly')h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div class="fg"><label class="fl">Start</label><input type="date" id="esStart" value="${s.startDate}"></div><div class="fg"><label class="fl">End</label><input type="date" id="esEnd" value="${s.endDate}"></div></div>`;mo('Edit',h,`<button class="btn" onclick="App.mc()">Cancel</button><button class="btn bd" onclick="App.delSch(${idx})">Delete</button><button class="btn bp" onclick="App.saveSch(${idx})">Save</button>`)}
function saveSch(idx){var s=D.psSch[idx],v=$('esV').value.trim().toUpperCase(),c=parseFloat($('esCost').value)||0;if(!v||!c){alert('Required');return}s.vendor=v;s.totalCost=c;s.cur=$('esCur').value;s.fund=$('esFund').value;s.description=$('esDesc').value.trim();if(s.terms==='monthly'){s.startDate=$('esStart').value;s.endDate=$('esEnd').value}save();mc_();notify('Updated');render()}
function delSch(idx){if(!confirm('Delete?'))return;D.psSch.splice(idx,1);save();notify('Deleted');render()}

function showInvSchFull(){var h=`<div class="fbar"><label>Display:</label><select onchange="App.setDC(this.value);App.render()">${curOpts(DC)}</select></div>`;var fb=getFB(),tD=0,tO=0;for(var i=0;i<D.invSch.length;i++){var r=D.invSch[i];if(r.status==='Deposited'||r.status==='Confirmed')tD+=cv(r.amount,r.cur||'USD','USD')}for(var k in fb)tO+=(fb[k]||{}).outflow||0;h+=`<div class="stats"><div class="si" style="border-left:4px solid #2d8a32"><div class="sl">Deposited</div><div class="sv" style="color:#2d8a32">${fmtD(tD)}</div></div><div class="si" style="border-left:4px solid #cc3333"><div class="sl">Outflow</div><div class="sv" style="color:#cc3333">${fmtD(tO)}</div></div><div class="si" style="border-left:4px solid ${tD-tO>=0?'#2d8a32':'#cc3333'}"><div class="sl">Net</div><div class="sv" style="color:${tD-tO>=0?'#2d8a32':'#cc3333'}">${fmtD(tD-tO)}</div></div></div>`;
h+=`<div class="card" style="border-left:4px solid #2d8a32"><div class="ch"><span class="ct">Record Investment</span></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div class="fg"><label class="fl">Date</label><input type="date" id="invD" value="${td()}"></div><div class="fg"><label class="fl">Fund</label><select id="invFund">${fundOpts('VN Fund')}</select></div></div><div style="display:grid;grid-template-columns:2fr 1fr 1fr;gap:8px"><div class="fg"><label class="fl">Amount</label><input type="number" id="invAmt" step="any"></div><div class="fg"><label class="fl">Currency</label><select id="invCur">${curOpts('USD')}</select></div><div class="fg"><label class="fl">Status</label><select id="invSt"><option>Deposited</option><option>Pending</option><option>Confirmed</option></select></div></div><div class="fg"><label class="fl">Remarks</label><textarea id="invRem" rows="2"></textarea></div><div style="display:flex;justify-content:flex-end"><button class="btn bp" onclick="App.invSave()">Record</button></div></div>`;
h+=`<div class="card" style="border-left:4px solid #b89630"><div class="ch"><span class="ct">Fund Balances</span></div><div style="display:grid;grid-template-columns:repeat(${FUNDS.length},1fr);gap:8px">`;for(var fi=0;fi<FUNDS.length;fi++){var fn=FUNDS[fi],f=fb[fn]||{inflow:0,outflow:0,balance:0};h+=`<div style="text-align:center;padding:10px;background:var(--s2);border-radius:var(--r);border:1px solid var(--b2)"><div style="font-size:.54rem;font-family:JetBrains Mono;color:${FC[fn]};text-transform:uppercase;font-weight:700">${fn}</div><div style="font-family:Space Grotesk;font-size:1.1rem;font-weight:700;color:${f.balance>=0?'#2d8a32':'#cc3333'};margin-top:3px">${fmtD(f.balance)}</div></div>`}h+=`</div></div>`;
h+=`<div class="fbar"><label>Fund:</label><select onchange="App.setInvShowFund(this.value);App.render()"><option value="all">All</option>${fundOpts('')}</select></div>`;
var flt=[];for(var i=0;i<D.invSch.length;i++){if(invShowFund==='all'||D.invSch[i].fund===invShowFund)flt.push({r:D.invSch[i],idx:i})}flt.sort(function(a,b){return(b.r.date||'')<(a.r.date||'')?-1:1});
h+=`<div class="card"><div class="ch"><span class="ct">Records</span></div>`;if(!flt.length)h+=`<div style="text-align:center;padding:30px;color:var(--t3)">None.</div>`;else{h+=`<div class="tw"><table><thead><tr><th>Date</th><th>Fund</th><th style="text-align:right">Amount</th><th style="text-align:right">USD</th><th>Status</th><th></th></tr></thead><tbody>`;for(var i=0;i<flt.length;i++){var r=flt[i].r,idx=flt[i].idx,sb=r.status==='Deposited'?'bg2':r.status==='Confirmed'?'bb2':'by2';h+=`<tr><td style="font-family:JetBrains Mono">${r.date}</td><td>${fundBadge(r.fund)}</td><td style="text-align:right;font-family:JetBrains Mono;font-weight:700">${fmtC(r.amount,r.cur)}</td><td style="text-align:right;font-family:JetBrains Mono">${fmtD(cv(r.amount,r.cur||'USD','USD'))}</td><td><span class="badge ${sb}">${r.status}</span></td><td><button class="btn bs" onclick="App.invEdit(${idx})">Edit</button> <button class="btn bs bd" onclick="App.invDel(${idx})">&times;</button></td></tr>`}h+=`</tbody></table></div>`}h+=`</div>`;$('app').innerHTML=h}
function invSave(){var d=$('invD').value,amt=parseFloat($('invAmt').value)||0;if(!d||!amt){alert('Required');return}D.invSch.push({id:uid(),date:d,fund:$('invFund').value,amount:amt,cur:$('invCur').value,status:$('invSt').value,remarks:$('invRem').value.trim()});save();notify('Recorded');render()}
function invEdit(idx){var r=D.invSch[idx];mo('Edit',`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div class="fg"><label class="fl">Date</label><input type="date" id="eiD" value="${r.date}"></div><div class="fg"><label class="fl">Fund</label><select id="eiFund">${fundOpts(r.fund)}</select></div></div><div style="display:grid;grid-template-columns:2fr 1fr 1fr;gap:8px"><div class="fg"><label class="fl">Amount</label><input type="number" id="eiAmt" value="${r.amount}" step="any"></div><div class="fg"><label class="fl">Currency</label><select id="eiCur">${curOpts(r.cur)}</select></div><div class="fg"><label class="fl">Status</label><select id="eiSt"><option${r.status==='Deposited'?' selected':''}>Deposited</option><option${r.status==='Pending'?' selected':''}>Pending</option><option${r.status==='Confirmed'?' selected':''}>Confirmed</option></select></div></div>`,`<button class="btn" onclick="App.mc()">Cancel</button><button class="btn bp" onclick="App.invSaveEdit(${idx})">Save</button>`)}
function invSaveEdit(idx){var a=parseFloat($('eiAmt').value)||0;if(!a){alert('Amount');return}D.invSch[idx]={id:D.invSch[idx].id,date:$('eiD').value,fund:$('eiFund').value,amount:a,cur:$('eiCur').value,status:$('eiSt').value,remarks:''};save();mc_();notify('Updated');render()}
function invDel(idx){if(!confirm('Delete?'))return;D.invSch.splice(idx,1);save();mc_();notify('Deleted');render()}

function showVendorsFull(){var h=`<div class="fbar"><label>Display:</label><select onchange="App.setDC(this.value);App.render()">${curOpts(DC)}</select></div>`;var vs={};for(var i=0;i<D.psSch.length;i++){var r=D.psSch[i],v=r.vendor.toUpperCase();if(!vs[v])vs[v]={totalSch:0,cat:r.category||'Others',fund:r.fund||'VN Fund',totalPaid:0,desc:r.description||'',fc:vfCnt(r.vendor)};vs[v].totalSch+=cv(r.totalCost,r.cur||'USD','USD')}for(var i=0;i<D.pays.length;i++){var p=D.pays[i],v=p.vendor;if(!vs[v])vs[v]={totalSch:0,cat:p.category||'Others',fund:p.fund||'Other',totalPaid:0,desc:'',fc:vfCnt(p.vendor)};vs[v].totalPaid+=cv(p.amt,p.cur,'USD')}var vk=Object.keys(vs).sort();h+=`<div style="font-family:JetBrains Mono;font-size:.56rem;color:var(--t3);margin-bottom:10px">${vk.length} vendors</div>`;if(!vk.length){h+=`<div class="card" style="text-align:center;padding:50px"><div style="font-family:Space Grotesk;font-size:1rem;font-weight:700">No Vendors</div></div>`;$('app').innerHTML=h;return}for(var i=0;i<vk.length;i++){var k=vk[i],v=vs[k],pp=pct(v.totalPaid,v.totalSch),rem=Math.max(0,v.totalSch-v.totalPaid);var sl=pp>=99?'Completed':pp>=50?'On Track':pp>0?'Partial':'Pending';var sb=pp>=99?'bg2':pp>=50?'bb2':pp>0?'by2':'bx2';h+=`<div class="vd-card"><div class="vd-header"><div><div class="vd-name">${H(k)}</div><div style="display:flex;gap:6px;margin-top:3px;align-items:center;flex-wrap:wrap">${catBadge(v.cat)}<span class="badge ${sb}">${sl}</span>${fundBadge(v.fund)}</div></div><div style="text-align:right"><div style="font-family:Space Grotesk;font-size:1.2rem;font-weight:700;color:#2874a6">${fmtD(v.totalSch)}</div><div style="font-size:.6rem;color:var(--t3);font-family:JetBrains Mono">TOTAL</div></div></div><div class="vd-body"><div style="display:flex;justify-content:space-between;font-size:.66rem;margin-bottom:3px"><span>Progress</span><span style="font-family:JetBrains Mono;font-weight:700;color:${pp>=80?'#2d8a32':pp>=40?'#d4930d':'#2874a6'}">${pp}%</span></div><div class="vd-bar-wrap"><div class="vd-bar-paid" style="width:${pp}%"></div></div><div style="display:flex;justify-content:space-between;font-size:.62rem"><span style="color:#2d8a32">Paid: ${fmtD(v.totalPaid)}</span><span style="color:#d4930d">Rem: ${fmtD(rem)}</span></div><div style="display:flex;gap:6px;justify-content:flex-end;margin-top:8px"><button class="btn bs" onclick="App.openVFModal('${H(k)}')">&#128206; Files</button></div></div></div>`}$('app').innerHTML=h}

function showCurFull(){var h=`<div class="fbar"><label>Mode:</label><select onchange="App.setCurrencyMode(this.value);if(this.value==='live')App.fetchLiveRates();if(this.value==='standard')App.applyStd();App.render()"><option value="live"${currencyMode==='live'?' selected':''}>Live</option><option value="standard"${currencyMode==='standard'?' selected':''}>Standard</option><option value="fixed"${currencyMode==='fixed'?' selected':''}>Manual</option></select>`;if(currencyMode==='live'){h+=`<button class="btn bs bp" onclick="App.fetchLiveRates()">${liveFetching?'Updating...':'Refresh'}</button>`;if(liveLastUpdated)h+=`<span style="font-size:.6rem;color:#2d8a32;font-family:JetBrains Mono">${liveLastUpdated}</span>`}h+=`</div>`;
h+=`<div class="cur-convert-box"><div style="font-family:Space Grotesk;font-size:.82rem;font-weight:700;margin-bottom:10px">Converter</div><div style="display:grid;grid-template-columns:1fr 80px 80px 40px;gap:8px;align-items:end"><div class="fg"><label class="fl">Amount</label><input type="number" id="cvAmt" value="${curConvAmt}" step="any" oninput="App.doConv()"></div><div class="fg"><label class="fl">From</label><select id="cvFr" onchange="App.doConv()">${curOpts(curFrom)}</select></div><div class="fg"><label class="fl">To</label><select id="cvTo" onchange="App.doConv()">${curOpts(curTo)}</select></div><div class="fg"><button class="btn" onclick="var t=$('cvFr').value;$('cvFr').value=$('cvTo').value;$('cvTo').value=t;App.doConv()">&#8644;</button></div></div><div class="cur-convert-result" id="cvRes">${fmtC(cv(curConvAmt,curFrom,curTo),curTo)}</div><div class="cur-convert-sub" id="cvSub">1 ${curFrom} = ${cv(1,curFrom,curTo).toFixed(4)} ${curTo}</div></div>`;
h+=`<div class="card"><div class="ch"><span class="ct">Rates (${currencyMode})</span></div><div class="cur-pair-grid">`;for(var k in FX){if(k==='USD')continue;h+=`<div class="cur-pair-card"><div class="cur-pair-pair">USD/${k}</div><div class="cur-pair-rate">${FX[k].r.toFixed(2)}</div><div class="cur-pair-sub">${FX[k].n}</div></div>`}h+=`</div></div>`;$('app').innerHTML=h}
function doConv(){var a=parseFloat($('cvAmt').value)||0,f=$('cvFr').value,t=$('cvTo').value;curConvAmt=a;curFrom=f;curTo=t;$('cvRes').textContent=fmtC(cv(a,f,t),t);$('cvSub').textContent='1 '+f+' = '+cv(1,f,t).toFixed(4)+' '+t}
function fetchLiveRates(){if(liveFetching)return;liveFetching=true;var ql=[];for(var k in FX)if(k!=='USD')ql.push(k);var done=false;function ok(){if(done)return;done=true;liveLastUpdated=new Date().toLocaleString();localStorage.setItem('ss_curRates',JSON.stringify(rateSnap()));localStorage.setItem('ss_curLiveTS',liveLastUpdated);liveFetching=false;render()}fetch('https://api.frankfurter.dev/v2/rates?base=USD&quotes='+ql.join(',')).then(function(r){if(!r.ok)throw 0;return r.json()}).then(function(data){if(data&&data.rates){for(var k2 in data.rates)if(FX[k2])FX[k2].r=data.rates[k2];ok()}else throw 0}).catch(function(){fetch('https://open.er-api.com/v6/latest/USD').then(function(r){if(!r.ok)throw 0;return r.json()}).then(function(d){if(d&&d.rates){for(var k3 in FX)if(k3!=='USD'&&d.rates[k3])FX[k3].r=d.rates[k3];ok()}else throw 0}).catch(function(){liveFetching=false;notify('Could not fetch rates')})})}

function openExport(){mo('Export','<div style="font-size:.72rem;color:var(--t2);margin-bottom:16px">Export all data as CSV.</div><button class="btn bp" onclick="App.doCSV()" style="padding:12px 24px">Export CSV</button>','<button class="btn" onclick="App.mc()">Close</button>')}
function doCSV(){var rows=[['Date','Type','Entity','Category','Fund','Currency','Amount','USD','Status']];for(var i=0;i<D.pays.length;i++){var p=D.pays[i];rows.push([p.date,'Payment',p.vendor,p.category||'',p.fund||'',p.cur,p.amt,cv(p.amt,p.cur,'USD').toFixed(2),'Paid'])}for(var i=0;i<D.invSch.length;i++){var r=D.invSch[i];rows.push([r.date,'Investment',r.remarks||'',r.fund||'',r.cur||'USD',r.amount,cv(r.amount,r.cur||'USD','USD').toFixed(2),r.status])}var csv='';for(var i=0;i<rows.length;i++)csv+=rows[i].map(function(c){return'"'+String(c).replace(/"/g,'""')+'"'}).join(',')+'\n';var b=new Blob([csv],{type:'text/csv'});var u=URL.createObjectURL(b);var a=document.createElement('a');a.href=u;a.download='StellarSeeds_'+td()+'.csv';a.click();URL.revokeObjectURL(u);notify('Exported');mc_()}

var R={dash:showDash,cf:showCashFlow,pays:showPays,paySch:showPaySch,invSch:showInvSch,vendors:showVendors,cur:showCur,cloud:showCloud};

initFileDB().then(function(){load();nav();render()}).catch(function(){load();nav();render()});

setInterval(function(){if(currencyMode==='live')fetchLiveRates()},600000);
setTimeout(function(){if(localStorage.getItem('ss_cloudCfg')){var ok=cloudInit();if(ok)cloudConnect()}},1000);
}

return{
init:init,go:go,render:render,mc:mc_,mpSub:mpSub,doPayForSch:doPayForSch,pickInst:pickInst,submitPay:submitPay,delPay:delPay,editSch:editSch,saveSch:saveSch,delSch:delSch,pssSave:pssSave,pssChk:pssChk,addIRow:addIRow,invSave:invSave,invEdit:invEdit,invSaveEdit:invSaveEdit,invDel:invDel,doConv:doConv,fetchLiveRates:fetchLiveRates,applyStd:applyStd,openExport:openExport,doCSV:doCSV,openVFModal:openVFModal,uploadVF:uploadVF,dlVF:dlVF,delVF:delVF,
setDC:setDC,setDashFund:setDashFund,setSummaryMonth:setSummaryMonth,setCfFund:setCfFund,setCfLookback:setCfLookback,setCfMonths:setCfMonths,setInvShowFund:setInvShowFund,setPssTerm:setPssTerm,setPssFund:setPssFund,setCurrencyMode:setCurrencyMode,setPsF:setPsF,resetPsF:resetPsF,
saveCloudCfg:saveCloudCfg,cloudConnect:cloudConnect,cloudDisconnect:cloudDisconnect,cloudPush:cloudPush,cloudPull:cloudPull,cloudFullSync:cloudFullSync,toggleAutoSync:toggleAutoSync,cloudBackup:cloudBackup,cloudRestore:cloudRestore,clearPays:clearPays,clearSchedules:clearSchedules,clearInvestments:clearInvestments,clearAll:clearAll
};
})();
