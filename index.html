<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f4f0;--s1:#fff;--s2:#faf9f6;--s3:#eeece7;--b1:#e0ded8;--b2:#ece9e3;--g:#2d8a32;--gb:#3da642;--gc:rgba(45,138,50,.08);--bl:#2874a6;--blc:rgba(40,116,166,.08);--am:#b89630;--amc:rgba(184,150,48,.08);--rd:#cc3333;--rdc:rgba(204,51,51,.08);--or:#d4930d;--orc:rgba(212,147,13,.08);--pu:#9b59b6;--puc:rgba(155,89,182,.08);--t1:#1a1c18;--t2:#555;--t3:#999;--r:6px;--rl:10px}

td{padding:5px 8px;border-bottom:1px solid var(--b2);vertical-align:middle}tr:last-child td{border-bottom:0}tbody tr:hover{background:var(--s2)}
.badge{font-family:'JetBrains Mono',monospace;font-size:.56rem;padding:2px 6px;border-radius:12px;font-weight:500;display:inline-flex;align-items:center;gap:3px;white-space:nowrap}.badge::before{content:'';width:4px;height:4px;border-radius:50%;flex-shrink:0}

.ps-schedule-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}
.ps-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);padding:12px;border-left:4px solid var(--bl);transition:all .15s}

.ps-card-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}

.ps-card-actions{display:flex;gap:4px;margin-top:8px;justify-content:flex-end}
.ps-mini-timeline{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.ps-tl-item{background:var(--s2);border:1px solid var(--b2);border-radius:4px;padding:2px 6px;font-size:.56rem;font-family:'JetBrains Mono',monospace}
.ps-tl-item.done{background:var(--gc);border-color:var(--g);color:var(--g)}.ps-tl-item.pending{background:var(--orc);border-color:var(--or);color:var(--or)}
.mo-highlight{background:linear-gradient(135deg,var(--blc),rgba(40,116,166,.04));border:1px solid rgba(40,116,166,.15);border-radius:var(--r);padding:8px 10px;margin-top:6px;display:grid;grid-template-columns:1fr 1fr;gap:6px}
.mo-highlight-item{text-align:center}

.fund-avail-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;padding:10px;background:var(--s2);border:1px solid var(--b2);border-radius:var(--rl)}

.fund-avail-name{font-size:.58rem;font-family:'JetBrains Mono',monospace;font-weight:700;text-transform:uppercase;margin-bottom:2px}
.fund-avail-bal{font-family:'Space Grotesk',sans-serif;font-size:.92rem;font-weight:700;line-height:1.1}
.fund-avail-sub{font-size:.5rem;color:var(--t3);font-family:'JetBrains Mono',monospace;margin-top:2px}
.vd-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);margin-bottom:12px;overflow:hidden}
.vd-header{padding:14px 16px;border-bottom:1px solid var(--b1);display:flex;justify-content:space-between;align-items:center}
.vd-name{font-family:'Space Grotesk',sans-serif;font-size:1rem;font-weight:700}
.vd-body{padding:14px 16px}
.vd-bar-wrap{height:10px;background:var(--s3);border-radius:5px;overflow:hidden;margin:6px 0}
.vd-bar-paid{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--g),var(--gb))}
.vd-section{margin-top:10px;padding-top:10px;border-top:1px solid var(--b2)}
.vd-section-title{font-family:'Space Grotesk',sans-serif;font-size:.72rem;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.fin-row{display:grid;grid-template-columns:2fr 1fr;gap:12px;margin-bottom:12px}
.fund-bal-row{display:grid;grid-template-columns:100px 1fr 100px 100px;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid var(--b2);font-size:.72rem}
.fund-bal-row:last-child{border-bottom:0}
.fund-bal-name{font-weight:700}
.fund-bal-bar{height:14px;background:var(--s3);border-radius:4px;overflow:hidden;position:relative}
.fund-bal-in{height:100%;background:linear-gradient(90deg,var(--g),var(--gb));border-radius:4px;position:absolute;top:0;left:0}
.fund-bal-out{height:100%;background:linear-gradient(90deg,var(--rd),#e05050);border-radius:4px;position:absolute;top:0;left:0;opacity:.5}
.fund-bal-val{font-family:'JetBrains Mono',monospace;font-weight:700;text-align:right}
.cf-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.cf-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);padding:14px;overflow:hidden}
.cur-pair-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-bottom:14px}
.cur-pair-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);padding:12px;text-align:center;transition:all .15s}
.cur-pair-card:hover{border-color:var(--bl);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.cur-pair-pair{font-family:'Space Grotesk',sans-serif;font-size:.72rem;font-weight:700;color:var(--t3);margin-bottom:2px}
.cur-pair-rate{font-family:'JetBrains Mono',monospace;font-size:1.1rem;font-weight:700;color:var(--bl)}
.cur-pair-sub{font-size:.54rem;color:var(--t3);font-family:'JetBrains Mono',monospace;margin-top:2px}
.cur-convert-box{background:linear-gradient(135deg,var(--s1),var(--s2));border:1px solid var(--b1);border-radius:var(--rl);padding:20px;margin-bottom:14px}
.cur-convert-result{font-family:'Space Grotesk',sans-serif;font-size:1.6rem;font-weight:700;color:var(--g);text-align:center;margin:10px 0 4px}

@media(max-width:900px){.app{padding:10px}.cf-row{grid-template-columns:1fr}.fin-row{grid-template-columns:1fr}.cur-pair-grid{grid-template-columns:1fr 1fr}.mo-highlight{grid-template-columns:1fr}.fund-bal-row{grid-template-columns:80px 1fr 80px}.fund-avail-bar{grid-template-columns:1fr}.term-cards{grid-template-columns:1fr}.ps-schedule-grid{grid-template-columns:1fr}.ps-inst-row{grid-template-columns:1fr 80px 1fr 40px}}
</style>

<body>
<div id="loginScr" style="display:none"><div class="lcard"><div style="display:flex;align-items:center;gap:10px;margin-bottom:24px;justify-content:center"><div class="logo-ic" style="width:40px;height:40px"></div><div class="logo-txt"><span class="logo-nm" style="font-size:1.1rem">Stellar Seeds</span><span class="logo-sb">Construction Management</span></div></div><div style="font-family:'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:700;text-align:center;margin-bottom:4px" id="lTitle">Sign In</div><div style="font-size:.72rem;color:var(--t3);text-align:center;margin-bottom:20px" id="lSub">Enter credentials</div><div class="lerr" id="lErr"></div><div class="fg"><label class="fl">Email</label><input type="text" id="lEmail" placeholder="you@company.com"></div><div class="fg"><label class="fl">Password</label><input type="password" id="lPass" placeholder="Password"></div><button class="btn bp" style="width:100%;padding:10px;font-size:.82rem;margin-top:6px" id="lBtn" onclick="doLogin()">Sign In</button><div style="text-align:center;margin-top:14px;font-size:.74rem;color:var(--t3)" id="lTog">No account? <a style="color:var(--g);font-weight:600" onclick="togAuth()">Sign Up</a></div><div style="margin-top:16px;padding-top:12px;border-top:1px solid var(--b2);text-align:center"><a style="font-size:.68rem;color:var(--t3);text-decoration:underline" onclick="skipAuth()">Continue without login</a></div></div></div>
<div id="mainApp" style="display:none"><div class="hdr"><div class="logo"><div class="logo-ic"></div><div class="logo-txt"><span class="logo-nm">Stellar Seeds</span><span class="logo-sb">Seed Tolling Plant</span></div></div><div class="hdr-r"><span class="hdr-usr" id="hUser"></span><div class="dot off" id="hDot"></div><span class="dot-lb" id="hLbl">Local</span><button class="btn bp bs" onclick="expAll()">Export</button><button class="btn bs" id="hOut" style="display:none" onclick="doLogout()">Logout</button></div></div><div class="nav" id="nbar"></div><div class="app" id="app"></div></div>
<div class="modal" id="mdl"><div class="mbox"><div class="mhdr"><h3 id="mTi"></h3><button class="mx" onclick="mClose()">&times;</button></div><div class="mbd" id="mBd"></div><div class="mft" id="mFt"></div></div></div>
<div class="toast" id="tst"></div>
<script>
var D={costs:[],pays:[],upds:[],psSch:[],vn:{},invSch:[]};
var curUser=null,auth=null,db=null,cOn=false,skipSync=false,tab='costD';
var nP=100,nU=100,nPSS=200,nINV=300;
var DC='USD';
var FX={USD:{r:1,name:'US Dollar',sym:'$'},EUR:{r:0.92,name:'Euro',sym:'€'},VND:{r:26307,name:'Vietnamese Dong',sym:'Đ'},PHP:{r:61.26,name:'Philippine Peso',sym:'₱'},THB:{r:34.5,name:'Thai Baht',sym:'฿'},SGD:{r:1.34,name:'Singapore Dollar',sym:'S$'},CNY:{r:7.24,name:'Chinese Yuan',sym:'¥'},JPY:{r:155.5,name:'Japanese Yen',sym:'¥'},KRW:{r:1380,name:'South Korean Won',sym:'₩'},GBP:{r:0.79,name:'British Pound',sym:'£'},AUD:{r:1.53,name:'Australian Dollar',sym:'A$'},MYR:{r:4.47,name:'Malaysian Ringgit',sym:'RM'},INR:{r:83.5,name:'Indian Rupee',sym:'₹'},TWD:{r:32.1,name:'Taiwan Dollar',sym:'NT$'}};
var SY={USD:'$',EUR:'€',VND:'Đ',PHP:'₱',THB:'฿',SGD:'S$',CNY:'¥',JPY:'¥',KRW:'₩',GBP:'£',AUD:'A$',MYR:'RM',INR:'₹',TWD:'NT$'};
var currencyMode='live',liveLastUpdated=null,liveFetching=false;
var CATS=['Machines','Buildings','Land','Opex','Others'];
var CAT_COLORS={Machines:'var(--bl)',Buildings:'var(--g)',Land:'var(--am)',Opex:'var(--pu)',Others:'var(--t3)'};

var FUND_COLORS={'VN Fund':'var(--g)','PH Fund':'var(--bl)','Other':'var(--am)'};
var authMode='login',pssTerm='monthly',pssFund='VN Fund';
var curFrom='USD',curTo='EUR',curConvAmt=1000;
var invShowFund='all';
function $i(id){return document.getElementById(id)}
function H(s){if(!s)return'';var d=document.createElement('span');d.textContent=String(s);return d.innerHTML}
function pct(a,b){return b>0?Math.round(a/b*100):0}
function td(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function addD(ds,n){var d=new Date(ds);d.setDate(d.getDate()+n);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function notify(m){var t=$i('tst');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2200)}

window.pssSave=function(){var v=$i('pssV').value.trim().toUpperCase(),c=parseFloat($i('pssCost').value)||0;if(!v){alert('Vendor');return}if(!c){alert('Amount');return}var e={id:++nPSS,vendor:v,totalCost:c,cur:$i('pssCur').value,category:$i('pssCat').value,fund:pssFund,terms:pssTerm,startDate:'',endDate:'',installments:[],remarks:$i('pssRem').value.trim(),created:new Date().toISOString()};if(pssTerm==='monthly'){var s=$i('pssStart').value,en=$i('pssEnd').value;if(!s||!en){alert('Dates');return}e.startDate=s;e.endDate=en}else{var rows=document.querySelectorAll('#instRows .ps-inst-row'),insts=[],pT=0;rows.forEach(function(r){var d=r.querySelector('.inst-date').value,p=parseFloat(r.querySelector('.inst-pct').value)||0,f=r.querySelector('.inst-fund')?r.querySelector('.inst-fund').value:'VN Fund';if(d&&p>0){insts.push({pct:p,date:d,fund:f});pT+=p}});if(!insts.length||Math.abs(pT-100)>0.01){alert('Must total 100%');return}insts.sort(function(a,b){return a.date<b.date?-1:1});e.installments=insts}D.psSch.push(e);save();notify('Enrolled: '+v+' → '+pssFund);showPaySch()};

window.pssSaveEdit=function(idx){var r=D.psSch[idx],v=$i('epsV').value.trim().toUpperCase(),c=parseFloat($i('epsCost').value)||0;if(!v||!c){alert('Required');return}r.vendor=v;r.category=$i('epsCat').value;r.totalCost=c;r.cur=$i('epsCur').value;r.fund=$i('epsFund').value;r.remarks=$i('epsRem').value.trim();if(r.terms==='monthly'){r.startDate=$i('epsStart').value;r.endDate=$i('epsEnd').value}else{var rows=document.querySelectorAll('#epsInstRows .ps-inst-row'),insts=[],pT=0;rows.forEach(function(row){var d=row.querySelector('.eps-inst-date').value,p=parseFloat(row.querySelector('.eps-inst-pct').value)||0,f=row.querySelector('.eps-inst-fund')?row.querySelector('.eps-inst-fund').value:'VN Fund';if(d&&p>0){insts.push({pct:p,date:d,fund:f});pT+=p}});if(!insts.length||Math.abs(pT-100)>0.01){alert('Must total 100%');return}insts.sort(function(a,b){return a.date<b.date?-1:1});r.installments=insts}save();mClose();notify('Updated');showPaySch()};

function showVendors(){var vs=getVendorSummary();var h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><span class="ct" style="font-size:.92rem">Vendor Summary</span><span style="font-family:JetBrains Mono;font-size:.6rem;color:var(--t3)">'+Object.keys(vs).length+' vendors</span></div>';var vKeys=Object.keys(vs).sort();if(!vKeys.length){h+='<div class="card" style="text-align:center;padding:50px 20px"><div style="font-size:2rem;margin-bottom:10px">🏢</div><div style="font-family:Space Grotesk;font-size:1rem;font-weight:700;margin-bottom:6px">No Vendors Yet</div><button class="btn bp" style="margin-top:12px" onclick="go(\'paySch\')">Enroll</button></div>';$i('app').innerHTML=h;return}for(var vi=0;vi<vKeys.length;vi++){var k=vKeys[vi],v=vs[k];var pp=pct(v.totalPaid,v.totalSch),bc=pp>=80?'var(--g)':pp>=40?'var(--or)':'var(--bl)',rem=Math.max(0,v.totalSch-v.totalPaid),sl=pp>=100?'Completed':pp>=50?'On Track':pp>0?'Partial':'Pending',sb=pp>=100?'bg2':pp>=50?'bb2':pp>0?'by2':'bx2';h+='<div class="vd-card"><div class="vd-header"><div><div class="vd-name">'+H(k)+'</div><div style="display:flex;gap:6px;margin-top:3px">'+catBadge(v.category)+'<span class="badge '+sb+'">'+sl+'</span></div></div><div style="text-align:right"><div style="font-family:Space Grotesk;font-size:1.2rem;font-weight:700;color:var(--bl)">'+fmtC(cv(v.totalSch,'USD',DC),DC)+'</div><div style="font-size:.6rem;color:var(--t3);font-family:JetBrains Mono">TOTAL</div></div></div><div class="vd-body"><div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:.66rem;margin-bottom:3px"><span style="color:var(--t3)">Progress</span><span style="font-family:JetBrains Mono;font-weight:700;color:'+bc+'">'+pp+'%</span></div><div class="vd-bar-wrap"><div class="vd-bar-paid" style="width:'+pp+'%"></div></div><div style="display:flex;justify-content:space-between;font-size:.62rem"><span style="color:var(--g)">Paid: '+fmtC(cv(v.totalPaid,'USD',DC),DC)+'</span><span style="color:var(--or)">Remaining: '+fmtC(cv(rem,'USD',DC),DC)+'</span></div></div>';h+='<div style="font-size:.68rem;color:var(--t2);padding:4px 0;display:flex;justify-content:space-between;border-bottom:1px solid var(--b2)"><span>Term</span><b style="font-family:JetBrains Mono">'+(v.terms==='monthly'?'Monthly':v.terms==='installment'?'Installment':'--')+'</b></div>';h+='<div style="font-size:.68rem;color:var(--t2);padding:4px 0;display:flex;justify-content:space-between;border-bottom:1px solid var(--b2)"><span>Category</span><b style="font-family:JetBrains Mono">'+H(v.category)+'</b></div>';h+='<div style="font-size:.68rem;color:var(--t2);padding:4px 0;display:flex;justify-content:space-between;border-bottom:1px solid var(--b2)"><span>Payments</span><b style="font-family:JetBrains Mono">'+v.payCount+'</b></div>';if(v.terms==='monthly'&&v.startDate){var mc=monthCount(v.startDate,v.endDate),ma=monthlyAmt(v.totalSch,v.startDate,v.endDate);h+='<div class="mo-highlight"><div class="mo-highlight-item"><div class="mo-highlight-label">Per Month</div><div class="mo-highlight-val">'+fmtC(cv(ma,'USD',DC),DC)+'</div></div><div class="mo-highlight-item"><div class="mo-highlight-label">Total</div><div class="mo-highlight-val">'+fmtC(cv(ma*mc,'USD',DC),DC)+'</div></div></div>'}if(v.terms==='installment'&&v.installments.length){h+='<div class="vd-section"><div class="vd-section-title">Installments</div>';for(var j=0;j<v.installments.length;j++){var ins=v.installments[j],iA=v.totalSch*ins.pct/100,iD=new Date(ins.date)<new Date();h+='<div style="display:grid;grid-template-columns:60px 1fr 90px;gap:8px;align-items:center;padding:4px 0;border-bottom:1px solid var(--b2);font-size:.72rem"><span style="font-family:JetBrains Mono;font-size:.66rem;color:var(--t3)">'+ins.date+'</span><div><div style="height:6px;background:var(--s3);border-radius:3px;overflow:hidden"><div style="height:100%;width:'+(iD?100:0)+'%;background:'+(iD?'var(--g)':'var(--b1)')+';border-radius:3px"></div></div></div><div style="text-align:right"><span style="font-family:JetBrains Mono;font-weight:700">'+ins.pct+'%</span> <span style="font-size:.6rem;color:var(--t3)">= '+fmtC(cv(iA,'USD',DC),DC)+'</span></div></div>'}h+='</div>'}if(v.remarks)h+='<div style="margin-top:8px;padding:6px 8px;background:var(--s2);border-radius:var(--r);font-size:.66rem;color:var(--t3);font-style:italic">"'+H(v.remarks)+'"</div>';h+='</div></div>'}$i('app').innerHTML=h}
function showCur(){var h='<div class="fbar"><label>Mode:</label><select onchange="currencyMode=this.value;localStorage.setItem(\'ss_curMode\',this.value);if(this.value===\'live\')fetchLiveRates();showCur()"><option value="live"'+(currencyMode==='live'?' selected':'')+'>Live Internet</option><option value="fixed"'+(currencyMode==='fixed'?' selected':'')+'>Manual</option></select>';if(currencyMode==='live'){h+='<button class="btn bs bp" onclick="fetchLiveRates()">'+(liveFetching?'Updating...':'Refresh Now')+'</button>';if(liveLastUpdated)h+='<span style="font-size:.6rem;color:var(--g);font-family:JetBrains Mono;font-weight:600">Last: '+liveLastUpdated+'</span>';else h+='<span style="font-size:.6rem;color:var(--or)">Not yet updated</span>';h+='<span style="font-size:.52rem;color:var(--t3);margin-left:auto">ECB + Open Exchange Rates</span>'}h+='</div>';h+='<div class="cur-convert-box"><div style="font-family:Space Grotesk;font-size:.82rem;font-weight:700;margin-bottom:10px">Currency Converter</div>';var curOpts='';for(var k in FX)curOpts+='<option value="'+k+'">'+k+' — '+FX[k].name+'</option>';h+='<div style="display:grid;grid-template-columns:1fr 80px 80px 50px;gap:8px;align-items:end"><div class="fg"><label class="fl">Amount</label><input type="number" id="cvAmt" value="'+curConvAmt+'" step="any" oninput="doConvert()"></div><div class="fg"><label class="fl">From</label><select id="cvFrom" onchange="doConvert()">'+curOpts.replace('value="'+curFrom+'"','value="'+curFrom+'" selected')+'</select></div><div class="fg"><label class="fl">To</label><select id="cvTo" onchange="doConvert()">'+curOpts.replace('value="'+curTo+'"','value="'+curTo+'" selected')+'</select></div><div class="fg"><button class="btn" style="font-size:.9rem" onclick="var t=$i(\'cvFrom\').value;$i(\'cvFrom\').value=$i(\'cvTo\').value;$i(\'cvTo\').value=t;doConvert()">&#8644;</button></div></div>';var converted=cv(curConvAmt,curFrom,curTo),rate=cv(1,curFrom,curTo);h+='<div class="cur-convert-result" id="cvResult">'+fmtC(converted,curTo)+'</div><div class="cur-convert-sub" id="cvSub">1 '+curFrom+' = '+rate.toFixed(FX[curTo].r>=100?2:4)+' '+curTo+'</div></div>';h+='<div class="card"><div class="ch"><span class="ct">Exchange Rates</span><span style="font-family:JetBrains Mono;font-size:.52rem;color:var(--t3)">Base: 1 USD</span></div><div class="cur-pair-grid">';var keys=Object.keys(FX);for(var i=0;i<keys.length;i++){var k=keys[i];if(k==='USD')continue;var r=FX[k].r;h+='<div class="cur-pair-card"><div class="cur-pair-pair">USD / '+k+'</div><div class="cur-pair-rate">'+(r>=1000?Number(r).toLocaleString('en',{maximumFractionDigits:2}):r.toFixed(4))+'</div><div class="cur-pair-sub">'+FX[k].name+'</div></div>'}h+='</div>';h+='<div class="ch" style="margin-top:14px"><span class="ct">Cross Rates</span></div><div class="tw"><table><thead><tr><th></th>';for(var i=0;i<keys.length;i++)h+='<th style="text-align:center">'+keys[i]+'</th>';h+='</tr></thead><tbody>';for(var i=0;i<keys.length;i++){h+='<tr><td style="font-weight:700">'+keys[i]+'</td>';for(var j=0;j<keys.length;j++){if(keys[i]===keys[j])h+='<td style="text-align:center;background:var(--s2);color:var(--t3)">—</td>';else{var cr=cv(1,keys[i],keys[j]);h+='<td style="text-align:center;font-family:JetBrains Mono;font-size:.64rem">'+(cr>=1000?Number(cr).toLocaleString('en',{maximumFractionDigits:2}):cr.toFixed(4))+'</td>'}}h+='</tr>'}h+='</tbody></table></div></div>';if(currencyMode==='fixed'){h+='<div class="card"><div class="ch"><span class="ct">Manual Rates</span></div><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px">';for(var i=0;i<keys.length;i++)h+='<div class="fg"><label class="fl">'+keys[i]+'</label><input type="number" id="fx_'+keys[i]+'" value="'+FX[keys[i]].r+'" step="any"></div>';h+='</div><div style="display:flex;justify-content:flex-end;margin-top:8px"><button class="btn bp" onclick="saveFixedRates()">Save</button></div></div>'}$i('app').innerHTML=h}
window.doConvert=function(){var amt=parseFloat($i('cvAmt').value)||0,f=$i('cvFrom').value,t=$i('cvTo').value;curConvAmt=amt;curFrom=f;curTo=t;var r=cv(amt,f,t),rate=cv(1,f,t);$i('cvResult').textContent=fmtC(r,t);$i('cvSub').textContent='1 '+f+' = '+rate.toFixed(FX[t].r>=100?2:4)+' '+t};
window.saveFixedRates=function(){for(var k in FX){var el=$i('fx_'+k);if(el){var r=parseFloat(el.value)||0;if(r>0)FX[k].r=r}}localStorage.setItem('ss_curRates',JSON.stringify(getRateSnapshot()));notify('Saved');doRender()};

window.saveCloud=function(){var url=$i('clURL').value.trim(),key=$i('clKey').value.trim();if(!url||!key){alert('Required');return}localStorage.setItem('ss_cloud',JSON.stringify({databaseURL:url,apiKey:key}));notify('Saved — reload');initCloud()};
