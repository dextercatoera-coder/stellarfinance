<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stellar Seeds</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f4f0;--s1:#fff;--s2:#faf9f6;--s3:#eeece7;--b1:#e0ded8;--b2:#ece9e3;--g:#2d8a32;--gb:#3da642;--gc:rgba(45,138,50,.08);--bl:#2874a6;--blc:rgba(40,116,166,.08);--am:#b89630;--amc:rgba(184,150,48,.08);--rd:#cc3333;--rdc:rgba(204,51,51,.08);--or:#d4930d;--orc:rgba(212,147,13,.08);--t1:#1a1c18;--t2:#555;--t3:#999;--r:6px;--rl:10px}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t1);line-height:1.5;font-size:14px}
button{font-family:inherit;cursor:pointer}
.hdr{height:52px;background:var(--s1);border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px}
.logo-ic{width:32px;height:32px;background:linear-gradient(135deg,var(--g),#1a5c20);border-radius:var(--r);position:relative}
.logo-ic::after{content:'';position:absolute;width:16px;height:16px;border:2.5px solid rgba(255,255,255,.9);border-radius:50%;top:5px;left:5px}
.logo-txt{display:flex;flex-direction:column;line-height:1}
.logo-nm{font-family:'Cormorant Garamond',serif;font-size:.88rem;font-weight:700;color:var(--am);letter-spacing:.18em;text-transform:uppercase}
.logo-sb{font-family:'JetBrains Mono',monospace;font-size:.38rem;color:var(--t3);letter-spacing:.08em;text-transform:uppercase}
.btn{font-weight:600;font-size:.72rem;padding:5px 12px;border-radius:var(--r);border:1px solid var(--b1);background:var(--s1);color:var(--t1);transition:all .12s;white-space:nowrap}
.btn:hover{background:var(--s3)}
.bp{background:var(--g);border-color:var(--g);color:#fff}
.bp:hover{background:var(--gb)}
.bd{border-color:var(--rd);color:var(--rd)}
.bs{padding:3px 8px;font-size:.66rem}
.nav{background:var(--s1);border-bottom:1px solid var(--b1);display:flex;padding:0 12px;overflow-x:auto;position:sticky;top:52px;z-index:99}
.nav button{background:0;border:0;padding:8px 10px;font-size:.74rem;font-weight:600;color:var(--t3);border-bottom:2px solid transparent;white-space:nowrap;font-family:'DM Sans',sans-serif;transition:all .15s}
.nav button:hover{color:var(--t1)}
.nav button.act{color:var(--g);border-color:var(--g)}
.app{padding:16px;max-width:1400px;margin:0 auto}
.card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);padding:14px;margin-bottom:12px}
.ch{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.ct{font-family:'Space Grotesk',sans-serif;font-size:.82rem;font-weight:700}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:14px}
.si{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);padding:12px}
.si .sl{font-family:'JetBrains Mono',monospace;font-size:.54rem;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.si .sv{font-family:'Space Grotesk',sans-serif;font-size:1.15rem;font-weight:700;line-height:1.1}
.tw{overflow-x:auto;border-radius:var(--r);border:1px solid var(--b1)}
table{width:100%;border-collapse:collapse;font-size:.76rem}
th{background:var(--s2);font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:.6rem;text-transform:uppercase;letter-spacing:.04em;color:var(--t3);padding:6px 8px;text-align:left;border-bottom:1px solid var(--b1);white-space:nowrap}
td{padding:5px 8px;border-bottom:1px solid var(--b2);vertical-align:middle}
tr:last-child td{border-bottom:0}
tbody tr:hover{background:var(--s2)}
.clickable-row{cursor:pointer}
.clickable-row:hover{background:var(--blc)!important}
.badge{font-family:'JetBrains Mono',monospace;font-size:.56rem;padding:2px 6px;border-radius:12px;font-weight:500;display:inline-flex;align-items:center;gap:3px;white-space:nowrap}
.badge::before{content:'';width:4px;height:4px;border-radius:50%;flex-shrink:0}
.bg2{background:var(--gc);color:var(--g)}.bg2::before{background:var(--g)}
.bd2{background:var(--rdc);color:var(--rd)}.bd2::before{background:var(--rd)}
.by2{background:var(--orc);color:var(--or)}.by2::before{background:var(--or)}
.bb2{background:var(--blc);color:var(--bl)}.bb2::before{background:var(--bl)}
.bx2{background:rgba(153,153,153,.12);color:var(--t3)}.bx2::before{background:var(--t3)}
select,input[type="text"],input[type="number"],input[type="date"],textarea{width:100%;padding:6px 10px;background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);color:var(--t1);font-family:'DM Sans',sans-serif;font-size:.8rem;outline:0;transition:border-color .15s}
select:focus,input:focus,textarea:focus{border-color:var(--g)}
textarea{resize:vertical;min-height:36px}
.fg{margin-bottom:8px}
.fl{display:block;font-size:.68rem;font-weight:600;color:var(--t2);margin-bottom:3px}
.fbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:8px 10px;background:var(--s2);border:1px solid var(--b2);border-radius:var(--rl);margin-bottom:10px}
.fbar label{font-size:.7rem;font-weight:600;color:var(--t2);white-space:nowrap}
.fbar select,.fbar input{width:auto;min-width:80px;padding:4px 8px;font-size:.74rem;border-radius:var(--r);border:1px solid var(--b1);background:var(--s1);font-weight:600;outline:0}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;display:none;align-items:center;justify-content:center;padding:12px}
.modal.open{display:flex}
.mbox{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);width:100%;max-width:680px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.mhdr{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--b1);position:sticky;top:0;background:var(--s1)}
.mhdr h3{font-family:'Space Grotesk',sans-serif;font-size:.88rem;font-weight:700}
.mx{background:0;border:0;color:var(--t3);font-size:1.2rem;padding:4px 8px}
.mx:hover{color:var(--t1)}
.mbd{padding:16px}
.mft{padding:10px 16px;border-top:1px solid var(--b1);display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:var(--s1)}
.toast{position:fixed;bottom:16px;right:16px;background:var(--t1);color:#fff;padding:8px 16px;border-radius:var(--r);font-size:.76rem;font-weight:600;z-index:300;transform:translateY(60px);opacity:0;transition:all .3s ease}
.toast.show{transform:translateY(0);opacity:1}
.term-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.term-card{border:2px solid var(--b2);border-radius:var(--rl);padding:14px;cursor:pointer;transition:all .15s;text-align:center}
.term-card:hover{border-color:var(--bl)}
.term-card.sel{border-color:var(--g);background:var(--gc)}
.term-card .tc-icon{font-size:1.4rem;margin-bottom:4px}
.term-card .tc-title{font-family:'Space Grotesk',sans-serif;font-size:.82rem;font-weight:700}
.vendor-dd{display:flex;gap:6px;align-items:end}
.vendor-dd select{flex:2}
.vendor-dd input{flex:1}
.ps-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);padding:12px;border-left:4px solid var(--bl);margin-bottom:10px}
.ps-card-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.ps-card-vendor{font-family:'Space Grotesk',sans-serif;font-size:.88rem;font-weight:700}
.ps-card-total{font-family:'JetBrains Mono',monospace;font-size:.92rem;font-weight:700;color:var(--bl)}
.sch-desc{font-size:.6rem;color:var(--t2);font-style:italic;margin-top:2px;line-height:1.3}
.fund-avail-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px;background:var(--s2);border:1px solid var(--b2);border-radius:var(--rl)}
.fund-avail-item{text-align:center;padding:8px;border-radius:var(--r);border:2px solid var(--b2);cursor:pointer;transition:all .15s}
.fund-avail-item:hover{border-color:var(--bl)}
.fund-avail-item.sel{border-color:var(--g);background:var(--gc)}
.fund-avail-name{font-size:.58rem;font-family:'JetBrains Mono',monospace;font-weight:700;text-transform:uppercase;margin-bottom:2px}
.fund-avail-bal{font-family:'Space Grotesk',sans-serif;font-size:.92rem;font-weight:700;line-height:1.1}
.fund-avail-sub{font-size:.5rem;color:var(--t3);font-family:'JetBrains Mono',monospace;margin-top:2px}
.vd-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);margin-bottom:12px;overflow:hidden}
.vd-header{padding:14px 16px;border-bottom:1px solid var(--b1);display:flex;justify-content:space-between;align-items:center}
.vd-name{font-family:'Space Grotesk',sans-serif;font-size:1rem;font-weight:700}
.vd-body{padding:14px 16px}
.vd-bar-wrap{height:10px;background:var(--s3);border-radius:5px;overflow:hidden;margin:6px 0}
.vd-bar-paid{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--g),var(--gb))}
.vd-pay-mini-bar{height:6px;background:var(--s3);border-radius:3px;overflow:hidden;min-width:60px}
.vd-pay-mini-fill{height:100%;border-radius:3px}
.cat-spec-box{background:var(--amc);border:1px solid rgba(184,150,48,.2);border-radius:var(--r);padding:8px 10px}
.cat-spec-box label{color:var(--am)}
.inst-pick{border:2px solid var(--b1);border-radius:var(--rl);padding:12px;margin-bottom:8px;cursor:pointer;transition:all .15s}
.inst-pick:hover{border-color:var(--bl);background:var(--blc)}
.inst-pick.ip-sel{border-color:var(--g);background:var(--gc)}
.inst-pick.ip-done{opacity:.6;cursor:default}
.inst-pick-head{display:flex;justify-content:space-between;align-items:center}
.inst-pick-tranche{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.84rem}
.inst-pick-amt{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:.88rem;color:var(--bl)}
.ps-prog-bar{height:10px;background:var(--s3);border-radius:5px;overflow:hidden}
.ps-prog-fill{height:100%;border-radius:5px;transition:width .3s}
.ps-prog-info{display:flex;justify-content:space-between;font-size:.54rem;font-family:'JetBrains Mono',monospace;margin-top:3px;color:var(--t3)}
.ps-pay-list{margin-top:8px;padding-top:8px;border-top:1px solid var(--b2)}
.ps-pay-item{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:.64rem;border-bottom:1px dashed var(--b2)}
.ps-pay-item:last-child{border-bottom:0}
.ps-pay-date{font-family:'JetBrains Mono',monospace;color:var(--t3)}
.ps-pay-amt{font-family:'JetBrains Mono',monospace;font-weight:700}
.ps-pay-btn{background:0;border:0;color:var(--t3);font-size:.6rem;padding:1px 4px;cursor:pointer}
.ps-pay-btn:hover{color:var(--bl)}
.ps-pay-btn.del:hover{color:var(--rd)}
.donut-wrap{position:relative;width:150px;height:150px;flex-shrink:0}
.donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.donut-total{font-family:'JetBrains Mono',monospace;font-size:.44rem;color:var(--t3);text-transform:uppercase;letter-spacing:.06em}
.donut-val{font-family:'Space Grotesk',sans-serif;font-size:.88rem;font-weight:700;color:var(--g)}
.cat-legend-item{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.cat-legend-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.cat-legend-label{font-size:.6rem;flex:1}
.cat-legend-pct{font-family:'JetBrains Mono',monospace;font-size:.6rem;font-weight:700}
.cat-legend-val{font-family:'JetBrains Mono',monospace;font-size:.54rem;color:var(--t3)}
.status-stack{height:22px;background:var(--s3);border-radius:8px;overflow:hidden;display:flex;margin-bottom:8px}
.status-seg{transition:width .3s ease}
.status-seg:first-child{border-radius:8px 0 0 8px}
.status-seg:last-child{border-radius:0 8px 8px 0}
.status-legend{display:flex;gap:16px;flex-wrap:wrap}
.status-legend-item{display:flex;align-items:center;gap:4px}
.status-legend-dot{width:6px;height:6px;border-radius:2px}
.status-legend-label{font-size:.58rem}
.status-legend-count{font-family:'JetBrains Mono',monospace;font-size:.62rem;font-weight:700}
.totals-bar{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;padding:12px;background:var(--s2);border:1px solid var(--b2);border-radius:var(--rl);margin-bottom:10px}
.totals-item{text-align:center}
.totals-label{font-size:.48rem;font-family:'JetBrains Mono',monospace;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.totals-val{font-family:'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:700;line-height:1.1}
.cur-convert-box{background:linear-gradient(135deg,var(--s1),var(--s2));border:1px solid var(--b1);border-radius:var(--rl);padding:20px;margin-bottom:14px}
.cur-convert-result{font-family:'Space Grotesk',sans-serif;font-size:1.6rem;font-weight:700;color:var(--g);text-align:center;margin:10px 0 4px}
.cur-convert-sub{text-align:center;font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--t3)}
.cur-pair-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.cur-pair-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);padding:12px;text-align:center}
.cur-pair-pair{font-family:'Space Grotesk',sans-serif;font-size:.72rem;font-weight:700;color:var(--t3);margin-bottom:2px}
.cur-pair-rate{font-family:'JetBrains Mono',monospace;font-size:1.1rem;font-weight:700;color:var(--bl)}
.cur-pair-sub{font-size:.54rem;color:var(--t3);font-family:'JetBrains Mono',monospace;margin-top:2px}
.file-drop-zone{border:2px dashed var(--b1);border-radius:var(--rl);padding:16px;text-align:center;cursor:pointer;transition:all .15s;background:var(--s2);margin-top:8px}
.file-drop-zone:hover{border-color:var(--bl);background:var(--blc)}
.file-item{display:flex;align-items:center;gap:6px;padding:5px 8px;background:var(--s1);border:1px solid var(--b2);border-radius:var(--r);margin-bottom:3px}
.file-name{font-size:.64rem;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-size{font-size:.5rem;color:var(--t3);font-family:'JetBrains Mono',monospace}
.file-btn{background:0;border:0;cursor:pointer;font-size:.7rem;padding:2px 5px;transition:color .12s}
.file-btn:hover{color:var(--bl)}
.file-att-badge{display:inline-flex;align-items:center;gap:3px;font-size:.58rem;color:var(--bl);cursor:pointer;font-family:'JetBrains Mono',monospace;font-weight:600}
.file-att-badge:hover{text-decoration:underline}
.cloud-status{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:.62rem;font-weight:700;font-family:'JetBrains Mono',monospace}
.cloud-status.connected{background:var(--gc);color:var(--g)}
.cloud-status.disconnected{background:var(--rdc);color:var(--rd)}
.user-pill{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;background:var(--s2);border:1px solid var(--b2);border-radius:16px;font-size:.58rem;font-weight:600}
.user-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.config-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.auth-card{background:linear-gradient(135deg,var(--s1),var(--s2));border:2px solid var(--bl);border-radius:var(--rl);padding:30px;text-align:center;max-width:440px;margin:40px auto}
.auth-avatar{width:64px;height:64px;border-radius:50%;background:var(--blc);border:2px solid var(--bl);margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;overflow:hidden}
.auth-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.auth-name{font-family:'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:700;margin-bottom:2px}
.auth-email{font-size:.66rem;color:var(--t3);font-family:'JetBrains Mono',monospace;margin-bottom:16px}
.google-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 24px;background:var(--s1);border:2px solid var(--b1);border-radius:var(--rl);font-size:.82rem;font-weight:700;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif}
.google-btn:hover{border-color:var(--bl);box-shadow:0 2px 12px rgba(0,0,0,.08)}
.google-btn svg{width:18px;height:18px}
.signout-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 20px;background:var(--s1);border:1px solid var(--rd);border-radius:var(--rl);font-size:.76rem;font-weight:600;color:var(--rd);cursor:pointer;transition:all .12s;font-family:'DM Sans',sans-serif}
.signout-btn:hover{background:var(--rdc)}
.desc-cell{max-width:180px;font-size:.62rem;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.history-timeline{border-left:3px solid var(--b2);margin-left:8px;padding-left:16px}
.history-item{position:relative;padding:10px 0;border-bottom:1px solid var(--b2)}
.history-item:last-child{border-bottom:0}
.history-item::before{content:'';position:absolute;left:-22px;top:14px;width:10px;height:10px;border-radius:50%;border:2px solid var(--b1);background:var(--s1)}
.history-item.hp::before{background:var(--rd);border-color:var(--rd)}
.history-item.hi::before{background:var(--g);border-color:var(--g)}
@media(max-width:900px){.app{padding:10px}.fund-avail-bar,.config-grid,.totals-bar{grid-template-columns:1fr}.cur-pair-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="mainApp">
  <div class="hdr">
    <div class="logo"><div class="logo-ic"></div><div class="logo-txt"><span class="logo-nm">Stellar Seeds</span><span class="logo-sb">Seed Tolling Plant</span></div></div>
    <div style="display:flex;align-items:center;gap:8px"><span id="cloudBadge"></span><span id="userBadge"></span><button class="btn bp bs" onclick="App.openExport()">Export</button></div>
  </div>
  <div class="nav" id="nbar"></div>
  <div class="app" id="app"></div>
</div>
<div class="modal" id="mdl"><div class="mbox"><div class="mhdr"><h3 id="mTi"></h3><button class="mx" onclick="App.cMod()">&times;</button></div><div class="mbd" id="mBd"></div><div class="mft" id="mFt"></div></div></div>
<div class="toast" id="tst"></div>

<script>
var App = (function() {
  "use strict";

  // ===== DATA =====
  var D = { pays: [], psSch: [], invSch: [], vf: {} };
  var tab = 'dash', DC = 'USD', pssTerm = 'monthly', pssFund = 'VN Fund';
  var summaryMonth = 'all', invShowFund = 'all', dashFund = 'all';
  var cfFund = 'all', cfLookback = 6, cfMonths = 12;
  var curConvAmt = 1000, curFrom = 'USD', curTo = 'EUR';
  var currencyMode = 'live', liveLastUpdated = null, liveFetching = false;
  var psF = { q: '', cat: 'all', fund: 'all', status: 'all' };
  var fileDB = null;
  var histF = { type: 'all', fund: 'all', q: '' };
  var cloudDb = null, cloudConnected = false, cloudRoom = 'default';
  var cloudUserId = '', cloudUserName = '', cloudUsers = {};
  var cloudLastSync = null, cloudAutoSync = true, cloudSilent = false;
  var firebaseAuth = null, currentUser = null;
  var selInstIdx = -1;

  // ===== CONSTANTS =====
  var FX = {
    USD:{r:1,n:'US Dollar'},EUR:{r:.92,n:'Euro'},VND:{r:26307,n:'Dong'},
    PHP:{r:61.26,n:'Peso'},THB:{r:34.5,n:'Baht'},SGD:{r:1.34,n:'S$'},
    CNY:{r:7.24,n:'Yuan'},JPY:{r:155.5,n:'Yen'},KRW:{r:1380,n:'Won'},
    GBP:{r:.79,n:'Pound'},AUD:{r:1.53,n:'A$'},MYR:{r:4.47,n:'Ringgit'},INR:{r:83.5,n:'Rupee'}
  };
  var SY = {USD:'$',EUR:'\u20ac',VND:'\u0110',PHP:'\u20b1',THB:'\u0e3f',SGD:'S$',CNY:'\u00a5',JPY:'\u00a5',KRW:'\u20a9',GBP:'\u00a3',AUD:'A$',MYR:'RM',INR:'\u20b9'};
  var CATS = ['Machines','Buildings','Land','Opex','Logistics','Tax','Others'];
  var CATC = {Machines:'#2874a6',Buildings:'#2d8a32',Land:'#b89630',Opex:'#9b59b6',Logistics:'#e67e22',Tax:'#c0392b',Others:'#999'};
  var FUNDS = ['VN Fund','PH Fund','Other'];
  var FC = {'VN Fund':'#2d8a32','PH Fund':'#2874a6','Other':'#b89630'};
  var UC = ['#2874a6','#2d8a32','#b89630','#9b59b6','#e67e22','#c0392b','#d4930d'];

  // ===== HELPERS =====
  function el(id) { return document.getElementById(id); }
  function esc(s) { var d = document.createElement('span'); d.textContent = String(s == null ? '' : s); return d.innerHTML; }
  function uid() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 5); }
  function today() { var d = new Date(); return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'); }
  function addDays(ds, n) { var d = new Date(ds); if (isNaN(d)) d = new Date(); d.setDate(d.getDate() + n); return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'); }
  function notify(m) { var t = el('tst'); t.textContent = m; t.classList.add('show'); setTimeout(function() { t.classList.remove('show'); }, 2200); }
  function openModal(title, body, foot) { el('mTi').textContent = title; el('mBd').innerHTML = body; el('mFt').innerHTML = foot || ''; el('mdl').classList.add('open'); }
  function cMod() { el('mdl').classList.remove('open'); }
  function convertCurrency(val, from, to) { if (from === to) return val; var ff = FX[from] ? FX[from].r : 1, ft = FX[to] ? FX[to].r : 1; return ff ? val / ff * ft : 0; }
  function fmtCur(v, c) { return (SY[c] || '$') + Number(v || 0).toLocaleString('en', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
  function fmtD(v) { return fmtCur(convertCurrency(v, 'USD', DC), DC); }
  function fmtK(v) { if (Math.abs(v) >= 1e6) return (v / 1e6).toFixed(1) + 'M'; if (Math.abs(v) >= 1e3) return (v / 1e3).toFixed(1) + 'K'; return Math.round(v).toString(); }
  function pct(a, b) { return b > 0 ? Math.round(a / b * 100) : 0; }
  function monthDiff(s, e) { if (!s || !e) return 0; var a = new Date(s), b = new Date(e); if (isNaN(a) || isNaN(b)) return 0; return Math.max(1, (b.getFullYear() - a.getFullYear()) * 12 + (b.getMonth() - a.getMonth()) + 1); }
  function fmtMonth(k) { var m = ['', 'Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'], p = k.split('-'); return m[parseInt(p[1])] + ' ' + p[0]; }
  function curOpts(sel) { var o = ''; for (var k in FX) o += '<option value="' + k + '"' + (k === sel ? ' selected' : '') + '>' + k + '</option>'; return o; }
  function catOpts(sel) { var o = ''; for (var i = 0; i < CATS.length; i++) o += '<option value="' + CATS[i] + '"' + (sel === CATS[i] ? ' selected' : '') + '>' + CATS[i] + '</option>'; return o; }
  function fundOpts(sel) { var o = ''; for (var i = 0; i < FUNDS.length; i++) o += '<option value="' + FUNDS[i] + '"' + (sel === FUNDS[i] ? ' selected' : '') + '>' + FUNDS[i] + '</option>'; return o; }
  function fundAll(sel) { return '<option value="all"' + (sel === 'all' ? ' selected' : '') + '>All Funds</option>' + fundOpts(sel); }
  function catBadge(c, s) { var cl = CATC[c] || '#999'; var l = c === 'Others' && s ? 'Others: ' + s : c; return '<span class="badge" style="background:' + cl + '22;color:' + cl + ';border:1px solid ' + cl + '44">' + esc(l) + '</span>'; }
  function fundBadge(f) { var c = FC[f] || '#999'; return '<span class="badge" style="background:' + c + '22;color:' + c + ';border:1px solid ' + c + '44">' + esc(f) + '</span>'; }
  function barHTML(p, cl) { return '<div style="display:flex;align-items:center;gap:5px"><div class="vd-pay-mini-bar" style="width:55px"><div class="vd-pay-mini-fill" style="width:' + p + '%;background:' + cl + '"></div></div><span style="font-family:JetBrains Mono;font-size:.6rem;font-weight:700;color:' + cl + '">' + p + '%</span></div>'; }
  function toggleOS(p) { var s = el(p + 'Cat'), w = el(p + 'OS'); if (s && w) w.style.display = s.value === 'Others' ? 'block' : 'none'; }
  function toggleVN(sel, id) { var i = el(id); if (i) i.style.display = sel.value === '__NEW__' ? 'block' : 'none'; }
  function getAllVendors() { var m = {}; for (var i = 0; i < D.psSch.length; i++) if (D.psSch[i].vendor) m[D.psSch[i].vendor.toUpperCase()] = 1; for (var i = 0; i < D.pays.length; i++) if (D.pays[i].vendor) m[D.pays[i].vendor.toUpperCase()] = 1; return Object.keys(m).sort(); }
  function vendorOpts(sv) { var v = getAllVendors(), u = sv ? sv.toUpperCase() : '', o = '<option value="">-- Select --</option>'; for (var i = 0; i < v.length; i++) o += '<option value="' + esc(v[i]) + '"' + (u === v[i] ? ' selected' : '') + '>' + esc(v[i]) + '</option>'; o += '<option value="__NEW__">+ Add New</option>'; return o; }
  function getVendor(selId, newId) { var v = el(selId).value; if (v === '__NEW__') { v = el(newId).value.trim(); if (!v) return ''; } return v.toUpperCase(); }
  function vfCount(v) { return (D.vf[v.toUpperCase()] || []).length; }
  function hashStr(s) { var h = 0; for (var i = 0; i < s.length; i++) { h = ((h << 5) - h) + s.charCodeAt(i); h |= 0; } return h; }
  function rateSnap() { var s = {}; for (var k in FX) s[k] = FX[k].r; return s; }
  function jsEsc(s) { return String(s || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'"); }

  // Donut chart
  function donut(data, sz) {
    var total = 0;
    for (var i = 0; i < data.length; i++) total += data[i].value;
    if (!total) return '<svg viewBox="0 0 100 100" style="width:' + sz + 'px;height:' + sz + 'px"><circle cx="50" cy="50" r="35" fill="none" stroke="#eeece7" stroke-width="16"/></svg>';
    var r = 35, c = 2 * Math.PI * r, off = 0;
    var svg = '<svg viewBox="0 0 100 100" style="width:' + sz + 'px;height:' + sz + 'px;transform:rotate(-90deg)"><circle cx="50" cy="50" r="' + r + '" fill="none" stroke="#eeece7" stroke-width="16"/>';
    for (var i = 0; i < data.length; i++) {
      var seg = (data[i].value / total) * c;
      if (seg < 0.3) continue;
      svg += '<circle cx="50" cy="50" r="' + r + '" fill="none" stroke="' + data[i].color + '" stroke-width="16" stroke-dasharray="' + seg.toFixed(2) + ' ' + (c - seg).toFixed(2) + '" stroke-dashoffset="' + (-off).toFixed(2) + '"/>';
      off += seg;
    }
    return svg + '</svg>';
  }

  // ===== INDEXEDDB FOR FILES =====
  function initFileDB() {
    return new Promise(function(res) {
      if (fileDB) { res(); return; }
      var r = indexedDB.open('SSFiles', 1);
      r.onupgradeneeded = function(e) {
        var d = e.target.result;
        if (!d.objectStoreNames.contains('files')) d.createObjectStore('files', { keyPath: 'id' });
      };
      r.onsuccess = function(e) { fileDB = e.target.result; res(); };
      r.onerror = function() { res(); };
    });
  }
  function dbSave(id, nm, tp, data) {
    if (!fileDB) return;
    try { fileDB.transaction('files', 'readwrite').objectStore('files').put({ id: id, name: nm, type: tp, data: data, date: today() }); } catch (e) {}
  }
  function dbGet(id) {
    return new Promise(function(res) {
      if (!fileDB) { res(null); return; }
      try {
        var r = fileDB.transaction('files', 'readonly').objectStore('files').get(id);
        r.onsuccess = function() { res(r.result); };
        r.onerror = function() { res(null); };
      } catch (e) { res(null); }
    });
  }
  function dbDel(id) {
    if (!fileDB) return;
    try { fileDB.transaction('files', 'readwrite').objectStore('files').delete(id); } catch (e) {}
  }

  // ===== STORAGE =====
  function save() {
    localStorage.setItem('ss_pays', JSON.stringify(D.pays));
    localStorage.setItem('ss_psSch', JSON.stringify(D.psSch));
    localStorage.setItem('ss_invSch', JSON.stringify(D.invSch));
    localStorage.setItem('ss_vf', JSON.stringify(D.vf));
    if (cloudConnected && cloudAutoSync && !cloudSilent) cloudPush();
  }
  function saveLocal() {
    localStorage.setItem('ss_pays', JSON.stringify(D.pays));
    localStorage.setItem('ss_psSch', JSON.stringify(D.psSch));
    localStorage.setItem('ss_invSch', JSON.stringify(D.invSch));
    localStorage.setItem('ss_vf', JSON.stringify(D.vf));
  }
  function load() {
    try { D.pays = JSON.parse(localStorage.getItem('ss_pays')) || []; } catch (e) { D.pays = []; }
    try { D.psSch = JSON.parse(localStorage.getItem('ss_psSch')) || []; } catch (e) { D.psSch = []; }
    try { D.invSch = JSON.parse(localStorage.getItem('ss_invSch')) || []; } catch (e) { D.invSch = []; }
    try { D.vf = JSON.parse(localStorage.getItem('ss_vf')) || {}; } catch (e) { D.vf = {}; }
    DC = localStorage.getItem('ss_DC') || 'USD';
    currencyMode = localStorage.getItem('ss_curMode') || 'live';
    var sr;
    try { sr = JSON.parse(localStorage.getItem('ss_curRates')); } catch (e) {}
    if (sr) for (var k in sr) if (FX[k]) FX[k].r = sr[k];
    liveLastUpdated = localStorage.getItem('ss_curLiveTS') || null;
    cloudRoom = localStorage.getItem('ss_cloudRoom') || 'default';
    cloudAutoSync = localStorage.getItem('ss_cloudAuto') !== 'false';
    for (var i = 0; i < D.psSch.length; i++) {
      if (!D.psSch[i].id) D.psSch[i].id = uid();
      if (!D.psSch[i].attachments) D.psSch[i].attachments = [];
    }
  }

  // ===== DATA HELPERS =====
  function findSch(id) {
    for (var i = 0; i < D.psSch.length; i++) {
      if (String(D.psSch[i].id) === String(id)) return { sch: D.psSch[i], idx: i };
    }
    return null;
  }
  function schPays(sid) {
    var l = [];
    for (var i = 0; i < D.pays.length; i++) {
      if (String(D.pays[i].psSchId) === String(sid)) l.push(D.pays[i]);
    }
    return l;
  }
  function schPaidUSD(sid) {
    var p = schPays(sid), t = 0;
    for (var i = 0; i < p.length; i++) t += convertCurrency(p[i].amt, p[i].cur, 'USD');
    return t;
  }
  function schTotalUSD(sid) {
    var f = findSch(sid);
    return f ? convertCurrency(f.sch.totalCost, f.sch.cur || 'USD', 'USD') : 0;
  }
  function schStatus(sid) {
    var total = schTotalUSD(sid), paid = schPaidUSD(sid);
    if (total <= 0) return { label: 'No Data', cls: 'bx2', pct: 0 };
    var p = paid / total * 100;
    if (p >= 99.5) return { label: 'Paid', cls: 'bg2', pct: 100 };
    if (p > 0) return { label: 'Partial ' + Math.round(p) + '%', cls: 'by2', pct: p };
    return { label: 'Pending', cls: 'bd2', pct: 0 };
  }
  function instPaidUSD(sid, idx) {
    var t = 0;
    for (var i = 0; i < D.pays.length; i++) {
      var p = D.pays[i];
      if (p.psSchId && String(p.psSchId) === String(sid) && p.instIdx === idx) t += convertCurrency(p.amt, p.cur, 'USD');
    }
    return t;
  }
  function getFundBalances() {
    var bal = {};
    for (var i = 0; i < FUNDS.length; i++) bal[FUNDS[i]] = { inflow: 0, outflow: 0, balance: 0 };
    for (var i = 0; i < D.invSch.length; i++) {
      var r = D.invSch[i], f = r.fund || 'Other';
      if (!bal[f]) bal[f] = { inflow: 0, outflow: 0, balance: 0 };
      if (r.status === 'Deposited' || r.status === 'Confirmed') bal[f].inflow += convertCurrency(r.amount, r.cur || 'USD', 'USD');
    }
    for (var i = 0; i < D.pays.length; i++) {
      var p = D.pays[i], f = p.fund || 'Other';
      if (!bal[f]) bal[f] = { inflow: 0, outflow: 0, balance: 0 };
      bal[f].outflow += convertCurrency(p.amt, p.cur, 'USD');
    }
    for (var k in bal) bal[k].balance = bal[k].inflow - bal[k].outflow;
    return bal;
  }

  // ===== BADGES =====
  function updateBadges() {
    var cb = el('cloudBadge');
    if (cb) cb.innerHTML = cloudConnected
      ? '<span class="cloud-status connected"><span class="user-dot" style="background:#2d8a32"></span>Cloud</span>'
      : '<span class="cloud-status disconnected"><span class="user-dot" style="background:#cc3333"></span>Local</span>';

    if (ub) {

          : '<span style="font-size:.6rem">' + nm.charAt(0).toUpperCase() + '</span>';
        ub.innerHTML = '<span class="user-pill" style="cursor:pointer" onclick="App.go(\'cloud\')"><span class="user-dot" style="background:var(--g)"></span>' + av + ' ' + esc(nm.split(' ')[0]) + '</span>';
      } else {
        ub.innerHTML = '';
      }
    }

  // ===== FIREBASE/CLOUD =====
  function firebaseInit() {
    if (typeof firebase === 'undefined') return false;
    var cfg;
    try { cfg = JSON.parse(localStorage.getItem('ss_cloudCfg')); } catch (e) {}
    if (!cfg || !cfg.apiKey) return false;
    try {
      if (!firebase.apps.length) firebase.initializeApp(cfg);
      firebaseAuth = firebase.auth();
      cloudDb = firebase.database();
      return true;
    } catch (e) { return false; }
  }
  function doSignIn() {
    if (!firebaseInit()) { notify('Configure Firebase first'); return; }
    firebaseAuth.signInWithPopup(new firebase.auth.GoogleAuthProvider())
      .then(function(r) {
        currentUser = r.user;
        notify('Signed in as ' + (currentUser.displayName || currentUser.email));
        updateBadges();
        autoConnectCloud();
        render();
      })
      .catch(function(e) {
        if (e.code === 'auth/popup-closed-by-user') return;
        notify('Sign-in: ' + e.message);
      });
  }
  function doSignOut() {
    if (cloudConnected) cloudDisconnect();
    if (firebaseAuth) {
      firebaseAuth.signOut().then(function() {
        currentUser = null; updateBadges(); notify('Signed out'); render();
      }).catch(function() {
        currentUser = null; updateBadges(); render();
      });
    } else {
      currentUser = null; updateBadges(); render();
    }
  }
  function autoConnectCloud() {
    if (currentUser && localStorage.getItem('ss_cloudCfg') && !cloudConnected) cloudConnect();
  }
  function cloudConnect() {
    if (!currentUser) { notify('Sign in first'); return; }
    if (!cloudDb && !firebaseInit()) { notify('Firebase not configured'); return; }
    cloudUserId = currentUser.uid;
    cloudUserName = currentUser.displayName || currentUser.email || 'User';
    cloudConnected = true;
    updateBadges();
    var roomRef = cloudDb.ref('ss/' + cloudRoom);
    var presRef = roomRef.child('users/' + cloudUserId);
    presRef.set({ name: cloudUserName, photoURL: currentUser.photoURL || '', lastSeen: firebase.database.ServerValue.TIMESTAMP, color: UC[Math.abs(hashStr(cloudUserId)) % UC.length] });
    presRef.onDisconnect().remove();
    roomRef.child('users').on('value', function(s) { cloudUsers = s.val() || {}; if (tab === 'cloud') render(); });
    roomRef.child('meta').on('value', function(s) { var m = s.val(); if (m && m.lastUpdatedBy !== cloudUserId) cloudPull(true); });
    roomRef.child('data').once('value').then(function(s) {
      var rem = s.val();
      if (rem && rem.pays && rem.pays.length > 0) {
        cloudSilent = true;
        D.pays = rem.pays || []; D.psSch = rem.psSch || []; D.invSch = rem.invSch || []; D.vf = rem.vf || {};
        for (var i = 0; i < D.psSch.length; i++) { if (!D.psSch[i].id) D.psSch[i].id = uid(); if (!D.psSch[i].attachments) D.psSch[i].attachments = []; }
        saveLocal();
        cloudSilent = false;
        cloudLastSync = new Date().toLocaleString();
        notify('Connected & synced');
      } else {
        cloudPush();
        notify('Connected & uploaded');
      }
      render();
    }).catch(function() { notify('Connected (sync check failed)'); render(); });
  }
  function cloudDisconnect() {
    try { if (cloudDb) cloudDb.ref('ss/' + cloudRoom + '/users/' + cloudUserId).remove(); } catch (e) {}
    cloudConnected = false; cloudUsers = {};
    updateBadges(); notify('Disconnected'); render();
  }
  function cloudPush() {
    if (!cloudConnected || !cloudDb || !currentUser) return;
    var rr = cloudDb.ref('ss/' + cloudRoom);
    rr.child('data').set({ pays: D.pays, psSch: D.psSch, invSch: D.invSch, vf: D.vf })
      .then(function() {
        rr.child('meta').set({ lastUpdatedBy: cloudUserId, lastUpdated: firebase.database.ServerValue.TIMESTAMP, userName: cloudUserName });
        cloudLastSync = new Date().toLocaleString();
        if (tab === 'cloud') render();
      })
      .catch(function() { notify('Push failed'); });
  }
  function cloudPull(silent) {
    if (!cloudConnected || !cloudDb) return;
    cloudDb.ref('ss/' + cloudRoom + '/data').once('value').then(function(s) {
      var data = s.val();
      if (!data) { if (!silent) notify('No cloud data'); return; }
      cloudSilent = true;
      D.pays = data.pays || []; D.psSch = data.psSch || []; D.invSch = data.invSch || []; D.vf = data.vf || {};
      for (var i = 0; i < D.psSch.length; i++) { if (!D.psSch[i].id) D.psSch[i].id = uid(); if (!D.psSch[i].attachments) D.psSch[i].attachments = []; }
      saveLocal();
      cloudSilent = false;
      cloudLastSync = new Date().toLocaleString();
      if (!silent) notify('Pulled');
      render();
    }).catch(function() { if (!silent) notify('Pull failed'); });
  }
  function cloudFullSync() {
    if (!cloudConnected || !cloudDb) return;
    cloudDb.ref('ss/' + cloudRoom + '/data').once('value').then(function(s) {
      var rem = s.val();
      if (!rem || !rem.pays || rem.pays.length === 0) { cloudPush(); return; }
      cloudSilent = true;
      D.pays = rem.pays || []; D.psSch = rem.psSch || []; D.invSch = rem.invSch || []; D.vf = rem.vf || {};
      for (var i = 0; i < D.psSch.length; i++) { if (!D.psSch[i].id) D.psSch[i].id = uid(); if (!D.psSch[i].attachments) D.psSch[i].attachments = []; }
      saveLocal(); cloudSilent = false; cloudPush(); notify('Synced'); render();
    }).catch(function() { notify('Sync failed'); });
  }

  // ===== FILE MANAGEMENT =====
  function uploadFiles(vendor, files) {
    var vu = vendor.toUpperCase();
    if (!D.vf[vu]) D.vf[vu] = [];
    for (var i = 0; i < files.length; i++) {
      var f = files[i];
      if (f.size > 10 * 1024 * 1024) continue;
      (function(file) {
        var reader = new FileReader();
        reader.onload = function(e) {
          var fid = uid();
          dbSave(fid, file.name, file.type, e.target.result);
          D.vf[vu].push({ id: fid, name: file.name, type: file.type, size: file.size, date: today() });
          save();
          openFilesModal(vendor);
        };
        reader.readAsDataURL(file);
      })(f);
    }
  }
  function downloadFile(fid) {
    dbGet(fid).then(function(f) {
      if (!f) return;
      var a = document.createElement('a');
      a.href = f.data; a.download = f.name;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
    });
  }
  function removeFile(vendor, idx) {
    var vu = vendor.toUpperCase();
    if (!D.vf[vu] || !confirm('Delete?')) return;
    var att = D.vf[vu][idx];
    if (att) dbDel(att.id);
    D.vf[vu].splice(idx, 1);
    save(); openFilesModal(vendor); notify('Deleted');
  }
  function openFilesModal(vendor) {
    var vu = vendor.toUpperCase(), files = D.vf[vu] || [];
    var h = '<div style="font-size:.62rem;color:var(--t2);margin-bottom:8px">' + files.length + ' file(s) for ' + esc(vendor) + '</div>';
    if (files.length) {
      for (var i = 0; i < files.length; i++) {
        var f = files[i];
        h += '<div class="file-item"><span>&#128196;</span><span class="file-name">' + esc(f.name) + '</span><span class="file-size">' + (f.size > 1048576 ? (f.size / 1048576).toFixed(1) + 'MB' : (f.size / 1024).toFixed(0) + 'KB') + '</span><button class="file-btn" onclick="App.downloadFile(\'' + f.id + '\')">&#8681;</button><button class="file-btn" style="color:var(--rd)" onclick="App.removeFile(\'' + jsEsc(vendor) + '\',' + i + ')">&times;</button></div>';
      }
    } else {
      h += '<div style="text-align:center;padding:12px;color:var(--t3)">No files.</div>';
    }
    h += '<div class="file-drop-zone" id="vfDZ"><div style="font-size:.66rem">Drop or <label style="color:var(--bl);cursor:pointer;text-decoration:underline">browse<input type="file" multiple style="display:none" onchange="App.uploadFiles(\'' + jsEsc(vendor) + '\',this.files)"></label></div></div>';
    openModal('Files: ' + vendor, h, '<button class="btn" onclick="App.cMod()">Close</button>');
    var dz = el('vfDZ');
    if (dz) {
      dz.addEventListener('dragover', function(e) { e.preventDefault(); this.style.borderColor = 'var(--g)'; });
      dz.addEventListener('dragleave', function() { this.style.borderColor = 'var(--b1)'; });
      dz.addEventListener('drop', function(e) { e.preventDefault(); this.style.borderColor = 'var(--b1)'; uploadFiles(vendor, e.dataTransfer.files); });
    }
  }

  // ===== NAV & RENDER =====
  var tabs = [
    { id: 'dash', l: 'Dashboard' }, { id: 'cf', l: 'Cash Flow' },
    { id: 'pays', l: 'Payments' }, { id: 'paySch', l: 'Schedule' },
    { id: 'invSch', l: 'Investment' }, { id: 'vendors', l: 'Vendors' },
    { id: 'history', l: 'History' }, { id: 'cur', l: 'Currency' }, { id: 'cloud', l: 'Cloud' }
  ];
  function nav() {
    var h = '';
    for (var i = 0; i < tabs.length; i++) h += '<button class="' + (tab === tabs[i].id ? 'act' : '') + '" onclick="App.go(\'' + tabs[i].id + '\')">' + tabs[i].l + '</button>';
    el('nbar').innerHTML = h;
  }

  function render() {

  // ===== SETTERS =====
  function setDC(v) { DC = v; localStorage.setItem('ss_DC', v); }

  // ===== CASH FLOW PROJECTION =====
  function cfProject(pastN, futureN) {
    var now = new Date(), sy = now.getFullYear(), sm = now.getMonth();
    var data = [], fb0 = getFundBalances();
    for (var m = -pastN; m <= futureN; m++) {
      var tm = sm + m, ty = sy + Math.floor(tm / 12), tmm = ((tm % 12) + 12) % 12;
      var isP = m < 0, isC = m === 0, isF = m > 0;
      var inf = {}, outf = {};
      for (var fi = 0; fi < FUNDS.length; fi++) { inf[FUNDS[fi]] = 0; outf[FUNDS[fi]] = 0; }
      // Actual inflows
      for (var i = 0; i < D.invSch.length; i++) {
        var r = D.invSch[i];
        if (r.date && (r.status === 'Deposited' || r.status === 'Confirmed')) {
          var rd = new Date(r.date);
          if (!isNaN(rd) && rd.getFullYear() === ty && rd.getMonth() === tmm) inf[r.fund || 'Other'] += convertCurrency(r.amount, r.cur || 'USD', 'USD');
        }
      }
      // Actual outflows
      if (isP || isC) {
        for (var i = 0; i < D.pays.length; i++) {
          var p = D.pays[i];
          if (p.date) {
            var pd = new Date(p.date);
            if (!isNaN(pd) && pd.getFullYear() === ty && pd.getMonth() === tmm) outf[p.fund || 'Other'] += convertCurrency(p.amt, p.cur, 'USD');
          }
        }
      }
      // Projected
      if (isF) {
        for (var i = 0; i < D.invSch.length; i++) {
          var r = D.invSch[i];
          if (r.status === 'Pending' && r.date) {
            var rd = new Date(r.date);
            if (!isNaN(rd) && rd.getFullYear() === ty && rd.getMonth() === tmm) inf[r.fund || 'Other'] += convertCurrency(r.amount, r.cur || 'USD', 'USD');
          }
        }
        for (var i = 0; i < D.psSch.length; i++) {
          var r = D.psSch[i], aUSD = convertCurrency(r.totalCost, r.cur || 'USD', 'USD');
          if (r.terms === 'monthly' && r.startDate && r.endDate) {
            var sd = new Date(r.startDate), ed = new Date(r.endDate);
            if (!isNaN(sd) && !isNaN(ed) && (new Date(ty, tmm, 1) <= ed && new Date(ty, tmm + 1, 0) >= sd)) {
              var cnt = monthDiff(r.startDate, r.endDate);
              outf[r.fund || 'VN Fund'] += (cnt > 0 ? aUSD / cnt : 0);
            }
          } else if (r.terms === 'installment') {
            for (var j = 0; j < (r.installments || []).length; j++) {
              var inst = r.installments[j];
              if (inst.date) {
                var id2 = new Date(inst.date);
                if (!isNaN(id2) && id2.getFullYear() === ty && id2.getMonth() === tmm) outf[inst.fund || r.fund || 'VN Fund'] += aUSD * inst.pct / 100;
              }
            }
          }
        }
      }
      var tI = 0, tO = 0;
      for (var fi = 0; fi < FUNDS.length; fi++) { tI += inf[FUNDS[fi]]; tO += outf[FUNDS[fi]]; }
      var monthNames = ['', 'Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
      data.push({
        label: monthNames[tmm + 1] + ' ' + String(ty).slice(2),
        key: ty + '-' + String(tmm + 1).padStart(2, '0'),
        inflows: inf, outfows: outf,
        totalIn: tI, totalOut: tO, net: tI - tO,
        isPast: isP, isCurrent: isC, isFuture: isF, fundBal: {}
      });
    }
    // Running balances per fund
    for (var fi = 0; fi < FUNDS.length; fi++) {
      var fund = FUNDS[fi], cb = (fb0[fund] || { balance: 0 }).balance, pn = 0;
      for (var i = 0; i <= pastN; i++) pn += ((data[i].inflows[fund] || 0) - (data[i].outfows[fund] || 0));
      var rb = cb - pn;
      for (var i = 0; i < data.length; i++) {
        rb += ((data[i].inflows[fund] || 0) - (data[i].outfows[fund] || 0));
        data[i].fundBal[fund] = rb;
      }
    }
    // Total running balance
    var cT = 0;
    for (var k in fb0) cT += fb0[k].balance;
    var tPn = 0;
    for (var i = 0; i <= pastN; i++) tPn += data[i].net;
    var tR = cT - tPn;
    for (var i = 0; i < data.length; i++) { tR += data[i].net; data[i].totalBal = tR; }
    return data;
  }

    if (iM.length) {

      h += '<table style="font-size:.66rem"><thead><tr><th>Date</th><th>Fund</th><th>Status</th><th>Remarks</th><th style="text-align:right">Amount</th></tr></thead><tbody>';

        h += '<tr><td style="font-family:JetBrains Mono;color:var(--t3)">' + r.date + '</td><td>' + fundBadge(r.fund) + '</td><td><span class="badge ' + sb + '">' + r.status + '</span></td><td class="desc-cell">' + esc(r.remarks || '-') + '</td><td style="text-align:right;font-family:JetBrains Mono;font-weight:700;color:#2d8a32">+' + fmtD(convertCurrency(r.amount, r.cur || 'USD', 'USD')) + '</td></tr>';
      }
      h += '</tbody></table>';
    }
    if (!pM.length && !iM.length) h += '<div style="text-align:center;padding:20px;color:var(--t3)">No transactions in ' + label + '</div>';

      var yP = (g / 4) * 100;
      h += '<div style="position:absolute;left:0;right:0;top:' + yP + '%;border-top:' + (g === 4 ? '1px solid var(--b1)' : '1px dashed var(--b2)') + '"></div>';
      h += '<div style="position:absolute;left:-48px;top:calc(' + yP + '% - 6px);width:44px;text-align:right;font-size:.42rem;font-family:JetBrains Mono;color:var(--t3)">' + fmtK(mxV * (1 - g / 4)) + '</div>';
    }
    h += '<div style="position:absolute;left:0;right:0;bottom:0;top:0;display:flex;gap:2px;padding:0 1px">';
    for (var i = 0; i < n; i++) {
      var iv2 = cfFund === 'all' ? proj[i].totalIn : (proj[i].inflows[cfFund] || 0);
      var ov2 = cfFund === 'all' ? proj[i].totalOut : (proj[i].outfows[cfFund] || 0);
      var op = proj[i].isCurrent ? '1' : proj[i].isPast ? '.85' : '.45';
      h += '<div style="flex:1;display:flex;gap:1px;align-items:flex-end;height:160px;opacity:' + op + '">';
      h += '<div style="flex:1;background:var(--g);border-radius:1px 1px 0 0;height:' + Math.max(iv2 > 0 ? 2 : 0, (iv2 / mxV) * 160) + 'px"></div>';
      h += '<div style="flex:1;background:var(--rd);border-radius:1px 1px 0 0;height:' + Math.max(ov2 > 0 ? 2 : 0, (ov2 / mxV) * 160) + 'px"></div></div>';
    }
    h += '</div></div><div style="display:flex;gap:2px;padding:0 1px;margin-left:50px;margin-top:3px">';
    for (var i = 0; i < n; i++) h += '<div style="flex:1;text-align:center;font-size:.34rem;color:' + (proj[i].isCurrent ? 'var(--g)' : 'var(--t3)') + ';font-family:JetBrains Mono;font-weight:' + (proj[i].isCurrent ? '700' : '400') + '">' + proj[i].label + '</div>';
    h += '</div></div>';

    // Month-by-month table
    h += '<div class="card"><div class="ch"><span class="ct">Month-by-Month</span><span style="font-size:.54rem;color:var(--t3);font-family:JetBrains Mono">Click a month for details</span></div>';
    h += '<div class="tw"><table><thead><tr><th>Month</th><th></th><th style="text-align:right">In</th><th style="text-align:right">Out</th><th style="text-align:right">Net</th><th style="text-align:right">Balance</th></tr></thead><tbody>';
    for (var i = 0; i < n; i++) {
      var p = proj[i], iv3, ov3, bal;
      if (cfFund === 'all') { iv3 = p.totalIn; ov3 = p.totalOut; bal = p.totalBal; }
      else { iv3 = p.inflows[cfFund] || 0; ov3 = p.outfows[cfFund] || 0; bal = (p.fundBal && p.fundBal[cfFund]) || 0; }
      var net = iv3 - ov3;
      h += '<tr class="clickable-row" onclick="App.showMonthDetail(\'' + p.key + '\')" style="' + (p.isCurrent ? 'background:var(--gc)' : '') + '">';
      h += '<td style="font-family:JetBrains Mono;font-weight:' + (p.isCurrent ? '700' : '400') + '">' + p.label + '</td>';
      h += '<td>' + (p.isPast ? '<span class="badge" style="background:rgba(100,100,100,.08);color:var(--t3)">Actual</span>' : p.isCurrent ? '<span class="badge bg2">Now</span>' : '<span class="badge by2">Projected</span>') + '</td>';
      h += '<td style="text-align:right;font-family:JetBrains Mono;color:var(--g)">' + (iv3 > 0 ? fmtD(iv3) : '-') + '</td>';
      h += '<td style="text-align:right;font-family:JetBrains Mono;color:var(--rd)">' + (ov3 > 0 ? fmtD(ov3) : '-') + '</td>';
      h += '<td style="text-align:right;font-family:JetBrains Mono;font-weight:700;color:' + (net >= 0 ? 'var(--g)' : 'var(--rd)') + '">' + (net >= 0 ? '+' : '') + fmtD(Math.abs(net)) + '</td>';
      h += '<td style="text-align:right;font-family:JetBrains Mono;font-weight:700;color:' + (bal >= 0 ? 'var(--g)' : 'var(--rd)') + '">' + fmtD(bal) + '</td></tr>';
    }
    h += '</tbody></table></div></div>';
    el('app').innerHTML = h;
  }

  // ===== PAYMENTS =====
  function showPays() {
    var h = '<div class="fbar"><label>Display:</label><select onchange="App.setDC(this.value);App.render()">' + curOpts(DC) + '</select>';
    h += '<label>Search:</label><input type="text" value="' + esc(psF.q) + '" onkeyup="App.setPF2(\'q\',this.value);App.render()" placeholder="Vendor...">';
    h += '<label>Cat:</label><select onchange="App.setPF2(\'cat\',this.value);App.render()"><option value="all">All</option>' + catOpts('') + '</select>';
    h += '<label>Fund:</label><select onchange="App.setPF2(\'fund\',this.value);App.render()">' + fundAll(psF.fund) + '</select>';
    h += '<label>Status:</label><select onchange="App.setPF2(\'status\',this.value);App.render()"><option value="all">All</option><option value="paid">Paid</option><option value="partial">Partial</option><option value="pending">Pending</option></select>';
    h += '<button class="btn bs" onclick="App.resetPF();App.render()">Reset</button></div>';

    var rows = [];
    for (var i = 0; i < D.psSch.length; i++) {
      var s = D.psSch[i], sid = s.id;
      var tUSD = convertCurrency(s.totalCost, s.cur || 'USD', 'USD');
      var pUSD = schPaidUSD(sid), pp = pct(pUSD, tUSD), st = schStatus(sid);
      rows.push({ idx: i, vendor: s.vendor, desc: s.description || '', cat: s.category || 'Others', catSpec: s.catSpec || '', fund: s.fund || 'VN Fund', terms: s.terms, total: tUSD, paid: pUSD, remaining: Math.max(0, tUSD - pUSD), pct: pp, stLbl: st.label, stCls: st.cls });
    }
    rows = rows.filter(function(r) {
      if (psF.q && r.vendor.toLowerCase().indexOf(psF.q.toLowerCase()) < 0 && r.desc.toLowerCase().indexOf(psF.q.toLowerCase()) < 0) return false;
      if (psF.cat !== 'all' && r.cat !== psF.cat) return false;
      if (psF.fund !== 'all' && r.fund !== psF.fund) return false;
      if (psF.status === 'paid' && r.pct < 99) return false;
      if (psF.status === 'pending' && r.pct > 0) return false;
      if (psF.status === 'partial' && (r.pct <= 0 || r.pct >= 99)) return false;
      return true;
    });

    var tS = 0, tP = 0, tR = 0;
    for (var i = 0; i < rows.length; i++) { tS += rows[i].total; tP += rows[i].paid; tR += rows[i].remaining; }
    h += '<div style="display:flex;gap:16px;padding:8px 12px;background:var(--s2);border:1px solid var(--b2);border-radius:var(--r);margin-bottom:10px;flex-wrap:wrap">';
    h += '<span style="font-family:JetBrains Mono;font-size:.62rem"><span style="color:var(--t3)">SCHED:</span> <strong style="color:#2874a6">' + fmtD(tS) + '</strong></span>';
    h += '<span style="font-family:JetBrains Mono;font-size:.62rem"><span style="color:var(--t3)">PAID:</span> <strong style="color:#2d8a32">' + fmtD(tP) + '</strong></span>';
    h += '<span style="font-family:JetBrains Mono;font-size:.62rem"><span style="color:var(--t3)">REM:</span> <strong style="color:#d4930d">' + fmtD(tR) + '</strong></span></div>';

    if (!rows.length) {
      h += '<div class="card" style="text-align:center;padding:30px;color:var(--t3)">No schedules match.</div>';
    } else {
      h += '<div class="card" style="padding:0;overflow:hidden"><div class="tw"><table><thead><tr><th>#</th><th>Vendor</th><th>Description</th><th>Category</th><th>Fund</th><th>Terms</th><th style="text-align:right">Total</th><th style="text-align:right">Paid</th><th style="text-align:right">Remaining</th><th>Progress</th><th>Status</th><th>Action</th></tr></thead><tbody>';
      for (var i = 0; i < rows.length; i++) {
        var r = rows[i], pc = r.pct >= 99 ? '#2d8a32' : r.pct > 0 ? '#d4930d' : '#2874a6';
        h += '<tr><td style="font-family:JetBrains Mono;font-size:.6rem;color:var(--t3)">' + (i + 1) + '</td>';
        h += '<td style="font-weight:700">' + esc(r.vendor) + '</td>';
        h += '<td class="desc-cell" title="' + esc(r.desc) + '">' + esc(r.desc || '-') + '</td>';
        h += '<td>' + catBadge(r.cat, r.catSpec) + '</td>';
        h += '<td>' + fundBadge(r.fund) + '</td>';
        h += '<td><span class="badge ' + (r.terms === 'monthly' ? 'bb2' : 'by2') + '">' + r.terms + '</span></td>';
        h += '<td style="text-align:right;font-family:JetBrains Mono;font-weight:700">' + fmtD(r.total) + '</td>';
        h += '<td style="text-align:right;font-family:JetBrains Mono;font-weight:700;color:#2d8a32">' + fmtD(r.paid) + '</td>';
        h += '<td style="text-align:right;font-family:JetBrains Mono;font-weight:700;color:#d4930d">' + fmtD(r.remaining) + '</td>';
        h += '<td style="text-align:center">' + barHTML(r.pct, pc) + '</td>';
        h += '<td><span class="badge ' + r.stCls + '">' + r.stLbl + '</span></td>';
        h += '<td><button class="btn bs bp" onclick="App.doPay(' + r.idx + ')">Pay</button> <button class="btn bs" onclick="App.editSch(' + r.idx + ')">&#9998;</button></td></tr>';
      }
      h += '</tbody></table></div></div>';
    }

    // Record payment form
    h += '<div class="card" style="border-left:4px solid #2874a6"><div class="ch"><span class="ct">Record Payment</span></div>';
    h += '<div style="display:grid;grid-template-columns:2fr 1fr;gap:8px"><div class="fg"><label class="fl">Vendor</label><div class="vendor-dd"><select id="mpV" onchange="App.toggleVN(this,\'mpVN\')">' + vendorOpts('') + '</select><input type="text" id="mpVN" style="display:none" placeholder="New vendor"></div></div>';
    h += '<div class="fg"><label class="fl">Category</label><select id="mpCat" onchange="App.toggleOS(\'mp\')">' + catOpts('Others') + '</select></div></div>';
    h += '<div class="fg cat-spec-box" id="mpOS" style="display:none"><label class="fl">Specify</label><input type="text" id="mpCatSpec" placeholder="e.g."></div>';
    h += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px"><div class="fg"><label class="fl">Date</label><input type="date" id="mpD" value="' + today() + '"></div><div class="fg"><label class="fl">Fund</label><select id="mpF">' + fundOpts('VN Fund') + '</select></div><div class="fg"><label class="fl">Currency</label><select id="mpC">' + curOpts('USD') + '</select></div></div>';
    h += '<div class="fg"><label class="fl">Amount</label><input type="number" id="mpA" step="any"></div>';
    h += '<div class="fg"><label class="fl">Description / Remarks</label><input type="text" id="mpR" placeholder="What is this payment for?"></div>';
    h += '<div style="display:flex;justify-content:flex-end"><button class="btn bp" onclick="App.mpSub()">Record</button></div></div>';
    el('app').innerHTML = h;
  }

  function mpSub() {
    var v = getVendor('mpV', 'mpVN'), a = parseFloat(el('mpA').value), d = el('mpD').value;
    if (!v || !a || !d) { alert('Required'); return; }
    var cat = el('mpCat').value, cs = cat === 'Others' ? el('mpCatSpec').value.trim() : '';
    if (cat === 'Others' && !cs) { alert('Specify'); return; }
    D.pays.push({ id: uid(), date: d, vendor: v, amt: a, cur: el('mpC').value, fund: el('mpF').value, category: cat, catSpec: cs, rem: el('mpR').value.trim(), psSchId: '' });
    save(); notify('Recorded'); render();
  }

  function doPay(idx) {
    selInstIdx = -1;
    var s = D.psSch[idx];
    if (!s) return;
    var cur = s.cur || 'USD', sid = s.id;
    var tUSD = convertCurrency(s.totalCost, cur, 'USD');
    var pUSD = schPaidUSD(sid), rem = Math.max(0, tUSD - pUSD);
    var h = '<div style="background:var(--blc);border-radius:var(--r);padding:12px;margin-bottom:12px">';
    h += '<div style="font-family:Space Grotesk;font-weight:700;font-size:1rem">' + esc(s.vendor) + '</div>';
    if (s.description) h += '<div class="sch-desc" style="white-space:normal">' + esc(s.description) + '</div>';
    h += '<div style="margin-top:6px;font-family:JetBrains Mono;font-size:.62rem;color:var(--t3)">Paid: ' + fmtD(pUSD) + ' / ' + fmtD(tUSD) + ' | Rem: ' + fmtD(rem) + '</div></div>';

    if (s.terms === 'installment' && s.installments) {
      h += '<div style="font-weight:700;font-size:.72rem;margin-bottom:8px">SELECT INSTALLMENT</div>';
      for (var i = 0; i < s.installments.length; i++) {
        var inst = s.installments[i], iAUSD = convertCurrency(s.totalCost * inst.pct / 100, cur, 'USD');
        var iPd = instPaidUSD(sid, i), iP = iAUSD > 0 ? Math.min(100, iPd / iAUSD * 100) : 0, done = iP >= 99.5;
        h += '<div class="inst-pick' + (done ? ' ip-done' : '') + '" id="ip' + i + '"' + (done ? '' : ' onclick="App.pickInst(' + idx + ',' + i + ')"') + '>';
        h += '<div class="inst-pick-head"><div><span class="inst-pick-tranche">T' + (i + 1) + '</span> <span class="badge bb2">' + inst.pct + '%</span></div><div class="inst-pick-amt">' + fmtCur(iAUSD, cur) + '</div></div>';
        h += '<div style="margin-top:4px"><div class="ps-prog-bar" style="height:6px"><div class="ps-prog-fill" style="width:' + iP + '%;background:' + (done ? '#2d8a32' : '#2874a6') + '"></div></div></div>';
        if (done) h += '<div style="text-align:center;margin-top:4px"><span class="badge bg2">COMPLETE</span></div>';
        h += '</div>';
      }
      h += '<div id="ipfW" style="display:none"></div>';
    } else {
      var mc = monthDiff(s.startDate, s.endDate), ma = mc > 0 ? s.totalCost / mc : s.totalCost;
      h += '<div style="border:2px solid var(--b1);border-radius:var(--rl);padding:12px"><div style="text-align:right"><div style="font-family:JetBrains Mono;font-weight:700;font-size:1rem;color:#2874a6">' + fmtCur(ma, cur) + '</div><div style="font-size:.48rem;color:var(--t3)">per month' + (mc ? ' (' + mc + ' mo)' : '') + '</div></div></div>';
      h += '<div id="ipfW"><div style="margin-top:12px;padding-top:12px;border-top:2px solid #2d8a32"><div style="font-weight:700;margin-bottom:8px;color:#2d8a32">Record Payment</div>';
      h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div class="fg"><label class="fl">Amount (' + cur + ')</label><input type="number" id="pfA" step="any" value="' + (ma ? ma.toFixed(2) : '') + '"></div><div class="fg"><label class="fl">Date</label><input type="date" id="pfD" value="' + today() + '"></div></div>';
      h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div class="fg"><label class="fl">Fund</label><select id="pfF">' + fundOpts(s.fund || 'VN Fund') + '</select></div><div class="fg"><label class="fl">Remarks</label><input type="text" id="pfR"></div></div></div></div>';
    }
    openModal('Pay: ' + s.vendor, h, '<button class="btn" onclick="App.cMod()">Cancel</button><button class="btn bp" onclick="App.submitPay(' + idx + ')">Record</button>');
  }

  function pickInst(idx, ii) {
    selInstIdx = ii;
    var s = D.psSch[idx];
    if (!s) return;
    var cur = s.cur || 'USD', inst = s.installments[ii];
    var iAUSD = convertCurrency(s.totalCost * inst.pct / 100, cur, 'USD');
    var iPd = instPaidUSD(s.id, ii);
    var remC = convertCurrency(Math.max(0, iAUSD - iPd), 'USD', cur);
    for (var i = 0; i < s.installments.length; i++) { var e = el('ip' + i); if (e) e.className = 'inst-pick' + (i === ii ? ' ip-sel' : ''); }
    var w = el('ipfW');
    if (w) {
      w.style.display = 'block';
      w.innerHTML = '<div style="margin-top:12px;padding-top:12px;border-top:2px solid #2d8a32"><div style="font-weight:700;margin-bottom:8px;color:#2d8a32">Pay T' + (ii + 1) + ' (' + inst.pct + '%)</div>';
      w.innerHTML += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div class="fg"><label class="fl">Amount (' + cur + ')</label><input type="number" id="pfA" step="any" value="' + remC.toFixed(2) + '"></div><div class="fg"><label class="fl">Date</label><input type="date" id="pfD" value="' + today() + '"></div></div>';
      w.innerHTML += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div class="fg"><label class="fl">Fund</label><select id="pfF">' + fundOpts(inst.fund || s.fund || 'VN Fund') + '</select></div><div class="fg"><label class="fl">Remarks</label><input type="text" id="pfR"></div></div></div>';
    }
  }

  function submitPay(idx) {
    var s = D.psSch[idx];
    if (!s) return;
    var cur = s.cur || 'USD', amt = parseFloat(el('pfA').value) || 0, date = el('pfD').value;
    if (!amt || !date) { alert('Required'); return; }
    D.pays.push({ id: uid(), date: date, vendor: s.vendor.toUpperCase(), amt: amt, cur: cur, fund: el('pfF').value, category: s.category || 'Others', catSpec: s.catSpec || '', rem: el('pfR').value.trim(), psSchId: String(s.id), instIdx: selInstIdx });
    save(); cMod(); notify('Paid: ' + s.vendor); render();
  }

  function delPay(pid) {
    if (!confirm('Delete?')) return;
    for (var i = 0; i < D.pays.length; i++) if (D.pays[i].id === pid) { D.pays.splice(i, 1); break; }
    save(); notify('Deleted'); render();
  }

  // ===== SCHEDULE =====
  function schCardHTML(s, idx) {
    var sid = s.id, st = schStatus(sid), cur = s.cur || 'USD';
    var tUSD = convertCurrency(s.totalCost, cur, 'USD'), pUSD = schPaidUSD(sid);
    var pp = pct(pUSD, tUSD), bc = pp >= 100 ? '#2d8a32' : pp > 0 ? '#d4930d' : '#2874a6', fc = vfCount(s.vendor);
    var h = '<div class="ps-card" style="border-left-color:' + bc + '"><div class="ps-card-head"><div>';
    h += '<div class="ps-card-vendor">' + esc(s.vendor) + '</div>';
    if (s.description) h += '<div class="sch-desc">' + esc(s.description) + '</div>';
    h += '<div style="display:flex;gap:4px;margin-top:3px;flex-wrap:wrap"><span class="badge ' + st.cls + '">' + st.label + '</span><span class="badge ' + (s.terms === 'monthly' ? 'bb2' : 'by2') + '">' + s.terms + '</span>' + catBadge(s.category || 'Others', s.catSpec) + fundBadge(s.fund || 'VN Fund') + '</div></div>';
    h += '<div style="text-align:right"><div style="font-size:.54rem;color:var(--t3);font-family:JetBrains Mono">TOTAL</div><div class="ps-card-total">' + fmtD(tUSD) + '</div></div></div>';
    h += '<div class="ps-prog-bar"><div class="ps-prog-fill" style="width:' + pp + '%;background:' + bc + '"></div></div>';
    h += '<div class="ps-prog-info"><span>Paid: ' + fmtD(pUSD) + '</span><span>' + pp + '%</span><span>Rem: ' + fmtD(Math.max(0, tUSD - pUSD)) + '</span></div>';
    if (fc > 0) h += '<div style="margin-top:6px"><span class="file-att-badge" onclick="App.openVFMI(' + idx + ')">&#128206; ' + fc + ' file' + (fc > 1 ? 's' : '') + '</span></div>';
    var pays = schPays(sid);
    if (pays.length) {
      h += '<div class="ps-pay-list">';
      for (var j = 0; j < pays.length; j++) {
        var py = pays[j];
        h += '<div class="ps-pay-item"><span class="ps-pay-date">' + py.date + '</span><span style="font-size:.58rem;color:var(--t3)">' + (py.instIdx >= 0 ? 'T' + (py.instIdx + 1) + ' ' : '') + esc(py.rem || '') + '</span><span><span class="ps-pay-amt" style="color:#cc3333">-' + fmtD(convertCurrency(py.amt, py.cur, 'USD')) + '</span> <button class="ps-pay-btn del" onclick="App.delPay(\'' + py.id + '\')">&times;</button></span></div>';
      }
      h += '</div>';
    }
    h += '<div style="display:flex;gap:4px;margin-top:8px;justify-content:flex-end">';
    h += '<button class="btn bs" onclick="App.openVFMI(' + idx + ')">&#128206; Files</button>';
    h += '<button class="btn bs bp" onclick="App.doPay(' + idx + ')">+ Pay</button>';
    h += '<button class="btn bs" onclick="App.editSch(' + idx + ')">Edit</button>';
    h += '<button class="btn bs bd" onclick="App.delSch(' + idx + ')">&times;</button></div></div>';
    return h;
  }

  function openVFMI(idx) { var s = D.psSch[idx]; if (s) openFilesModal(s.vendor); }

  function showPaySch() {
    var h = '<div class="fbar"><label>Display:</label><select onchange="App.setDC(this.value);App.render()">' + curOpts(DC) + '</select></div>';
    var fb = getFundBalances();
    h += '<div class="card" style="margin-bottom:12px"><div class="ch"><span class="ct">Fund</span></div><div class="fund-avail-bar">';
    for (var fi = 0; fi < FUNDS.length; fi++) {
      var fn = FUNDS[fi], f = fb[fn] || { inflow: 0, outflow: 0, balance: 0 };
      h += '<div class="fund-avail-item' + (pssFund === fn ? ' sel' : '') + '" onclick="App.setPF(\'' + fn + '\');App.render()">';
      h += '<div class="fund-avail-name" style="color:' + FC[fn] + '">' + fn + '</div>';
      h += '<div class="fund-avail-bal" style="color:' + (f.balance >= 0 ? '#2d8a32' : '#cc3333') + '">' + fmtD(f.balance) + '</div>';
      h += '<div class="fund-avail-sub">of ' + fmtD(f.inflow) + ' deposited</div></div>';
    }
    h += '</div></div>';

    // Enroll form
    h += '<div class="card" style="border-left:4px solid #2d8a32"><div class="ch"><span class="ct">Enroll Schedule</span></div>';
    h += '<div class="term-cards"><div class="term-card' + (pssTerm === 'monthly' ? ' sel' : '') + '" onclick="App.setPT(\'monthly\');App.render()"><div class="tc-icon">&#128197;</div><div class="tc-title">Monthly</div></div>';
    h += '<div class="term-card' + (pssTerm === 'installment' ? ' sel' : '') + '" onclick="App.setPT(\'installment\');App.render()"><div class="tc-icon">&#128203;</div><div class="tc-title">Installment</div></div></div>';
    h += '<div style="display:grid;grid-template-columns:2fr 1fr;gap:8px"><div class="fg"><label class="fl">Vendor</label><select id="pssV" onchange="App.toggleVN(this,\'pssVN\')">' + vendorOpts('') + '</select><input type="text" id="pssVN" style="display:none;margin-top:4px" placeholder="New vendor"></div>';
    h += '<div class="fg"><label class="fl">Category</label><select id="pssCat" onchange="App.toggleOS(\'pss\')">' + catOpts('Others') + '</select></div></div>';
    h += '<div class="fg cat-spec-box" id="pssOS" style="display:none"><label class="fl">Specify</label><input type="text" id="pssCatSpec" placeholder="e.g."></div>';

  function addIR() {

  function pssChk() {
    var els = el('instRows').querySelectorAll('input.inst-pct'), t = 0;
    els.forEach(function(r) { t += (parseFloat(r.value) || 0); });
    var pw = el('pssPW');
    if (!pw) return;
    pw.textContent = Math.abs(t - 100) > 0.01 ? 'Total: ' + t + '%' : '100% OK';
    pw.style.color = Math.abs(t - 100) > 0.01 ? '#cc3333' : '#2d8a32';

  function pssSave() {
    var v = getVendor('pssV', 'pssVN'), c = parseFloat(el('pssCost').value) || 0;
    if (!v || !c) { alert('Required'); return; }
    var cat = el('pssCat').value, cs = cat === 'Others' ? el('pssCatSpec').value.trim() : '';
    if (cat === 'Others' && !cs) { alert('Specify'); return; }
    var e = { id: uid(), vendor: v, description: el('pssDesc').value.trim(), totalCost: c, cur: el('pssCur').value, category: cat, catSpec: cs, fund: pssFund, terms: pssTerm, startDate: '', endDate: '', installments: [], attachments: [], remarks: el('pssRem').value.trim() };
    if (pssTerm === 'monthly') {
      e.startDate = el('pssStart').value; e.endDate = el('pssEnd').value;
      if (!e.startDate || !e.endDate) { alert('Dates'); return; }
    } else {
      var rows = el('instRows').children, insts = [], pT = 0;
      for (var i = 0; i < rows.length; i++) {
        var r = rows[i], d = r.querySelector('input.inst-date'), p = r.querySelector('input.inst-pct'), f = r.querySelector('select.inst-fund');

      insts.sort(function(a, b) { return a.date < b.date ? -1 : 1; });

  // ===== HISTORY =====
  function showHist() {

    var all = [];
    for (var i = 0; i < D.pays.length; i++) { var p = D.pays[i]; all.push({ date: p.date || '0000-00-00', type: 'payment', vendor: p.vendor, cat: p.category || 'Others', catSpec: p.catSpec || '', fund: p.fund || 'Other', cur: p.cur, amt: p.amt, usd: convertCurrency(p.amt, p.cur, 'USD'), desc: p.rem || '', status: '' }); }
    for (var i = 0; i < D.invSch.length; i++) { var r = D.invSch[i]; all.push({ date: r.date || '0000-00-00', type: 'investment', vendor: '', cat: '', catSpec: '', fund: r.fund || 'Other', cur: r.cur || 'USD', amt: r.amount, usd: convertCurrency(r.amount, r.cur || 'USD', 'USD'), desc: r.remarks || '', status: r.status }); }

    h += '<div class="si" style="border-left:4px solid var(--bl)"><div class="sl">Net Flow</div><div class="sv" style="color:' + (tInv - tPay >= 0 ? 'var(--g)' : 'var(--rd)') + '">' + fmtD(tInv - tPay) + '</div></div></div>';
    if (!all.length) { h += '<div class="card" style="text-align:center;padding:50px"><div style="font-size:1.4rem;margin-bottom:8px">&#128240;</div><div style="font-family:Space Grotesk;font-size:1rem;font-weight:700">No Records</div></div>'; el('app').innerHTML = h; return; }
    h += '<div class="card"><div class="ch"><span class="ct">Transaction History</span><span style="font-size:.54rem;color:var(--t3);font-family:JetBrains Mono">' + all.length + ' records</span></div>';
    var groups = {}, gOrder = [];
    for (var i = 0; i < all.length; i++) { var mk = all[i].date.substring(0, 7); if (!groups[mk]) { groups[mk] = []; gOrder.push(mk); } groups[mk].push(all[i]); }
    for (var gi = 0; gi < gOrder.length; gi++) {
      var mk = gOrder[gi], items = groups[mk], gIn = 0, gOut = 0;

        h += '<div class="history-item ' + (isP ? 'hp' : 'hi') + '"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div>';
