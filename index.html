<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stellar Seeds — Seed Tolling Plant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=JetBrains+Mono:wght@400;500&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f4f0;--s1:#fff;--s2:#faf9f6;--s3:#eeece7;--b1:#e0ded8;--g:#2d8a32;--gb:#3da642;--gc:rgba(45,138,50,.08);--bl:#2874a6;--blc:rgba(40,116,166,.08);--am:#b89630;--amc:rgba(184,150,48,.08);--rd:#cc3333;--rdc:rgba(204,51,51,.08);--or:#d4930d;--orc:rgba(212,147,13,.08);--t1:#1a1c18;--t2:#555;--t3:#999;--r:6px;--rl:10px}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t1);line-height:1.5;font-size:14px;min-height:100vh}
button{font-family:inherit;cursor:pointer}
select,input[type="text"],input[type="number"],input[type="date"],textarea{width:100%;padding:6px 10px;background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);color:var(--t1);font-family:'DM Sans',sans-serif;font-size:.8rem;outline:0}
select:focus,input:focus,textarea:focus{border-color:var(--g)}
textarea{resize:vertical;min-height:36px}
.hdr{height:52px;background:var(--s1);border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px}
.logo-ic{width:32px;height:32px;background:linear-gradient(135deg,var(--g),#1a5c20);border-radius:var(--r);position:relative}
.logo-ic::after{content:'';position:absolute;width:16px;height:16px;border:2.5px solid rgba(255,255,255,.9);border-radius:50%;top:5px;left:5px}
.logo-nm{font-family:'Cormorant Garamond',serif;font-size:.88rem;font-weight:700;color:var(--am);letter-spacing:.18em;text-transform:uppercase}
.logo-sb{font-family:'JetBrains Mono',monospace;font-size:.38rem;color:var(--t3);letter-spacing:.08em;text-transform:uppercase}
.btn{font-weight:600;font-size:.72rem;padding:5px 12px;border-radius:var(--r);border:1px solid var(--b1);background:var(--s1);color:var(--t1);transition:all .12s;white-space:nowrap}
.btn:hover{background:var(--s3)}
.bp{background:var(--g);border-color:var(--g);color:#fff}.bp:hover{background:var(--gb)}
.bd{border-color:var(--rd);color:var(--rd)}.bd:hover{background:var(--rdc)}
.bs{padding:3px 8px;font-size:.66rem}
.nb{background:var(--s1);border-bottom:1px solid var(--b1);display:flex;padding:0 12px;overflow-x:auto;position:sticky;top:52px;z-index:99}
.nb button{background:0;border:0;padding:8px 10px;font-size:.74rem;font-weight:600;color:var(--t3);border-bottom:2px solid transparent;white-space:nowrap;font-family:'DM Sans',sans-serif;transition:all .15s}
.nb button:hover{color:var(--t1)}.nb button.on{color:var(--g);border-color:var(--g)}
.ap{padding:16px;max-width:1400px;margin:0 auto}
.cd{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);padding:14px;margin-bottom:12px}
.ch{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.ct{font-weight:700;font-size:.84rem}
.stg{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:14px}
.sti{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);padding:12px}
.stl{font-family:'JetBrains Mono',monospace;font-size:.52rem;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.stv{font-size:1.15rem;font-weight:700;line-height:1.1}
.tw{overflow-x:auto;border-radius:var(--r);border:1px solid var(--b1)}
table{width:100%;border-collapse:collapse;font-size:.76rem}
th{background:var(--s2);font-weight:600;font-size:.6rem;text-transform:uppercase;letter-spacing:.04em;color:var(--t3);padding:6px 8px;text-align:left;border-bottom:1px solid var(--b1);white-space:nowrap}
td{padding:5px 8px;border-bottom:1px solid var(--b2);vertical-align:middle}
tr:last-child td{border-bottom:0}
tbody tr:hover{background:var(--s2)}
.bg{font-family:'JetBrains Mono',monospace;font-size:.56rem;padding:2px 6px;border-radius:12px;font-weight:500;display:inline-flex;align-items:center;gap:3px;white-space:nowrap}
.bg::before{content:'';width:4px;height:4px;border-radius:50%;flex-shrink:0}
.b1{background:var(--gc);color:var(--g)}.b1::before{background:var(--g)}
.b2{background:var(--rdc);color:var(--rd)}.b2::before{background:var(--rd)}
.b3{background:var(--orc);color:var(--or)}.b3::before{background:var(--or)}
.b4{background:var(--blc);color:var(--bl)}.b4::before{background:var(--bl)}
.fg{margin-bottom:8px}
.fl{display:block;font-size:.68rem;font-weight:600;color:var(--t2);margin-bottom:3px}
.fb{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:8px 10px;background:var(--s2);border:1px solid var(--b2);border-radius:var(--rl);margin-bottom:10px}
.fb label{font-size:.7rem;font-weight:600;color:var(--t2);white-space:nowrap}
.fb select{width:auto;min-width:80px;padding:4px 8px;font-size:.74rem;border-radius:var(--r);border:1px solid var(--b1);background:var(--s1);font-weight:600;outline:0}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;display:none;align-items:center;justify-content:center;padding:12px}
.mo.op{display:flex}
.mb{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);width:100%;max-width:860px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.mh{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--b1);position:sticky;top:0;background:var(--s1)}
.mh h3{font-size:.88rem;font-weight:700}
.mc{background:0;border:0;color:var(--t3);font-size:1.2rem;padding:4px 8px}.mc:hover{color:var(--t1)}
.md{padding:16px}
.mf{padding:10px 16px;border-top:1px solid var(--b1);display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:var(--s1)}
.tst{position:fixed;bottom:16px;right:16px;background:var(--t1);color:#fff;padding:8px 16px;border-radius:var(--r);font-size:.76rem;font-weight:600;z-index:300;transform:translateY(60px);opacity:0;transition:all .3s ease}
.tst.sh{transform:translateY(0);opacity:1}
.tc{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.tk{border:2px solid var(--b2);border-radius:var(--rl);padding:14px;cursor:pointer;transition:all .15s;text-align:center}
.tk:hover{border-color:var(--bl)}.tk.on{border-color:var(--g);background:var(--gc)}
.ps{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);padding:12px;border-left:4px solid var(--bl);margin-bottom:10px}
.ps-v{font-weight:700;font-size:.88rem;cursor:pointer;color:var(--bl)}.ps-v:hover{text-decoration:underline}
.ps-d{font-size:.6rem;color:var(--t2);font-style:italic;margin-top:2px;line-height:1.3}
.pb{height:10px;background:var(--s3);border-radius:5px;overflow:hidden}
.pf{height:100%;border-radius:5px;transition:width .3s}
.pi{display:flex;justify-content:space-between;font-size:.54rem;font-family:'JetBrains Mono',monospace;margin-top:3px;color:var(--t3)}
.ppl{margin-top:8px;padding-top:8px;border-top:1px solid var(--b2)}
.ppi{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:.64rem;border-bottom:1px dashed var(--b2)}
.ppi:last-child{border-bottom:0}
.ppd{font-family:'JetBrains Mono',monospace;color:var(--t3)}
.ppa{font-family:'JetBrains Mono',monospace;font-weight:700}
.ppb{background:0;border:0;color:var(--t3);font-size:.7rem;padding:2px 5px;cursor:pointer}.ppb:hover{color:var(--rd)}
.dn{position:relative;width:150px;height:150px;flex-shrink:0}
.dc{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ptc{border:2px solid var(--b2);border-radius:var(--rl);padding:10px 14px;cursor:pointer;transition:all .15s;text-align:center}
.ptc:hover{border-color:var(--bl)}.ptc.on{border-color:var(--g);background:var(--gc)}
.sb{display:flex;gap:4px;height:20px;border-radius:6px;overflow:hidden;background:var(--s3);margin-bottom:6px}
.sg{transition:width .3s}
.ip{border:2px solid var(--b1);border-radius:var(--rl);padding:12px;margin-bottom:8px;cursor:pointer;transition:all .15s}
.ip:hover{border-color:var(--bl);background:var(--blc)}.ip.on{border-color:var(--g);background:var(--gc)}.ip.dn2{opacity:.5;cursor:default}
.fw{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px;background:var(--s2);border:1px solid var(--b2);border-radius:var(--rl)}
.fi{text-align:center;padding:8px;border-radius:var(--r);border:2px solid var(--b2);cursor:pointer;transition:all .15s}
.fi:hover{border-color:var(--bl)}.fi.on{border-color:var(--g);background:var(--gc)}
.fn{font-size:.58rem;font-family:'JetBrains Mono',monospace;font-weight:700;text-transform:uppercase;margin-bottom:2px}
.fv{font-size:.92rem;font-weight:700;line-height:1.1}
.fs{font-size:.5rem;color:var(--t3);font-family:'JetBrains Mono',monospace;margin-top:2px}
.cur-box{background:linear-gradient(135deg,var(--s1),var(--s2));border:1px solid var(--b1);border-radius:var(--rl);padding:20px;margin-bottom:14px}
.cur-r{font-size:1.6rem;font-weight:700;color:var(--g);text-align:center;margin:10px 0 4px}
.cur-s{text-align:center;font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--t3)}
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px}
.cc{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);padding:12px;text-align:center}
.cp{font-weight:700;font-size:.72rem;color:var(--t3);margin-bottom:2px}
.cr{font-family:'JetBrains Mono',monospace;font-size:1.1rem;font-weight:700;color:var(--bl)}
.cs{font-size:.54rem;color:var(--t3);font-family:'JetBrains Mono',monospace;margin-top:2px}
.hl{border-left:3px solid var(--b2);padding:10px 0 10px 16px;position:relative;margin-left:8px}
.hl::before{content:'';position:absolute;left:-8px;top:14px;width:10px;height:10px;border-radius:50%;border:2px solid var(--b1);background:var(--s1)}
.hl.hp::before{background:var(--rd);border-color:var(--rd)}
.hl.hi::before{background:var(--g);border-color:var(--g)}
.tbr{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;padding:12px;background:var(--s2);border:1px solid var(--b2);border-radius:var(--rl);margin-bottom:10px}
.tb{text-align:center}
.tl{font-size:.48rem;font-family:'JetBrains Mono',monospace;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.tv{font-size:1.1rem;font-weight:700;line-height:1.1}
@media(max-width:900px){.ap{padding:10px}.fw,.tbr{grid-template-columns:1fr}.cg{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="mainApp">
  <div class="hdr">
    <div class="logo">
      <div class="logo-ic"></div>
      <div>
        <div class="logo-nm">Stellar Seeds</div>
        <div class="logo-sb">Seed Tolling Plant</div>
      </div>
    </div>
    <div id="hdrRight" style="display:flex;align-items:center;gap:8px"></div>
  </div>
  <div class="nb" id="navbar"></div>
  <div class="ap" id="content"></div>
</div>
<div class="mo" id="modal">
  <div class="mb">
    <div class="mh"><h3 id="modalTitle"></h3><button class="mc" onclick="SS.closeModal()">&times;</button></div>
    <div class="md" id="modalBody"></div>
    <div class="mf" id="modalFoot"></div>
  </div>
</div>
<div class="tst" id="toast"></div>

<script>
(function(){
"use strict";

/* ============================================================
   STATE
   ============================================================ */
var data = {
  payments: [],
  schedules: [],
  investments: [],
  files: {}
};

var state = {
  tab: 'dash',
  displayCurrency: 'USD',
  payType: 'full',
  schTerm: 'monthly',
  schFund: 'VN Fund',
  selectedInstallment: -1
};

/* ============================================================
   CONSTANTS
   ============================================================ */
var RATES = {
  USD: 1, EUR: 0.92, VND: 26307, PHP: 61.26, THB: 34.5,
  SGD: 1.34, CNY: 7.24, JPY: 155.5, KRW: 1380,
  GBP: 0.79, AUD: 1.53, MYR: 4.47, INR: 83.5
};
var SYMBOLS = {
  USD: '$', EUR: '\u20ac', VND: '\u0110', PHP: '\u20b1', THB: '\u0e3f',
  SGD: 'S$', CNY: '\u00a5', JPY: '\u00a5', KRW: '\u20a9',
  GBP: '\u00a3', AUD: 'A$', MYR: 'RM', INR: '\u20b9'
};
var CATEGORIES = ['Machines','Buildings','Land','Opex','Logistics','Tax','Others'];
var CAT_COLORS = {
  Machines:'#2874a6', Buildings:'#2d8a32', Land:'#b89630',
  Opex:'#9b59b6', Logistics:'#e67e22', Tax:'#c0392b', Others:'#999'
};
var FUNDS = ['VN Fund', 'PH Fund', 'Other'];
var FUND_COLORS = {'VN Fund':'#2d8a32', 'PH Fund':'#2874a6', 'Other':'#b89630'};
var TABS = [
  {id:'dash', label:'Dashboard'},
  {id:'payments', label:'Payments'},
  {id:'schedules', label:'Schedules'},
  {id:'investments', label:'Investments'},
  {id:'vendors', label:'Vendors'},
  {id:'history', label:'History'},
  {id:'currency', label:'Currency'},
  {id:'settings', label:'Settings'}
];

/* ============================================================
   UTILITY FUNCTIONS
   ============================================================ */
function el(id) { return document.getElementById(id); }

function esc(str) {
  if (str == null) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).substr(2, 6);
}

function todayStr() {
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function addDays(dateStr, days) {
  var d = new Date(dateStr);
  if (isNaN(d.getTime())) d = new Date();
  d.setDate(d.getDate() + days);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function convert(amount, from, to) {
  if (from === to) return amount;
  var fromRate = RATES[from] || 1;
  var toRate = RATES[to] || 1;
  return (amount / fromRate) * toRate;
}

function formatCurrency(amount, currency) {
  var sym = SYMBOLS[currency] || '$';
  var num = Number(amount || 0);
  return sym + num.toLocaleString('en', {minimumFractionDigits: 2, maximumFractionDigits: 2});
}

function formatDisplay(usdAmount) {
  return formatCurrency(convert(usdAmount, 'USD', state.displayCurrency), state.displayCurrency);
}

function formatShort(n) {
  if (Math.abs(n) >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (Math.abs(n) >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return Math.round(n).toString();
}

function percent(part, total) {
  return total > 0 ? Math.round(part / total * 100) : 0;
}

function monthDiff(start, end) {
  if (!start || !end) return 0;
  var a = new Date(start), b = new Date(end);
  if (isNaN(a.getTime()) || isNaN(b.getTime())) return 0;
  return Math.max(1, (b.getFullYear() - a.getFullYear()) * 12 + (b.getMonth() - a.getMonth()) + 1);
}

function formatMonth(key) {
  var names = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var parts = key.split('-');
  return names[parseInt(parts[1]) || 0] + ' ' + parts[0];
}

function notify(msg) {
  var t = el('toast');
  if (!t) return;
  t.textContent = msg;
  t.classList.add('sh');
  setTimeout(function() { t.classList.remove('sh'); }, 2200);
}

function openModal(title, body, footer) {
  el('modalTitle').textContent = title;
  el('modalBody').innerHTML = body;
  el('modalFoot').innerHTML = footer || '';
  el('modal').classList.add('op');
}

/* ============================================================
   OPTION BUILDERS
   ============================================================ */
function currencyOptions(selected) {
  var html = '';
  for (var k in RATES) {
    html += '<option value="' + k + '"' + (k === selected ? ' selected' : '') + '>' + k + '</option>';
  }
  return html;
}

function categoryOptions(selected) {
  var html = '';
  for (var i = 0; i < CATEGORIES.length; i++) {
    html += '<option value="' + CATEGORIES[i] + '"' + (CATEGORIES[i] === selected ? ' selected' : '') + '>' + CATEGORIES[i] + '</option>';
  }
  return html;
}

function fundOptions(selected) {
  var html = '';
  for (var i = 0; i < FUNDS.length; i++) {
    html += '<option value="' + FUNDS[i] + '"' + (FUNDS[i] === selected ? ' selected' : '') + '>' + FUNDS[i] + '</option>';
  }
  return html;
}

function allFundOptions(selected) {
  return '<option value="all"' + (selected === 'all' ? ' selected' : '') + '>All Funds</option>' + fundOptions(selected);
}

function getVendorList() {
  var map = {};
  for (var i = 0; i < data.schedules.length; i++) {
    var v = data.schedules[i].vendor;
    if (v) map[v.toUpperCase()] = 1;
  }
  for (var i = 0; i < data.payments.length; i++) {
    var v = data.payments[i].vendor;
    if (v) map[v.toUpperCase()] = 1;
  }
  return Object.keys(map).sort();
}

function vendorOptions(selected) {
  var vendors = getVendorList();
  var sel = selected ? selected.toUpperCase() : '';
  var html = '<option value="">-- Select Vendor --</option>';
  for (var i = 0; i < vendors.length; i++) {
    html += '<option value="' + esc(vendors[i]) + '"' + (sel === vendors[i] ? ' selected' : '') + '>' + esc(vendors[i]) + '</option>';
  }
  html += '<option value="__NEW__">+ Add New Vendor</option>';
  return html;
}

/* ============================================================
   BADGE HELPERS
   ============================================================ */
function catBadge(cat, spec) {
  var color = CAT_COLORS[cat] || '#999';
  var label = (cat === 'Others' && spec) ? 'Others: ' + spec : cat;
  return '<span class="bg" style="background:' + color + '22;color:' + color + ';border:1px solid ' + color + '44">' + esc(label) + '</span>';
}

function fundBadge(fund) {
  var color = FUND_COLORS[fund] || '#999';
  return '<span class="bg" style="background:' + color + '22;color:' + color + ';border:1px solid ' + color + '44">' + esc(fund) + '</span>';
}

/* ============================================================
   DONUT CHART
   ============================================================ */
function donutSVG(dataArr, size) {
  var total = 0;
  for (var i = 0; i < dataArr.length; i++) total += dataArr[i].value;
  if (!total) {
    return '<svg viewBox="0 0 100 100" style="width:' + size + 'px;height:' + size + 'px"><circle cx="50" cy="50" r="35" fill="none" stroke="#eeece7" stroke-width="16"/></svg>';
  }
  var r = 35, circ = 2 * Math.PI * r, offset = 0;
  var svg = '<svg viewBox="0 0 100 100" style="width:' + size + 'px;height:' + size + 'px;transform:rotate(-90deg)"><circle cx="50" cy="50" r="' + r + '" fill="none" stroke="#eeece7" stroke-width="16"/>';
  for (var i = 0; i < dataArr.length; i++) {
    var seg = (dataArr[i].value / total) * circ;
    if (seg < 0.3) continue;
    svg += '<circle cx="50" cy="50" r="' + r + '" fill="none" stroke="' + dataArr[i].color + '" stroke-width="16" stroke-dasharray="' + seg.toFixed(2) + ' ' + (circ - seg).toFixed(2) + '" stroke-dashoffset="' + (-offset).toFixed(2) + '"/>';
    offset += seg;
  }
  return svg + '</svg>';
}

/* ============================================================
   SCHEDULE HELPERS
   ============================================================ */
function getPaymentsForSchedule(scheduleId) {
  var result = [];
  for (var i = 0; i < data.payments.length; i++) {
    if (String(data.payments[i].scheduleId) === String(scheduleId)) {
      result.push(data.payments[i]);
    }
  }
  return result;
}

function getTotalPaidForSchedule(scheduleId) {
  var payments = getPaymentsForSchedule(scheduleId);
  var total = 0;
  for (var i = 0; i < payments.length; i++) {
    total += convert(payments[i].amount, payments[i].currency, 'USD');
  }
  return total;
}

function getInstallmentPaid(scheduleId, instIndex) {
  var total = 0;
  for (var i = 0; i < data.payments.length; i++) {
    var p = data.payments[i];
    if (p.scheduleId && String(p.scheduleId) === String(scheduleId) && p.installmentIndex === instIndex) {
      total += convert(p.amount, p.currency, 'USD');
    }
  }
  return total;
}

function getScheduleStatus(scheduleId) {
  var schedule = null;
  for (var i = 0; i < data.schedules.length; i++) {
    if (String(data.schedules[i].id) === String(scheduleId)) { schedule = data.schedules[i]; break; }
  }
  if (!schedule) return {label: 'N/A', badgeClass: '', pct: 0};
  var totalUSD = convert(schedule.totalCost, schedule.currency || 'USD', 'USD');
  var paidUSD = getTotalPaidForSchedule(scheduleId);
  if (totalUSD <= 0) return {label: 'N/A', badgeClass: '', pct: 0};
  var p = paidUSD / totalUSD * 100;
  if (p >= 99.5) return {label: 'Paid', badgeClass: 'b1', pct: 100};
  if (p > 0) return {label: 'Partial ' + Math.round(p) + '%', badgeClass: 'b3', pct: p};
  return {label: 'Pending', badgeClass: 'b2', pct: 0};
}

function getFundBalances() {
  var bal = {};
  for (var i = 0; i < FUNDS.length; i++) bal[FUNDS[i]] = {inflow: 0, outflow: 0, balance: 0};
  for (var i = 0; i < data.investments.length; i++) {
    var r = data.investments[i], f = r.fund || 'Other';
    if (!bal[f]) bal[f] = {inflow: 0, outflow: 0, balance: 0};
    if (r.status === 'Deposited' || r.status === 'Confirmed') {
      bal[f].inflow += convert(r.amount, r.currency || 'USD', 'USD');
    }
  }
  for (var i = 0; i < data.payments.length; i++) {
    var p = data.payments[i], f = p.fund || 'Other';
    if (!bal[f]) bal[f] = {inflow: 0, outflow: 0, balance: 0};
    bal[f].outflow += convert(p.amount, p.currency, 'USD');
  }
  for (var k in bal) bal[k].balance = bal[k].inflow - bal[k].outflow;
  return bal;
}

/* ============================================================
   PERSISTENCE
   ============================================================ */
function saveData() {
  localStorage.setItem('ss_payments', JSON.stringify(data.payments));
  localStorage.setItem('ss_schedules', JSON.stringify(data.schedules));
  localStorage.setItem('ss_investments', JSON.stringify(data.investments));
  localStorage.setItem('ss_files', JSON.stringify(data.files));
  localStorage.setItem('ss_currency', state.displayCurrency);
}

function loadData() {
  try { data.payments = JSON.parse(localStorage.getItem('ss_payments')) || []; } catch(e) { data.payments = []; }
  try { data.schedules = JSON.parse(localStorage.getItem('ss_schedules')) || []; } catch(e) { data.schedules = []; }
  try { data.investments = JSON.parse(localStorage.getItem('ss_investments')) || []; } catch(e) { data.investments = []; }
  try { data.files = JSON.parse(localStorage.getItem('ss_files')) || {}; } catch(e) { data.files = {}; }
  state.displayCurrency = localStorage.getItem('ss_currency') || 'USD';
}

/* ============================================================
   NAVIGATION
   ============================================================ */
function renderNav() {
  var html = '';
  for (var i = 0; i < TABS.length; i++) {
    var isActive = state.tab === TABS[i].id;
    html += '<button class="' + (isActive ? 'on' : '') + '" onclick="SS.go(\'' + TABS[i].id + '\')">' + TABS[i].label + '</button>';
  }
  el('navbar').innerHTML = html;
}

function go(tabId) {
  state.tab = tabId;
  renderNav();
  renderPage();
}

function renderPage() {
  var content = el('content');
  if (!content) return;
  try {
    switch (state.tab) {
      case 'dash': renderDashboard(content); break;
      case 'payments': renderPayments(content); break;
      case 'schedules': renderSchedules(content); break;
      case 'investments': renderInvestments(content); break;
      case 'vendors': renderVendors(content); break;
      case 'history': renderHistory(content); break;
      case 'currency': renderCurrency(content); break;
      case 'settings': renderSettings(content); break;
      default: content.innerHTML = '<div class="cd">Unknown tab.</div>';
    }
  } catch (e) {
    content.innerHTML = '<div class="cd" style="color:#cc3333"><b>Error:</b> ' + esc(e.message) + '</div>';
  }
}

function renderScheduleCard(schedule, index) {
  var sid = schedule.id;
  var st = getScheduleStatus(sid);
  var scur = schedule.currency || 'USD';
  var totalUSD = convert(schedule.totalCost, scur, 'USD');
  var paidUSD = getTotalPaidForSchedule(sid);
  var pctVal = percent(paidUSD, totalUSD);
  var barColor = pctVal >= 100 ? '#2d8a32' : pctVal > 0 ? '#d4930d' : '#2874a6';
  var payments = getPaymentsForSchedule(sid);

  var h = '<div class="ps" style="border-left-color:' + barColor + '">';
  h += '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px"><div>';
  h += '<div class="ps-v" onclick="SS.showScheduleDetail(' + index + ')">' + esc(schedule.vendor) + '</div>';
  if (schedule.description) h += '<div class="ps-d">' + esc(schedule.description) + '</div>';
  h += '<div style="display:flex;gap:4px;margin-top:3px;flex-wrap:wrap">';
  h += '<span class="bg ' + st.badgeClass + '">' + st.label + '</span>';
  h += '<span class="bg ' + (schedule.terms === 'monthly' ? 'b4' : 'b3') + '">' + schedule.terms + '</span>';
  h += catBadge(schedule.category || 'Others', schedule.catSpec);
  h += fundBadge(schedule.fund || 'VN Fund');
  h += '</div></div>';
  h += '<div style="text-align:right"><div style="font-size:.54rem;color:var(--t3);font-family:JetBrains Mono">TOTAL</div>';
  h += '<div style="font-family:JetBrains Mono;font-size:.92rem;font-weight:700;color:var(--bl)">' + formatDisplay(totalUSD) + '</div></div></div>';

  h += '<div class="pb"><div class="pf" style="width:' + pctVal + '%;background:' + barColor + '"></div></div>';
  h += '<div class="pi"><span>Paid: ' + formatDisplay(paidUSD) + '</span><span>' + pctVal + '%</span><span>Rem: ' + formatDisplay(Math.max(0, totalUSD - paidUSD)) + '</span></div>';

  if (payments.length) {
    h += '<div class="ppl">';
    for (var j = 0; j < payments.length; j++) {
      var py = payments[j];
      h += '<div class="ppi"><span class="ppd">' + esc(py.date) + '</span>';
      h += '<span style="font-size:.58rem;color:var(--t3)">' + (py.installmentIndex >= 0 ? 'T' + (py.installmentIndex+1) + ' ' : '') + (py.payType === 'partial' ? '[P] ' : '') + esc(py.remarks || '') + '</span>';
      h += '<span><span class="ppa" style="color:#cc3333">-' + formatDisplay(convert(py.amount, py.currency, 'USD')) + '</span> <button class="ppb" onclick="SS.deletePayment(\'' + py.id + '\')">&times;</button></span></div>';
    }
    h += '</div>';
  }

  h += '<div style="display:flex;gap:4px;margin-top:8px;justify-content:flex-end">';
  h += '<button class="btn bs bp" onclick="SS.openPaymentModal(' + index + ')">+ Pay</button>';
  h += '<button class="btn bs" onclick="SS.showScheduleDetail(' + index + ')">Details</button>';
  h += '<button class="btn bs bd" onclick="SS.deleteSchedule(' + index + ')">Delete</button>';
  h += '</div></div>';
  return h;
}

/* ============================================================
   SCHEDULE DETAIL MODAL
   ============================================================ */
function showScheduleDetail(index) {
  var schedule = data.schedules[index];
  if (!schedule) return;
  var sid = schedule.id;
  var scur = schedule.currency || 'USD';
  var totalUSD = convert(schedule.totalCost, scur, 'USD');
  var paidUSD = getTotalPaidForSchedule(sid);
  var pctVal = percent(paidUSD, totalUSD);

  var h = '<div style="background:var(--blc);border-radius:var(--r);padding:14px;margin-bottom:14px">';
  h += '<div style="font-weight:700;font-size:1rem">' + esc(schedule.vendor) + '</div>';
  if (schedule.description) h += '<div style="font-size:.62rem;color:var(--t2);font-style:italic;margin-top:2px">' + esc(schedule.description) + '</div>';
  h += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;margin-top:10px">';
  h += '<div><div style="font-size:.48rem;font-family:JetBrains Mono;color:var(--t3);text-transform:uppercase">Total</div><div style="font-weight:700">' + formatCurrency(schedule.totalCost, scur) + '</div></div>';
  h += '<div><div style="font-size:.48rem;font-family:JetBrains Mono;color:var(--t3);text-transform:uppercase">Paid</div><div style="font-weight:700;color:var(--g)">' + formatDisplay(paidUSD) + '</div></div>';
  h += '<div><div style="font-size:.48rem;font-family:JetBrains Mono;color:var(--t3);text-transform:uppercase">Remaining</div><div style="font-weight:700;color:var(--rd)">' + formatDisplay(Math.max(0, totalUSD - paidUSD)) + '</div></div>';
  h += '<div><div style="font-size:.48rem;font-family:JetBrains Mono;color:var(--t3);text-transform:uppercase">Progress</div><div style="font-weight:700;color:var(--bl)">' + pctVal + '%</div></div>';
  h += '</div>';
  h += '<div style="margin-top:8px"><div class="pb" style="height:8px"><div class="pf" style="width:' + pctVal + '%;background:' + (pctVal >= 100 ? 'var(--g)' : 'var(--bl)') + '"></div></div></div>';
  h += '</div>';

  // Show period breakdown
  if (schedule.terms === 'monthly' && schedule.startDate && schedule.endDate) {
    var months = monthDiff(schedule.startDate, schedule.endDate);
    var monthlyAmount = months > 0 ? schedule.totalCost / months : schedule.totalCost;
    var startDate = new Date(schedule.startDate);
    var todayMonth = todayStr().substring(0, 7);
    h += '<div class="tw"><table><thead><tr><th>#</th><th>Period</th><th style="text-align:right">Due</th><th style="text-align:right">Paid</th><th>Status</th></tr></thead><tbody>';
    for (var m = 0; m < months; m++) {
      var monthDate = new Date(startDate.getFullYear(), startDate.getMonth() + m, 1);
      var monthKey = monthDate.getFullYear() + '-' + String(monthDate.getMonth()+1).padStart(2,'0');
      var monthPaid = 0;
      for (var qi = 0; qi < data.payments.length; qi++) {
        var pay = data.payments[qi];
        if (pay.scheduleId && String(pay.scheduleId) === String(sid) && pay.date && pay.date.substring(0,7) === monthKey) {
          monthPaid += convert(pay.amount, pay.currency, 'USD');
        }
      }
      var monthUSD = convert(monthlyAmount, scur, 'USD');
      var isComplete = monthUSD > 0 && monthPaid >= monthUSD * 0.99;
      var statusLabel = isComplete ? 'Paid' : monthPaid > 0 ? 'Partial' : monthKey > todayMonth ? 'Upcoming' : 'Overdue';
      var statusClass = isComplete ? 'b1' : monthPaid > 0 ? 'b3' : monthKey > todayMonth ? 'b4' : 'b2';
      h += '<tr><td style="font-family:JetBrains Mono;font-size:.6rem;color:var(--t3)">' + (m+1) + '</td>';
      h += '<td style="font-weight:600">' + formatMonth(monthKey) + '</td>';
      h += '<td style="text-align:right;font-family:JetBrains Mono">' + formatCurrency(monthlyAmount, scur) + '</td>';
      h += '<td style="text-align:right;font-family:JetBrains Mono;font-weight:700;color:' + (monthPaid > 0 ? 'var(--g)' : 'var(--t3)') + '">' + (monthPaid > 0 ? formatDisplay(monthPaid) : '-') + '</td>';
      h += '<td><span class="bg ' + statusClass + '">' + statusLabel + '</span></td></tr>';
    }
    h += '</tbody></table></div>';
  }

  if (schedule.terms === 'installment' && schedule.installments) {
    h += '<div class="tw"><table><thead><tr><th>#</th><th>Tranche</th><th>Due Date</th><th style="text-align:right">Due</th><th style="text-align:right">Paid</th><th>Status</th></tr></thead><tbody>';
    for (var ii = 0; ii < schedule.installments.length; ii++) {
      var inst = schedule.installments[ii];
      var instAmount = convert(schedule.totalCost * inst.pct / 100, scur, 'USD');
      var instPaid = getInstallmentPaid(sid, ii);
      var instPct = percent(instPaid, instAmount);
      var instDone = instPct >= 99;
      h += '<tr><td style="font-family:JetBrains Mono;font-size:.6rem;color:var(--t3)">' + (ii+1) + '</td>';
      h += '<td style="font-weight:600">T' + (ii+1) + ' (' + inst.pct + '%)</td>';
      h += '<td style="font-family:JetBrains Mono;font-size:.66rem">' + esc(inst.date || '-') + '</td>';
      h += '<td style="text-align:right;font-family:JetBrains Mono">' + formatCurrency(schedule.totalCost * inst.pct / 100, scur) + '</td>';
      h += '<td style="text-align:right;font-family:JetBrains Mono;font-weight:700;color:' + (instPaid > 0 ? 'var(--g)' : 'var(--t3)') + '">' + (instPaid > 0 ? formatDisplay(instPaid) : '-') + '</td>';
      h += '<td><span class="bg ' + (instDone ? 'b1' : instPaid > 0 ? 'b3' : 'b2') + '">' + (instDone ? 'Paid' : instPaid > 0 ? 'Partial' : 'Pending') + '</span></td></tr>';
    }
    h += '</tbody></table></div>';
  }

  openModal('Schedule: ' + schedule.vendor, h, '<button class="btn" onclick="SS.closeModal()">Close</button><button class="btn bp" onclick="SS.closeModal();SS.openPaymentModal(' + index + ')">Record Payment</button>');
}

/* ============================================================
   PAYMENT MODAL
   ============================================================ */
function openPaymentModal(index) {
  var schedule = data.schedules[index];
  if (!schedule) return;
  var scur = schedule.currency || 'USD';
  var sid = schedule.id;
  var totalUSD = convert(schedule.totalCost, scur, 'USD');
  var paidUSD = getTotalPaidForSchedule(sid);
  var remainingUSD = Math.max(0, totalUSD - paidUSD);
  state.selectedInstallment = -1;

  var h = '<div style="background:var(--blc);border-radius:var(--r);padding:12px;margin-bottom:12px">';
  h += '<div style="font-weight:700;font-size:1rem">' + esc(schedule.vendor) + '</div>';
  h += '<div style="margin-top:4px;font-family:JetBrains Mono;font-size:.62rem;color:var(--t3)">Paid: ' + formatDisplay(paidUSD) + ' / ' + formatDisplay(totalUSD) + ' | Rem: ' + formatDisplay(remainingUSD) + '</div>';
  h += '</div>';

  if (schedule.terms === 'installment' && schedule.installments) {
    h += '<div style="font-weight:700;font-size:.72rem;margin-bottom:8px">SELECT INSTALLMENT</div>';
    for (var i = 0; i < schedule.installments.length; i++) {
      var inst = schedule.installments[i];
      var instAmountUSD = convert(schedule.totalCost * inst.pct / 100, scur, 'USD');
      var instPaidUSD = getInstallmentPaid(sid, i);
      var instPct = percent(instPaidUSD, instAmountUSD);
      var isDone = instPct >= 99;
      h += '<div class="ip' + (isDone ? ' dn2' : '') + '" id="instPick' + i + '"';
      if (!isDone) h += ' onclick="SS.pickInstallment(' + index + ',' + i + ')"';
      h += '><div style="display:flex;justify-content:space-between"><div><b>T' + (i+1) + '</b> <span class="bg b4">' + inst.pct + '%</span></div>';
      h += '<div style="font-family:JetBrains Mono;font-weight:700">' + formatCurrency(instAmountUSD, 'USD') + '</div></div>';
      h += '<div style="margin-top:4px"><div class="pb" style="height:6px"><div class="pf" style="width:' + instPct + '%;background:' + (isDone ? '#2d8a32' : '#2874a6') + '"></div></div></div>';
      if (isDone) h += '<div style="text-align:center;margin-top:4px"><span class="bg b1">COMPLETE</span></div>';
      h += '</div>';
    }
    h += '<div id="paymentFormArea"></div>';
  } else {
    var mc = monthDiff(schedule.startDate, schedule.endDate);
    var monthlyAmount = mc > 0 ? schedule.totalCost / mc : schedule.totalCost;
    h += '<div style="border:2px solid var(--b1);border-radius:var(--rl);padding:12px;text-align:right">';
    h += '<div style="font-family:JetBrains Mono;font-weight:700;font-size:1rem;color:#2874a6">' + formatCurrency(monthlyAmount, scur) + '</div>';
    h += '<div style="font-size:.48rem;color:var(--t3)">per month</div></div>';
    h += '<div id="paymentFormArea">' + buildPaymentForm(scur, monthlyAmount.toFixed(2), schedule.fund || 'VN Fund') + '</div>';
  }

  openModal('Pay: ' + schedule.vendor, h, '<button class="btn" onclick="SS.closeModal()">Cancel</button><button class="btn bp" onclick="SS.submitSchedulePayment(' + index + ')">Record Payment</button>');
}

function buildPaymentForm(scur, defaultAmount, defaultFund) {
  var h = '<div style="margin-top:12px;padding-top:12px;border-top:2px solid #2d8a32">';
  h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div class="fg"><label class="fl">Amount (' + scur + ')</label><input type="number" id="pfAmount" step="any" value="' + defaultAmount + '"></div>';
  h += '<div class="fg"><label class="fl">Date</label><input type="date" id="pfDate" value="' + todayStr() + '"></div></div>';
  h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div class="fg"><label class="fl">Fund</label><select id="pfFund">' + fundOptions(defaultFund) + '</select></div>';
  h += '<div class="fg"><label class="fl">Remarks</label><input type="text" id="pfRemarks"></div></div>';
  h += '</div>';
  return h;
}

function pickInstallment(scheduleIndex, installmentIndex) {
  state.selectedInstallment = installmentIndex;
  var schedule = data.schedules[scheduleIndex];
  if (!schedule) return;
  var scur = schedule.currency || 'USD';

  // Highlight selected
  for (var i = 0; i < schedule.installments.length; i++) {
    var el2 = document.getElementById('instPick' + i);
    if (el2) {
      el2.className = 'ip' + (i === installmentIndex ? ' on' : '');
    }
  }

  var inst = schedule.installments[installmentIndex];
  var instAmountUSD = convert(schedule.totalCost * inst.pct / 100, scur, 'USD');
  var instPaidUSD = getInstallmentPaid(schedule.id, installmentIndex);
  var remaining = convert(Math.max(0, instAmountUSD - instPaidUSD), 'USD', scur);
  var formArea = document.getElementById('paymentFormArea');
  if (formArea) {
    formArea.innerHTML = buildPaymentForm(scur, remaining.toFixed(2), inst.fund || schedule.fund || 'VN Fund');
  }
}

function submitSchedulePayment(index) {
  var schedule = data.schedules[index];
  if (!schedule) return;
  var amountEl = document.getElementById('pfAmount');
  var dateEl = document.getElementById('pfDate');
  var fundEl = document.getElementById('pfFund');
  var remEl = document.getElementById('pfRemarks');

  var amount = parseFloat(amountEl ? amountEl.value : 0) || 0;
  var payDate = dateEl ? dateEl.value : '';
  if (!amount || !payDate) { alert('Amount and date are required.'); return; }

  data.payments.push({
    id: uid(),
    date: payDate,
    vendor: schedule.vendor.toUpperCase(),
    amount: amount,
    currency: schedule.currency || 'USD',
    fund: fundEl ? fundEl.value : 'VN Fund',
    category: schedule.category || 'Others',
    catSpec: schedule.catSpec || '',
    remarks: remEl ? remEl.value.trim() : '',
    scheduleId: String(schedule.id),
    installmentIndex: state.selectedInstallment,
    payType: state.payType
  });
  saveData();
  SS.closeModal();
  notify('Payment recorded: ' + schedule.vendor);
  renderPage();
}

/* ============================================================
   INVESTMENTS PAGE
   ============================================================ */
function renderInvestments(container) {
  var h = '';
  h += '<div class="fb"><label>Display:</label><select onchange="SS.setCurrency(this.value)">' + currencyOptions(state.displayCurrency) + '</select></div>';

  var totalDeposited = 0;
  for (var i = 0; i < data.investments.length; i++) {
    var r = data.investments[i];
    if (r.status === 'Deposited' || r.status === 'Confirmed') totalDeposited += convert(r.amount, r.currency || 'USD', 'USD');
  }
  h += '<div class="stg"><div class="sti" style="border-left:4px solid #2d8a32"><div class="stl">Total Deposited</div><div class="stv" style="color:#2d8a32">' + formatDisplay(totalDeposited) + '</div></div></div>';

  // Record form
  h += '<div class="cd" style="border-left:4px solid #2d8a32"><div class="ch"><span class="ct">Record Investment</span></div>';
  h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div class="fg"><label class="fl">Date</label><input type="date" id="invDate" value="' + todayStr() + '"></div><div class="fg"><label class="fl">Fund</label><select id="invFund">' + fundOptions('VN Fund') + '</select></div></div>';
  h += '<div style="display:grid;grid-template-columns:2fr 1fr 1fr;gap:8px"><div class="fg"><label class="fl">Amount</label><input type="number" id="invAmount" step="any"></div><div class="fg"><label class="fl">Currency</label><select id="invCurrency">' + currencyOptions('USD') + '</select></div><div class="fg"><label class="fl">Status</label><select id="invStatus"><option>Deposited</option><option>Pending</option><option>Confirmed</option></select></div></div>';
  h += '<div class="fg"><label class="fl">Remarks</label><textarea id="invRemarks" rows="2"></textarea></div>';
  h += '<div style="display:flex;justify-content:flex-end"><button class="btn bp" onclick="SS.recordInvestment()">Record</button></div></div>';

  // List
  var sorted = data.investments.slice().sort(function(a,b) { return (a.date||'') < (b.date||'') ? 1 : -1; });
  h += '<div class="cd"><div class="ch"><span class="ct">Records (' + sorted.length + ')</span></div>';
  if (!sorted.length) {
    h += '<div style="text-align:center;padding:30px;color:var(--t3)">No investment records.</div>';
  } else {
    h += '<div class="tw"><table><thead><tr><th>Date</th><th>Fund</th><th style="text-align:right">Amount</th><th style="text-align:right">USD</th><th>Status</th><th></th></tr></thead><tbody>';
    for (var i = 0; i < sorted.length; i++) {
      var r = sorted[i];
      var origIdx = data.investments.indexOf(r);
      h += '<tr><td style="font-family:JetBrains Mono">' + esc(r.date) + '</td>';
      h += '<td>' + fundBadge(r.fund) + '</td>';
      h += '<td style="text-align:right;font-family:JetBrains Mono;font-weight:700">' + formatCurrency(r.amount, r.currency) + '</td>';
      h += '<td style="text-align:right;font-family:JetBrains Mono">' + formatDisplay(convert(r.amount, r.currency || 'USD', 'USD')) + '</td>';
      h += '<td><span class="bg ' + (r.status === 'Deposited' || r.status === 'Confirmed' ? 'b1' : 'b3') + '">' + r.status + '</span></td>';
      h += '<td><button class="btn bs bd" onclick="SS.deleteInvestment(' + origIdx + ')">X</button></td></tr>';
    }
    h += '</tbody></table></div>';
  }
  h += '</div>';
  container.innerHTML = h;
}

/* ============================================================
   VENDORS PAGE
   ============================================================ */
function renderVendors(container) {
  var h = '';
  h += '<div class="fb"><label>Display:</label><select onchange="SS.setCurrency(this.value)">' + currencyOptions(state.displayCurrency) + '</select></div>';

  var vendors = {};
  for (var i = 0; i < data.schedules.length; i++) {
    var s = data.schedules[i], v = (s.vendor||'').toUpperCase();
    if (!v) continue;
    if (!vendors[v]) vendors[v] = {name:v, budget:0, paid:0, cat:s.category||'Others', fund:s.fund||'VN Fund'};
    vendors[v].budget += convert(s.totalCost, s.currency||'USD', 'USD');
  }
  for (var i = 0; i < data.payments.length; i++) {
    var p = data.payments[i], v = (p.vendor||'').toUpperCase();
    if (!v) continue;
    if (!vendors[v]) vendors[v] = {name:v, budget:0, paid:0, cat:p.category||'Others', fund:p.fund||'Other'};
    vendors[v].paid += convert(p.amount, p.currency, 'USD');
  }

  var vArr = [];
  for (var k in vendors) {
    var v = vendors[k];
    v.remaining = Math.max(0, v.budget - v.paid);
    v.pct = percent(v.paid, v.budget);
    vArr.push(v);
  }
  vArr.sort(function(a,b) { return b.paid - a.paid; });

  if (!vArr.length) {
    h += '<div class="cd" style="text-align:center;padding:50px;color:var(--t3)">No vendors yet.</div>';
    container.innerHTML = h;
    return;
  }

  var totalB = 0, totalP = 0;
  for (var i = 0; i < vArr.length; i++) { totalB += vArr[i].budget; totalP += vArr[i].paid; }
  h += '<div style="display:flex;gap:14px;padding:8px 12px;background:var(--s2);border:1px solid var(--b2);border-radius:var(--r);margin-bottom:10px;flex-wrap:wrap">';
  h += '<span style="font-family:JetBrains Mono;font-size:.62rem"><span style="color:var(--t3)">VENDORS:</span> <strong>' + vArr.length + '</strong></span>';
  h += '<span style="font-family:JetBrains Mono;font-size:.62rem"><span style="color:var(--t3)">BUDGET:</span> <strong style="color:#2874a6">' + formatDisplay(totalB) + '</strong></span>';
  h += '<span style="font-family:JetBrains Mono;font-size:.62rem"><span style="color:var(--t3)">PAID:</span> <strong style="color:#2d8a32">' + formatDisplay(totalP) + '</strong></span></div>';

  for (var i = 0; i < vArr.length; i++) {
    var v = vArr[i];
    var bc = v.pct >= 100 ? '#2d8a32' : v.pct >= 50 ? '#d4930d' : '#2874a6';
    h += '<div class="cd" style="border-left:4px solid ' + bc + '">';
    h += '<div style="display:flex;justify-content:space-between;align-items:flex-start"><div>';
    h += '<div style="font-weight:700;font-size:.92rem">' + esc(v.name) + '</div>';
    h += '<div style="display:flex;gap:6px;margin-top:3px">' + catBadge(v.cat) + fundBadge(v.fund);
    h += '<span class="bg ' + (v.pct >= 99 ? 'b1' : v.pct > 0 ? 'b3' : 'b4') + '">' + (v.pct >= 99 ? 'Completed' : v.pct + '%') + '</span></div>';
    h += '</div><div style="text-align:right"><div style="font-size:1.2rem;font-weight:700;color:#2874a6">' + formatDisplay(v.budget) + '</div><div style="font-size:.6rem;color:var(--t3)">BUDGET</div></div></div>';
    h += '<div style="margin-top:8px"><div style="display:flex;justify-content:space-between;font-size:.66rem;margin-bottom:3px"><span>Progress</span><span style="font-family:JetBrains Mono;font-weight:700;color:' + bc + '">' + v.pct + '%</span></div>';
    h += '<div class="pb" style="height:10px"><div class="pf" style="width:' + v.pct + '%;background:' + bc + '"></div></div>';
    h += '<div style="display:flex;justify-content:space-between;font-size:.62rem;margin-top:3px"><span style="color:#2d8a32">Paid: ' + formatDisplay(v.paid) + '</span><span style="color:#d4930d">Rem: ' + formatDisplay(v.remaining) + '</span></div>';
    h += '</div></div>';
  }
  container.innerHTML = h;
}

/* ============================================================
   HISTORY PAGE
   ============================================================ */
function renderHistory(container) {
  var h = '';
  h += '<div class="fb"><label>Display:</label><select onchange="SS.setCurrency(this.value)">' + currencyOptions(state.displayCurrency) + '</select></div>';

  var all = [];
  for (var i = 0; i < data.payments.length; i++) {
    var p = data.payments[i];
    all.push({date:p.date, type:'payment', vendor:p.vendor, fund:p.fund||'Other', currency:p.currency, amount:p.amount, remarks:p.remarks||''});
  }
  for (var i = 0; i < data.investments.length; i++) {
    var r = data.investments[i];
    all.push({date:r.date, type:'investment', vendor:'Deposit', fund:r.fund||'Other', currency:r.currency||'USD', amount:r.amount, remarks:r.remarks||''});
  }
  all.sort(function(a,b) { return (a.date||'') < (b.date||'') ? 1 : -1; });

  var totalPay = 0, totalInv = 0;
  for (var i = 0; i < all.length; i++) {
    var usd = convert(all[i].amount, all[i].currency, 'USD');
    if (all[i].type === 'payment') totalPay += usd; else totalInv += usd;
  }
  h += '<div class="stg"><div class="sti" style="border-left:4px solid var(--rd)"><div class="stl">Payments</div><div class="stv" style="color:var(--rd)">' + formatDisplay(totalPay) + '</div></div>';
  h += '<div class="sti" style="border-left:4px solid var(--g)"><div class="stl">Investments</div><div class="stv" style="color:var(--g)">' + formatDisplay(totalInv) + '</div></div>';
  h += '<div class="sti" style="border-left:4px solid var(--bl)"><div class="stl">Net Flow</div><div class="stv" style="color:' + (totalInv - totalPay >= 0 ? 'var(--g)' : 'var(--rd)') + '">' + formatDisplay(totalInv - totalPay) + '</div></div></div>';

  if (!all.length) {
    h += '<div class="cd" style="text-align:center;padding:50px;color:var(--t3)">No transactions yet.</div>';
    container.innerHTML = h;
    return;
  }

  h += '<div class="cd"><div class="ch"><span class="ct">Transaction History (' + all.length + ')</span></div>';
  for (var i = 0; i < all.length; i++) {
    var it = all[i], isPay = it.type === 'payment';
    h += '<div class="hl ' + (isPay ? 'hp' : 'hi') + '"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div>';
    h += '<div style="display:flex;align-items:center;gap:6px;margin-bottom:2px"><span style="font-family:JetBrains Mono;font-size:.56rem;color:var(--t3)">' + esc(it.date) + '</span>';
    h += '<span class="bg ' + (isPay ? 'b2' : 'b1') + '">' + (isPay ? 'Payment' : 'Investment') + '</span>';
    h += fundBadge(it.fund) + '</div>';
    h += '<div style="font-weight:700;font-size:.82rem">' + esc(it.vendor) + '</div>';
    if (it.remarks) h += '<div style="font-size:.6rem;color:var(--t2);font-style:italic">' + esc(it.remarks) + '</div>';
    h += '</div><div style="text-align:right;flex-shrink:0;margin-left:12px">';
    h += '<div style="font-family:JetBrains Mono;font-weight:700;font-size:.88rem;color:' + (isPay ? '#cc3333' : '#2d8a32') + '">' + (isPay ? '-' : '+') + formatCurrency(it.amount, it.currency) + '</div>';
    h += '<div style="font-family:JetBrains Mono;font-size:.52rem;color:var(--t3)">' + formatDisplay(convert(it.amount, it.currency, 'USD')) + '</div>';
    h += '</div></div></div>';
  }
  h += '</div>';
  container.innerHTML = h;
}

/* ============================================================
   CURRENCY PAGE
   ============================================================ */
function renderCurrency(container) {
  var h = '';
  h += '<div class="fb"><label>Display:</label><select onchange="SS.setCurrency(this.value)">' + currencyOptions(state.displayCurrency) + '</select></div>';

  h += '<div class="cur-box"><div style="font-weight:700;font-size:.82rem;margin-bottom:10px">Currency Converter</div>';
  h += '<div style="display:grid;grid-template-columns:1fr 80px 80px 40px;gap:8px;align-items:end">';
  h += '<div class="fg"><label class="fl">Amount</label><input type="number" id="convAmount" value="1000" step="any" oninput="SS.doConvert()"></div>';
  h += '<div class="fg"><label class="fl">From</label><select id="convFrom" onchange="SS.doConvert()">' + currencyOptions('USD') + '</select></div>';
  h += '<div class="fg"><label class="fl">To</label><select id="convTo" onchange="SS.doConvert()">' + currencyOptions('EUR') + '</select></div>';
  h += '<div class="fg"><button class="btn" onclick="SS.swapCurrencies()">&#8644;</button></div></div>';
  h += '<div class="cur-r" id="convResult">' + formatCurrency(convert(1000, 'USD', 'EUR'), 'EUR') + '</div>';
  h += '<div class="cur-s" id="convInfo">1 USD = ' + convert(1, 'USD', 'EUR').toFixed(4) + ' EUR</div></div>';

  h += '<div class="cd"><div class="ch"><span class="ct">All Rates (base USD)</span></div><div class="cg">';
  for (var k in RATES) {
    if (k === 'USD') continue;
    h += '<div class="cc"><div class="cp">USD/' + k + '</div><div class="cr">' + RATES[k].toFixed(2) + '</div><div class="cs">' + k + '</div></div>';
  }
  h += '</div></div>';
  container.innerHTML = h;
}

/* ============================================================
   SETTINGS PAGE
   ============================================================ */
function renderSettings(container) {
  var h = '';
  h += '<div class="stg"><div class="sti" style="border-left:4px solid var(--bl)"><div class="stl">Payments</div><div class="stv">' + data.payments.length + '</div></div>';
  h += '<div class="sti" style="border-left:4px solid var(--g)"><div class="stl">Schedules</div><div class="stv">' + data.schedules.length + '</div></div>';
  h += '<div class="sti" style="border-left:4px solid var(--am)"><div class="stl">Investments</div><div class="stv">' + data.investments.length + '</div></div></div>';

  h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">';
  h += '<div class="cd" style="border-left:4px solid var(--g)"><div class="ch"><span class="ct">Backup</span></div>';
  h += '<div style="font-size:.72rem;color:var(--t2);margin-bottom:8px">Download all data as a JSON file.</div>';
  h += '<button class="btn bp" onclick="SS.backupData()" style="width:100%;padding:10px">Download Backup</button></div>';
  h += '<div class="cd" style="border-left:4px solid var(--bl)"><div class="ch"><span class="ct">Restore</span></div>';
  h += '<div style="font-size:.72rem;color:var(--t2);margin-bottom:8px">Upload a backup JSON file to restore data.</div>';
  h += '<div style="border:2px dashed var(--b1);border-radius:var(--rl);padding:16px;text-align:center"><label style="color:var(--bl);cursor:pointer;text-decoration:underline;font-size:.72rem">Browse backup file<input type="file" accept=".json" style="display:none" onchange="SS.restoreData(this.files[0])"></label></div></div>';
  h += '</div>';

  h += '<div class="cd" style="border-left:4px solid var(--rd);margin-top:12px"><div class="ch"><span class="ct">Danger Zone</span></div>';
  h += '<div style="font-size:.72rem;color:var(--t2);margin-bottom:8px">Permanently delete ALL data. This cannot be undone.</div>';
  h += '<button class="btn bd" onclick="SS.clearAllData()" style="background:var(--rd);color:#fff;border-color:var(--rd)">Clear All Data</button></div>';

  container.innerHTML = h;
}

/* ============================================================
   ACTION HANDLERS
   ============================================================ */
function recordPayment() {
  var vendorEl = document.getElementById('payVendor');
  var vendorNewEl = document.getElementById('payVendorNew');
  var catEl = document.getElementById('payCategory');
  var catSpecEl = document.getElementById('payCatSpecVal');
  var dateEl = document.getElementById('payDate');
  var fundEl = document.getElementById('payFund');
  var curEl = document.getElementById('payCurrency');
  var amtEl = document.getElementById('payAmount');
  var remEl = document.getElementById('payRemarks');

  var vendor = vendorEl ? vendorEl.value : '';
  if (vendor === '__NEW__') vendor = vendorNewEl ? vendorNewEl.value.trim() : '';
  vendor = vendor.toUpperCase();

  var category = catEl ? catEl.value : 'Others';
  var catSpec = category === 'Others' ? (catSpecEl ? catSpecEl.value.trim() : '') : '';
  var payDate = dateEl ? dateEl.value : '';
  var amount = parseFloat(amtEl ? amtEl.value : 0) || 0;
  var currency = curEl ? curEl.value : 'USD';
  var fund = fundEl ? fundEl.value : 'VN Fund';
  var remarks = remEl ? remEl.value.trim() : '';

  if (!vendor) { alert('Please select or enter a vendor.'); return; }
  if (!amount) { alert('Please enter an amount.'); return; }
  if (!payDate) { alert('Please select a date.'); return; }
  if (category === 'Others' && !catSpec) { alert('Please specify the category.'); return; }

  data.payments.push({
    id: uid(), date: payDate, vendor: vendor, amount: amount,
    currency: currency, fund: fund, category: category, catSpec: catSpec,
    remarks: remarks, scheduleId: '', installmentIndex: -1, payType: state.payType
  });
  saveData();
  notify('Payment recorded');
  renderPage();
}

function deletePayment(pid) {
  if (!confirm('Delete this payment?')) return;
  for (var i = 0; i < data.payments.length; i++) {
    if (data.payments[i].id === pid) { data.payments.splice(i, 1); break; }
  }
  saveData();
  notify('Payment deleted');
  renderPage();
}

function enrollSchedule() {
  var vendorEl = document.getElementById('schVendor');
  var vendorNewEl = document.getElementById('schVendorNew');
  var catEl = document.getElementById('schCategory');
  var catSpecEl = document.getElementById('schCatSpecVal');
  var descEl = document.getElementById('schDescription');
  var costEl = document.getElementById('schCost');
  var curEl = document.getElementById('schCurrency');
  var remEl = document.getElementById('schRemarks');

  var vendor = vendorEl ? vendorEl.value : '';
  if (vendor === '__NEW__') vendor = vendorNewEl ? vendorNewEl.value.trim() : '';
  vendor = vendor.toUpperCase();
  var category = catEl ? catEl.value : 'Others';
  var catSpec = category === 'Others' ? (catSpecEl ? catSpecEl.value.trim() : '') : '';
  var cost = parseFloat(costEl ? costEl.value : 0) || 0;

  if (!vendor) { alert('Please select or enter a vendor.'); return; }
  if (!cost) { alert('Please enter a cost.'); return; }
  if (category === 'Others' && !catSpec) { alert('Please specify the category.'); return; }

  var entry = {
    id: uid(), vendor: vendor, description: descEl ? descEl.value.trim() : '',
    totalCost: cost, currency: curEl ? curEl.value : 'USD',
    category: category, catSpec: catSpec, fund: state.schFund,
    terms: state.schTerm, startDate: '', endDate: '', installments: [],
    remarks: remEl ? remEl.value.trim() : ''
  };

  if (state.schTerm === 'monthly') {
    var startEl = document.getElementById('schStart');
    var endEl = document.getElementById('schEnd');
    entry.startDate = startEl ? startEl.value : '';
    entry.endDate = endEl ? endEl.value : '';
    if (!entry.startDate || !entry.endDate) { alert('Start and end dates are required.'); return; }
  } else {
    var rows = document.querySelectorAll('.inst-row');
    var insts = [], pctTotal = 0;
    for (var i = 0; i < rows.length; i++) {
      var dEl = rows[i].querySelector('.inst-date');
      var pEl = rows[i].querySelector('.inst-pct');
      var fEl = rows[i].querySelector('.inst-fund');
      if (dEl && pEl && fEl) {
        var dv = dEl.value, pv = parseFloat(pEl.value) || 0;
        if (dv && pv > 0) { insts.push({pct: pv, date: dv, fund: fEl.value}); pctTotal += pv; }
      }
    }
    if (!insts.length) { alert('Please add at least one installment.'); return; }
    if (Math.abs(pctTotal - 100) > 0.01) { alert('Installments must total 100%. Currently: ' + pctTotal + '%'); return; }
    insts.sort(function(a,b) { return a.date < b.date ? -1 : 1; });
    entry.installments = insts;
  }

  data.schedules.push(entry);
  saveData();
  notify('Schedule enrolled: ' + vendor);
  renderPage();
}

function deleteSchedule(index) {
  if (!confirm('Delete this schedule and all related payments?')) return;
  var sid = data.schedules[index].id;
  data.payments = data.payments.filter(function(p) { return String(p.scheduleId) !== String(sid); });
  data.schedules.splice(index, 1);
  saveData();
  notify('Schedule deleted');
  renderPage();
}

function recordInvestment() {
  var dateEl = document.getElementById('invDate');
  var fundEl = document.getElementById('invFund');
  var amtEl = document.getElementById('invAmount');
  var curEl = document.getElementById('invCurrency');
  var stEl = document.getElementById('invStatus');
  var remEl = document.getElementById('invRemarks');

  var invDate = dateEl ? dateEl.value : '';
  var amount = parseFloat(amtEl ? amtEl.value : 0) || 0;
  if (!invDate || !amount) { alert('Date and amount are required.'); return; }

  data.investments.push({
    id: uid(), date: invDate, fund: fundEl ? fundEl.value : 'VN Fund',
    amount: amount, currency: curEl ? curEl.value : 'USD',
    status: stEl ? stEl.value : 'Deposited',
    remarks: remEl ? remEl.value.trim() : ''
  });
  saveData();
  notify('Investment recorded');
  renderPage();
}

function deleteInvestment(index) {
  if (!confirm('Delete this record?')) return;
  data.investments.splice(index, 1);
  saveData();
  notify('Record deleted');
  renderPage();
}

function backupData() {
  var backup = {version:1, date:new Date().toISOString(), currency:state.displayCurrency, payments:data.payments, schedules:data.schedules, investments:data.investments, files:data.files};
  var blob = new Blob([JSON.stringify(backup, null, 2)], {type:'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'StellarSeeds_' + todayStr() + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  notify('Backup downloaded');
}

function restoreData(file) {
  if (!file) return;
  if (!confirm('This will replace ALL current data. Continue?')) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var b = JSON.parse(e.target.result);
      if (!b.version) throw new Error('Invalid backup file');
      data.payments = b.payments || [];
      data.schedules = b.schedules || [];
      data.investments = b.investments || [];
      data.files = b.files || {};
      if (b.currency) state.displayCurrency = b.currency;
      saveData();
      notify('Data restored successfully');
      renderPage();
    } catch(err) {
      alert('Error: ' + err.message);
    }
  };
  reader.readAsText(file);
}

function clearAllData() {
  if (!confirm('DELETE ALL DATA? This cannot be undone.')) return;
  if (!confirm('Are you absolutely sure?')) return;
  data.payments = [];
  data.schedules = [];
  data.investments = [];
  data.files = {};
  saveData();
  notify('All data cleared');
  renderPage();
}

/* ============================================================
   UI HELPERS
   ============================================================ */
function toggleNewVendor(sel, inputId) {
  var inp = document.getElementById(inputId);
  if (inp) inp.style.display = sel.value === '__NEW__' ? 'block' : 'none';
}

function toggleCategorySpec(sel, wrapperId) {
  var el2 = document.getElementById(wrapperId);
  if (el2) el2.style.display = sel.value === 'Others' ? 'block' : 'none';
}

function checkPercent() {
  var rows = document.querySelectorAll('.inst-row');
  var total = 0;
  for (var i = 0; i < rows.length; i++) {
    var p = rows[i].querySelector('.inst-pct');
    if (p) total += (parseFloat(p.value) || 0);
  }
  var warn = document.getElementById('pctWarning');
  if (warn) {
    warn.textContent = Math.abs(total - 100) > 0.01 ? 'Total: ' + total + '%' : '100% OK';
    warn.style.color = Math.abs(total - 100) > 0.01 ? '#cc3333' : '#2d8a32';
  }
}

function addInstallmentRow() {
  var container = document.getElementById('installmentRows');
  if (!container) return;
  var row = document.createElement('div');
  row.className = 'inst-row';
  row.style.cssText = 'display:grid;grid-template-columns:1fr 80px 100px 40px;gap:8px;align-items:end;margin-bottom:6px';
  row.innerHTML = '<div class="fg"><label class="fl">Date</label><input type="date" class="inst-date" value="' + todayStr() + '"></div>' +
    '<div class="fg"><label class="fl">%</label><input type="number" class="inst-pct" value="0" oninput="SS.checkPercent()"></div>' +
    '<div class="fg"><label class="fl">Fund</label><select class="inst-fund">' + fundOptions(state.schFund) + '</select></div>' +
    '<div class="fg"><button class="btn bs bd" onclick="SS.removeInstRow(this)">X</button></div>';
  container.appendChild(row);
}

function removeInstRow(btn) {
  var row = btn.closest('.inst-row');
  if (row) row.remove();
  checkPercent();
}

function doConvert() {
  var amtEl = document.getElementById('convAmount');
  var fromEl = document.getElementById('convFrom');
  var toEl = document.getElementById('convTo');
  var resEl = document.getElementById('convResult');
  var infoEl = document.getElementById('convInfo');
  if (!amtEl || !fromEl || !toEl) return;
  var amt = parseFloat(amtEl.value) || 0;
  var from = fromEl.value, to = toEl.value;
  if (resEl) resEl.textContent = formatCurrency(convert(amt, from, to), to);
  if (infoEl) infoEl.textContent = '1 ' + from + ' = ' + convert(1, from, to).toFixed(4) + ' ' + to;
}

function swapCurrencies() {
  var fromEl = document.getElementById('convFrom');
  var toEl = document.getElementById('convTo');
  if (!fromEl || !toEl) return;
  var tmp = fromEl.value;
  fromEl.value = toEl.value;
  toEl.value = tmp;
  doConvert();
}

/* ============================================================
   PUBLIC API
   ============================================================ */
window.SS = {
  init: function() { loadData(); renderNav(); renderPage(); },
  go: go,
  render: renderPage,
  setCurrency: function(v) { state.displayCurrency = v; localStorage.setItem('ss_currency', v); renderPage(); },
  setPayType: function(v) { state.payType = v; renderPage(); },
  setSchTerm: function(v) { state.schTerm = v; renderPage(); },
  setSchFund: function(v) { state.schFund = v; renderPage(); },
  closeModal: function() { el('modal').classList.remove('op'); },
  recordPayment: recordPayment,
  deletePayment: deletePayment,
  enrollSchedule: enrollSchedule,
  deleteSchedule: deleteSchedule,
  showScheduleDetail: showScheduleDetail,
  openPaymentModal: openPaymentModal,
  pickInstallment: pickInstallment,
  submitSchedulePayment: submitSchedulePayment,
  recordInvestment: recordInvestment,
  deleteInvestment: deleteInvestment,
  backupData: backupData,
  restoreData: restoreData,
  clearAllData: clearAllData,
  toggleNew: toggleNewVendor,
  toggleSpec: toggleCategorySpec,
  checkPercent: checkPercent,
  addInstallmentRow: addInstallmentRow,
  removeInstRow: removeInstRow,
  doConvert: doConvert,
  swapCurrencies: swapCurrencies
};

/* ============================================================
   BOOT
   ============================================================ */
SS.init();

})();
</script>
