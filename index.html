<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stellar Seeds Vietnam</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f4f0;--s1:#fff;--s2:#faf9f6;--s3:#eeece7;--b1:#e0ded8;--b2:#ece9e3;--g:#2d8a32;--gb:#3da642;--gc:rgba(45,138,50,.08);--bl:#2874a6;--blc:rgba(40,116,166,.08);--am:#b89630;--amc:rgba(184,150,48,.08);--rd:#cc3333;--rdc:rgba(204,51,51,.08);--or:#d4930d;--orc:rgba(212,147,13,.08);--pu:#9b59b6;--t1:#1a1c18;--t2:#555;--t3:#999;--r:6px;--rl:10px}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t1);line-height:1.5;font-size:14px;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}a{cursor:pointer}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--b1);border-radius:3px}
.hdr{height:52px;background:var(--s1);border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px}
.logo-ic{width:32px;height:32px;background:linear-gradient(135deg,var(--g),#1a5c20);border-radius:var(--r);position:relative}
.logo-ic::after{content:'';position:absolute;width:16px;height:16px;border:2.5px solid rgba(255,255,255,.9);border-radius:50%;top:5px;left:5px}
.logo-txt{display:flex;flex-direction:column;line-height:1}
.logo-nm{font-family:'Cormorant Garamond',serif;font-size:.88rem;font-weight:700;color:var(--am);letter-spacing:.18em;text-transform:uppercase}
.logo-sb{font-family:'JetBrains Mono',monospace;font-size:.38rem;color:var(--t3);letter-spacing:.08em;text-transform:uppercase}
.hdr-r{display:flex;align-items:center;gap:8px}
.hdr-usr{font-family:'JetBrains Mono',monospace;font-size:.56rem;color:var(--bl);max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dot{width:7px;height:7px;border-radius:50%}.dot.on{background:var(--g);box-shadow:0 0 6px rgba(45,138,50,.4)}.dot.off{background:var(--b1)}.dot.wr{background:var(--or)}.dot.err{background:var(--rd)}
.dot-lb{font-family:'JetBrains Mono',monospace;font-size:.54rem;color:var(--t3)}
.btn{font-weight:600;font-size:.72rem;padding:5px 12px;border-radius:var(--r);border:1px solid var(--b1);background:var(--s1);color:var(--t1);transition:all .12s;white-space:nowrap}.btn:hover{background:var(--s3)}
.bp{background:var(--g);border-color:var(--g);color:#fff}.bp:hover{background:var(--gb)}.bd{border-color:var(--rd);color:var(--rd)}.bs{padding:3px 8px;font-size:.66rem}.bb{background:var(--bl);border-color:var(--bl);color:#fff}
.nav{background:var(--s1);border-bottom:1px solid var(--b1);display:flex;padding:0 12px;overflow-x:auto;position:sticky;top:52px;z-index:99}
.nav button{background:0;border:0;padding:8px 10px;font-size:.74rem;font-weight:600;color:var(--t3);border-bottom:2px solid transparent;white-space:nowrap;font-family:'DM Sans',sans-serif;transition:all .15s}.nav button:hover{color:var(--t1)}.nav button.act{color:var(--g);border-color:var(--g)}
.app{padding:16px;max-width:1400px;margin:0 auto}
.card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);padding:14px;margin-bottom:12px}
.ch{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.ct{font-family:'Space Grotesk',sans-serif;font-size:.82rem;font-weight:700}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:14px}
.si{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);padding:12px}
.si .sl{font-family:'JetBrains Mono',monospace;font-size:.54rem;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.si .sv{font-family:'Space Grotesk',sans-serif;font-size:1.15rem;font-weight:700;line-height:1.1}
.tw{overflow-x:auto;border-radius:var(--r);border:1px solid var(--b1)}
table{width:100%;border-collapse:collapse;font-size:.76rem}
th{background:var(--s2);font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:.6rem;text-transform:uppercase;letter-spacing:.04em;color:var(--t3);padding:6px 8px;text-align:left;border-bottom:1px solid var(--b1);white-space:nowrap;cursor:pointer;user-select:none;transition:background .1s}th:hover{background:var(--s3)}th .sort-arrow{font-size:.5rem;margin-left:2px;opacity:.4}th.sorted .sort-arrow{opacity:1;color:var(--bl)}
td{padding:5px 8px;border-bottom:1px solid var(--b2);vertical-align:middle}tr:last-child td{border-bottom:0}tbody tr:hover{background:var(--s2)}
.badge{font-family:'JetBrains Mono',monospace;font-size:.56rem;padding:2px 6px;border-radius:12px;font-weight:500;display:inline-flex;align-items:center;gap:3px;white-space:nowrap}.badge::before{content:'';width:4px;height:4px;border-radius:50%;flex-shrink:0}
.bg2{background:var(--gc);color:var(--g)}.bg2::before{background:var(--g)}.bd2{background:var(--rdc);color:var(--rd)}.bd2::before{background:var(--rd)}.by2{background:var(--orc);color:var(--or)}.by2::before{background:var(--or)}.bb2{background:var(--blc);color:var(--bl)}.bb2::before{background:var(--bl)}.bx2{background:rgba(153,153,153,.12);color:var(--t3)}.bx2::before{background:var(--t3)}
select,input[type="text"],input[type="password"],input[type="number"],input[type="date"],textarea{width:100%;padding:6px 10px;background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);color:var(--t1);font-family:'DM Sans',sans-serif;font-size:.8rem;outline:0;transition:border-color .15s}select:focus,input:focus,textarea:focus{border-color:var(--g)}textarea{resize:vertical;min-height:36px}
.fg{margin-bottom:8px}.fl{display:block;font-size:.68rem;font-weight:600;color:var(--t2);margin-bottom:3px}.fr{color:var(--rd)}
.fbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:8px 10px;background:var(--s2);border:1px solid var(--b2);border-radius:var(--rl);margin-bottom:10px}
.fbar label{font-size:.7rem;font-weight:600;color:var(--t2);white-space:nowrap}.fbar select,.fbar input[type="text"]{width:auto;min-width:90px;padding:4px 8px;font-size:.74rem;border-radius:var(--r);border:1px solid var(--b1);background:var(--s1);font-weight:600;outline:0}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;display:none;align-items:center;justify-content:center;padding:12px}.modal.open{display:flex}
.mbox{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);width:100%;max-width:680px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.mhdr{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--b1);position:sticky;top:0;background:var(--s1);z-index:1}.mhdr h3{font-family:'Space Grotesk',sans-serif;font-size:.88rem;font-weight:700}
.mx{background:0;border:0;color:var(--t3);font-size:1.2rem;padding:4px 8px}.mx:hover{color:var(--t1)}
.mbd{padding:16px}.mft{padding:10px 16px;border-top:1px solid var(--b1);display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:var(--s1)}
.toast{position:fixed;bottom:16px;right:16px;background:var(--t1);color:#fff;padding:8px 16px;border-radius:var(--r);font-size:.76rem;font-weight:600;z-index:300;transform:translateY(60px);opacity:0;transition:all .3s ease}.toast.show{transform:translateY(0);opacity:1}
#loginScr{position:fixed;inset:0;background:linear-gradient(135deg,#1a2416,#243322);display:flex;align-items:center;justify-content:center;z-index:1000}
.lcard{background:var(--s1);border-radius:14px;padding:36px 32px;width:400px;max-width:92vw;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.lerr{background:var(--rdc);color:var(--rd);padding:8px 12px;border-radius:var(--r);font-size:.72rem;margin-bottom:10px;display:none;border:1px solid rgba(204,51,51,.2)}
.term-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.term-card{border:2px solid var(--b2);border-radius:var(--rl);padding:14px;cursor:pointer;transition:all .15s;text-align:center}
.term-card:hover{border-color:var(--bl);background:var(--blc)}.term-card.sel{border-color:var(--g);background:var(--gc)}
.term-card .tc-icon{font-size:1.4rem;margin-bottom:4px}.term-card .tc-title{font-family:'Space Grotesk',sans-serif;font-size:.82rem;font-weight:700}.term-card .tc-desc{font-size:.62rem;color:var(--t3);margin-top:2px}
.ps-inst-row{display:grid;grid-template-columns:1fr 80px 100px 40px;gap:8px;align-items:end;margin-bottom:6px}.ps-inst-row .fg{margin-bottom:0}
.ps-schedule-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:10px}
.ps-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);padding:12px;border-left:4px solid var(--bl);transition:all .15s}
.ps-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.06)}
.ps-card-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.ps-card-vendor{font-family:'Space Grotesk',sans-serif;font-size:.88rem;font-weight:700}
.ps-card-total{font-family:'JetBrains Mono',monospace;font-size:.92rem;font-weight:700;color:var(--bl)}
.ps-card-actions{display:flex;gap:4px;margin-top:8px;justify-content:flex-end}
.mo-highlight{background:linear-gradient(135deg,var(--blc),rgba(40,116,166,.04));border:1px solid rgba(40,116,166,.15);border-radius:var(--r);padding:8px 10px;margin-top:6px;display:grid;grid-template-columns:1fr 1fr;gap:6px}
.mo-highlight-item{text-align:center}.mo-highlight-label{font-size:.5rem;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.06em;color:var(--bl);margin-bottom:1px}
.mo-highlight-val{font-family:'Space Grotesk',sans-serif;font-size:1rem;font-weight:700;color:var(--bl);line-height:1.1}
.fund-avail-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;padding:10px;background:var(--s2);border:1px solid var(--b2);border-radius:var(--rl)}
.fund-avail-item{text-align:center;padding:8px;border-radius:var(--r);border:2px solid var(--b2);cursor:pointer;transition:all .15s}
.fund-avail-item:hover{border-color:var(--bl)}.fund-avail-item.sel{border-color:var(--g);background:var(--gc)}
.fund-avail-name{font-size:.58rem;font-family:'JetBrains Mono',monospace;font-weight:700;text-transform:uppercase;margin-bottom:2px}
.fund-avail-bal{font-family:'Space Grotesk',sans-serif;font-size:.92rem;font-weight:700;line-height:1.1}
.fund-avail-sub{font-size:.5rem;color:var(--t3);font-family:'JetBrains Mono',monospace;margin-top:2px}
.vd-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);margin-bottom:12px;overflow:hidden}
.vd-header{padding:14px 16px;border-bottom:1px solid var(--b1);display:flex;justify-content:space-between;align-items:center}
.vd-name{font-family:'Space Grotesk',sans-serif;font-size:1rem;font-weight:700}
.vd-body{padding:14px 16px}
.vd-bar-wrap{height:10px;background:var(--s3);border-radius:5px;overflow:hidden;margin:6px 0}
.vd-bar-paid{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--g),var(--gb))}
.fund-bal-row{display:grid;grid-template-columns:100px 1fr 100px 100px;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid var(--b2);font-size:.72rem}
.fund-bal-row:last-child{border-bottom:0}.fund-bal-name{font-weight:700}
.fund-bal-bar{height:14px;background:var(--s3);border-radius:4px;overflow:hidden;position:relative}
.fund-bal-in{height:100%;background:linear-gradient(90deg,var(--g),var(--gb));border-radius:4px;position:absolute;top:0;left:0}
.fund-bal-out{height:100%;background:linear-gradient(90deg,var(--rd),#e05050);border-radius:4px;position:absolute;top:0;left:0;opacity:.5}
.fund-bal-val{font-family:'JetBrains Mono',monospace;font-weight:700;text-align:right}
.ps-prog-wrap{margin:6px 0}
.ps-prog-bar{height:10px;background:var(--s3);border-radius:5px;overflow:hidden;position:relative}
.ps-prog-fill{height:100%;border-radius:5px;transition:width .3s}
.ps-prog-info{display:flex;justify-content:space-between;font-size:.54rem;font-family:'JetBrains Mono',monospace;margin-top:3px;color:var(--t3)}
.inst-pick{border:2px solid var(--b1);border-radius:var(--rl);padding:12px;margin-bottom:8px;cursor:pointer;transition:all .15s;background:var(--s1)}
.inst-pick:hover{border-color:var(--bl);background:var(--blc)}.inst-pick.ip-sel{border-color:var(--g);background:var(--gc)}.inst-pick.ip-done{border-color:var(--b2);background:var(--s2);cursor:default;opacity:.7}
.inst-pick-head{display:flex;justify-content:space-between;align-items:center}
.inst-pick-tranche{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.84rem}
.inst-pick-amt{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:.88rem;color:var(--bl)}
.ps-pay-list{margin-top:8px;padding-top:8px;border-top:1px solid var(--b2)}
.ps-pay-item{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:.64rem;border-bottom:1px dashed var(--b2)}.ps-pay-item:last-child{border-bottom:0}
.ps-pay-date{font-family:'JetBrains Mono',monospace;color:var(--t3)}
.ps-pay-amt{font-family:'JetBrains Mono',monospace;font-weight:700}
.ps-pay-btn{background:0;border:0;color:var(--t3);font-size:.6rem;padding:1px 4px;cursor:pointer}.ps-pay-btn:hover{color:var(--bl)}.ps-pay-btn.del:hover{color:var(--rd)}
.vendor-dd{display:flex;gap:6px;align-items:end}.vendor-dd select{flex:2}.vendor-dd input{flex:1}
.cur-pair-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.cur-pair-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);padding:12px;text-align:center}
.cur-pair-pair{font-family:'Space Grotesk',sans-serif;font-size:.72rem;font-weight:700;color:var(--t3);margin-bottom:2px}
.cur-pair-rate{font-family:'JetBrains Mono',monospace;font-size:1.1rem;font-weight:700;color:var(--bl)}
.cur-pair-sub{font-size:.54rem;color:var(--t3);font-family:'JetBrains Mono',monospace;margin-top:2px}
.cur-convert-box{background:linear-gradient(135deg,var(--s1),var(--s2));border:1px solid var(--b1);border-radius:var(--rl);padding:20px;margin-bottom:14px}
.cur-convert-result{font-family:'Space Grotesk',sans-serif;font-size:1.6rem;font-weight:700;color:var(--g);text-align:center;margin:10px 0 4px}
.cur-convert-sub{text-align:center;font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--t3)}
.exp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.exp-card{border:2px solid var(--b2);border-radius:var(--rl);padding:20px;cursor:pointer;transition:all .15s;text-align:center}
.exp-card:hover{transform:translateY(-2px)}
.exp-card .exp-icon{font-size:2.2rem;margin-bottom:6px}.exp-card .exp-title{font-family:'Space Grotesk',sans-serif;font-size:.88rem;font-weight:700}
.exp-card.excel{border-color:rgba(45,138,50,.3)}.exp-card.excel:hover{border-color:var(--g);background:var(--gc)}
.exp-card.pdf{border-color:rgba(204,51,51,.3)}.exp-card.pdf:hover{border-color:var(--rd);background:var(--rdc)}
.exp-card.ppt{border-color:rgba(212,147,13,.3)}.exp-card.ppt:hover{border-color:var(--or);background:var(--orc)}
.sum-totals{display:flex;gap:16px;align-items:center;padding:8px 12px;background:var(--s2);border:1px solid var(--b2);border-radius:var(--r);margin-bottom:8px;flex-wrap:wrap}
.sum-total-item{font-family:'JetBrains Mono',monospace;font-size:.62rem;display:flex;align-items:center;gap:4px}
.sum-total-val{font-weight:700;font-size:.82rem}
.sum-total-label{color:var(--t3);text-transform:uppercase;letter-spacing:.04em}
.vd-pay-mini-bar{height:6px;background:var(--s3);border-radius:3px;overflow:hidden;min-width:60px}
.vd-pay-mini-fill{height:100%;border-radius:3px}
.donut-wrap{position:relative;width:150px;height:150px;flex-shrink:0}
.donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.donut-total{font-family:'JetBrains Mono',monospace;font-size:.44rem;color:var(--t3);text-transform:uppercase;letter-spacing:.06em}
.donut-val{font-family:'Space Grotesk',sans-serif;font-size:.88rem;font-weight:700;color:var(--g)}
.dash-row{display:grid;gap:10px;margin-bottom:12px}.dash-row.c2{grid-template-columns:1fr 1fr}.dash-row.c16{grid-template-columns:1fr 1.6fr}.dash-row.c14{grid-template-columns:1.4fr 1fr}
.cat-legend-item{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.cat-legend-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.cat-legend-label{font-size:.6rem;flex:1}
.cat-legend-pct{font-family:'JetBrains Mono',monospace;font-size:.6rem;font-weight:700}
.cat-legend-val{font-family:'JetBrains Mono',monospace;font-size:.54rem;color:var(--t3)}
.bar-row{margin-bottom:10px}.bar-row-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
.bar-row-label{font-size:.62rem;font-weight:700;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-row-val{font-family:'JetBrains Mono',monospace;font-size:.56rem;font-weight:700}
.bar-track{position:relative;height:18px;background:var(--s3);border-radius:4px;overflow:hidden}
.bar-fill{position:absolute;top:0;left:0;height:100%;border-radius:4px;transition:width .4s ease}
.bar-fill-bg{position:absolute;top:0;left:0;height:100%;border-radius:4px;opacity:.22}
.bar-sub{display:flex;justify-content:space-between;font-size:.46rem;font-family:'JetBrains Mono',monospace;color:var(--t3);margin-top:1px}
.status-stack{height:22px;background:var(--s3);border-radius:8px;overflow:hidden;display:flex;margin-bottom:8px}
.status-seg{transition:width .3s ease;position:relative}
.status-seg:first-child{border-radius:8px 0 0 8px}.status-seg:last-child{border-radius:0 8px 8px 0}
.status-legend{display:flex;gap:16px;flex-wrap:wrap}
.status-legend-item{display:flex;align-items:center;gap:4px}
.status-legend-dot{width:6px;height:6px;border-radius:2px}
.status-legend-label{font-size:.58rem}
.status-legend-count{font-family:'JetBrains Mono',monospace;font-size:.62rem;font-weight:700}
.fund-bar-item{margin-bottom:10px}
.fund-bar-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.fund-bar-name{font-size:.62rem;font-weight:700}
.fund-bar-pct{font-family:'JetBrains Mono',monospace;font-size:.56rem}
.fund-bar-track{height:10px;background:var(--s3);border-radius:5px;overflow:hidden}
.fund-bar-fill{height:100%;border-radius:5px;transition:width .3s}
.fund-bar-sub{display:flex;justify-content:space-between;font-size:.46rem;font-family:'JetBrains Mono',monospace;color:var(--t3);margin-top:2px}
.upc-item{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--b2);font-size:.66rem}.upc-item:last-child{border-bottom:0}
.upc-vendor{font-weight:600;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.upc-date{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--t3)}
.upc-amt{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--or)}

<body>
<div id="loginScr" style="display:none"><div class="lcard"><div style="display:flex;align-items:center;gap:10px;margin-bottom:24px;justify-content:center"><div class="logo-ic" style="width:40px;height:40px"></div><div class="logo-txt"><span class="logo-nm" style="font-size:1.1rem">Stellar Seeds</span><span class="logo-sb">Construction Management</span></div></div><div style="font-family:'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:700;text-align:center;margin-bottom:4px" id="lTitle">Sign In</div><div style="font-size:.72rem;color:var(--t3);text-align:center;margin-bottom:20px">Enter credentials</div><div class="lerr" id="lErr"></div><div class="fg"><label class="fl">Email</label><input type="text" id="lEmail" placeholder="you@company.com"></div><div class="fg"><label class="fl">Password</label><input type="password" id="lPass" placeholder="Password"></div><button class="btn bp" style="width:100%;padding:10px;font-size:.82rem;margin-top:6px" id="lBtn" onclick="doLogin()">Sign In</button><div style="text-align:center;margin-top:14px;font-size:.74rem;color:var(--t3)" id="lTog">No account? <a style="color:var(--g);font-weight:600" onclick="togAuth()">Sign Up</a></div><div style="margin-top:16px;padding-top:12px;border-top:1px solid var(--b2);text-align:center"><a style="font-size:.68rem;color:var(--t3);text-decoration:underline" onclick="skipAuth()">Continue without login</a></div></div></div>

<div class="toast" id="tst"></div>
<script>
try {
var D={costs:[],pays:[],upds:[],psSch:[],vn:{},invSch:[]};
var curUser=null,auth=null,db=null,cOn=false,skipSync=false,tab='costD';
var nP=100,nPSS=200,nINV=300,DC='USD';
var FX={USD:{r:1,name:'US Dollar'},EUR:{r:0.92,name:'Euro'},VND:{r:26307,name:'Dong'},PHP:{r:61.26,name:'Peso'},THB:{r:34.5,name:'Baht'},SGD:{r:1.34,name:'S Dollar'},CNY:{r:7.24,name:'Yuan'},JPY:{r:155.5,name:'Yen'},KRW:{r:1380,name:'Won'},GBP:{r:0.79,name:'Pound'},AUD:{r:1.53,name:'A Dollar'},MYR:{r:4.47,name:'Ringgit'},INR:{r:83.5,name:'Rupee'}};
var SY={USD:'$',EUR:'\u20ac',VND:'\u0110',PHP:'\u20b1',THB:'\u0e3f',SGD:'S$',CNY:'\u00a5',JPY:'\u00a5',KRW:'\u20a9',GBP:'\u00a3',AUD:'A$',MYR:'RM',INR:'\u20b9'};
var currencyMode='live',liveLastUpdated=null,liveFetching=false;
var CATS=['Machines','Buildings','Land','Opex','Others'];
var CAT_COLORS={Machines:'#2874a6',Buildings:'#2d8a32',Land:'#b89630',Opex:'#9b59b6',Others:'#999'};
var FUNDS=['VN Fund','PH Fund','Other'];
var FUND_COLORS={'VN Fund':'#2d8a32','PH Fund':'#2874a6','Other':'#b89630'};
var authMode='login',pssTerm='monthly',pssFund='VN Fund';
var curFrom='USD',curTo='EUR',curConvAmt=1000;
var invShowFund='all',summaryMonth='all',cfFund='all',cfMonths=12,cfLookback=6;
var hFilter={type:'all',fund:'all',q:''};
var vsFilter={q:'',cat:'all',fund:'all',status:'all',sort:'vendor',sortDir:1};
window._payInstIdx=-1;
function G(id){return document.getElementById(id)}
function H(s){if(s==null)return '';var d=document.createElement('span');d.textContent=String(s);return d.innerHTML}
function pct(a,b){return b>0?Math.round(a/b*100):0}
function td(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function addD(ds,n){var d=new Date(ds);d.setDate(d.getDate()+n);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function notify(m){var t=G('tst');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2200)}
function mOpen(ti,bd,ft){G('mTi').textContent=ti;G('mBd').innerHTML=bd;G('mFt').innerHTML=ft||'';G('mdl').classList.add('open')}
function mClose(){G('mdl').classList.remove('open')}
function cv(v,f,t){if(f===t)return v;var ff=FX[f]?FX[f].r:1,ft=FX[t]?FX[t].r:1;return ff?v/ff*ft:0}
function fmtC(v,c){return(SY[c]||'')+Number(v||0).toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtD(v){return fmtC(cv(v,'USD',DC),DC)}
function fmtK(v){if(Math.abs(v)>=1e6)return(v/1e6).toFixed(1)+'M';if(Math.abs(v)>=1e3)return(v/1e3).toFixed(1)+'K';return Math.round(v).toString()}
function setDot(st){var el=G('hDot');if(el)el.className='dot '+st}
function setLbl(m){var el=G('hLbl');if(el)el.textContent=m}
function isPermErr(e){var m=(e&&e.message)||'';return m.indexOf('permission')>=0||m.indexOf('PERMISSION_DENIED')>=0}
function uid(){return Date.now().toString(36)+Math.random().toString(36).substr(2,5)}
function getAllVendors(){var m={};for(var i=0;i<D.psSch.length;i++)if(D.psSch[i].vendor)m[D.psSch[i].vendor.toUpperCase()]=1;for(var i=0;i<D.pays.length;i++)if(D.pays[i].vendor)m[D.pays[i].vendor.toUpperCase()]=1;return Object.keys(m).sort()}
function vendorOpts(selVal){var vds=getAllVendors(),uSel=selVal?selVal.toUpperCase():'',o='<option value="">-- Select --</option>';for(var i=0;i<vds.length;i++)o+='<option value="'+H(vds[i])+'"'+(uSel===vds[i]?' selected':'')+'>'+H(vds[i])+'</option>';o+='<option value="__NEW__">+ Add New</option>';return o}
function resolveVendor(selId,newId){var v=G(selId).value;if(v==='__NEW__'){v=G(newId).value.trim();if(!v)return ''}return v.toUpperCase()}
function fundOpts(sel){var o='';for(var i=0;i<FUNDS.length;i++)o+='<option value="'+FUNDS[i]+'"'+(sel===FUNDS[i]?' selected':'')+'>'+FUNDS[i]+'</option>';return o}
function curOpts(sel){var o='';for(var k in FX)o+='<option value="'+k+'"'+(k===sel?' selected':'')+'>'+k+'</option>';return o}
function catOpts(sel){var o='';for(var i=0;i<CATS.length;i++)o+='<option'+(sel===CATS[i]?' selected':'')+'>'+CATS[i]+'</option>';return o}
function fmtM(k){var mn=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],p=k.split('-');return mn[parseInt(p[1])-1]+' '+p[0]}
function monthCount(s,e){if(!s||!e)return 0;return Math.max(1,(new Date(e).getFullYear()-new Date(s).getFullYear())*12+(new Date(e).getMonth()-new Date(s).getMonth())+1)}
function catBadge(cat){var c=CAT_COLORS[cat]||'#999';return '<span class="badge" style="background:'+c+'22;color:'+c+';border:1px solid '+c+'44">'+H(cat)+'</span>'}
function fundBadge(f){var c=FUND_COLORS[f]||'#999';return '<span class="badge" style="background:'+c+'22;color:'+c+';border:1px solid '+c+'44">'+H(f)+'</span>'}
function cbar(fn){return '<div class="fbar"><label>Display:</label><select onchange="'+fn+'">'+curOpts(DC)+'</select></div>'}
function findSch(id){for(var i=0;i<D.psSch.length;i++){if(String(D.psSch[i].id)===String(id))return{sch:D.psSch[i],idx:i}}return null}
function findPayIdx(payId){for(var i=0;i<D.pays.length;i++){if(D.pays[i].id===String(payId))return i}return-1}
function getSchPayments(schId){var l=[];for(var i=0;i<D.pays.length;i++){if(D.pays[i].psSchId&&String(D.pays[i].psSchId)===String(schId))l.push(D.pays[i])}return l}
function getSchPaidUSD(schId){var pays=getSchPayments(schId),t=0;for(var i=0;i<pays.length;i++)t+=cv(pays[i].amt,pays[i].cur,'USD');return t}
function getInstPaidUSD(schId,instIdx){var t=0;for(var i=0;i<D.pays.length;i++){var p=D.pays[i];if(p.psSchId&&String(p.psSchId)===String(schId)&&p.instIdx===instIdx)t+=cv(p.amt,p.cur,'USD')}return t}
function getSchTotalUSD(schId){var f=findSch(schId);return f?f.sch.totalCost/(FX[f.sch.cur]?FX[f.sch.cur].r:1):0}
function getSchStatus(schId){var total=getSchTotalUSD(schId),paid=getSchPaidUSD(schId);if(total<=0)return{label:'No Data',cls:'bx2',pct:0};var p=paid/total*100;if(p>=99.5)return{label:'Paid',cls:'bg2',pct:100};if(p>0)return{label:'Partial '+Math.round(p)+'%',cls:'by2',pct:p};return{label:'Pending',cls:'bd2',pct:0}}
function getFundBalances(){var bal={};for(var i=0;i<FUNDS.length;i++)bal[FUNDS[i]]={inflow:0,outflow:0,balance:0};for(var i=0;i<D.invSch.length;i++){var r=D.invSch[i],f=r.fund||'Other';if(!bal[f])bal[f]={inflow:0,outflow:0,balance:0};if(r.status==='Deposited'||r.status==='Confirmed')bal[f].inflow+=cv(r.amount,r.cur||'USD','USD')}for(var i=0;i<D.pays.length;i++){var p=D.pays[i],f=p.fund||'Other';if(!bal[f])bal[f]={inflow:0,outflow:0,balance:0};bal[f].outflow+=cv(p.amt,p.cur,'USD')}for(var k in bal)bal[k].balance=bal[k].inflow-bal[k].outflow;return bal}
function getSummaryMonths(){var m={};for(var i=0;i<D.pays.length;i++){if(D.pays[i].date)m[D.pays[i].date.substring(0,7)]=1}for(var i=0;i<D.invSch.length;i++){if(D.invSch[i].date)m[D.invSch[i].date.substring(0,7)]=1}return Object.keys(m).sort()}

function renderDonut(data,size){
    var total=0;for(var i=0;i<data.length;i++)total+=data[i].value;
    if(total===0)return '<svg viewBox="0 0 100 100" style="width:'+size+'px;height:'+size+'px"><circle cx="50" cy="50" r="35" fill="none" stroke="#eeece7" stroke-width="16"/></svg>';
    var r=35,circ=2*Math.PI*r,offset=0;
    var svg='<svg viewBox="0 0 100 100" style="width:'+size+'px;height:'+size+'px;transform:rotate(-90deg)">';
    svg+='<circle cx="50" cy="50" r="'+r+'" fill="none" stroke="#eeece7" stroke-width="16"/>';
    for(var i=0;i<data.length;i++){
        var seg=(data[i].value/total)*circ;if(seg<0.3)continue;
        svg+='<circle cx="50" cy="50" r="'+r+'" fill="none" stroke="'+data[i].color+'" stroke-width="16" stroke-dasharray="'+seg.toFixed(2)+' '+(circ-seg).toFixed(2)+'" stroke-dashoffset="'+(-offset).toFixed(2)+'"/>';
        offset+=seg;
    }
    svg+='</svg>';return svg;
}

function renderMonthlyTrend(monthlyPay){
    var allMos=Object.keys(monthlyPay).sort();
    if(!allMos.length)return '<div style="text-align:center;padding:30px;color:var(--t3);font-size:.76rem">No payment data yet</div>';
    var show=allMos.slice(-12),vals=[];
    for(var i=0;i<show.length;i++)vals.push(monthlyPay[show[i]]||0);
    var mx=Math.max.apply(null,vals);if(mx===0)mx=100;
    var W=700,H=190,pL=65,pR=12,pT=14,pB=26,cW=W-pL-pR,cH=H-pT-pB;
    var bW=Math.min(32,cW/show.length*0.6),bG=(cW-bW*show.length)/(show.length+1);
    var mn=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var svg='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto">';
    for(var g=0;g<=4;g++){
        var y=pT+cH-(g/4)*cH;
        svg+='<line x1="'+pL+'" y1="'+y+'" x2="'+(W-pR)+'" y2="'+y+'" stroke="#e0ded8" stroke-width=".5"'+(g===4?' stroke-dasharray="none"':' stroke-dasharray="4,3"')+'/>';
        svg+='<text x="'+(pL-6)+'" y="'+(y+3)+'" font-size="7.5" text-anchor="end" fill="#999" font-family="JetBrains Mono, monospace">'+fmtK(mx*g/4)+'</text>';
    }
    var linePts='';
    for(var i=0;i<show.length;i++){
        var x=pL+bG+i*(bW+bG),bH=mx>0?(vals[i]/mx)*cH:0,y=pT+cH-bH;
        var mo=mn[parseInt(show[i].split('-')[1])-1],yr=show[i].substring(2,4);
        svg+='<rect x="'+x+'" y="'+y+'" width="'+bW+'" height="'+bH+'" fill="#2874a6" rx="2" opacity=".75"><title>'+mo+' '+yr+': '+fmtD(vals[i])+'</title></rect>';
        if(vals[i]>0)svg+='<text x="'+(x+bW/2)+'" y="'+(y-4)+'" font-size="6.5" text-anchor="middle" fill="#2874a6" font-family="JetBrains Mono, monospace" font-weight="700">'+fmtK(vals[i])+'</text>';
        svg+='<text x="'+(x+bW/2)+'" y="'+(H-5)+'" font-size="7" text-anchor="middle" fill="#999" font-family="JetBrains Mono, monospace">'+mo+'</text>';
        var cx=x+bW/2,cy=y;
        linePts+=cx.toFixed(1)+','+cy.toFixed(1)+' ';
    }
    if(show.length>1){svg+='<polyline points="'+linePts.trim()+'" fill="none" stroke="#d4930d" stroke-width="1.5" stroke-dasharray="4,2" opacity=".6"/>';
    for(var i=0;i<show.length;i++){var x2=pL+bG+i*(bW+bG)+bW/2,y2=pT+cH-(mx>0?(vals[i]/mx)*cH:0);svg+='<circle cx="'+x2+'" cy="'+y2+'" r="2.5" fill="#d4930d" opacity=".8"/>'}}
    svg+='</svg>';
    return svg;
}

function renderCatBarChart(){
    var rows=[];
    for(var ci=0;ci<CATS.length;ci++){var c=CATS[ci],s=0,p=0;
        for(var i=0;i<D.psSch.length;i++){if((D.psSch[i].category||'Others')===c)s+=cv(D.psSch[i].totalCost,D.psSch[i].cur||'USD','USD')}
        for(var i=0;i<D.pays.length;i++){if((D.pays[i].category||'Others')===c)p+=cv(D.pays[i].amt,D.pays[i].cur,'USD')}
        if(s>0||p>0)rows.push({cat:c,sched:s,paid:p,color:CAT_COLORS[c]||'#999'});
    }
    if(!rows.length)return '<div style="text-align:center;padding:20px;color:var(--t3);font-size:.72rem">No data</div>';
    var mx=0;for(var i=0;i<rows.length;i++)mx=Math.max(mx,rows[i].sched,rows[i].paid);if(mx===0)mx=1;
    var h='';
    for(var i=0;i<rows.length;i++){var r=rows[i],sPct=(r.sched/mx)*100,pPct=(r.paid/mx)*100,cp=r.sched>0?Math.min(100,Math.round(r.paid/r.sched*100)):100;
        h+='<div class="bar-row"><div class="bar-row-head"><span class="bar-row-label">'+r.cat+'</span><span class="bar-row-val" style="color:'+r.color+'">'+cp+'%</span></div>';
        h+='<div class="bar-track"><div class="bar-fill-bg" style="width:'+sPct+'%;background:'+r.color+'"></div><div class="bar-fill" style="width:'+pPct+'%;background:'+r.color+'"></div></div>';
        h+='<div class="bar-sub"><span>Budget: '+fmtD(r.sched)+'</span><span style="color:'+r.color+'">Paid: '+fmtD(r.paid)+'</span></div></div>';
    }
    return h;
}

function renderTopVendors(){
    var vm={};
    for(var i=0;i<D.psSch.length;i++){var v=D.psSch[i].vendor.toUpperCase();if(!vm[v])vm[v]={s:0,p:0};vm[v].s+=cv(D.psSch[i].totalCost,D.psSch[i].cur||'USD','USD')}
    for(var i=0;i<D.pays.length;i++){var v=D.pays[i].vendor.toUpperCase();if(!vm[v])vm[v]={s:0,p:0};vm[v].p+=cv(D.pays[i].amt,D.pays[i].cur,'USD')}
    var arr=[];for(var v in vm)arr.push({v:v,s:vm[v].s,p:vm[v].p});
    arr.sort(function(a,b){return b.p-a.p});arr=arr.slice(0,8);
    if(!arr.length)return '<div style="text-align:center;padding:20px;color:var(--t3);font-size:.72rem">No data</div>';
    var mx=arr[0].p;if(mx===0)mx=1;
    var h='';
    for(var i=0;i<arr.length;i++){var r=arr[i],pPct=(r.p/mx)*100,sPct=r.s>0?Math.min((r.s/mx)*100,100):0,vPct=r.s>0?Math.round(r.p/r.s*100):100;
        h+='<div class="bar-row"><div class="bar-row-head"><span class="bar-row-label" title="'+H(r.v)+'">'+H(r.v)+'</span><span class="bar-row-val" style="color:#2d8a32">'+fmtD(r.p)+'</span></div>';
        h+='<div class="bar-track"><div class="bar-fill-bg" style="width:'+sPct+'%;background:#2874a6"></div><div class="bar-fill" style="width:'+pPct+'%;background:#2d8a32"></div></div>';
        if(r.s>0)h+='<div class="bar-sub"><span>Budget: '+fmtD(r.s)+'</span><span>'+vPct+'%</span></div></div>';
        else h+='<div class="bar-sub"><span style="color:var(--t3)">No schedule</span></div></div>';
    }
    return h;
}

function renderStatusStack(){
    var sc={paid:0,partial:0,pending:0};
    for(var i=0;i<D.psSch.length;i++){var st=getSchStatus(D.psSch[i].id);if(st.pct>=99)sc.paid++;else if(st.pct>0)sc.partial++;else sc.pending++}
    var total=sc.paid+sc.partial+sc.pending;
    if(!total)return '<div style="text-align:center;padding:20px;color:var(--t3);font-size:.72rem">No schedules</div>';
    var colors=['#2d8a32','#d4930d','#cc3333'],labels=['Completed','Partial','Pending'],vals=[sc.paid,sc.partial,sc.pending];
    var h='<div class="status-stack">';
    for(var i=0;i<3;i++){if(vals[i]>0)h+='<div class="status-seg" style="width:'+(vals[i]/total*100)+'%;background:'+colors[i]+'"></div>'}
    h+='</div><div class="status-legend">';
    for(var i=0;i<3;i++)h+='<div class="status-legend-item"><span class="status-legend-dot" style="background:'+colors[i]+'"></span><span class="status-legend-label">'+labels[i]+'</span><span class="status-legend-count">'+vals[i]+'</span></div>';
    h+='</div>';return h;
}

function renderFundBars(){
    var fb=getFundBalances(),h='';
    for(var fi=0;fi<FUNDS.length;fi++){var fn=FUNDS[fi],f=fb[fn]||{inflow:0,outflow:0,balance:0};
        var uPct=f.inflow>0?Math.min(100,Math.round(f.outflow/f.inflow*100)):0;
        h+='<div class="fund-bar-item"><div class="fund-bar-head"><span class="fund-bar-name" style="color:'+FUND_COLORS[fn]+'">'+fn+'</span><span class="fund-bar-pct" style="color:'+FUND_COLORS[fn]+'">'+uPct+'% used</span></div>';
        h+='<div class="fund-bar-track"><div class="fund-bar-fill" style="width:'+uPct+'%;background:'+FUND_COLORS[fn]+'"></div></div>';
        h+='<div class="fund-bar-sub"><span>In: '+fmtD(f.inflow)+'</span><span>Out: '+fmtD(f.outflow)+'</span><span style="color:'+(f.balance>=0?'#2d8a32':'#cc3333')+'">Bal: '+fmtD(f.balance)+'</span></div></div>';
    }
    return h;
}

function renderUpcoming(){
    var up=[],today=td();
    for(var i=0;i<D.psSch.length;i++){var s=D.psSch[i],sid=s.id;
        if(s.terms==='installment'&&s.installments){for(var j=0;j<s.installments.length;j++){var inst=s.installments[j],iPaid=getInstPaidUSD(sid,j),iTotal=cv(s.totalCost*inst.pct/100,s.cur||'USD','USD');if(iPaid<iTotal*0.99)up.push({v:s.vendor,d:inst.date||'--',a:Math.max(0,iTotal-iPaid),l:'T'+(j+1)+' '+inst.pct+'%'})}}
        else if(s.terms==='monthly'){var st=getSchStatus(sid);if(st.pct<99){var mc=monthCount(s.startDate,s.endDate),ma=mc>0?cv(s.totalCost,s.cur||'USD','USD')/mc:0;up.push({v:s.vendor,d:s.startDate||'--',a:ma,l:'Monthly'})}}
    }
    up.sort(function(a,b){return a.d<b.d?-1:1});up=up.slice(0,8);
    if(!up.length)return '<div style="text-align:center;padding:20px;color:var(--t3);font-size:.72rem">No upcoming</div>';
    var h='';for(var i=0;i<up.length;i++){var u=up[i];
        h+='<div class="upc-item"><div><div class="upc-vendor">'+H(u.v)+'</div><div class="upc-tag">'+u.l+'</div></div><div style="text-align:right"><div class="upc-amt">'+fmtD(u.a)+'</div><div class="upc-date">'+u.d+'</div></div></div>';
    }
    return h;
}

function showSummary(){

function buildTxList(){var txs=[];for(var i=0;i<D.pays.length;i++){var p=D.pays[i];txs.push({type:'payment',date:p.date,entity:p.vendor,fund:p.fund||'Other',amount:p.amt,cur:p.cur,usd:cv(p.amt,p.cur,'USD'),id:p.id,status:'Paid',schLink:p.psSchId||'',instIdx:p.instIdx})}for(var i=0;i<D.invSch.length;i++){var r=D.invSch[i];txs.push({type:'investment',date:r.date,entity:r.remarks||'Investment',fund:r.fund||'Other',amount:r.amount,cur:r.cur||'USD',usd:cv(r.amount,r.cur||'USD','USD'),id:r.id,status:r.status})}txs.sort(function(a,b){return b.date<a.date?-1:1});return txs}
function showHistory(){var h=cbar("DC=this.value;localStorage.setItem('ss_DC',this.value);showHistory()");var allTx=buildTxList();var filt=allTx.filter(function(t){if(hFilter.type!=='all'&&t.type!==hFilter.type)return false;if(hFilter.fund!=='all'&&t.fund!==hFilter.fund)return false;if(hFilter.q&&t.entity.toLowerCase().indexOf(hFilter.q.toLowerCase())<0)return false;return true});var tP=0,tI=0;for(var i=0;i<filt.length;i++){if(filt[i].type==='payment')tP+=filt[i].usd;else tI+=filt[i].usd}h+='<div class="stats"><div class="si" style="border-left:4px solid #2874a6"><div class="sl">Total</div><div class="sv" style="color:#2874a6">'+filt.length+'</div></div><div class="si" style="border-left:4px solid #cc3333"><div class="sl">Payments</div><div class="sv" style="color:#cc3333">'+fmtD(tP)+'</div></div><div class="si" style="border-left:4px solid #2d8a32"><div class="sl">Investments</div><div class="sv" style="color:#2d8a32">'+fmtD(tI)+'</div></div><div class="si" style="border-left:4px solid '+(tI-tP>=0?'#2d8a32':'#cc3333')+'"><div class="sl">Net</div><div class="sv" style="color:'+(tI-tP>=0?'#2d8a32':'#cc3333')+'">'+fmtD(tI-tP)+'</div></div></div>';h+='<div class="fbar"><label>Type:</label><select onchange="hFilter.type=this.value;showHistory()"><option value="all"'+(hFilter.type==='all'?' selected':'')+'>All</option><option value="payment"'+(hFilter.type==='payment'?' selected':'')+'>Payments</option><option value="investment"'+(hFilter.type==='investment'?' selected':'')+'>Investments</option></select><label>Fund:</label><select onchange="hFilter.fund=this.value;showHistory()"><option value="all"'+(hFilter.fund==='all'?' selected':'')+'>All</option>';for(var i=0;i<FUNDS.length;i++)h+='<option value="'+FUNDS[i]+'"'+(hFilter.fund===FUNDS[i]?' selected':'')+'>'+FUNDS[i]+'</option>';h+='</select><input type="text" value="'+H(hFilter.q)+'" onkeyup="hFilter.q=this.value;showHistory()" style="width:auto;min-width:80px" placeholder="Search..."></div>';if(!filt.length){h+='<di "card"><div class="ch"><span class="ct">Manual</span></div><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px">';for(var k2 in FX)h+='<div class="fg"><label class="fl">'+k2+'</label><input type="number" id="fx_'+k2+'" value="'+FX[k2].r+'" step="any"></div>';h+='</div><div style="display:flex;justify-content:flex-end;margin-top:8px"><button class="btn bp" onclick="saveFx()">Save</button></div></div>'}G('app').innerHTML=h}

var TLBL={costD:'Dashboard',cf:'Cash Flow',invSch:'Investment',pays:'Payments',paySch:'Pay Schedule',vendors:'Vendors',history:'History',cur:'Currency',cloud:'Cloud'};
function openExport(){mOpen('Export','<div style="margin-bottom:12px"><div style="font-family:Space Grotesk;font-size:.88rem;font-weight:700">Export: <span style="color:#2d8a32">'+(TLBL[tab]||tab)+'</span></div></div><div class="exp-grid"><div class="exp-card excel" onclick="doExportXlsx()"><div class="exp-icon">X</div><div class="exp-title">Excel</div></div><div class="exp-card pdf" onclick="doExportPdf()"><div class="exp-icon">P</div><div class="exp-title">PDF</div></div><div class="exp-card ppt" onclick="doExportPpt()"><div class="exp-icon">T</div><div class="exp-title">PowerPoint</div></div></div>','<button class="btn" onclick="mClose()">Close</button>')}
function getExpData(){var r={title:TLBL[tab]||tab,table:[]};if(tab==='pays'){r.table=[['Vendor','Category','Fund','Terms','Scheduled','Paid','Remaining','Paid%','Status','#Payments']];var rows=buildVendorSummaryRows();rows.sort(function(a,b){return a.vendor.localeCompare(b.vendor)});for(var i=0;i<rows.length;i++){var v=rows[i];r.table.push([v.vendor,v.cat,v.fund,v.terms,v.scheduled>0?fmtD(v.scheduled):'-',fmtD(v.paid),v.remaining>0?fmtD(v.remaining):'--',v.pct+'%',v.status,v.payCount])}}else if(tab==='paySch'){r.table=[['Vendor','Terms','Category','Total','Fund','Status']];for(var i=0;i<D.psSch.length;i++){var x=D.psSch[i],st=getSchStatus(x.id);r.table.push([x.vendor,x.terms,x.category,fmtC(x.totalCost,x.cur),x.fund,st.label])}}else if(tab==='vendors'){var vs=getVendorSummary(),vk=Object.keys(vs).sort();r.table=[['Vendor','Scheduled','Paid','Paid%']];for(var i=0;i<vk.length;i++){var v=vs[vk[i]];r.table.push([vk[i],fmtD(v.totalSch),fmtD(v.totalPaid),pct(v.totalPaid,v.totalSch)+'%'])}}else{var txs=buildTxList().slice(0,50);r.table=[['Date','Type','Entity','Fund','Amount','Status']];for(var i=0;i<txs.length;i++){var t=txs[i];r.table.push([t.date,t.type,t.entity,t.fund,(t.type==='payment'?'-':'+')+fmtD(t.usd),t.status])}}return r}
function doExportXlsx(){var d=getExpData();if(d.table.length<2)return;var wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(d.table),d.title.substring(0,31));XLSX.writeFile(wb,'StellarSeeds_'+td()+'.xlsx');notify('Exported');mClose()}
function doExportPdf(){var doc=new jspdf.jsPDF();doc.setFontSize(16);doc.setTextColor(40,116,166);doc.text('Stellar Seeds - '+getExpData().title,14,18);var d=getExpData();if(d.table.length>1)doc.autoTable({startY:28,head:[d.table[0]],body:d.table.slice(1),theme:'grid',headStyles:{fillColor:[40,116,166]},styles:{fontSize:7}});doc.save('StellarSeeds_'+td()+'.pdf');notify('Exported');mClose()}

function initCloud(){var c;try{c=JSON.parse(localStorage.getItem('ss_cloud'))}catch(e){}if(!c||!c.databaseURL)return false;try{if(typeof firebase!=='undefined'){var cfg={databaseURL:c.databaseURL};if(c.apiKey)cfg.apiKey=c.apiKey;if(!firebase.apps.length)firebase.initializeApp(cfg);db=firebase.database();try{auth=firebase.auth()}catch(e){}cOn=true;return true}}catch(e){}return false}
function cSave(){if(!db)return;skipSync=true;db.ref('ss').update({costs:D.costs,pays:D.pays,psSch:D.psSch,invSch:D.invSch,_ts:Date.now()}).then(function(){setTimeout(function(){skipSync=false},1000)}).catch(function(e){skipSync=false;setDot(isPermErr(e)?'err':'wr')})}
function syncFromCloud(){if(!db)return;db.ref('ss').once('value').then(function(s){var v=s.val();if(!v)return;['costs','pays','psSch','invSch'].forEach(function(k){if(v[k]&&Array.isArray(v[k])){D[k]=v[k];localStorage.setItem('ss_'+k,JSON.stringify(v[k]))}});doRender()}).catch(function(e){setDot(isPermErr(e)?'err':'wr')})}
function checkAuth(){if(!auth){showMain();return}auth.onAuthStateChanged(function(u){if(u){curUser=u;showMain();syncFromCloud()}else{curUser=null;showLogin()}})}

function showMain(){G('loginScr').style.display='none';G('mainApp').style.display='block';if(curUser){G('hUser').textContent=curUser.email||'';G('hUser').style.display='inline';G('hOut').style.display='inline'}else{G('hUser').style.display='none';G('hOut').style.display='none';setDot('off');setLbl('Local')}load();nav();doRender()}
window.togAuth=function(){authMode=authMode==='login'?'signup':'login';G('lTitle').textContent=authMode==='signup'?'Create Account':'Sign In';G('lBtn').textContent=authMode==='signup'?'Sign Up':'Sign In'};
window.doLogin=function(){var em=G('lEmail').value.trim(),pw=G('lPass').value;if(!em||!pw)return;if(!auth)return;G('lBtn').textContent='Wait...';if(authMode==='signup')auth.createUserWithEmailAndPassword(em,pw).catch(function(e){G('lBtn').textContent='Sign Up';G('lErr').textContent=e.code;G('lErr').style.display='block'});else auth.signInWithEmailAndPassword(em,pw).catch(function(e){G('lBtn').textContent='Sign In';G('lErr').textContent=e.code;G('lErr').style.display='block'})};
window.doLogout=function(){if(auth)auth.signOut();else{curUser=null;showLogin()}};
window.skipAuth=function(){curUser=null;showMain();notify('Local mode')};
function save(){localStorage.setItem('ss_costs',JSON.stringify(D.costs));localStorage.setItem('ss_pays',JSON.stringify(D.pays));localStorage.setItem('ss_psSch',JSON.stringify(D.psSch));localStorage.setItem('ss_invSch',JSON.stringify(D.invSch));cSave()}
function lj(k,d){try{var v=JSON.parse(localStorage.getItem('ss_'+k));if(v&&((Array.isArray(v)&&v.length)||(!Array.isArray(v)&&Object.keys(v).length)))return v}catch(e){}return d}
function load(){D.costs=lj('costs',[]);D.pays=lj('pays',[]);D.psSch=lj('psSch',[]);D.invSch=lj('invSch',[]);DC=localStorage.getItem('ss_DC')||'USD';currencyMode=localStorage.getItem('ss_curMode')||'live';cfFund=localStorage.getItem('ss_cfFund')||'all';cfMonths=parseInt(localStorage.getItem('ss_cfMo'))||12;cfLookback=parseInt(localStorage.getItem('ss_cfLb'));if(isNaN(cfLookback))cfLookback=6;var sr=null;try{sr=JSON.parse(localStorage.getItem('ss_curRates'))}catch(e){}if(sr)for(var k in sr)if(FX[k])FX[k].r=sr[k];liveLastUpdated=localStorage.getItem('ss_curLiveTS')||null;if(currencyMode==='live')fetchLiveRates();var idMap={};for(var i=0;i<D.psSch.length;i++){var s=D.psSch[i];if(typeof s.id==='number'||!s.id){var newId=uid();idMap[String(s.id)]=newId;s.id=newId}}for(var i=0;i<D.pays.length;i++){var p=D.pays[i];if(p.psSchId&&idMap[String(p.psSchId)])p.psSchId=idMap[String(p.psSchId)]}if(Object.keys(idMap).length)save()}
var tabs=[{id:'costD',l:'Dashboard'},{id:'pays',l:'Payments'},{id:'paySch',l:'Pay Schedule'},{id:'invSch',l:'Investment'},{id:'vendors',l:'Vendors'},{id:'history',l:'History'},{id:'cur',l:'Currency'},{id:'cloud',l:'Cloud'}];
var R={costD:showSummary,pays:showPays,paySch:showPaySch,invSch:showInvSch,vendors:showVendors,history:showHistory,cur:showCur,cloud:showCloud};
function nav(){var h='';for(var i=0;i<tabs.length;i++)h+='<button class="'+(tab===tabs[i].id?'act':'')+'" onclick="go(\''+tabs[i].id+'\')">'+tabs[i].l+'</button>';G('nbar').innerHTML=h}
function go(id){tab=id;nav();doRender()}
function doRender(){try{if(R[tab])R[tab]()}catch(e){G('app').innerHTML='<div class="card" style="color:#cc3333"><b>Error:</b> '+H(e.message)+'<pre style="font-size:.6rem;white-space:pre-wrap">'+H(e.stack)+'</pre></div>'}}
function fetchLiveRates(){if(liveFetching)return;liveFetching=true;var ql=[];for(var k in FX)if(k!=='USD')ql.push(k);var done=false;function ok(){if(done)return;done=true;liveLastUpdated=new Date().toLocaleString();localStorage.setItem('ss_curRates',JSON.stringify(getRateSnap()));localStorage.setItem('ss_curLiveTS',liveLastUpdated);liveFetching=false;doRender()}fetch('https://api.frankfurter.dev/v2/rates?base=USD&quotes='+ql.join(',')).then(function(r){if(!r.ok)throw 0;return r.json()}).then(function(data){if(data&&data.rates){for(var k2 in data.rates)if(FX[k2])FX[k2].r=data.rates[k2];ok()}else throw 0}).catch(function(){fetch('https://open.er-api.com/v6/latest/USD').then(function(r){if(!r.ok)throw 0;return r.json()}).then(function(d){if(d&&d.rates){for(var k3 in FX)if(k3!=='USD'&&d.rates[k3])FX[k3].r=d.rates[k3];ok();}else throw 0}).catch(function(){liveFetching=false})})}
function getRateSnap(){var s={};for(var k in FX)s[k]=FX[k].r;return s}
setInterval(function(){if(currencyMode==='live')fetchLiveRates()},600000);
initCloud();checkAuth();
} catch(ie){document.getElementById('loginScr').style.display='none';document.getElementById('mainApp').style.display='block';document.getElementById('app').innerHTML='<div class="card" style="color:#cc3333"><b>Init Error:</b> '+ie.message+'<pre>'+ie.stack+'</pre></div>'}
</script>
</body>
